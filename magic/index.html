/* ============================== PHYSICS ============================== */
const SOLID = "#G=?MUSPTJIF";
function tileAt(tx, ty) {
  const L = game.level;
  if (tx < 0 || tx >= L.width) return "#";
  if (ty < 0) return " ";
  if (ty >= ROWS) return " ";
  return L.grid[ty][tx];
}
function isSolid(c) { return SOLID.includes(c); }

function moveEntity(e, onBumpHead) {
  // horizontal
  e.x += e.vx;
  let x0 = Math.floor(e.x / TILE), x1 = Math.floor((e.x + e.w - 0.01) / TILE);
  let y0 = Math.floor(e.y / TILE), y1 = Math.floor((e.y + e.h - 0.01) / TILE);
  if (e.vx > 0) {
    for (let ty = y0; ty <= y1; ty++) if (isSolid(tileAt(x1, ty))) { e.x = x1*TILE - e.w - 0.01; e.hitWall = true; break; }
  } else if (e.vx < 0) {
    for (let ty = y0; ty <= y1; ty++) if (isSolid(tileAt(x0, ty))) { e.x = (x0+1)*TILE + 0.01; e.hitWall = true; break; }
  }
  // vertical
  e.y += e.vy;
  x0 = Math.floor(e.x / TILE); x1 = Math.floor((e.x + e.w - 0.01) / TILE);
  y0 = Math.floor(e.y / TILE); y1 = Math.floor((e.y + e.h - 0.01) / TILE);
  e.grounded = false;
  if (e.vy > 0) {
    for (let tx = x0; tx <= x1; tx++) if (isSolid(tileAt(tx, y1))) {
      e.y = y1*TILE - e.h; e.vy = 0; e.grounded = true; break;
    }
  } else if (e.vy < 0) {
    let bumped = null, bestDist = 1e9;
    for (let tx = x0; tx <= x1; tx++) if (isSolid(tileAt(tx, y0))) {
      e.y = (y0+1)*TILE + 0.01; e.vy = 0;
      const cx = e.x + e.w/2, d = Math.abs((tx+0.5)*TILE - cx);
      if (d < bestDist) { bestDist = d; bumped = tx; }
    }
    if (bumped !== null && onBumpHead) onBumpHead(bumped, y0);
  }
}

function bumpBlock(tx, ty) {
  const c = tileAt(tx, ty), L = game.level;
  if (c === "?") {
    L.grid[ty][tx] = "U";
    game.coins++; game.score += 100; SFX.coin();
    game.pops.push({ x:(tx+0.5)*TILE, y:ty*TILE, t:0 });
  } else if (c === "M") {
    L.grid[ty][tx] = "U";
    game.score += 100; SFX.sprout();
    // mushroom when small, fire flower when already big (like SMB)
    game.powerups.push({ x:tx*TILE + 2, y:ty*TILE + 2, w:12, h:12,
      vx:0.7, vy:0, type: player.power === 0 ? "mushroom" : "flower", rise:28 });
  } else if (c === "=") {
    if (player.power > 0) {                  // only big kids break bricks
      L.grid[ty][tx] = " ";
      game.score += 50; SFX.brick();
      for (let i = 0; i < 6; i++)
        game.particles.push({ x:(tx+0.5)*TILE, y:(ty+0.5)*TILE,
          vx:(i%2?1:-1)*(0.6+i*0.25), vy:-2.2-(i%3)*0.7, t:0, c:"#b46a36" });
    } else SFX.bump();
  } else if (isSolid(c)) {
    SFX.bump();
  }
}

function applyDamage() {
  if (player.inv > 0 || player.glow > 0) return;   // Sparkle is indestructible while glowing
  if (player.shielding) {                          // Icy's wing shield blocks the hit
    SFX.bump();
    for (let i = 0; i < 4; i++) game.particles.push({ x: player.x + player.w/2 + player.facing*7,
      y: player.y + player.h*0.4 + (i-1.5)*3, vx: player.facing*1.2 + Math.random()-0.5,
      vy: -Math.random()*1.4, t: 0, c: "#bfe4ff" });
    return;
  }
  if (player.power > 0) {
    player.power--;
    if (player.power === 0) { player.y += 8; player.h = 16; }
    // camouflage after a hit — Appy's lasts exactly 8 seconds
    player.inv = CHARS[heroKey].look === "apple" ? 480 : CHARS[heroKey].kind === "bunny" ? 600 : 150;
    SFX.shrink();
  } else {
    killPlayer();
  }
}

/* Appy's split: when she's BIG, touching a bad guy splits her in half onto it —
   the bad guy is squashed and she's unhurt (then she needs a moment to regrow). */
function trySplit(victim) {
  if (CHARS[heroKey].look !== "apple" || player.power <= 0 || player.splitCool > 0 || player.inv > 0) return false;
  victim.dead = 1; if (typeof victim.vy === "number") victim.vy = Math.min(victim.vy, -1);
  game.score += 200; SFX.stomp();
  player.splitT = 30; player.splitCool = 180;      // ~3s before she can split again
  const c = player.power >= 2 ? "#ffd94d" : "#7ed058";
  for (let i = 0; i < 8; i++) game.particles.push({ x: player.x + player.w/2 + (i%2 ? 5 : -5),
    y: player.y + player.h*0.4 + (i-4)*1.6, vx: (i%2 ? 1 : -1) * (0.8 + Math.random()),
    vy: -1 - Math.random()*1.6, t: 0, c: i % 3 ? c : "#fdf3dc" });
  return true;
}

function bossHit() {
  const B = game.boss;
  B.hp--; B.stun = 50; SFX.stomp();
  game.score += 500;
  if (B.hp <= 0) { B.dead = true; B.deadT = 0; B.vy = -4.5; game.score += 5000; SFX.clear(); }
}

function collectCoins() {
  const x0 = Math.floor(player.x / TILE), x1 = Math.floor((player.x + player.w) / TILE);
  const y0 = Math.floor(player.y / TILE), y1 = Math.floor((player.y + player.h) / TILE);
  for (let ty = y0; ty <= y1; ty++) for (let tx = x0; tx <= x1; tx++) {
    if (tileAt(tx, ty) === "o") {
      game.level.grid[ty][tx] = " ";
      game.coins++; game.score += 100; SFX.coin();
      game.pops.push({ x:(tx+0.5)*TILE, y:ty*TILE, t:0 });
    }
  }
}

/* ============================== UPDATE ============================== */
/* Super Mario Bros movement constants (px/frame @ 60fps, 16px tiles) */
const WALK_MAX = 1.5625, RUN_MAX = 2.5625;
const ACC_WALK = 0.0374, ACC_RUN = 0.0556, DEC_REL = 0.0508, DEC_SKID = 0.1016;
const MAX_FALL = 4.0;
/* SMB jump: initial velocity + gravity depend on takeoff speed */
function jumpTier(speed) {
  const s = Math.abs(speed);
  if (s < 1.0)    return { v:-4.0, hold:0.125,   fall:0.4375  };
  if (s < 2.3125) return { v:-4.0, hold:0.1172,  fall:0.40625 };
  return            { v:-5.0, hold:0.15625, fall:0.5625  };
}

function setPower(n) {
  if (n > 0 && player.h === 16) { player.y -= 8.01; player.h = 24; }
  if (n === 0 && player.h === 24) { player.y += 8; player.h = 16; }
  player.power = n;
}

function doPortal() {
  const L = game.level;
  const dir = Math.random() < 0.5 ? -1 : 1;
  const dist = 14 + Math.floor(Math.random() * 24);          // 14–37 tiles away
  let tx = Math.max(2, Math.min(L.width - 3, Math.floor((player.x + player.w/2)/TILE) + dir*dist));
  const groundRow = cx => { for (let y = 2; y < ROWS-1; y++)
    if (isSolid(tileAt(cx,y)) && !isSolid(tileAt(cx,y-1)) && !isSolid(tileAt(cx,y-2))) return y; return -1; };
  let ty = groundRow(tx);
  if (ty < 0) for (let d=1; d<=5 && ty<0; d++) for (const s of [1,-1]) {     // pit? hop to nearby ground
    const nx = tx + s*d; if (nx < 2 || nx >= L.width-2) continue;
    const r = groundRow(nx); if (r >= 0) { tx = nx; ty = r; break; }
  }
  if (ty < 0) ty = 12;
  spawnPortal(player.x + player.w/2, player.y + player.h/2);  // depart swirl
  player.x = tx*TILE; player.y = ty*TILE - player.h; player.vx = 0; player.vy = 0;
  spawnPortal(player.x + player.w/2, player.y + player.h/2);  // arrive swirl
  player.portalCool = 45; player.inv = Math.max(player.inv, 24); SFX.grow();
  game.camX = Math.max(0, Math.min(player.x + player.w/2 - VIEW_W*0.42, L.width*TILE - VIEW_W));
}
function spawnPortal(x, y) {
  if (!game.portalFx) game.portalFx = [];
  game.portalFx.push({ x, y, t: 0 });
  const rc = ["#ff5e6c","#ffd23e","#5ecb6a","#4aa6f0","#9b6cff"];
  for (let i = 0; i < 10; i++) { const a = i*0.63;
    game.particles.push({ x, y, vx: Math.cos(a)*1.8, vy: Math.sin(a)*1.8 - 0.4, t: 0, c: rc[i%5] }); }
}

function updatePlay() {
  syncKeys();
  if (player.inv > 0) player.inv--;
  if (player.glow > 0) player.glow--;
  if (player.dumpSparkle > 0) player.dumpSparkle--;
  if (player.portalCool > 0) player.portalCool--;
  if (player.splitT > 0) player.splitT--;
  if (player.splitCool > 0) player.splitCool--;

  // --- Icy's wing shield: hold to block everything (she hunkers down, can't walk) ---
  player.shielding = CHARS[heroKey].look === "penguin" && input.shield && player.grounded;
  if (player.shielding) { player.vx *= 0.55; input.jumpPressed = false; player.jumpBuf = 0; }

  // --- horizontal: walk/auto-run with SMB accel, release decel and skid ---
  const dir = player.shielding ? 0 : (input.right ? 1 : 0) - (input.left ? 1 : 0);
  if (dir !== 0) {
    if (dir === player.runDir) player.runCharge++;
    else { player.runCharge = 0; player.runDir = dir; }
  } else player.runCharge = 0;
  const horse = CHARS[heroKey].look === "horse";     // Misty gallops: quick to run, and FAST
  const running = player.runCharge > (horse ? 10 : 30);
  const maxV = (running ? RUN_MAX : WALK_MAX) * (horse ? 1.45 : 1);
  // ice is slippery — low grip means you keep sliding. Northern Light skates best.
  const icy = game.level.icy && player.grounded;
  const grip = icy ? (CHARS[heroKey].look === "fox" ? 0.62 : 0.32) : 1;

  if (dir !== 0) {
    player.facing = dir;
    if (player.vx * dir < 0) {
      player.vx += dir * (player.grounded ? DEC_SKID * (icy ? grip : 1) : ACC_RUN);   // skid turn
    } else if (Math.abs(player.vx) < maxV) {
      player.vx += dir * (running ? ACC_RUN : ACC_WALK) * (horse ? 1.5 : 1);
      if (Math.abs(player.vx) > maxV) player.vx = dir * maxV;
      if (horse && player.grounded && Math.abs(player.vx) > 2.4 && (game.timer & 7) === 0)
        game.particles.push({ x: player.x + player.w/2 - dir*8, y: player.y + player.h - 1,
          vx: -dir*0.6, vy: -0.5 - Math.random()*0.7, t: 0, c: "rgba(230,220,200,.7)" });   // gallop dust
    } else if (player.grounded && Math.abs(player.vx) > maxV) {
      player.vx -= Math.sign(player.vx) * DEC_REL;                 // ease back to walk speed
    }
  } else if (player.grounded && player.vx !== 0) {
    const s = Math.sign(player.vx);
    player.vx -= s * DEC_REL * grip;
    if (player.vx * s < 0) player.vx = 0;
  }

  // --- jump (buffer + coyote for kid-friendliness) ---
  if (input.jumpPressed) { player.jumpBuf = 7; input.jumpPressed = false; }
  if (player.grounded) { player.coyote = 5; player.jg = jumpTier(player.vx); }
  if (player.jumpBuf > 0 && player.coyote > 0) {
    const t = jumpTier(player.vx);
    player.vy = t.v; player.jg = t;
    if (CHARS[heroKey].look === "penguin") player.vy = t.v * 1.28;   // Icy jumps REALLY high
    player.coyote = 0; player.jumpBuf = 0; SFX.jump();
  }
  if (player.jumpBuf > 0) player.jumpBuf--;
  if (player.coyote > 0) player.coyote--;

  // --- gravity: light while rising & holding jump, heavy otherwise (SMB) ---
  const gMul = game.level.lowG ? 0.42 : 1;           // on the moon everything floats
  player.vy += ((player.vy < 0 && input.jump) ? player.jg.hold : player.jg.fall) * gMul;
  player.vy = Math.min(player.vy, MAX_FALL * (game.level.lowG ? 0.6 : 1));

  // --- magic flight: Bamboo flies on a carpet (20s), Rosalina floats (10s) ---
  if (player.grounded) player.fly = CHARS[heroKey].flyMax;
  player.flying = false;
  if (!player.grounded && input.jump && player.vy > -1.2 && player.fly > 0) {
    player.fly--; player.flying = true;
    const cloudKind = CHARS[heroKey].kind === "cloud";
    const target = cloudKind ? -0.9 : -1.7;
    player.vy += (target - player.vy) * (cloudKind ? 0.18 : 0.12);
    if ((game.timer & 3) === 0)
      game.particles.push({ x: player.x + player.w/2 + (Math.random() * 10 - 5),
        y: player.y + player.h, vx: 0, vy: 0.6, t: 20,
        c: cloudKind ? "rgba(200,225,255,.8)" : "rgba(150,210,90,.85)" });
  }

  player.hitWall = false;
  moveEntity(player, bumpBlock);
  collectCoins();

  // --- Cutie leaves a blooming flower trail when powered up (blue-star mode) ---
  if (CHARS[heroKey].look === "butterfly" && player.power >= 2 && (game.timer & 7) === 0 &&
      (Math.abs(player.vx) > 0.4 || !player.grounded)) {
    game.particles.push({ x: player.x + player.w/2 - player.facing*4 + (Math.random()*4-2),
      y: player.y + player.h - 2, vx: -player.facing*0.2, vy: -0.3 - Math.random()*0.3,
      t: 0, conf: true, flower: true, c: ["#ff8ec4","#ffd166","#b88cff","#7fd0ff"][(game.timer>>3)%4] });
  }

  // --- trampoline bounce (playground) ---
  if (player.grounded) {
    const bx = Math.floor((player.x + player.w/2)/TILE), by = Math.floor((player.y + player.h + 1)/TILE);
    if (tileAt(bx, by) === "J") {
      player.vy = -8.6; player.grounded = false; player.coyote = 0; player.jumpBuf = 0;
      SFX.boing();
      for (let i=0;i<5;i++) game.particles.push({ x:(bx+0.5)*TILE + (i-2)*2.5, y:by*TILE,
        vx:(i-2)*0.5, vy:-1.4-Math.random()*1.6, t:0, c:"#ffd166" });
    }
  }

  // --- the playground runs its own (hazard-free) update ---
  if (game.inPlayground) { if (game.subArea === "waterpark") updateWaterparkExtras(); else updatePlaygroundExtras(); return; }

  // --- Sparkle's rainbow portal: teleport to a random spot, forward or back ---
  if (input.portalPressed) {
    input.portalPressed = false;
    if (CHARS[heroKey].look === "unicorn" && player.portalCool <= 0) doPortal();
  }

  // --- magic: Chun-me's stars / Chuckee's lightning ---
  if (player.shootCool > 0) player.shootCool--;
  if (input.firePressed) {
    input.firePressed = false;
    const cloudKind = CHARS[heroKey].kind === "cloud";
    const look = CHARS[heroKey].look;
    const fan = look === "dumpling" && player.dumpSparkle > 0;   // blue-gem mode: throw every color at once
    if (player.shootCool === 0 && game.fireballs.length < (fan ? 9 : 3)) {
      const kind = look === "fox" ? "snowflake" : look === "panda" ? "bamboo" : look === "butterfly" ? "rainbow" : look === "unicorn" ? "sparkle" : look === "dumpling" ? "dumpling" : look === "penguin" ? "fish" : look === "apple" ? "apple" : look === "horse" ? "crystal" : "bolt";
      const sx = player.x + (player.facing > 0 ? player.w : -6), sy = player.y + player.h * 0.35;
      const spd = (cloudKind ? 3.6 : 3.2) * player.facing;
      if (fan) {
        const ys = [-1.1, 0, 1.1];
        for (let i = 0; i < 3; i++) game.fireballs.push({ x: sx, y: sy, w: 5, h: 5,
          vx: spd, vy: ys[i], kind: "dumpling", t: 0, dumpTheme: ((game.timer>>1) + i*2) % 5 });
      } else {
        game.fireballs.push({ x: sx, y: sy, w: 5, h: 5, vx: spd, vy: 0,
          kind, t: 0, igloo: look === "fox", flower: look === "butterfly", dumpTheme: Math.floor(Math.random()*5), form: player.power });
      }
      player.shootCool = fan ? 11 : 16;
      if (cloudKind) SFX.bolt(); else SFX.star();
    }
  }
  for (const f of game.fireballs) {
    f.t++;
    if (f.kind === "pinkfire" || f.kind === "snowflake" || f.kind === "rainbow") f.vy = Math.min(f.vy + 0.12, 4);  // arc & fall
    f.hitWall = false;
    moveEntity(f);
    if (f.igloo && (f.grounded || f.hitWall)) { buildIgloo(f); f.gone = true; }
    else if (f.flower && (f.grounded || f.hitWall)) { buildFlower(f); f.gone = true; }
    else if (f.grounded || f.hitWall || f.t > 90 ||
        f.x < game.camX - 24 || f.x > game.camX + VIEW_W + 24 || f.y > LEVEL_H + 24) f.gone = true;
  }
  game.fireballs = game.fireballs.filter(f => !f.gone);

  // --- powerups (mushrooms walk, flowers sit) ---
  for (const p of game.powerups) {
    if (p.rise > 0) { p.rise--; p.y -= 0.5; }
    else if (p.type === "mushroom") {
      p.vy = Math.min(p.vy + 0.4375, MAX_FALL);
      p.hitWall = false;
      moveEntity(p);
      if (p.hitWall) p.vx = -p.vx;
      if (p.y > LEVEL_H + 40) p.gone = true;
    }
    if (p.rise < 20 &&
        player.x < p.x + p.w && player.x + player.w > p.x &&
        player.y < p.y + p.h && player.y + player.h > p.y) {
      p.gone = true; game.score += 1000;
      if (CHARS[heroKey].look === "unicorn") { player.glow = 300; SFX.grow(); }   // Sparkle: glow + indestructible 5s
      if (CHARS[heroKey].look === "dumpling") { player.dumpSparkle = 1200; SFX.grow(); }  // Squishy: blue gem → 20s sparkle, every-color dumplings
      if (p.type === "flower") { setPower(2); superBlast(); }      // blue star: super form + blast
      else { setPower(Math.max(1, player.power)); SFX.grow(); }    // mushroom never downgrades
      game.pops.push({ x: p.x + p.w/2, y: p.y, t: 0 });
    }
  }
  game.powerups = game.powerups.filter(p => !p.gone);
  refreshFireBtn();

  // animation
  if (Math.abs(player.vx) > 0.3 && player.grounded) {
    player.animT += Math.abs(player.vx);
    if (player.animT > 7) { player.animT = 0; player.frame = 1 - player.frame; }
  } else player.frame = 0;

  // fell in a pit
  if (player.y > LEVEL_H + 40) {
    // Icy can breathe underwater — she dives into the icy water and bursts back out
    if (CHARS[heroKey].look === "penguin" && game.level.theme === "icecastle") {
      player.y = LEVEL_H - 6; player.vy = -8.8; player.inv = Math.max(player.inv, 40);
      SFX.swim();
      for (let i = 0; i < 8; i++) game.particles.push({ x: player.x + player.w/2 + (i-4)*2.4,
        y: LEVEL_H - 4, vx: (i-4)*0.4, vy: -1.5 - Math.random()*2, t: 0, c: "#9be0ff" });
    } else { killPlayer(); return; }
  }

  // enemies
  const L = game.level;
  for (const e of L.enemies) {
    if (!e.active) {
      if (e.x < game.camX + VIEW_W + 24) e.active = true;
      else continue;
    }
    if (e.dead > 0) { e.dead++; continue; }
    e.vy = Math.min(e.vy + 0.4375, MAX_FALL);
    e.hitWall = false;
    moveEntity(e);
    if (e.hitWall) e.vx = -e.vx;
    e.frame = (Math.floor(game.timer / 14)) % 2;
    if (e.y > LEVEL_H + 60) { e.dead = 999; continue; }

    // fireball hits
    for (const f of game.fireballs) {
      if (!f.gone && f.x < e.x + e.w && f.x + f.w > e.x &&
          f.y < e.y + e.h && f.y + f.h > e.y) {
        e.dead = 1; f.gone = true; game.score += 200; SFX.stomp();
      }
    }
    if (e.dead > 0) continue;

    // player collision
    if (player.x < e.x + e.w && player.x + player.w > e.x &&
        player.y < e.y + e.h && player.y + player.h > e.y) {
      const feet = player.y + player.h;
      if (player.vy > 0.4 && feet - e.y < 9) {
        e.dead = 1; game.score += 200; SFX.stomp();
        const t = jumpTier(player.vx);
        player.vy = t.v; player.jg = t;     // SMB-style bounce; hold jump to ride it higher
      } else if (!trySplit(e)) {
        applyDamage();
        if (game.state !== "play") return;
      }
    }
  }
  L.enemies = L.enemies.filter(e => e.dead < 26 || !e.active);

  // --- angry pigeons: the flock dives at you for flying too long ---
  if (player.grounded) player.airT = 0; else player.airT++;
  const FLY_LIMIT = 210;                 // ~3.5s aloft before the flock takes notice
  if (!game.pigeonsOff && player.airT > FLY_LIMIT && game.pigeons.length < 3) {
    if (game.pigeonCool > 0) game.pigeonCool--;
    else {
      game.pigeonCool = 75;
      const fromLeft = (player.x + player.w/2) > (game.camX + VIEW_W/2);
      game.pigeons.push({
        x: fromLeft ? game.camX - 16 : game.camX + VIEW_W + 4,
        y: Math.max(6, player.y - 28 - Math.random()*26),
        w: 14, h: 11, vx: fromLeft ? 1.2 : -1.2, vy: 0,
        dead: 0, flap: Math.random()*6, facing: fromLeft ? 1 : -1, leaving: false });
      SFX.coo();
    }
  }
  for (const pg of game.pigeons) {
    pg.flap += 0.55;
    if (pg.dead > 0) { pg.dead++; pg.vy = Math.min(pg.vy + 0.3, 4); pg.y += pg.vy; pg.x += pg.vx * 0.4; continue; }
    if (player.airT === 0) pg.leaving = true;     // you touched the ground — the flock peels off
    if (pg.leaving) {
      pg.vy += -0.06;
      pg.vx += (pg.x < player.x ? -0.07 : 0.07);
    } else {                                       // home in on the flyer
      const dx = (player.x + player.w/2) - (pg.x + pg.w/2);
      const dy = (player.y + player.h/2) - (pg.y + pg.h/2);
      pg.vx += Math.sign(dx) * 0.055;
      pg.vy += Math.sign(dy) * 0.05 + Math.sin(pg.flap) * 0.03;   // bobbing dive
    }
    pg.vx = Math.max(-1.7, Math.min(1.7, pg.vx));
    pg.vy = Math.max(-1.7, Math.min(1.7, pg.vy));
    if (pg.vx < -0.05) pg.facing = -1; else if (pg.vx > 0.05) pg.facing = 1;
    pg.x += pg.vx; pg.y += pg.vy;
    if (pg.x < game.camX - 70 || pg.x > game.camX + VIEW_W + 70 || pg.y > LEVEL_H + 40 || pg.y < -90)
      pg.gone = true;

    // shot down by stars / bolts
    for (const f of game.fireballs) {
      if (!f.gone && f.x < pg.x + pg.w && f.x + f.w > pg.x &&
          f.y < pg.y + pg.h && f.y + f.h > pg.y) {
        pg.dead = 1; f.gone = true; pg.vy = -1.5; game.score += 150; SFX.stomp();
        for (let i = 0; i < 7; i++)
          game.particles.push({ x: pg.x + 7, y: pg.y + 5,
            vx: Math.cos(i)*1.6, vy: Math.sin(i)*1.6 - 0.5, t: 0, c: "#cfd6df" });
      }
    }
    if (pg.dead > 0) continue;

    // touching the player — stomp it, or it pecks you
    if (!pg.leaving &&
        player.x < pg.x + pg.w && player.x + player.w > pg.x &&
        player.y < pg.y + pg.h && player.y + player.h > pg.y) {
      const feet = player.y + player.h;
      if (player.vy > 0.4 && feet - pg.y < 8) {
        pg.dead = 1; pg.vy = -1; game.score += 150; SFX.stomp();
        const t = jumpTier(player.vx); player.vy = t.v; player.jg = t;   // bounce off it
      } else if (!trySplit(pg)) {
        applyDamage();
        if (game.state !== "play") return;
      }
    }
  }
  game.pigeons = game.pigeons.filter(pg => !pg.gone && pg.dead < 30);

  // --- Bowser (castle boss) ---
  const B = game.boss;
  if (B && !B.dead) {
    if (!B.active && B.x < game.camX + VIEW_W + 60) B.active = true;
    if (B.active) {
      if (B.stun > 0) B.stun--;
      B.facing = player.x + player.w/2 < B.x + B.w/2 ? -1 : 1;
      B.x += B.vx;
      if (B.x < B.baseX - 30 || B.x > B.baseX + 30) B.vx = -B.vx;
      B.vy = Math.min(B.vy + 0.3, 5);
      B.y += B.vy;
      const floorY = 13*TILE - B.h;
      if (B.y >= floorY) { B.y = floorY; B.vy = 0; }
      if (--B.hopT <= 0) { B.hopT = 130 + (game.timer % 70); B.vy = -3.4; }
      if (--B.fireT <= 0) {
        B.fireT = 150;
        game.bossFlames.push({ x: B.x + (B.facing > 0 ? B.w + 2 : -14), y: B.y + 7,
                               w: 12, h: 6, vx: 1.5 * B.facing });
        SFX.brick();
      }
      for (const f of game.fireballs) {
        if (!f.gone && B.stun === 0 && f.x < B.x + B.w && f.x + f.w > B.x &&
            f.y < B.y + B.h && f.y + f.h > B.y) { f.gone = true; bossHit(); }
      }
      if (player.x < B.x + B.w && player.x + player.w > B.x &&
          player.y < B.y + B.h && player.y + player.h > B.y) {
        const feet = player.y + player.h;
        if (player.vy > 0.4 && feet - B.y < 14) {
          const t = jumpTier(player.vx);
          player.vy = t.v; player.jg = t;       // bounce off his head
          if (B.stun === 0) bossHit();
        } else if (B.stun < 30) {
          applyDamage();
          if (game.state !== "play") return;
        }
      }
    }
  } else if (B && B.dead && B.y < LEVEL_H + 80) {
    B.deadT++; B.vy = Math.min(B.vy + 0.25, 6); B.y += B.vy;
  }
  for (const fl of game.bossFlames) {
    fl.x += fl.vx;
    if (fl.x < game.camX - 30 || fl.x > game.camX + VIEW_W + 30) fl.gone = true;
    else if (player.inv === 0 &&
        player.x < fl.x + fl.w && player.x + player.w > fl.x &&
        player.y < fl.y + fl.h && player.y + player.h > fl.y) {
      fl.gone = true;
      applyDamage();
      if (game.state !== "play") return;
    }
  }
  game.bossFlames = game.bossFlames.filter(fl => !fl.gone);

  // --- Peach the pug, waiting in her cage ---
  if (game.pug) {
    if (!game.pug.free && game.boss.dead && game.boss.deadT > 40) { game.pug.free = true; SFX.sprout(); }
    if (game.pug.free) {
      game.pug.hopT++;
      if (Math.abs(player.x + player.w/2 - game.pug.x) < 14 && player.y + player.h > 11*TILE) {
        game.state = "clear"; game.timer = 0; game.rescued = true; game.score += 5000;
        SFX.clear(); spawnConfetti(game.pug.x, 100); showButtons(false);
      }
    }
  }

  // flag
  if (L.flagX && player.x + player.w/2 >= L.flagX * TILE) {
    game.state = "clear"; game.timer = 0; game.score += 1000; SFX.clear();
    spawnConfetti(L.flagX * TILE, 80);
    showButtons(false);
  }

  // --- stand on a pipe + press Down → slide into the playground ---
  player.onPipe = false;
  if (player.grounded) {
    const bx = Math.floor((player.x + player.w/2)/TILE), by = Math.floor((player.y + player.h + 1)/TILE);
    if (tileAt(bx, by) === "T") player.onPipe = true;
  }
  player.onDownPipe = player.onPipe;                 // every main-level pipe goes down
  if (player.onPipe && input.downPressed) { input.downPressed = false; enterPipe(); return; }
  refreshContextBtns();

  // camera
  const target = player.x + player.w/2 - VIEW_W * 0.42;
  game.camX += (target - game.camX) * 0.12;
  game.camX = Math.max(0, Math.min(game.camX, L.width * TILE - VIEW_W));
}

function updatePlaygroundExtras() {
  const L = game.level;

  // walk animation
  if (Math.abs(player.vx) > 0.3 && player.grounded) {
    player.animT += Math.abs(player.vx);
    if (player.animT > 7) { player.animT = 0; player.frame = 1 - player.frame; }
  } else player.frame = 0;

  // water slide — a scripted whoosh down the chute
  const s = L.slide;
  if (s) {
    const cx = player.x + player.w/2;
    if (cx > s.x0*TILE && cx < s.x1*TILE) {
      const frac = (cx - s.x0*TILE) / ((s.x1 - s.x0)*TILE);
      const lineY = s.topY + (s.botY - s.topY) * frac;
      const feet = player.y + player.h;
      if (feet >= lineY - 3 && feet <= lineY + 12 && player.vy >= -0.5) {
        player.y = lineY - player.h; player.vy = 0; player.grounded = true; player.facing = 1;
        if (player.vx < 2.6) player.vx += 0.3;
        if (game.timer % 4 === 0) game.particles.push({ x:cx, y:feet, vx:Math.random()-0.5, vy:-Math.random()*1.6, t:0, c:"#9be0ff" });
      }
    }
  }

  // puppies trot back and forth; hearts when you're near
  for (const pup of L.puppies) {
    pup.x += pup.vx;
    if (pup.x < pup.minX || pup.x > pup.maxX) pup.vx *= -1;
    pup.hopT++;
    if (Math.abs(player.x + player.w/2 - pup.x) < 22 && game.timer % 40 === 0) {
      game.pops.push({ x:pup.x, y:11*TILE, t:0, heart:true }); SFX.yip();
    }
  }

  // ice-cream stand hands you a treat when you walk up
  if (game.treatT > 0) game.treatT--;
  if (Math.abs(player.x + player.w/2 - L.iceCreamX) < 16 && game.treatT <= 0) {
    game.treatT = 100; game.score += 50; SFX.yum();
    game.pops.push({ x:L.iceCreamX, y:11*TILE, t:0, treat:true });
  }

  // pipes: the EXIT pipe leaves to the main game; the WATER PARK pipe dives deeper
  player.onPipe = false;
  let onParkPipe = false;
  if (player.grounded) {
    const bx = Math.floor((player.x + player.w/2)/TILE), by = Math.floor((player.y + player.h + 1)/TILE);
    const tc = tileAt(bx, by);
    if (tc === "T" || tc === "P") { player.onPipe = true; onParkPipe = Math.abs(bx - L.parkPipeX) <= 1; }
  }
  player.onDownPipe = onParkPipe;                     // only the water-park pipe goes down (▼ button)
  if (player.onPipe && input.downPressed) {
    input.downPressed = false;
    if (onParkPipe) enterWaterpark(); else exitArea();
    return;
  }

  if (player.y > LEVEL_H + 30) { player.x = 4*TILE; player.y = 12*TILE - player.h; player.vy = 0; }
  refreshContextBtns();

  // camera
  const target = player.x + player.w/2 - VIEW_W * 0.42;
  game.camX += (target - game.camX) * 0.12;
  game.camX = Math.max(0, Math.min(game.camX, L.width * TILE - VIEW_W));
}

function updateWaterparkExtras() {
  const L = game.level;

  // walk animation
  if (Math.abs(player.vx) > 0.3 && player.grounded) {
    player.animT += Math.abs(player.vx);
    if (player.animT > 7) { player.animT = 0; player.frame = 1 - player.frame; }
  } else player.frame = 0;

  // ride any of the five water slides
  for (const s of L.slides) {
    const cx = player.x + player.w/2;
    if (cx > s.x0*TILE && cx < s.x1*TILE) {
      const frac = (cx - s.x0*TILE) / ((s.x1 - s.x0)*TILE);
      const lineY = s.topY + (s.botY - s.topY) * frac;
      const feet = player.y + player.h;
      if (feet >= lineY - 3 && feet <= lineY + 12 && player.vy >= -0.5) {
        player.y = lineY - player.h; player.vy = 0; player.grounded = true; player.facing = 1;
        if (player.vx < 2.8) player.vx += 0.32;
        if (game.timer % 4 === 0) game.particles.push({ x:cx, y:feet, vx:Math.random()-0.5, vy:-Math.random()*1.6, t:0, c:"#9be0ff" });
      }
    }
  }

  // water gun — fire to shoot a water blob that arcs and falls
  if (input.firePressed) {
    input.firePressed = false;
    if (game.waterShots.length < 5) {
      game.waterShots.push({ x: player.x + (player.facing>0 ? player.w : -4), y: player.y + player.h*0.3,
        vx: 3.2*player.facing, vy: -5, t: 0 });   // strong arc so it sweeps high & low targets
      SFX.fire && SFX.fire();
    }
  }
  for (const ws of game.waterShots) {
    ws.t++; ws.vy = Math.min(ws.vy + 0.2, 6); ws.x += ws.vx; ws.y += ws.vy;
    for (const tg of L.targets) {                    // splash a target → a coin!
      if (tg.hit <= 0 && Math.abs(ws.x - tg.x) < tg.r + 3 && Math.abs(ws.y - tg.y) < tg.r + 3) {
        tg.hit = 80; game.coins++; game.score += 100; SFX.coin();
        game.pops.push({ x: tg.x, y: tg.y, t: 0 });
        ws.gone = true;
        for (let i=0;i<7;i++) game.particles.push({ x:ws.x, y:ws.y, vx:Math.random()*2.4-1.2, vy:-Math.random()*2.2, t:0, c:"#7fd0ff" });
      }
    }
    if (!ws.gone && (isSolid(tileAt(Math.floor(ws.x/TILE), Math.floor(ws.y/TILE))) || ws.t > 120 ||
        ws.y > LEVEL_H + 16 || ws.x < game.camX - 30 || ws.x > game.camX + VIEW_W + 30)) {
      for (let i=0;i<4;i++) game.particles.push({ x:ws.x, y:ws.y, vx:Math.random()*2-1, vy:-Math.random()*1.5, t:0, c:"#9be0ff" });
      ws.gone = true;
    }
  }
  game.waterShots = game.waterShots.filter(ws => !ws.gone);
  for (const tg of L.targets) { if (tg.hit > 0) tg.hit--; if (tg.hit <= 0) tg.y = tg.baseY + Math.sin((game.timer + tg.ph)*0.05)*5; }

  // exit pipe → back up to the playground (use the EXIT button; no down-pipes here)
  player.onPipe = false;
  if (player.grounded) {
    const bx = Math.floor((player.x + player.w/2)/TILE), by = Math.floor((player.y + player.h + 1)/TILE);
    const tc = tileAt(bx, by);
    if (tc === "T" || tc === "P") player.onPipe = true;
  }
  player.onDownPipe = false;
  if (player.onPipe && input.downPressed) { input.downPressed = false; exitArea(); return; }

  if (player.y > LEVEL_H + 30) { player.x = 4*TILE; player.y = 12*TILE - player.h; player.vy = 0; }
  refreshContextBtns();

  const target = player.x + player.w/2 - VIEW_W * 0.42;
  game.camX += (target - game.camX) * 0.12;
  game.camX = Math.max(0, Math.min(game.camX, L.width * TILE - VIEW_W));
}

function killPlayer() {
  game.state = "dead"; game.timer = 0;
  player.vy = -6.5; player.power = 0; player.airT = 0; game.pigeons = [];
  SFX.die();
  showButtons(false);
}

function spawnConfetti(x, n) {
  const colors = ["#ff5e7e","#ffd166","#6ee7b7","#7fb5ff","#c89bff"];
  for (let i = 0; i < n; i++)
    game.particles.push({ x: x + (Math.random()*60-30), y: Math.random()*120,
      vx: Math.random()*2-1, vy: Math.random()*-1.5-0.5, t: -Math.random()*30,
      c: colors[i % colors.length], conf: true });
}

function update() {
  game.timer++;

  // particles
  for (const p of game.particles) {
    if (p.t < 0) { p.t++; continue; }
    p.x += p.vx; p.y += p.vy;
    p.vy += p.conf ? 0.05 : 0.3;
    if (p.conf) p.vx *= 0.99;
    p.t++;
  }
  game.particles = game.particles.filter(p => p.t < (p.conf ? 220 : 60) && p.y < LEVEL_H + 80);
  if (game.superFx && ++game.superFx.t > 110) game.superFx = null;
  if (game.portalFx) { for (const pf of game.portalFx) pf.t++; game.portalFx = game.portalFx.filter(pf => pf.t < 26); }
  for (const c of game.pops) c.t++;
  game.pops = game.pops.filter(c => c.t < 28);

  if (game.state === "play") updatePlay();
  else if (game.state === "entering") {
    game.timer++; player.y += 1.7; player.frame = 0;
    if (game.timer > 22) { if (game.enterTo === "waterpark") loadWaterpark(); else loadPlayground(); }
  }
  else if (game.state === "exiting") {
    game.timer++; player.y += 1.7; player.frame = 0;
    if (game.timer > 22) finishExitArea();
  }
  else if (game.state === "dead") {
    player.vy += 0.35; player.y += player.vy;
    if (game.timer > 110) {
      game.lives--;
      if (game.lives <= 0) { game.state = "gameover"; game.timer = 0; }
      else startLevel(game.levelNum);
    }
  }
  else if (game.state === "clear") {
    // hero strolls right past the flag
    player.vx = 1.2; player.vy = Math.min(player.vy + 0.46, 7);
    moveEntity(player);
    player.animT += 1.2;
    if (player.animT > 7) { player.animT = 0; player.frame = 1 - player.frame; }
    if (game.timer > 170) {
      if (game.levelNum + 1 < LEVEL_COUNT) startLevel(game.levelNum + 1);
      else { game.state = "win"; game.timer = 0; spawnConfetti(game.camX + VIEW_W/2, 120); }
    }
  }
  else if (game.state === "gameover") {
    if (game.timer > 30 && tapX >= 0 && game.goHits) {
      for (const h of game.goHits) {
        if (tapX >= h.x && tapX <= h.x + h.w && tapY >= h.y && tapY <= h.y + h.h) {
          SFX.select();
          if (h.action === "continue") { game.lives = 3; startLevel(game.levelNum); }
          else goTitle();
          break;
        }
      }
    }
    if (keys["Enter"] && game.timer > 30) { SFX.select(); game.lives = 3; startLevel(game.levelNum); }
  }
  else if (game.state === "win") {
    if (game.timer % 50 === 0 && game.timer < 400) spawnConfetti(game.camX + VIEW_W/2, 30);
    if (game.timer > 90 && input.anyTap) goTitle();
  }
  else if (game.state === "title") updateTitle();

  input.anyTap = false; input.firePressed = false; input.downPressed = false; input.portalPressed = false; tapX = -1;
}

function updateTitle() {
  if (tapX >= 0) {
    const tg = game.pigeonToggleRect;
    if (tg && tapX >= tg.x && tapX <= tg.x + tg.w && tapY >= tg.y && tapY <= tg.y + tg.h) {
      setPigeonsOff(!game.pigeonsOff); return;
    }
    for (const lb of (game.levelBtnRects || [])) {          // pick a starting level
      if (tapX >= lb.x && tapX <= lb.x + lb.w && tapY >= lb.y && tapY <= lb.y + lb.h) {
        game.levelSelect = lb.n; SFX.select(); return;
      }
    }
    for (const c of game.titleCards) {
      if (tapX >= c.sx && tapX <= c.sx + c.sw && tapY >= c.sy && tapY <= c.sy + c.sh) {
        heroKey = c.key; SFX.select();
        startLevel(game.levelSelect || 0);
        return;
      }
    }
  }
  if (keys["Enter"]) { SFX.select(); startLevel(game.levelSelect || 0); }
}

/* ============================== DRAW ============================== */
/* Tiles are pre-rendered once at 3x resolution into offscreen canvases,
   then drawn scaled — detailed texture at zero per-frame cost. */
const SPR = {};
function tileSprite(c) {
  const themeKey = (game.level && game.level.theme) || "";
  const key = c + "|" + themeKey;
  if (SPR[key]) return SPR[key];
  const K = 3, R = 16 * K;
  const s = document.createElement("canvas");
  s.width = c === "T" ? R + 4*K : R; s.height = R;
  const t = s.getContext("2d");
  const lg = (x0,y0,x1,y1,stops) => {
    const gr = t.createLinearGradient(x0,y0,x1,y1);
    for (const [o,col] of stops) gr.addColorStop(o,col);
    return gr;
  };
  const speckle = (n, colors, y0, y1) => {
    for (let i = 0; i < n; i++) {
      t.fillStyle = colors[i % colors.length];
      const sx = Math.random() * R, sy = y0 + Math.random() * (y1 - y0);
      t.beginPath(); t.arc(sx, sy, 1 + Math.random()*1.8, 0, Math.PI*2); t.fill();
    }
  };
  switch (c) {
    case "G": {
      if (themeKey === "beach") {
        t.fillStyle = lg(0,0,0,R,[[0,"#efd7a2"],[1,"#cfae6e"]]); t.fillRect(0,0,R,R);
        speckle(12, ["#dfc18a","#b8945a","#f5e6c0"], 0, R);
        t.fillStyle = "rgba(255,250,225,.55)"; t.fillRect(0,0,R,6);
        break;
      }
      if (themeKey === "snow" || themeKey === "icecastle") {
        t.fillStyle = lg(0,0,0,R,[[0,"#cfe1f2"],[1,"#9fb9d6"]]); t.fillRect(0,0,R,R);   // icy body
        speckle(10, ["#e8f2fb","#bcd2e8","#ffffff"], R*0.4, R);
        t.fillStyle = lg(0,0,0,R*0.42,[[0,"#ffffff"],[1,"#dcebf8"]]); t.fillRect(0,0,R,R*0.4);  // snow cap
        t.fillStyle = "rgba(255,255,255,.9)";                                            // rounded snow lumps on top
        for (let i = 0; i < 4; i++) { t.beginPath(); t.arc(i*13+6, R*0.4, 7, Math.PI, 0); t.fill(); }
        t.fillStyle = "rgba(180,210,235,.5)"; t.fillRect(0, R*0.4, R, 2);
        break;
      }
      if (themeKey === "rainbow" || themeKey === "rainbowcastle") {
        t.fillStyle = lg(0,0,0,R,[[0,"#c79bff"],[1,"#9b6cff"]]); t.fillRect(0,0,R,R);   // candy body
        const rcg = ["#ff5e6c","#ff9f43","#ffd23e","#5ecb6a","#4aa6f0","#9b6cff"];      // rainbow top stripe
        const sw = R*0.34/rcg.length;
        for (let i = 0; i < rcg.length; i++) { t.fillStyle = rcg[i]; t.fillRect(0, i*sw, R, sw+0.5); }
        t.fillStyle = "rgba(255,255,255,.4)"; t.fillRect(0, 0, R, 3);
        speckle(8, ["#ffffff","#ffe0ff","#d9c8ff"], R*0.42, R);
        break;
      }
      if (themeKey === "moon") {
        t.fillStyle = lg(0,0,0,R,[[0,"#c8ccd8"],[1,"#8f95a8"]]); t.fillRect(0,0,R,R);   // moon dust
        t.fillStyle = "rgba(255,255,255,.5)"; t.fillRect(0, 0, R, 4);
        speckle(8, ["#aab0c2","#dde2ec","#7a8095"], R*0.2, R);
        t.strokeStyle = "rgba(90,95,115,.5)"; t.lineWidth = 1.5;                        // little craters
        t.beginPath(); t.arc(R*0.3, R*0.4, 5, 0.2, Math.PI+0.5); t.stroke();
        t.beginPath(); t.arc(R*0.72, R*0.68, 4, 0.4, Math.PI+0.2); t.stroke();
        break;
      }
      t.fillStyle = lg(0,0,0,R,[[0,"#8a5a32"],[1,"#6b431f"]]); t.fillRect(0,0,R,R);
      speckle(14, ["#7a4b24","#9c6a3c","#5e3a18"], R*0.4, R);
      t.fillStyle = lg(0,0,0,R*0.36,[[0,"#8fd95e"],[1,"#4c9a32"]]); t.fillRect(0,0,R,R*0.34);
      t.fillStyle = "#4c9a32";
      for (let i = 0; i < 8; i++) {
        t.beginPath();
        t.moveTo(i*6, R*0.34); t.lineTo(i*6+3, R*0.34 + 3 + (i%3)*2); t.lineTo(i*6+6, R*0.34);
        t.fill();
      }
      t.strokeStyle = "rgba(255,255,255,.25)"; t.lineWidth = 1.2;
      for (let i = 0; i < 5; i++) {
        t.beginPath(); t.moveTo(4 + i*10, R*0.3); t.lineTo(5.5 + i*10, R*0.08); t.stroke();
      }
      break;
    }
    case "#": {
      if (themeKey === "beach") {
        t.fillStyle = lg(0,0,0,R,[[0,"#d4b276"],[1,"#b08e52"]]); t.fillRect(0,0,R,R);
        speckle(14, ["#c4a266","#9a7a42","#e0c890"], 0, R);
        break;
      }
      if (themeKey === "snow" || themeKey === "icecastle") {
        t.fillStyle = lg(0,0,0,R,[[0,"#bcd2e8"],[1,"#90add0"]]); t.fillRect(0,0,R,R);   // packed snow/ice
        speckle(12, ["#a8c4dd","#d6e6f4","#86a4c8"], 0, R);
        break;
      }
      if (themeKey === "rainbow" || themeKey === "rainbowcastle") {
        t.fillStyle = lg(0,0,0,R,[[0,"#9b6cff"],[1,"#6f48c8"]]); t.fillRect(0,0,R,R);   // candy underground
        speckle(14, ["#7e54d8","#b79bf0","#5a38a8"], 0, R);
        break;
      }
      if (themeKey === "moon") {
        t.fillStyle = lg(0,0,0,R,[[0,"#6a7085"],[1,"#4a4f62"]]); t.fillRect(0,0,R,R);   // deep moon rock
        speckle(14, ["#5a6076","#7e8498","#3c4052"], 0, R);
        break;
      }
      t.fillStyle = lg(0,0,0,R,[[0,"#7d4d26"],[1,"#62391a"]]); t.fillRect(0,0,R,R);
      speckle(16, ["#6b431f","#8a5e34","#54320f"], 0, R);
      break;
    }
    case "=": {
      const ice = themeKey === "icecastle";
      t.fillStyle = ice ? "#6f93b4" : "#6e3a17"; t.fillRect(0,0,R,R);   // mortar
      const brick = (bx, by, bw, bh) => {
        t.fillStyle = ice ? lg(bx,by,bx,by+bh,[[0,"#dcefff"],[1,"#a3cae8"]])
                          : lg(bx,by,bx,by+bh,[[0,"#cd7d4a"],[1,"#a4562a"]]);
        rrPath(t, bx, by, bw, bh, 2); t.fill();
        t.fillStyle = "rgba(255,255,255,.18)"; t.fillRect(bx+1, by+1, bw-2, 2);
      };
      brick(1, 1, 22, 21); brick(25, 1, 22, 21);
      brick(-11, 25, 22, 21); brick(13, 25, 22, 21); brick(37, 25, 22, 21);
      break;
    }
    case "?": case "M": {
      t.fillStyle = lg(0,0,0,R,[[0,"#f8cf5e"],[0.55,"#eeAB33"],[1,"#c97f1a"]]); t.fillRect(0,0,R,R);
      t.fillStyle = "rgba(255,255,255,.35)"; t.fillRect(2,2,R-4,4);
      t.fillStyle = "rgba(0,0,0,.18)"; t.fillRect(2,R-6,R-4,4);
      t.fillStyle = "#9c6a14";
      for (const [rx,ry] of [[4,4],[R-8,4],[4,R-8],[R-8,R-8]]) { t.beginPath(); t.arc(rx+2,ry+2,2.2,0,Math.PI*2); t.fill(); }
      t.font = "900 26px 'Avenir Next',Arial"; t.textAlign = "center"; t.textBaseline = "middle";
      t.fillStyle = "rgba(0,0,0,.3)"; t.fillText("?", R/2 + 1.5, R/2 + 2.5);
      t.fillStyle = "#fff8e0"; t.fillText("?", R/2, R/2 + 1);
      break;
    }
    case "U": {
      t.fillStyle = lg(0,0,0,R,[[0,"#b07a3a"],[1,"#8a5a24"]]); t.fillRect(0,0,R,R);
      t.fillStyle = "rgba(0,0,0,.2)"; t.fillRect(3,3,R-6,R-6);
      t.fillStyle = lg(0,0,0,R,[[0,"#a9743a"],[1,"#8e5f28"]]); t.fillRect(5,5,R-10,R-10);
      break;
    }
    case "S": {
      if (themeKey === "snow" || themeKey === "icecastle") {
        t.fillStyle = lg(0,0,R,R,[[0,"#dff1ff"],[1,"#a7d2ef"]]); t.fillRect(0,0,R,R);   // glassy ice block
        t.fillStyle = "rgba(255,255,255,.7)"; t.fillRect(2,2,R-4,5);
        t.fillStyle = "rgba(120,170,210,.3)"; t.fillRect(2,R-7,R-4,5);
        t.strokeStyle = "rgba(255,255,255,.6)"; t.lineWidth = 1.6;
        t.beginPath(); t.moveTo(R*0.6, R*0.2); t.lineTo(R*0.35, R*0.5); t.lineTo(R*0.55, R*0.8); t.stroke();
        break;
      }
      t.fillStyle = lg(0,0,0,R,[[0,"#e4e6ef"],[1,"#aaaebe"]]); t.fillRect(0,0,R,R);
      t.fillStyle = "rgba(255,255,255,.55)"; t.fillRect(2,2,R-4,4);
      t.fillStyle = "rgba(40,44,60,.25)"; t.fillRect(2,R-6,R-4,4);
      t.strokeStyle = "rgba(90,95,115,.4)"; t.lineWidth = 1.4;
      t.beginPath(); t.moveTo(R*0.25, R*0.35); t.lineTo(R*0.45, R*0.55); t.lineTo(R*0.38, R*0.75); t.stroke();
      break;
    }
    case "I": {                                  // igloo block — built from snowflakes
      t.fillStyle = lg(0,0,0,R,[[0,"#ffffff"],[1,"#d4e6f4"]]); rrPath(t,0,0,R,R,6); t.fill();
      t.strokeStyle = "rgba(150,185,215,.7)"; t.lineWidth = 2;
      t.beginPath(); t.moveTo(R*0.5,2); t.lineTo(R*0.5,R-2); t.stroke();          // ice-brick seams
      t.beginPath(); t.moveTo(2,R*0.5); t.lineTo(R-2,R*0.5); t.stroke();
      t.fillStyle = "rgba(255,255,255,.8)"; t.fillRect(3,3,R-6,3);
      break;
    }
    case "F": {                                  // flower platform — built from rainbows
      t.fillStyle = lg(0,0,0,R,[[0,"#5fc06a"],[1,"#3a8f44"]]);   // grassy mound
      rrPath(t, 0, R*0.42, R, R*0.58, 5); t.fill();
      t.fillStyle = "rgba(255,255,255,.25)"; t.fillRect(2, R*0.42, R-4, 3);
      // a row of little flowers on top
      const petals = ["#ff8ec4", "#ffd166", "#b88cff", "#7fd0ff"];
      for (let i = 0; i < 3; i++) {
        const fx = R*0.22 + i * R*0.28, fy = R*0.34, c = petals[i % petals.length];
        t.fillStyle = c;
        for (let p = 0; p < 5; p++) { const a = p * Math.PI*2/5;
          t.beginPath(); t.ellipse(fx + Math.cos(a)*3.4, fy + Math.sin(a)*3.4, 2.2, 1.5, a, 0, Math.PI*2); t.fill(); }
        t.fillStyle = "#fff3a0"; t.beginPath(); t.arc(fx, fy, 2, 0, Math.PI*2); t.fill();
      }
      break;
    }
    case "T": {
      const w = R + 4*K;
      t.fillStyle = lg(0,0,0.0001+w,0,[[0,"#15521f"],[0.22,"#67d973"],[0.5,"#2f9e44"],[1,"#123f18"]]);
      rrPath(t, 0, 0, w, R*0.52, 5); t.fill();
      t.fillStyle = lg(0,0,0.0001+w,0,[[0,"#15521f"],[0.25,"#67d973"],[0.5,"#2f9e44"],[1,"#123f18"]]);
      t.fillRect(2*K, R*0.52, R, R*0.48);
      t.fillStyle = "rgba(0,0,0,.25)"; t.fillRect(2*K, R*0.52, R, 3);
      break;
    }
    case "P": {
      t.fillStyle = lg(0,0,R,0,[[0,"#15521f"],[0.25,"#67d973"],[0.5,"#2f9e44"],[1,"#123f18"]]);
      t.fillRect(0,0,R,R);
      break;
    }
  }
  SPR[key] = s;
  return s;
}

function drawTile(c, tx, ty) {
  const x = tx*TILE, y = ty*TILE;
  if (c === "o") {
    const sp = Math.sin(game.timer * 0.12 + tx * 0.9);
    const w = Math.abs(sp) * 4.6 + 1.4;
    const cg = g.createRadialGradient(x+7, y+6.6, 0.5, x+8, y+8, 7);
    cg.addColorStop(0, "#fff3c0"); cg.addColorStop(0.6, "#f6c14f"); cg.addColorStop(1, "#c8861d");
    g.fillStyle = cg;
    g.beginPath(); g.ellipse(x+8, y+8, w, 6, 0, 0, Math.PI*2); g.fill();
    g.strokeStyle = "rgba(140,90,20,.55)"; g.lineWidth = 0.8;
    g.beginPath(); g.ellipse(x+8, y+8, w, 6, 0, 0, Math.PI*2); g.stroke();
    if (w > 3.4) {
      g.strokeStyle = "rgba(150,100,25,.5)";
      g.beginPath(); g.ellipse(x+8, y+8, w*0.55, 3.6, 0, 0, Math.PI*2); g.stroke();
    }
    return;
  }
  if (c === "J") {   // trampoline mat (drawn live for a soft bounce sheen)
    const r = (rx,ry,rw,rh,col) => { g.fillStyle = col; g.fillRect(x+rx, y+ry, rw, rh); };
    r(1,15,2,1,"#a8316a"); r(13,15,2,1,"#a8316a");          // legs
    r(0,9,16,5,"#ff7ab8"); r(0,9,16,2,"#ffc1de");           // springy mat
    g.strokeStyle = "#fff0f7"; g.lineWidth = 0.6;
    for (let i=2;i<16;i+=3){ g.beginPath(); g.moveTo(x+i,y+10); g.lineTo(x+i,y+14); g.stroke(); }
    return;
  }
  const sp = tileSprite(c);
  if (c === "T") g.drawImage(sp, x - 2, y, 20, 16);
  else g.drawImage(sp, x, y, 16, 16);
}

function bgLayer(camX, p, period, fn) {
  const off = -((camX * p) % period);
  for (let i = -1; i < VIEW_W / period + 2; i++) fn(camX + off + i * period);
}

function drawBackgroundUnused(camX) {
  const theme = game.level.theme || "day";
  if (theme === "castle") {
    const cgr = g.createLinearGradient(0, -VIEW_H, 0, LEVEL_H);
    cgr.addColorStop(0, "#140a10"); cgr.addColorStop(1, "#43161c");
    g.fillStyle = cgr;
    g.fillRect(camX - 4, -VIEW_H - 4, VIEW_W + 8, VIEW_H + LEVEL_H + 8);
    return;
  }
  if (theme === "night") {
    const ngr = g.createLinearGradient(0, -VIEW_H, 0, LEVEL_H);
    ngr.addColorStop(0, "#0e1638"); ngr.addColorStop(1, "#33437e");
    g.fillStyle = ngr;
    g.fillRect(camX - 4, -VIEW_H - 4, VIEW_W + 8, VIEW_H + LEVEL_H + 8);
    for (let i = 0; i < 50; i++) {
      const sx = camX + ((i * 89.7) % VIEW_W), sy = (i * 47.3) % 170;
      const tw = Math.sin(game.timer * 0.05 + i) * 0.5 + 0.5;
      g.fillStyle = "rgba(255,255,235," + (0.25 + tw * 0.6) + ")";
      g.fillRect(sx, sy, 1.6, 1.6);
    }
    const mx = camX + VIEW_W * 0.8;
    g.fillStyle = "#f2ecd8";
    g.beginPath(); g.arc(mx, 36, 11, 0, Math.PI*2); g.fill();
    g.fillStyle = "#0e1638";
    g.beginPath(); g.arc(mx + 5, 33, 9, 0, Math.PI*2); g.fill();
    const hx2 = -((camX * 0.4) % 220);
    g.fillStyle = "#1c3a4e";
    for (let i = -1; i < VIEW_W / 220 + 2; i++) {
      const bx = camX + hx2 + i * 220;
      g.beginPath(); g.arc(bx + 60, 208, 44, Math.PI, 0); g.fill();
      g.beginPath(); g.arc(bx + 170, 208, 26, Math.PI, 0); g.fill();
    }
    return;
  }
  // atmospheric sky
  const grad = g.createLinearGradient(0, -VIEW_H, 0, 208);
  grad.addColorStop(0, "#4f8fd4"); grad.addColorStop(0.55, "#8cbce8"); grad.addColorStop(1, "#e4f1f7");
  g.fillStyle = grad;
  g.fillRect(camX - 4, -VIEW_H - 4, VIEW_W + 8, VIEW_H + LEVEL_H + 8);

  // sun with glow (fixed on screen)
  const sx = camX + VIEW_W * 0.8, sy = 28;
  const halo = g.createRadialGradient(sx, sy, 2, sx, sy, 34);
  halo.addColorStop(0, "rgba(255,244,200,.95)"); halo.addColorStop(0.3, "rgba(255,238,170,.45)"); halo.addColorStop(1, "rgba(255,238,170,0)");
  g.fillStyle = halo;
  g.beginPath(); g.arc(sx, sy, 34, 0, Math.PI*2); g.fill();
  g.fillStyle = "#fff6d8";
  g.beginPath(); g.arc(sx, sy, 10, 0, Math.PI*2); g.fill();

  // far mountains (hazy)
  g.fillStyle = "rgba(150,170,205,.55)";
  bgLayer(camX, 0.12, 340, bx => {
    g.beginPath(); g.moveTo(bx, 208);
    g.quadraticCurveTo(bx + 75, 70, bx + 150, 208);
    g.closePath(); g.fill();
    g.beginPath(); g.moveTo(bx + 110, 208);
    g.quadraticCurveTo(bx + 205, 104, bx + 300, 208);
    g.closePath(); g.fill();
  });
  // snow caps (sit on the curve apex, which is halfway to the control point)
  g.fillStyle = "rgba(255,255,255,.65)";
  bgLayer(camX, 0.12, 340, bx => {
    g.beginPath(); g.moveTo(bx + 56, 147);
    g.quadraticCurveTo(bx + 75, 130, bx + 94, 147);
    g.quadraticCurveTo(bx + 84, 152, bx + 75, 147);
    g.quadraticCurveTo(bx + 66, 152, bx + 56, 147);
    g.closePath(); g.fill();
  });

  // mid hills
  bgLayer(camX, 0.3, 270, bx => {
    const hg = g.createLinearGradient(0, 130, 0, 208);
    hg.addColorStop(0, "#9ecf86"); hg.addColorStop(1, "#6fae5b");
    g.fillStyle = hg;
    g.beginPath(); g.arc(bx + 70, 208, 58, Math.PI, 0); g.closePath(); g.fill();
    g.beginPath(); g.arc(bx + 195, 208, 36, Math.PI, 0); g.closePath(); g.fill();
  });

  // near bushes
  bgLayer(camX, 0.55, 210, bx => {
    g.fillStyle = "#4d8f3c";
    for (const [ox, r] of [[30, 13], [44, 17], [60, 12], [150, 11], [162, 15], [176, 10]]) {
      g.beginPath(); g.arc(bx + ox, 208, r, Math.PI, 0); g.closePath(); g.fill();
    }
    g.fillStyle = "rgba(255,255,255,.14)";
    for (const [ox, r] of [[44, 17], [162, 15]]) {
      g.beginPath(); g.arc(bx + ox - 3, 205, r * 0.55, Math.PI, 0); g.closePath(); g.fill();
    }
  });

  // soft clouds
  bgLayer(camX, 0.2, 280, bx => { cloud(bx + 40, 44); cloud(bx + 170, 80); });
}
function cloud(x, y) {
  g.save();
  g.fillStyle = "rgba(190,205,225,.5)";
  g.beginPath();
  g.arc(x, y + 2.5, 10, 0, Math.PI*2); g.arc(x + 12, y - 2.5, 12, 0, Math.PI*2);
  g.arc(x + 26, y + 2.5, 10, 0, Math.PI*2); g.fill();
  g.fillStyle = "rgba(255,255,255,.95)";
  g.beginPath();
  g.arc(x, y, 10, 0, Math.PI*2); g.arc(x + 12, y - 5, 12, 0, Math.PI*2);
  g.arc(x + 26, y, 10, 0, Math.PI*2); g.fill();
  g.restore();
}

function drawAurora(camX) {
  const t = game.timer;
  g.save();
  g.globalCompositeOperation = "lighter";
  const cols = ["rgba(120,240,190,", "rgba(120,170,255,", "rgba(190,140,255,"];
  for (let b = 0; b < 3; b++) {
    g.beginPath();
    const baseY = 24 + b * 16;
    g.moveTo(camX - 10, baseY);
    for (let x = 0; x <= VIEW_W + 20; x += 16) {
      const y = baseY + Math.sin((x + camX) * 0.012 + t * 0.02 + b) * 14 + Math.sin((x) * 0.05 + t * 0.03) * 5;
      g.lineTo(camX + x, y);
    }
    for (let x = VIEW_W + 20; x >= -10; x -= 16) {
      const y = baseY + 26 + Math.sin((x + camX) * 0.012 + t * 0.02 + b) * 14;
      g.lineTo(camX + x, y);
    }
    g.closePath();
    const a = 0.10 + Math.sin(t * 0.04 + b) * 0.05;
    g.fillStyle = cols[b] + Math.max(0.04, a) + ")";
    g.fill();
  }
  g.restore();
}
function drawIgloo(cx, baseY, w) {
  g.save();
  const dome = g.createLinearGradient(cx, baseY - w, cx, baseY);
  dome.addColorStop(0, "#ffffff"); dome.addColorStop(1, "#cbdef0");
  g.fillStyle = dome;
  g.beginPath(); g.arc(cx, baseY, w, Math.PI, 0); g.closePath(); g.fill();
