<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>Rosalina &amp; Cosmo — by Jules &amp; Nora</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  #game, .btn, #verlink, #verlink a { touch-action:none; }
  html, body {
    width:100%; height:100%; overflow:hidden; background:#5c94fc;
    touch-action:none; -webkit-user-select:none; user-select:none;
    -webkit-touch-callout:none; -webkit-tap-highlight-color:transparent;
    font-family:"Avenir Next","Helvetica Neue",Arial,sans-serif;
    position:fixed;
  }
  #game { display:block; width:100%; height:100%; }
  #verlink {
    position:fixed; right:14px; top:max(14px, env(safe-area-inset-top)); z-index:20; display:none;
  }
  #verlink a {
    color:#fff; font-weight:700; font-size:14px; text-decoration:none;
    background:rgba(0,0,0,.32); padding:7px 14px; border-radius:16px; margin-left:8px;
  }
  .btn {
    position:fixed; bottom:max(18px, env(safe-area-inset-bottom));
    width:72px; height:72px; border-radius:50%;
    background:rgba(255,255,255,.22); border:3px solid rgba(255,255,255,.55);
    color:#fff; font-size:30px; font-weight:800; text-align:center; line-height:66px;
    z-index:10; display:none; backdrop-filter:blur(2px);
  }
  .btn.pressed { background:rgba(255,255,255,.55); }
  .btn { transition: opacity .6s; }
  .btn.faded { opacity:.14; }
  .btn.faded.pressed { opacity:.5; }
  #btnL { left:max(16px, env(safe-area-inset-left)); }
  #btnR { left:calc(max(16px, env(safe-area-inset-left)) + 90px); }
  #btnJ { right:max(16px, env(safe-area-inset-right)); width:88px; height:88px; line-height:80px; font-size:22px; }
  #btnF { right:calc(max(16px, env(safe-area-inset-right)) + 106px); bottom:calc(max(18px, env(safe-area-inset-bottom)) + 8px); font-size:26px; background:rgba(255,140,205,.35); border-color:rgba(255,195,228,.7); }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div class="btn" id="btnL">&#9664;</div>
<div class="btn" id="btnR">&#9654;</div>
<div class="btn" id="btnJ">JUMP</div>
<div class="btn" id="btnF">✨</div>
<div id="verlink"><a href="../">🕹 Classic</a><a href="../fortnite/">⚡ Battle</a><a href="../realistic/">🌿 Real</a><a href="../bubble/">🫧 Bubble</a></div>
<script>
"use strict";
/* ============================== SETUP ============================== */
const cv = document.getElementById("game");
const g  = cv.getContext("2d");
const TILE = 16, ROWS = 15, LEVEL_H = ROWS * TILE; // 240 game px tall

let W = 0, H = 0, DPR = 1, SCALE = 1, VIEW_W = 0, VIEW_H = 0;
function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 3);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = Math.round(W * DPR); cv.height = Math.round(H * DPR);
  // landscape: fit level height; portrait: fit ~11 tiles across so things stay big
  SCALE = W >= H ? H / LEVEL_H : W / 176;
  VIEW_W = W / SCALE; VIEW_H = H / SCALE;
}
window.addEventListener("resize", resize);
window.addEventListener("orientationchange", () => setTimeout(resize, 200));
resize();

/* ============================== AUDIO ============================== */
let AC = null;
function audio() {
  if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){} }
  if (AC && AC.state === "suspended") AC.resume();
}
function tone(freq, dur, type, vol, slide) {
  if (!AC) return;
  const o = AC.createOscillator(), gn = AC.createGain(), t = AC.currentTime;
  o.type = type || "square"; o.frequency.setValueAtTime(freq, t);
  if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq + slide), t + dur);
  gn.gain.setValueAtTime(vol || .12, t);
  gn.gain.exponentialRampToValueAtTime(.001, t + dur);
  o.connect(gn).connect(AC.destination); o.start(t); o.stop(t + dur + .02);
}
const SFX = {
  jump:  () => tone(300, .22, "square", .10, 380),
  coin:  () => { tone(990, .08, "square", .10); setTimeout(() => tone(1320, .25, "square", .10), 70); },
  stomp: () => tone(220, .14, "square", .14, -140),
  brick: () => tone(140, .16, "sawtooth", .14, -80),
  die:   () => { tone(520, .25, "square", .12, -300); setTimeout(() => tone(260, .4, "square", .12, -180), 200); },
  bump:  () => tone(110, .08, "square", .12),
  select:() => { tone(660, .09, "square", .10); setTimeout(() => tone(880, .14, "square", .10), 80); },
  clear: () => [523,659,784,1047,1319].forEach((f,i) => setTimeout(() => tone(f, .22, "square", .10), i*110)),
  sprout:() => [392,494,587,698].forEach((f,i) => setTimeout(() => tone(f, .09, "square", .09), i*60)),
  grow:  () => [262,330,392,523,659,784].forEach((f,i) => setTimeout(() => tone(f, .08, "square", .10), i*45)),
  shrink:() => [784,523,392,262].forEach((f,i) => setTimeout(() => tone(f, .09, "square", .10), i*70)),
  fire:  () => tone(680, .12, "sawtooth", .08, -420),
  star:  () => { tone(1180, .07, "sine", .09, 300); setTimeout(() => tone(1560, .1, "sine", .07, 200), 50); },
  bolt:  () => { tone(150, .2, "sawtooth", .13, -60); setTimeout(() => tone(90, .3, "sawtooth", .1, -30), 60); },
  coo:   () => { tone(720, .07, "sawtooth", .09, -260); setTimeout(() => tone(560, .12, "sawtooth", .08, -320), 70); },
  superb:() => [392,523,659,784,1047,1319,1568].forEach((f,i) => setTimeout(() => tone(f, .18, "square", .1), i*80),)
};

/* ============================== INPUT ============================== */
const input = { left:false, right:false, jump:false, jumpPressed:false, firePressed:false, anyTap:false };
const keys = {};
window.addEventListener("keydown", e => {
  if (["ArrowLeft","ArrowRight","ArrowUp","Space"].includes(e.code)) e.preventDefault();
  audio();
  if (!keys[e.code] && (e.code==="Space"||e.code==="ArrowUp"||e.code==="KeyZ"||e.code==="KeyW")) input.jumpPressed = true;
  if (!keys[e.code] && (e.code==="KeyX"||e.code==="KeyB")) input.firePressed = true;
  keys[e.code] = true;
  input.anyTap = true;
});
window.addEventListener("keyup", e => { keys[e.code] = false; });

function syncKeys() {
  input.left  = !!(keys["ArrowLeft"] || keys["KeyA"]) || touch.left;
  input.right = !!(keys["ArrowRight"]|| keys["KeyD"]) || touch.right;
  input.jump  = !!(keys["Space"] || keys["ArrowUp"] || keys["KeyZ"] || keys["KeyW"]) || touch.jump;
}

const touch = { left:false, right:false, jump:false };
const btnL = document.getElementById("btnL"),
      btnR = document.getElementById("btnR"),
      btnJ = document.getElementById("btnJ"),
      btnF = document.getElementById("btnF");
const allBtns = [btnL, btnR, btnJ, btnF];

// Controls fade to near-invisible a few seconds after first use (still tappable)
let fadeScheduled = false;
function scheduleFade() {
  if (fadeScheduled) return;
  fadeScheduled = true;
  setTimeout(() => allBtns.forEach(b => b.classList.add("faded")), 3000);
}
function unfadeButtons() {
  fadeScheduled = false;
  allBtns.forEach(b => b.classList.remove("faded"));
}

function bindBtn(el, prop, onPress) {
  const set = on => {
    if (on && onPress && !touch[prop]) onPress();
    touch[prop] = on;
    el.classList.toggle("pressed", on);
  };
  el.addEventListener("pointerdown", e => { e.preventDefault(); audio(); scheduleFade(); set(true); }, {passive:false});
  el.addEventListener("pointerup",     () => set(false));
  el.addEventListener("pointercancel", () => set(false));
  el.addEventListener("pointerleave",  () => set(false));
}
bindBtn(btnL, "left"); bindBtn(btnR, "right");
bindBtn(btnJ, "jump", () => { input.jumpPressed = true; });
bindBtn(btnF, "fire", () => { input.firePressed = true; });

cv.addEventListener("pointerdown", e => {
  e.preventDefault(); audio();
  input.anyTap = true;
  tapX = e.clientX; tapY = e.clientY;
}, {passive:false});
// block 1-finger scroll, but leave 2-finger pinch available so the page can always be un-zoomed
document.addEventListener("touchmove", e => { if (e.touches.length < 2) e.preventDefault(); }, {passive:false});
// iPad Safari ignores user-scalable=no and zooms on double-tap — suppress rapid second taps
let lastTouchEnd = 0;
document.addEventListener("touchend", e => {
  const tnow = Date.now();
  if (tnow - lastTouchEnd < 350) e.preventDefault();
  lastTouchEnd = tnow;
}, {passive:false});
let tapX = -1, tapY = -1;

function showButtons(on) {
  btnL.style.display = btnR.style.display = btnJ.style.display = on ? "block" : "none";
  refreshFireBtn();
}
let fireBtnShown = false;
function refreshFireBtn() {
  const want = game.state === "play";
  if (want !== fireBtnShown) { fireBtnShown = want; btnF.style.display = want ? "block" : "none"; }
}

/* ============================== CHARACTERS ============================== */
const CHARS = {
  jules: {
    name: "COSMO", kind: "bunny", look: "slime", flyMax: 1200,
    body:"#fdf3ea", earIn:"#f5c4d6", visor:"#f06a9c", visorDark:"#d14e80",
    skirt:"#f5a8c8", skirtDark:"#e07cab", star:"#ffd166", accent:"#e074a8",
    // slime look — a cosmic lavender blob with big sparkly eyes
    slimeLt:"#d6c6f6", slime:"#ad8de4", slimeDark:"#7f5fcc",
    slimeEye:"#1a1230", spark:"#ffffff", mouth:"#5a3f8a",
  },
  nora: {
    name: "PRINCESS ROSALINA", kind: "cloud", look: "princess", flyMax: 600,
    body:"#f2f7fd", shade:"#c3d4ea", cheek:"#f5a8b8", bolt:"#e8447a",
    accent:"#4fa3e0",
    // princess look — flowing aqua gown, platinum-blonde sweep, silver crown
    gown:"#46cdc6", gownDark:"#1f9aa0", gownLight:"#9ef0e6",
    hair:"#f6e08c", hairLt:"#fff2bc", hairDk:"#e3c45f",
    skin:"#fce0c2", crown:"#e6edf2", crownDk:"#aebccb",
    gem:"#7fe0ff", pstar:"#aef06a", lip:"#dd5f7e", eye:"#357fd1", lash:"#2a1c12",
  }
};
let heroKey = "jules";

const firePals = {};
function firePal(key) {
  if (!firePals[key]) {
    const p = CHARS[key];
    firePals[key] = Object.assign({}, p, {
      shirt:"#fff6f3", shirtDark:p.shirt, cap:"#ff5e5e", capDark:"#d63c3c",
    });
  }
  return firePals[key];
}

/* rounded-rect path helper usable on any 2d context */
function rrPath(ctx, x, y, w, h, r) {
  r = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function drawStarShape(ctx, x, y, ro, ri, rot, fill, stroke) {
  ctx.save(); ctx.translate(x, y); ctx.rotate(rot || 0);
  ctx.beginPath();
  for (let i = 0; i < 10; i++) {
    const r = i % 2 ? ri : ro, a = i * Math.PI / 5 - Math.PI / 2;
    i ? ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r) : ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
  }
  ctx.closePath();
  ctx.fillStyle = fill || "#ffd166"; ctx.fill();
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 0.6; ctx.stroke(); }
  ctx.restore();
}

/* Heroes: Chun-me the wand bunny and Chuckee the storm cloud.
   Feet at (0,0), facing right by default. */
function drawKid(ctx, x, y, pal, frame, facing, airborne, walking, power) {
  ctx.save();
  ctx.translate(x, y);
  if (power > 0) ctx.scale(1.18, 1.32);
  if (facing < 0) ctx.scale(-1, 1);
  if (pal.look === "slime") drawCosmoBody(ctx, pal, frame, airborne, walking);
  else if (pal.look === "princess") drawRosalinaBody(ctx, pal, frame, airborne, walking);
  else if (pal.kind === "cloud") drawChuckeeBody(ctx, pal);
  else drawChunmeBody(ctx, pal, frame, airborne, walking);
  ctx.restore();
}

/* Cosmo the Slime: a cosmic lavender blob with big sparkly eyes, a tiny
   smile, little nub hands, and galaxy speckles. Stretches when jumping. */
function drawCosmoBody(ctx, pal, frame, airborne, walking) {
  const t = game.timer;
  ctx.save();
  if (airborne) ctx.scale(0.9, 1.14);            // jump stretch
  const wob = Math.sin(t * 0.12) * 0.5;
  const sq  = (walking && frame) ? 0.7 : 0;      // little squash on the walk hop

  // blobby body (rounded bottom, tapering rounded top)
  const bg = ctx.createLinearGradient(0, -19, 0, 0);
  bg.addColorStop(0, pal.slimeLt); bg.addColorStop(0.55, pal.slime); bg.addColorStop(1, pal.slimeDark);
  ctx.fillStyle = bg;
  const w = 8 + sq * 0.5, topY = -19 + wob * 0.4 + sq;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo(-w, -0.5, -w - 0.5, -8, -6, -13);
  ctx.bezierCurveTo(-4.5, -16.5, -2.5, topY, 0, topY);
  ctx.bezierCurveTo(2.5, topY, 4.5, -16.5, 6, -13);
  ctx.bezierCurveTo(w + 0.5, -8, w, -0.5, 0, 0);
  ctx.closePath(); ctx.fill();

  // squishy base shadow
  ctx.fillStyle = "rgba(90,60,150,.22)";
  ctx.beginPath(); ctx.ellipse(0, -1.1, 6.4, 1.3, 0, 0, Math.PI*2); ctx.fill();
  // soft top-left highlight
  ctx.fillStyle = "rgba(255,255,255,.32)";
  ctx.beginPath(); ctx.ellipse(-3, -13.5, 2.3, 3.3, -0.5, 0, Math.PI*2); ctx.fill();

  // twinkling galaxy speckles
  ctx.fillStyle = pal.spark;
  for (const s of [[-4.5,-6],[3.6,-4.6],[5,-9],[-2,-3.4],[1.4,-15.4],[-5,-10.6]]) {
    ctx.globalAlpha = 0.45 + 0.45 * Math.abs(Math.sin(t * 0.05 + s[0]));
    ctx.beginPath(); ctx.arc(s[0], s[1], 0.5, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // big sparkly eyes
  for (const ex of [-3, 3]) {
    ctx.fillStyle = pal.slimeEye;
    ctx.beginPath(); ctx.ellipse(ex, -11, 2.5, 3, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,.95)";
    ctx.beginPath(); ctx.arc(ex - 0.8, -12.3, 0.9, 0, Math.PI*2); ctx.fill();   // big catchlight
    ctx.beginPath(); ctx.arc(ex + 0.8, -9.9, 0.42, 0, Math.PI*2); ctx.fill();   // tiny sparkle
  }

  // tiny smile between the eyes
  ctx.strokeStyle = pal.mouth; ctx.lineWidth = 0.8; ctx.lineCap = "round";
  ctx.beginPath(); ctx.arc(0, -9.6, 1.3, 0.15 * Math.PI, 0.85 * Math.PI); ctx.stroke();

  // two little nub hands held together at the front
  const ho = (walking && frame) ? 0.6 : 0;
  ctx.fillStyle = pal.slime;
  ctx.beginPath(); ctx.ellipse(-1.9 - ho, -3.1, 1.6, 1.2, 0.3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(1.9 + ho, -3.1, 1.6, 1.2, -0.3, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = pal.slimeDark; ctx.lineWidth = 0.4;
  ctx.beginPath(); ctx.moveTo(-2.4 - ho, -3.5); ctx.lineTo(-2.4 - ho, -2.7);
                   ctx.moveTo(-1.5 - ho, -3.5); ctx.lineTo(-1.5 - ho, -2.7); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(2.4 + ho, -3.5); ctx.lineTo(2.4 + ho, -2.7);
                   ctx.moveTo(1.5 + ho, -3.5); ctx.lineTo(1.5 + ho, -2.7); ctx.stroke();

  ctx.restore();
}

function drawChunmeBody(ctx, pal, frame, airborne, walking) {
  const t = game.timer;
  // paws
  ctx.fillStyle = pal.body;
  const po = (walking && frame) ? 1.2 : 0;
  ctx.beginPath(); ctx.ellipse(-2.6 - po, -1, 2, 1.3, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(2.2 + po, -1, 2, 1.3, 0, 0, Math.PI*2); ctx.fill();
  // skirt with scalloped hem
  const sk = ctx.createLinearGradient(0, -10, 0, -2);
  sk.addColorStop(0, pal.skirt); sk.addColorStop(1, pal.skirtDark);
  ctx.fillStyle = sk;
  ctx.beginPath();
  ctx.moveTo(-4.8, -9.5);
  ctx.lineTo(4.8, -9.5);
  ctx.lineTo(6.3, -2.8);
  for (const cx of [4.2, 0, -4.2]) ctx.arc(cx, -2.8, 2.1, 0, Math.PI, false);
  ctx.closePath(); ctx.fill();
  // torso
  ctx.fillStyle = pal.body;
  rrPath(ctx, -3.6, -13, 7.2, 4.5, 2); ctx.fill();
  // back arm
  ctx.beginPath(); ctx.ellipse(-4.2, -10.5, 1.7, 1.3, 0.4, 0, Math.PI*2); ctx.fill();
  // golden wand with spinning star tip
  ctx.strokeStyle = "#d9a83c"; ctx.lineWidth = 1.4; ctx.lineCap = "round";
  ctx.beginPath(); ctx.moveTo(3.6, -9.2); ctx.lineTo(8.2, -15.6); ctx.stroke();
  ctx.fillStyle = pal.body;
  ctx.beginPath(); ctx.ellipse(4, -9.6, 1.8, 1.4, 0, 0, Math.PI*2); ctx.fill();
  drawStarShape(ctx, 8.6, -16.4, 2.4, 1.1, t * 0.05, pal.star, "#f08cb8");
  for (let i = 0; i < 2; i++) {
    const a = t * 0.08 + i * 2.6;
    ctx.fillStyle = "rgba(245,140,190," + (0.5 + Math.sin(a) * 0.3).toFixed(2) + ")";
    ctx.beginPath(); ctx.arc(9.5 + Math.cos(a) * 2.5, -15 + Math.sin(a * 1.3) * 3, 0.8, 0, Math.PI*2); ctx.fill();
  }
  // droopy ears with star clips (behind head)
  for (const sgn of [-1, 1]) {
    ctx.save();
    ctx.translate(sgn * 5.6, -18.6);
    ctx.rotate(sgn * (airborne ? 0.45 : 0.3));
    ctx.fillStyle = pal.body;
    ctx.beginPath(); ctx.ellipse(0, 4.6, 2.1, 5.4, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = pal.earIn;
    ctx.beginPath(); ctx.ellipse(0, 5, 1.1, 3.6, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
  // head
  ctx.fillStyle = pal.body;
  ctx.beginPath(); ctx.ellipse(0.4, -16.3, 5.9, 5.4, 0, 0, Math.PI*2); ctx.fill();
  // star clips
  drawStarShape(ctx, -5.4, -19.8, 1.7, 0.8, 0.3, pal.star);
  drawStarShape(ctx, 6, -19.8, 1.7, 0.8, -0.3, pal.star);
  // pink visor
  ctx.fillStyle = pal.visor;
  rrPath(ctx, -5, -19.6, 10.6, 2.6, 1.3); ctx.fill();
  ctx.fillStyle = pal.visorDark;
  ctx.beginPath(); ctx.ellipse(5.8, -18.4, 2.8, 1, -0.12, 0, Math.PI*2); ctx.fill();
  // determined eyes
  for (const e of [[-1.4, 0.18], [3, -0.18]]) {
    ctx.save(); ctx.translate(e[0], -15.6); ctx.rotate(e[1]);
    ctx.fillStyle = "#2a1c12";
    ctx.beginPath(); ctx.ellipse(0, 0, 1.05, 1.5, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,.9)";
    ctx.beginPath(); ctx.arc(-0.25, -0.5, 0.35, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
  ctx.strokeStyle = "#3a2a1e"; ctx.lineWidth = 0.7; ctx.lineCap = "round";
  ctx.beginPath();
  ctx.moveTo(-2.6, -17.4); ctx.lineTo(-0.4, -16.9);
  ctx.moveTo(4.2, -17.4); ctx.lineTo(2, -16.9);
  ctx.stroke();
  // smile + tiny fang
  ctx.strokeStyle = "#b35a4a"; ctx.lineWidth = 0.6;
  ctx.beginPath(); ctx.arc(1, -13.4, 1.1, 0.15 * Math.PI, 0.85 * Math.PI); ctx.stroke();
  ctx.fillStyle = "#fff";
  ctx.beginPath(); ctx.moveTo(1.7, -13.2); ctx.lineTo(2.3, -13.2); ctx.lineTo(2, -12.4); ctx.closePath(); ctx.fill();
}

function drawChuckeeBody(ctx, pal) {
  const t = game.timer;
  ctx.translate(0, Math.sin(t * 0.1) * 0.9 - 0.5);
  const cg = ctx.createLinearGradient(0, -13, 0, -1);
  cg.addColorStop(0, "#ffffff"); cg.addColorStop(1, pal.shade);
  ctx.fillStyle = cg;
  ctx.beginPath(); ctx.ellipse(0, -5.2, 8.6, 4.6, 0, 0, Math.PI*2); ctx.fill();
  for (const b of [[-4.6, -8.6, 3.2], [0.4, -10.2, 3.9], [5.2, -8.4, 3]]) {
    ctx.beginPath(); ctx.arc(b[0], b[1], b[2], 0, Math.PI*2); ctx.fill();
  }
  ctx.fillStyle = "rgba(150,170,205,.3)";
  ctx.beginPath(); ctx.ellipse(0, -2.6, 7.2, 1.6, 0, 0, Math.PI*2); ctx.fill();
  // happy closed eyes + smile
  ctx.strokeStyle = "#5a6a86"; ctx.lineWidth = 0.9; ctx.lineCap = "round";
  ctx.beginPath(); ctx.arc(-2.4, -6.6, 1.3, Math.PI * 1.15, Math.PI * 1.85); ctx.stroke();
  ctx.beginPath(); ctx.arc(2, -6.6, 1.3, Math.PI * 1.15, Math.PI * 1.85); ctx.stroke();
  ctx.beginPath(); ctx.arc(-0.2, -5.4, 1.2, 0.15 * Math.PI, 0.85 * Math.PI); ctx.stroke();
  // rosy cheeks
  ctx.fillStyle = "rgba(245,150,170,.55)";
  ctx.beginPath(); ctx.ellipse(-4.6, -5.4, 1.3, 0.9, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(4.2, -5.4, 1.3, 0.9, 0, 0, Math.PI*2); ctx.fill();
  // pink bolt on top
  ctx.fillStyle = pal.bolt;
  ctx.beginPath();
  ctx.moveTo(5.2, -14.6); ctx.lineTo(7.6, -14.6); ctx.lineTo(6.2, -12.2);
  ctx.lineTo(7.8, -12.2); ctx.lineTo(4.8, -8.8); ctx.lineTo(5.8, -11.2);
  ctx.lineTo(4.4, -11.2); ctx.closePath(); ctx.fill();
}

/* Princess Rosalina: flowing aqua gown, platinum hair swept over one eye,
   silver crown with a green star, and a sparkling wand. Front-facing. */
function drawRosalinaBody(ctx, pal, frame, airborne, walking) {
  const t = game.timer;
  const sway = Math.sin(t * 0.08) * 0.6;

  // long hair lock flowing down her left shoulder (viewer's right)
  ctx.fillStyle = pal.hairDk;
  ctx.beginPath();
  ctx.moveTo(3.4, -18.5);
  ctx.bezierCurveTo(8.8, -15.5, 8.2, -7, 5.4 + sway, -3.2);
  ctx.bezierCurveTo(7, -8, 6, -14, 2.6, -16.5);
  ctx.closePath(); ctx.fill();

  // little shoes peeking from the hem
  const po = (walking && frame) ? 1.1 : 0;
  ctx.fillStyle = "#6a4a86";
  ctx.beginPath(); ctx.ellipse(-2.4 - po, -1, 1.7, 1.1, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(2 + po, -1, 1.7, 1.1, 0, 0, Math.PI*2); ctx.fill();

  // flowing gown
  const gg = ctx.createLinearGradient(0, -13, 0, -1);
  gg.addColorStop(0, pal.gown); gg.addColorStop(1, pal.gownDark);
  ctx.fillStyle = gg;
  ctx.beginPath();
  ctx.moveTo(-3.4, -12.5);
  ctx.lineTo(3.4, -12.5);
  ctx.bezierCurveTo(5.5, -8, 7 + sway, -3, 7.6 + sway, -0.6);
  ctx.quadraticCurveTo(0, -2.4, -7.6 + sway, -0.6);
  ctx.bezierCurveTo(-7, -3, -5.5, -8, -3.4, -12.5);
  ctx.closePath(); ctx.fill();
  // soft center panel
  ctx.fillStyle = pal.gownLight; ctx.globalAlpha = 0.5;
  ctx.beginPath();
  ctx.moveTo(-1.7, -12);
  ctx.lineTo(1.7, -12);
  ctx.quadraticCurveTo(2.7, -6, 2.5 + sway*0.6, -1.4);
  ctx.quadraticCurveTo(0, -2.2, -2.5 + sway*0.6, -1.4);
  ctx.quadraticCurveTo(-2.7, -6, -1.7, -12);
  ctx.closePath(); ctx.fill();
  ctx.globalAlpha = 1;

  // bodice + brooch
  ctx.fillStyle = pal.gownDark;
  rrPath(ctx, -3, -14.4, 6, 3.4, 1.4); ctx.fill();
  ctx.fillStyle = pal.gem;
  ctx.beginPath(); ctx.arc(0, -12.6, 1, 0, Math.PI*2); ctx.fill();

  // arms: right hand rests on gown, left raised with the wand
  ctx.strokeStyle = pal.skin; ctx.lineWidth = 1.8; ctx.lineCap = "round";
  ctx.beginPath(); ctx.moveTo(2.8, -13.6); ctx.quadraticCurveTo(4.8, -11, 4.2, -8.4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-2.8, -13.6); ctx.quadraticCurveTo(-5.6, -13, -6.4, -15.4); ctx.stroke();

  // wand with a spinning star + sparkles
  ctx.strokeStyle = "#cfd9e2"; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(-6.4, -15.4); ctx.lineTo(-8.4, -20.4); ctx.stroke();
  drawStarShape(ctx, -8.7, -21, 2.2, 1, t * 0.05, pal.gem, "#3a9fd0");
  for (let i = 0; i < 2; i++) {
    const a = t * 0.09 + i * 2.6;
    ctx.fillStyle = "rgba(150,230,255," + (0.5 + Math.sin(a) * 0.3).toFixed(2) + ")";
    ctx.beginPath(); ctx.arc(-9 + Math.cos(a) * 2.4, -20 + Math.sin(a * 1.3) * 2.6, 0.7, 0, Math.PI*2); ctx.fill();
  }

  // head
  ctx.fillStyle = pal.skin;
  ctx.beginPath(); ctx.ellipse(0, -16.4, 5, 5.2, 0, 0, Math.PI*2); ctx.fill();

  // one visible eye (viewer's left); the other is hidden by the bang
  ctx.save(); ctx.translate(-1.8, -16.4);
  ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.ellipse(0, 0, 1.25, 1.7, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = pal.eye; ctx.beginPath(); ctx.ellipse(0.1, 0.2, 0.85, 1.15, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = "#1a1426"; ctx.beginPath(); ctx.arc(0.1, 0.3, 0.5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = "rgba(255,255,255,.9)"; ctx.beginPath(); ctx.arc(-0.2, -0.2, 0.32, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  // lash + brow
  ctx.strokeStyle = pal.lash; ctx.lineWidth = 0.6;
  ctx.beginPath(); ctx.moveTo(-3.2, -17.5); ctx.quadraticCurveTo(-1.8, -18.3, -0.5, -17.7); ctx.stroke();
  // lips
  ctx.fillStyle = pal.lip;
  ctx.beginPath(); ctx.ellipse(-1, -13.1, 1.1, 0.6, 0, 0, Math.PI*2); ctx.fill();
  // cheek
  ctx.fillStyle = "rgba(245,150,170,.45)";
  ctx.beginPath(); ctx.ellipse(-3.2, -14.5, 1, 0.7, 0, 0, Math.PI*2); ctx.fill();

  // front hair: forehead fringe with a big side-swept bang over her right eye
  const hg = ctx.createLinearGradient(0, -22, 0, -12);
  hg.addColorStop(0, pal.hairLt); hg.addColorStop(1, pal.hair);
  ctx.fillStyle = hg;
  ctx.beginPath();
  ctx.moveTo(-5, -16.8);
  ctx.quadraticCurveTo(-5.8, -21.6, -1, -22.5);
  ctx.quadraticCurveTo(4.3, -22.2, 5.7, -17.4);
  ctx.quadraticCurveTo(5.9, -13.4, 3.3, -12.3);
  ctx.quadraticCurveTo(4.6, -16, 2.1, -17.6);
  ctx.quadraticCurveTo(-0.5, -18.9, -2.4, -17.4);
  ctx.quadraticCurveTo(-3.8, -16.6, -5, -16.8);
  ctx.closePath(); ctx.fill();
  // hair highlight strand
  ctx.strokeStyle = pal.hairLt; ctx.lineWidth = 0.6;
  ctx.beginPath(); ctx.moveTo(-1, -21); ctx.bezierCurveTo(2, -20.4, 3.8, -18, 3.4, -15); ctx.stroke();

  // silver crown with a little green star
  ctx.fillStyle = pal.crown;
  ctx.beginPath();
  ctx.moveTo(-3, -20.8);
  ctx.lineTo(-3.2, -23.2); ctx.lineTo(-1.4, -21.9); ctx.lineTo(0, -23.9); ctx.lineTo(1.4, -21.9);
  ctx.lineTo(3.2, -23.2); ctx.lineTo(3, -20.8);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = pal.crownDk; ctx.lineWidth = 0.4; ctx.stroke();
  drawStarShape(ctx, 0, -23, 1.1, 0.5, 0, pal.pstar, "#5fae3a");
}

function drawPowerup(ctx, p) {
  ctx.save();
  ctx.translate(p.x + p.w/2, p.y + p.h);
  const t = game.timer;
  if (p.type === "mushroom") {               // magic charm: a glowing heart
    const bob = Math.sin(t * 0.1);
    const gl = ctx.createRadialGradient(0, -7 + bob, 1, 0, -7 + bob, 9);
    gl.addColorStop(0, "rgba(255,150,200,.5)"); gl.addColorStop(1, "rgba(255,150,200,0)");
    ctx.fillStyle = gl;
    ctx.beginPath(); ctx.arc(0, -7 + bob, 9, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = "#f0608c";
    ctx.beginPath();
    ctx.moveTo(0, -2.5 + bob);
    ctx.bezierCurveTo(-7, -8 + bob, -3.5, -13.5 + bob, 0, -9.5 + bob);
    ctx.bezierCurveTo(3.5, -13.5 + bob, 7, -8 + bob, 0, -2.5 + bob);
    ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,.55)";
    ctx.beginPath(); ctx.ellipse(-2, -9.5 + bob, 1.4, 1, -0.5, 0, Math.PI*2); ctx.fill();
  } else {                                   // storm gem: triggers the super blast
    const spin = Math.abs(Math.sin(t * 0.08));
    const gl = ctx.createRadialGradient(0, -8, 1, 0, -8, 10);
    gl.addColorStop(0, "rgba(140,230,255,.45)"); gl.addColorStop(1, "rgba(140,230,255,0)");
    ctx.fillStyle = gl;
    ctx.beginPath(); ctx.arc(0, -8, 10, 0, Math.PI*2); ctx.fill();
    const gg = ctx.createLinearGradient(-4, -13, 4, -3);
    gg.addColorStop(0, "#9bf0e0"); gg.addColorStop(0.5, "#5cc8f0"); gg.addColorStop(1, "#9b7af0");
    ctx.fillStyle = gg;
    ctx.beginPath();
    ctx.moveTo(0, -14); ctx.lineTo(4.4 * spin + 1.2, -8); ctx.lineTo(0, -2); ctx.lineTo(-(4.4 * spin + 1.2), -8);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,.6)";
    ctx.beginPath(); ctx.moveTo(0, -13); ctx.lineTo(1.4, -8); ctx.lineTo(0, -3.2); ctx.lineTo(-1, -8); ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}

function drawFireball(ctx, f, t) {
  const cx = f.x + 2.5, cy = f.y + 2.5;
  if (f.kind === "bolt") {                   // Chuckee's lightning
    const glow = ctx.createRadialGradient(cx, cy, 0.5, cx, cy, 8);
    glow.addColorStop(0, "rgba(255,238,140,.9)"); glow.addColorStop(1, "rgba(255,220,80,0)");
    ctx.fillStyle = glow;
    ctx.beginPath(); ctx.arc(cx, cy, 8, 0, Math.PI*2); ctx.fill();
    ctx.save();
    ctx.translate(cx, cy); ctx.scale(Math.sign(f.vx) || 1, 1);
    ctx.fillStyle = "#ffe066";
    ctx.beginPath();
    ctx.moveTo(-6, -2.6); ctx.lineTo(0.5, -2.6); ctx.lineTo(-1.5, 0); ctx.lineTo(6, 0);
    ctx.lineTo(-1.5, 3.2); ctx.lineTo(0.2, 0.8); ctx.lineTo(-6, 0.8);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  } else if (f.kind === "pinkfire") {        // Chun-me's pink fireball (when charmed)
    const glow = ctx.createRadialGradient(cx, cy, 0.5, cx, cy, 7);
    glow.addColorStop(0, "rgba(255,160,210,.9)"); glow.addColorStop(1, "rgba(255,110,180,0)");
    ctx.fillStyle = glow;
    ctx.beginPath(); ctx.arc(cx, cy, 7, 0, Math.PI*2); ctx.fill();
    const core = ctx.createRadialGradient(cx - 0.8, cy - 0.8, 0.3, cx, cy, 3.6);
    core.addColorStop(0, "#fff"); core.addColorStop(0.5, "#ff9ed0"); core.addColorStop(1, "#e8479c");
    ctx.fillStyle = core;
    ctx.beginPath(); ctx.arc(cx, cy, 3.6, 0, Math.PI*2); ctx.fill();
  } else {                                   // Chun-me's star
    const glow = ctx.createRadialGradient(cx, cy, 0.5, cx, cy, 7);
    glow.addColorStop(0, "rgba(255,220,130,.8)"); glow.addColorStop(1, "rgba(255,180,90,0)");
    ctx.fillStyle = glow;
    ctx.beginPath(); ctx.arc(cx, cy, 7, 0, Math.PI*2); ctx.fill();
    drawStarShape(ctx, cx, cy, 4, 1.8, t * 0.2, "#ffd166", "#f08cb8");
  }
}

function drawGrump(ctx, x, y, frame, squashT) {
  ctx.save(); ctx.translate(x, y);
  if (squashT > 0) {
    ctx.fillStyle = "#7c4423";
    rrPath(ctx, -7, -3.5, 14, 3.5, 1.6); ctx.fill();
    ctx.restore(); return;
  }
  const off = frame ? 0.9 : -0.9;
  // feet
  ctx.fillStyle = "#4f2a14";
  rrPath(ctx, -6.6 + off, -2.5, 5.4, 2.5, 1.2); ctx.fill();
  rrPath(ctx, 1.2 - off, -2.5, 5.4, 2.5, 1.2); ctx.fill();
  // body with radial shading
  const gr = ctx.createRadialGradient(-2, -9.5, 1, 0, -7.2, 9);
  gr.addColorStop(0, "#c1763f"); gr.addColorStop(1, "#7e4017");
  ctx.fillStyle = gr;
  ctx.beginPath(); ctx.ellipse(0, -7.4, 7, 6, 0, 0, Math.PI*2); ctx.fill();
  // eyes
  for (const s of [-1, 1]) {
    ctx.fillStyle = "#fff";
    ctx.beginPath(); ctx.ellipse(s*2.6, -8.6, 1.7, 2, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = "#241a12";
    ctx.beginPath(); ctx.arc(s*2.6, -8.1, 0.9, 0, Math.PI*2); ctx.fill();
  }
  // angry brows + frown
  ctx.strokeStyle = "#3c2410"; ctx.lineWidth = 1.1; ctx.lineCap = "round";
  ctx.beginPath();
  ctx.moveTo(-4.4, -11.8); ctx.lineTo(-1.2, -10.6);
  ctx.moveTo(4.4, -11.8); ctx.lineTo(1.2, -10.6);
  ctx.stroke();
  ctx.beginPath(); ctx.arc(0, -3.4, 1.7, 1.15*Math.PI, 1.85*Math.PI); ctx.stroke();
  ctx.restore();
}

/* angry pigeon — flapping, cross-eyed, ready to bonk a flyer */
function drawPigeon(ctx, pg) {
  ctx.save();
  ctx.translate(pg.x + pg.w/2, pg.y + pg.h/2);
  if ((pg.facing || 1) < 0) ctx.scale(-1, 1);
  if (pg.dead > 0) ctx.rotate(Math.min(pg.dead * 0.18, 1.4));   // tumble when shot down
  const flap = Math.sin(pg.flap);
  // tail
  ctx.fillStyle = "#7d8794";
  ctx.beginPath(); ctx.moveTo(-5, 0); ctx.lineTo(-10.5, -2.5); ctx.lineTo(-10.5, 2.5); ctx.closePath(); ctx.fill();
  // far wing (behind body)
  ctx.fillStyle = "#6f7a88";
  ctx.beginPath(); ctx.ellipse(-1, -flap*4 - 1, 6, 3, flap*0.5, 0, Math.PI*2); ctx.fill();
  // body
  const bg = ctx.createRadialGradient(-1, -2, 1, 0, 0, 8);
  bg.addColorStop(0, "#aeb7c2"); bg.addColorStop(1, "#838d9b");
  ctx.fillStyle = bg;
  ctx.beginPath(); ctx.ellipse(0, 0, 6.5, 5, 0, 0, Math.PI*2); ctx.fill();
  // iridescent neck patch
  ctx.fillStyle = "#5fb39a";
  ctx.beginPath(); ctx.ellipse(4, -1.5, 2.2, 2.6, 0, 0, Math.PI*2); ctx.fill();
  // head
  ctx.fillStyle = "#9aa4b1";
  ctx.beginPath(); ctx.arc(6, -3.5, 3.4, 0, Math.PI*2); ctx.fill();
  // beak
  ctx.fillStyle = "#f2a33c";
  ctx.beginPath(); ctx.moveTo(9, -4); ctx.lineTo(13, -3); ctx.lineTo(9, -1.8); ctx.closePath(); ctx.fill();
  // furious eye + angry brow
  ctx.fillStyle = "#fff";
  ctx.beginPath(); ctx.arc(6.6, -4.4, 1.5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = "#1d1f24";
  ctx.beginPath(); ctx.arc(7.1, -4.4, 0.8, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = "#2a2d34"; ctx.lineWidth = 1.1; ctx.lineCap = "round";
  ctx.beginPath(); ctx.moveTo(4.4, -7.2); ctx.lineTo(8.4, -5.6); ctx.stroke();
  // legs
  ctx.strokeStyle = "#e08a2c"; ctx.lineWidth = 0.9;
  ctx.beginPath(); ctx.moveTo(0, 4.5); ctx.lineTo(-0.5, 6.5); ctx.moveTo(2.5, 4.5); ctx.lineTo(2.5, 6.5); ctx.stroke();
  // near wing (in front, flaps the other way)
  ctx.fillStyle = "#9aa4b1";
  ctx.beginPath(); ctx.ellipse(-1, flap*4 + 1, 6.5, 3.2, -flap*0.5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = "#7d8794";
  ctx.beginPath(); ctx.ellipse(-3, flap*4 + 1.5, 3.2, 1.6, -flap*0.5, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}


function drawBowser(ctx, B) {
  ctx.save();
  ctx.translate(B.x + B.w/2, B.y + B.h);
  if (B.dead) ctx.scale(1, -1);
  if ((B.facing || -1) < 0) ctx.scale(-1, 1);
  const flash = !B.dead && B.stun > 0 && (B.stun >> 2) % 2 === 0;
  ctx.fillStyle = "#c9a23c";
  rrPath(ctx, -12, -7, 8, 7, 2.5); ctx.fill();
  rrPath(ctx, 4, -7, 8, 7, 2.5); ctx.fill();
  const sg = ctx.createRadialGradient(-5, -20, 2, -3, -16, 15);
  sg.addColorStop(0, flash ? "#c8ffc8" : "#6cc873");
  sg.addColorStop(1, flash ? "#7ed084" : "#2c7a36");
  ctx.fillStyle = sg;
  ctx.beginPath(); ctx.ellipse(-3, -16, 11.5, 10.5, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = "#f3eedd";
  for (const [px, py] of [[-11.5, -24], [-5, -26.5], [1.5, -24]]) {
    ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(px + 2.4, py - 4.5); ctx.lineTo(px + 4.8, py);
    ctx.closePath(); ctx.fill();
  }
  const bg2 = ctx.createLinearGradient(0, -20, 0, -2);
  bg2.addColorStop(0, "#f5e2b2"); bg2.addColorStop(1, "#d8b87e");
  ctx.fillStyle = bg2;
  ctx.beginPath(); ctx.ellipse(5, -11, 7, 9, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = flash ? "#c8ffc8" : "#8fce58";
  ctx.beginPath(); ctx.ellipse(9, -26, 7, 6, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = "#e8632c";
  ctx.beginPath(); ctx.ellipse(6, -31.5, 4.5, 2.5, -0.3, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = "#f3eedd";
  ctx.beginPath(); ctx.moveTo(3, -29); ctx.lineTo(2, -34.5); ctx.lineTo(6.5, -31); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(14, -30); ctx.lineTo(16.5, -34.5); ctx.lineTo(17, -29.5); ctx.closePath(); ctx.fill();
  ctx.fillStyle = "#fff";
  ctx.beginPath(); ctx.ellipse(11.5, -27.5, 1.8, 2.1, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = "#c81e1e";
  ctx.beginPath(); ctx.arc(12, -27, 1, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = "#5a2c10"; ctx.lineWidth = 1.1; ctx.lineCap = "round";
  ctx.beginPath(); ctx.moveTo(9, -30.5); ctx.lineTo(13.5, -29.2); ctx.stroke();
  ctx.fillStyle = "#cfe0a8";
  rrPath(ctx, 12, -25, 6.5, 5, 2); ctx.fill();
  ctx.fillStyle = "#fff";
  ctx.fillRect(13.5, -21.5, 4, 1.4);
  ctx.restore();
}

function drawFlame(ctx, fl) {
  const cx = fl.x + fl.w/2, cy = fl.y + fl.h/2;
  const fg2 = ctx.createRadialGradient(cx, cy, 0.5, cx, cy, 9);
  fg2.addColorStop(0, "#fff3c0"); fg2.addColorStop(0.5, "#ffb03c"); fg2.addColorStop(1, "rgba(232,90,32,0)");
  ctx.fillStyle = fg2;
  ctx.beginPath(); ctx.ellipse(cx, cy, 9, 5.5, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = "#ff8a3c";
  ctx.beginPath(); ctx.ellipse(cx, cy, 5, 2.6, 0, 0, Math.PI*2); ctx.fill();
}

function drawPug(ctx, cx, feetY) {
  ctx.save(); ctx.translate(cx, feetY);
  const bg3 = ctx.createLinearGradient(0, -9, 0, 0);
  bg3.addColorStop(0, "#e3c08c"); bg3.addColorStop(1, "#c3a06a");
  ctx.fillStyle = bg3;
  ctx.beginPath(); ctx.ellipse(0, -4.6, 6, 4.4, 0, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = "#c3a06a"; ctx.lineWidth = 1.8; ctx.lineCap = "round";
  ctx.beginPath(); ctx.arc(5.4, -8, 2, 0.4, Math.PI * 1.5); ctx.stroke();
  ctx.fillStyle = "#c3a06a";
  for (const lx of [-4.4, -1.4, 1.6, 4]) ctx.fillRect(lx, -2, 1.8, 2);
  ctx.fillStyle = "#e3c08c";
  ctx.beginPath(); ctx.ellipse(-5.6, -8.4, 4.4, 4.2, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = "#4a3828";
  ctx.beginPath(); ctx.ellipse(-6.4, -6.6, 2.6, 2.1, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = "#241a12";
  ctx.beginPath(); ctx.arc(-7.6, -7, 0.7, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = "#3a2a1c";
  ctx.beginPath(); ctx.ellipse(-8.4, -11.6, 1.6, 2, 0.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-2.6, -11.8, 1.6, 2, -0.4, 0, Math.PI*2); ctx.fill();
  for (const ex of [-7.8, -4.2]) {
    ctx.fillStyle = "#fff";
    ctx.beginPath(); ctx.arc(ex, -9.2, 1.25, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = "#241a12";
    ctx.beginPath(); ctx.arc(ex + 0.2, -9, 0.85, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,.9)";
    ctx.beginPath(); ctx.arc(ex - 0.2, -9.5, 0.3, 0, Math.PI*2); ctx.fill();
  }
  ctx.fillStyle = "#e8748c";
  rrPath(ctx, -7.2, -5.2, 1.8, 2.4, 0.9); ctx.fill();
  ctx.fillStyle = "#ff5e7e";
  ctx.fillRect(-8.8, -5, 6.4, 1.4);
  ctx.restore();
}

function superBlast() {
  const cloudKind = CHARS[heroKey].kind === "cloud";
  game.superFx = { type: cloudKind ? "storm" : "fireworks", t: 0 };
  SFX.superb();
  for (const e of game.level.enemies) {
    if (e.dead || !e.active) continue;
    if (e.x > game.camX - 20 && e.x < game.camX + VIEW_W + 20) {
      e.dead = 1; game.score += 200;
      for (let i = 0; i < 10; i++)
        game.particles.push({ x: e.x + 6, y: e.y + 6,
          vx: Math.cos(i * 0.63) * 2, vy: Math.sin(i * 0.63) * 2 - 1, t: 0,
          c: cloudKind ? "#9bd0ff" : ["#ff7ab8", "#ffd166", "#c89bff"][i % 3] });
    }
  }
  for (const pg of game.pigeons) {            // and scatter the whole flock
    if (pg.dead === 0) { pg.dead = 1; pg.vy = -1.6; game.score += 150; }
  }
}

function drawSuperFx() {
  const fx = game.superFx, camX = game.camX, a = Math.max(0, 1 - fx.t / 110);
  if (fx.type === "storm") {                 // Chuckee's rain storm
    g.fillStyle = "rgba(40,60,110," + (0.25 * a).toFixed(3) + ")";
    g.fillRect(camX - 4, -VIEW_H, VIEW_W + 8, VIEW_H + LEVEL_H + 40);
    g.strokeStyle = "rgba(160,200,255," + (0.7 * a).toFixed(3) + ")";
    g.lineWidth = 1;
    for (let i = 0; i < 50; i++) {
      const rx = camX + ((i * 41.7 + fx.t * 2.5) % VIEW_W);
      const ry = ((i * 53.3 + fx.t * 7) % (LEVEL_H + 40)) - 20;
      g.beginPath(); g.moveTo(rx, ry); g.lineTo(rx - 1.5, ry + 7); g.stroke();
    }
  } else {                                   // Chun-me's pink fireworks
    for (let i = 0; i < 6; i++) {
      const bx = camX + ((i * 67.3) % VIEW_W), by = 36 + ((i * 41.7) % 110);
      const rr = (fx.t * 1.3 + i * 7) % 46;
      g.strokeStyle = "rgba(" + (i % 2 ? "255,140,200," : "255,210,120,") + (Math.max(0, 0.8 - rr / 46) * a).toFixed(3) + ")";
      g.lineWidth = 2;
      g.beginPath(); g.arc(bx, by, rr, 0, Math.PI * 2); g.stroke();
    }
  }
}

/* ============================== PHYSICS ============================== */
const SOLID = "#G=?MUSPT";
function tileAt(tx, ty) {
  const L = game.level;
  if (tx < 0 || tx >= L.width) return "#";
  if (ty < 0) return " ";
  if (ty >= ROWS) return " ";
  return L.grid[ty][tx];
}
function isSolid(c) { return SOLID.includes(c); }

function moveEntity(e, onBumpHead) {
  // horizontal
  e.x += e.vx;
  let x0 = Math.floor(e.x / TILE), x1 = Math.floor((e.x + e.w - 0.01) / TILE);
  let y0 = Math.floor(e.y / TILE), y1 = Math.floor((e.y + e.h - 0.01) / TILE);
  if (e.vx > 0) {
    for (let ty = y0; ty <= y1; ty++) if (isSolid(tileAt(x1, ty))) { e.x = x1*TILE - e.w - 0.01; e.hitWall = true; break; }
  } else if (e.vx < 0) {
    for (let ty = y0; ty <= y1; ty++) if (isSolid(tileAt(x0, ty))) { e.x = (x0+1)*TILE + 0.01; e.hitWall = true; break; }
  }
  // vertical
  e.y += e.vy;
  x0 = Math.floor(e.x / TILE); x1 = Math.floor((e.x + e.w - 0.01) / TILE);
  y0 = Math.floor(e.y / TILE); y1 = Math.floor((e.y + e.h - 0.01) / TILE);
  e.grounded = false;
  if (e.vy > 0) {
    for (let tx = x0; tx <= x1; tx++) if (isSolid(tileAt(tx, y1))) {
      e.y = y1*TILE - e.h; e.vy = 0; e.grounded = true; break;
    }
  } else if (e.vy < 0) {
    let bumped = null, bestDist = 1e9;
    for (let tx = x0; tx <= x1; tx++) if (isSolid(tileAt(tx, y0))) {
      e.y = (y0+1)*TILE + 0.01; e.vy = 0;
      const cx = e.x + e.w/2, d = Math.abs((tx+0.5)*TILE - cx);
      if (d < bestDist) { bestDist = d; bumped = tx; }
    }
    if (bumped !== null && onBumpHead) onBumpHead(bumped, y0);
  }
}

function bumpBlock(tx, ty) {
  const c = tileAt(tx, ty), L = game.level;
  if (c === "?") {
    L.grid[ty][tx] = "U";
    game.coins++; game.score += 100; SFX.coin();
    game.pops.push({ x:(tx+0.5)*TILE, y:ty*TILE, t:0 });
  } else if (c === "M") {
    L.grid[ty][tx] = "U";
    game.score += 100; SFX.sprout();
    // mushroom when small, fire flower when already big (like SMB)
    game.powerups.push({ x:tx*TILE + 2, y:ty*TILE + 2, w:12, h:12,
      vx:0.7, vy:0, type: player.power === 0 ? "mushroom" : "flower", rise:28 });
  } else if (c === "=") {
    if (player.power > 0) {                  // only big kids break bricks
      L.grid[ty][tx] = " ";
      game.score += 50; SFX.brick();
      for (let i = 0; i < 6; i++)
        game.particles.push({ x:(tx+0.5)*TILE, y:(ty+0.5)*TILE,
          vx:(i%2?1:-1)*(0.6+i*0.25), vy:-2.2-(i%3)*0.7, t:0, c:"#b46a36" });
    } else SFX.bump();
  } else if (isSolid(c)) {
    SFX.bump();
  }
}

function applyDamage() {
  if (player.inv > 0) return;
  if (player.power > 0) {
    player.power--;
    if (player.power === 0) { player.y += 8; player.h = 16; }
    player.inv = CHARS[heroKey].kind === "bunny" ? 600 : 150; SFX.shrink();
  } else {
    killPlayer();
  }
}

function bossHit() {
  const B = game.boss;
  B.hp--; B.stun = 50; SFX.stomp();
  game.score += 500;
  if (B.hp <= 0) { B.dead = true; B.deadT = 0; B.vy = -4.5; game.score += 5000; SFX.clear(); }
}

function collectCoins() {
  const x0 = Math.floor(player.x / TILE), x1 = Math.floor((player.x + player.w) / TILE);
  const y0 = Math.floor(player.y / TILE), y1 = Math.floor((player.y + player.h) / TILE);
  for (let ty = y0; ty <= y1; ty++) for (let tx = x0; tx <= x1; tx++) {
    if (tileAt(tx, ty) === "o") {
      game.level.grid[ty][tx] = " ";
      game.coins++; game.score += 100; SFX.coin();
      game.pops.push({ x:(tx+0.5)*TILE, y:ty*TILE, t:0 });
    }
  }
}

/* ============================== UPDATE ============================== */
/* Super Mario Bros movement constants (px/frame @ 60fps, 16px tiles) */
const WALK_MAX = 1.5625, RUN_MAX = 2.5625;
const ACC_WALK = 0.0374, ACC_RUN = 0.0556, DEC_REL = 0.0508, DEC_SKID = 0.1016;
const MAX_FALL = 4.0;
/* SMB jump: initial velocity + gravity depend on takeoff speed */
function jumpTier(speed) {
  const s = Math.abs(speed);
  if (s < 1.0)    return { v:-4.0, hold:0.125,   fall:0.4375  };
  if (s < 2.3125) return { v:-4.0, hold:0.1172,  fall:0.40625 };
  return            { v:-5.0, hold:0.15625, fall:0.5625  };
}

function setPower(n) {
  if (n > 0 && player.h === 16) { player.y -= 8.01; player.h = 24; }
  if (n === 0 && player.h === 24) { player.y += 8; player.h = 16; }
  player.power = n;
}

function updatePlay() {
  syncKeys();
  if (player.inv > 0) player.inv--;

  // --- horizontal: walk/auto-run with SMB accel, release decel and skid ---
  const dir = (input.right ? 1 : 0) - (input.left ? 1 : 0);
  if (dir !== 0) {
    if (dir === player.runDir) player.runCharge++;
    else { player.runCharge = 0; player.runDir = dir; }
  } else player.runCharge = 0;
  const running = player.runCharge > 30;            // hold a direction ~0.5s to run
  const maxV = running ? RUN_MAX : WALK_MAX;

  if (dir !== 0) {
    player.facing = dir;
    if (player.vx * dir < 0) {
      player.vx += dir * (player.grounded ? DEC_SKID : ACC_RUN);   // skid turn
    } else if (Math.abs(player.vx) < maxV) {
      player.vx += dir * (running ? ACC_RUN : ACC_WALK);
      if (Math.abs(player.vx) > maxV) player.vx = dir * maxV;
    } else if (player.grounded && Math.abs(player.vx) > maxV) {
      player.vx -= Math.sign(player.vx) * DEC_REL;                 // ease back to walk speed
    }
  } else if (player.grounded && player.vx !== 0) {
    const s = Math.sign(player.vx);
    player.vx -= s * DEC_REL;
    if (player.vx * s < 0) player.vx = 0;
  }

  // --- jump (buffer + coyote for kid-friendliness) ---
  if (input.jumpPressed) { player.jumpBuf = 7; input.jumpPressed = false; }
  if (player.grounded) { player.coyote = 5; player.jg = jumpTier(player.vx); }
  if (player.jumpBuf > 0 && player.coyote > 0) {
    const t = jumpTier(player.vx);
    player.vy = t.v; player.jg = t;
    player.coyote = 0; player.jumpBuf = 0; SFX.jump();
  }
  if (player.jumpBuf > 0) player.jumpBuf--;
  if (player.coyote > 0) player.coyote--;

  // --- gravity: light while rising & holding jump, heavy otherwise (SMB) ---
  player.vy += (player.vy < 0 && input.jump) ? player.jg.hold : player.jg.fall;
  player.vy = Math.min(player.vy, MAX_FALL);

  // --- magic flight: Chun-me flies (20s), Chuckee floats (10s) ---
  if (player.grounded) player.fly = CHARS[heroKey].flyMax;
  if (!player.grounded && input.jump && player.vy > -1.2 && player.fly > 0) {
    player.fly--;
    const cloudKind = CHARS[heroKey].kind === "cloud";
    const target = cloudKind ? -0.9 : -1.7;
    player.vy += (target - player.vy) * (cloudKind ? 0.18 : 0.12);
    if ((game.timer & 3) === 0)
      game.particles.push({ x: player.x + player.w/2 + (Math.random() * 10 - 5),
        y: player.y + player.h, vx: 0, vy: 0.6, t: 20,
        c: cloudKind ? "rgba(200,225,255,.8)" : "rgba(255,160,210,.85)" });
  }

  player.hitWall = false;
  moveEntity(player, bumpBlock);
  collectCoins();

  // --- magic: Chun-me's stars / Chuckee's lightning ---
  if (player.shootCool > 0) player.shootCool--;
  if (input.firePressed) {
    input.firePressed = false;
    if (player.shootCool === 0 && game.fireballs.length < 3) {
      const cloudKind = CHARS[heroKey].kind === "cloud";
      const kind = cloudKind ? "bolt" : (player.power > 0 ? "pinkfire" : "star");
      game.fireballs.push({ x: player.x + (player.facing > 0 ? player.w : -6),
        y: player.y + player.h * 0.35, w: 5, h: 5,
        vx: (cloudKind ? 3.6 : 3) * player.facing, vy: kind === "pinkfire" ? -0.5 : 0,
        kind, t: 0 });
      player.shootCool = 16;
      if (cloudKind) SFX.bolt(); else SFX.star();
    }
  }
  for (const f of game.fireballs) {
    f.t++;
    if (f.kind === "pinkfire") f.vy = Math.min(f.vy + 0.12, 4);   // stars and bolts fly straight
    f.hitWall = false;
    moveEntity(f);
    if (f.grounded || f.hitWall || f.t > 90 ||
        f.x < game.camX - 24 || f.x > game.camX + VIEW_W + 24 || f.y > LEVEL_H + 24) f.gone = true;
  }
  game.fireballs = game.fireballs.filter(f => !f.gone);

  // --- powerups (mushrooms walk, flowers sit) ---
  for (const p of game.powerups) {
    if (p.rise > 0) { p.rise--; p.y -= 0.5; }
    else if (p.type === "mushroom") {
      p.vy = Math.min(p.vy + 0.4375, MAX_FALL);
      p.hitWall = false;
      moveEntity(p);
      if (p.hitWall) p.vx = -p.vx;
      if (p.y > LEVEL_H + 40) p.gone = true;
    }
    if (p.rise < 20 &&
        player.x < p.x + p.w && player.x + player.w > p.x &&
        player.y < p.y + p.h && player.y + player.h > p.y) {
      p.gone = true; game.score += 1000;
      if (p.type === "flower") superBlast();
      else { setPower(1); SFX.grow(); }
      game.pops.push({ x: p.x + p.w/2, y: p.y, t: 0 });
    }
  }
  game.powerups = game.powerups.filter(p => !p.gone);
  refreshFireBtn();

  // animation
  if (Math.abs(player.vx) > 0.3 && player.grounded) {
    player.animT += Math.abs(player.vx);
    if (player.animT > 7) { player.animT = 0; player.frame = 1 - player.frame; }
  } else player.frame = 0;

  // fell in a pit
  if (player.y > LEVEL_H + 40) { killPlayer(); return; }

  // enemies
  const L = game.level;
  for (const e of L.enemies) {
    if (!e.active) {
      if (e.x < game.camX + VIEW_W + 24) e.active = true;
      else continue;
    }
    if (e.dead > 0) { e.dead++; continue; }
    e.vy = Math.min(e.vy + 0.4375, MAX_FALL);
    e.hitWall = false;
    moveEntity(e);
    if (e.hitWall) e.vx = -e.vx;
    e.frame = (Math.floor(game.timer / 14)) % 2;
    if (e.y > LEVEL_H + 60) { e.dead = 999; continue; }

    // fireball hits
    for (const f of game.fireballs) {
      if (!f.gone && f.x < e.x + e.w && f.x + f.w > e.x &&
          f.y < e.y + e.h && f.y + f.h > e.y) {
        e.dead = 1; f.gone = true; game.score += 200; SFX.stomp();
      }
    }
    if (e.dead > 0) continue;

    // player collision
    if (player.x < e.x + e.w && player.x + player.w > e.x &&
        player.y < e.y + e.h && player.y + player.h > e.y) {
      const feet = player.y + player.h;
      if (player.vy > 0.4 && feet - e.y < 9) {
        e.dead = 1; game.score += 200; SFX.stomp();
        const t = jumpTier(player.vx);
        player.vy = t.v; player.jg = t;     // SMB-style bounce; hold jump to ride it higher
      } else {
        applyDamage();
        if (game.state !== "play") return;
      }
    }
  }
  L.enemies = L.enemies.filter(e => e.dead < 26 || !e.active);

  // --- angry pigeons: the flock dives at you for flying too long ---
  if (player.grounded) player.airT = 0; else player.airT++;
  const FLY_LIMIT = 210;                 // ~3.5s aloft before the flock takes notice
  if (player.airT > FLY_LIMIT && game.pigeons.length < 3) {
    if (game.pigeonCool > 0) game.pigeonCool--;
    else {
      game.pigeonCool = 75;
      const fromLeft = (player.x + player.w/2) > (game.camX + VIEW_W/2);
      game.pigeons.push({
        x: fromLeft ? game.camX - 16 : game.camX + VIEW_W + 4,
        y: Math.max(6, player.y - 28 - Math.random()*26),
        w: 14, h: 11, vx: fromLeft ? 1.2 : -1.2, vy: 0,
        dead: 0, flap: Math.random()*6, facing: fromLeft ? 1 : -1, leaving: false });
      SFX.coo();
    }
  }
  for (const pg of game.pigeons) {
    pg.flap += 0.55;
    if (pg.dead > 0) { pg.dead++; pg.vy = Math.min(pg.vy + 0.3, 4); pg.y += pg.vy; pg.x += pg.vx * 0.4; continue; }
    if (player.airT === 0) pg.leaving = true;     // you touched the ground — the flock peels off
    if (pg.leaving) {
      pg.vy += -0.06;
      pg.vx += (pg.x < player.x ? -0.07 : 0.07);
    } else {                                       // home in on the flyer
      const dx = (player.x + player.w/2) - (pg.x + pg.w/2);
      const dy = (player.y + player.h/2) - (pg.y + pg.h/2);
      pg.vx += Math.sign(dx) * 0.055;
      pg.vy += Math.sign(dy) * 0.05 + Math.sin(pg.flap) * 0.03;   // bobbing dive
    }
    pg.vx = Math.max(-1.7, Math.min(1.7, pg.vx));
    pg.vy = Math.max(-1.7, Math.min(1.7, pg.vy));
    if (pg.vx < -0.05) pg.facing = -1; else if (pg.vx > 0.05) pg.facing = 1;
    pg.x += pg.vx; pg.y += pg.vy;
    if (pg.x < game.camX - 70 || pg.x > game.camX + VIEW_W + 70 || pg.y > LEVEL_H + 40 || pg.y < -90)
      pg.gone = true;

    // shot down by stars / bolts
    for (const f of game.fireballs) {
      if (!f.gone && f.x < pg.x + pg.w && f.x + f.w > pg.x &&
          f.y < pg.y + pg.h && f.y + f.h > pg.y) {
        pg.dead = 1; f.gone = true; pg.vy = -1.5; game.score += 150; SFX.stomp();
        for (let i = 0; i < 7; i++)
          game.particles.push({ x: pg.x + 7, y: pg.y + 5,
            vx: Math.cos(i)*1.6, vy: Math.sin(i)*1.6 - 0.5, t: 0, c: "#cfd6df" });
      }
    }
    if (pg.dead > 0) continue;

    // touching the player — stomp it, or it pecks you
    if (!pg.leaving &&
        player.x < pg.x + pg.w && player.x + player.w > pg.x &&
        player.y < pg.y + pg.h && player.y + player.h > pg.y) {
      const feet = player.y + player.h;
      if (player.vy > 0.4 && feet - pg.y < 8) {
        pg.dead = 1; pg.vy = -1; game.score += 150; SFX.stomp();
        const t = jumpTier(player.vx); player.vy = t.v; player.jg = t;   // bounce off it
      } else {
        applyDamage();
        if (game.state !== "play") return;
      }
    }
  }
  game.pigeons = game.pigeons.filter(pg => !pg.gone && pg.dead < 30);

  // --- Bowser (castle boss) ---
  const B = game.boss;
  if (B && !B.dead) {
    if (!B.active && B.x < game.camX + VIEW_W + 60) B.active = true;
    if (B.active) {
      if (B.stun > 0) B.stun--;
      B.facing = player.x + player.w/2 < B.x + B.w/2 ? -1 : 1;
      B.x += B.vx;
      if (B.x < B.baseX - 30 || B.x > B.baseX + 30) B.vx = -B.vx;
      B.vy = Math.min(B.vy + 0.3, 5);
      B.y += B.vy;
      const floorY = 13*TILE - B.h;
      if (B.y >= floorY) { B.y = floorY; B.vy = 0; }
      if (--B.hopT <= 0) { B.hopT = 130 + (game.timer % 70); B.vy = -3.4; }
      if (--B.fireT <= 0) {
        B.fireT = 150;
        game.bossFlames.push({ x: B.x + (B.facing > 0 ? B.w + 2 : -14), y: B.y + 7,
                               w: 12, h: 6, vx: 1.5 * B.facing });
        SFX.brick();
      }
      for (const f of game.fireballs) {
        if (!f.gone && B.stun === 0 && f.x < B.x + B.w && f.x + f.w > B.x &&
            f.y < B.y + B.h && f.y + f.h > B.y) { f.gone = true; bossHit(); }
      }
      if (player.x < B.x + B.w && player.x + player.w > B.x &&
          player.y < B.y + B.h && player.y + player.h > B.y) {
        const feet = player.y + player.h;
        if (player.vy > 0.4 && feet - B.y < 14) {
          const t = jumpTier(player.vx);
          player.vy = t.v; player.jg = t;       // bounce off his head
          if (B.stun === 0) bossHit();
        } else if (B.stun < 30) {
          applyDamage();
          if (game.state !== "play") return;
        }
      }
    }
  } else if (B && B.dead && B.y < LEVEL_H + 80) {
    B.deadT++; B.vy = Math.min(B.vy + 0.25, 6); B.y += B.vy;
  }
  for (const fl of game.bossFlames) {
    fl.x += fl.vx;
    if (fl.x < game.camX - 30 || fl.x > game.camX + VIEW_W + 30) fl.gone = true;
    else if (player.inv === 0 &&
        player.x < fl.x + fl.w && player.x + player.w > fl.x &&
        player.y < fl.y + fl.h && player.y + player.h > fl.y) {
      fl.gone = true;
      applyDamage();
      if (game.state !== "play") return;
    }
  }
  game.bossFlames = game.bossFlames.filter(fl => !fl.gone);

  // --- Peach the pug, waiting in her cage ---
  if (game.pug) {
    if (!game.pug.free && game.boss.dead && game.boss.deadT > 40) { game.pug.free = true; SFX.sprout(); }
    if (game.pug.free) {
      game.pug.hopT++;
      if (Math.abs(player.x + player.w/2 - game.pug.x) < 14 && player.y + player.h > 11*TILE) {
        game.state = "clear"; game.timer = 0; game.rescued = true; game.score += 5000;
        SFX.clear(); spawnConfetti(game.pug.x, 100); showButtons(false);
      }
    }
  }

  // flag
  if (L.flagX && player.x + player.w/2 >= L.flagX * TILE) {
    game.state = "clear"; game.timer = 0; game.score += 1000; SFX.clear();
    spawnConfetti(L.flagX * TILE, 80);
    showButtons(false);
  }

  // camera
  const target = player.x + player.w/2 - VIEW_W * 0.42;
  game.camX += (target - game.camX) * 0.12;
  game.camX = Math.max(0, Math.min(game.camX, L.width * TILE - VIEW_W));
}

function killPlayer() {
  game.state = "dead"; game.timer = 0;
  player.vy = -6.5; player.power = 0; player.airT = 0; game.pigeons = [];
  SFX.die();
  showButtons(false);
}

function spawnConfetti(x, n) {
  const colors = ["#ff5e7e","#ffd166","#6ee7b7","#7fb5ff","#c89bff"];
  for (let i = 0; i < n; i++)
    game.particles.push({ x: x + (Math.random()*60-30), y: Math.random()*120,
      vx: Math.random()*2-1, vy: Math.random()*-1.5-0.5, t: -Math.random()*30,
      c: colors[i % colors.length], conf: true });
}

function update() {
  game.timer++;

  // particles
  for (const p of game.particles) {
    if (p.t < 0) { p.t++; continue; }
    p.x += p.vx; p.y += p.vy;
    p.vy += p.conf ? 0.05 : 0.3;
    if (p.conf) p.vx *= 0.99;
    p.t++;
  }
  game.particles = game.particles.filter(p => p.t < (p.conf ? 220 : 60) && p.y < LEVEL_H + 80);
  if (game.superFx && ++game.superFx.t > 110) game.superFx = null;
  for (const c of game.pops) c.t++;
  game.pops = game.pops.filter(c => c.t < 28);

  if (game.state === "play") updatePlay();
  else if (game.state === "dead") {
    player.vy += 0.35; player.y += player.vy;
    if (game.timer > 110) {
      game.lives--;
      if (game.lives <= 0) { game.state = "gameover"; game.timer = 0; }
      else startLevel(game.levelNum);
    }
  }
  else if (game.state === "clear") {
    // hero strolls right past the flag
    player.vx = 1.2; player.vy = Math.min(player.vy + 0.46, 7);
    moveEntity(player);
    player.animT += 1.2;
    if (player.animT > 7) { player.animT = 0; player.frame = 1 - player.frame; }
    if (game.timer > 170) {
      if (game.levelNum + 1 < LEVEL_COUNT) startLevel(game.levelNum + 1);
      else { game.state = "win"; game.timer = 0; spawnConfetti(game.camX + VIEW_W/2, 120); }
    }
  }
  else if (game.state === "gameover") {
    if (game.timer > 30 && tapX >= 0 && game.goHits) {
      for (const h of game.goHits) {
        if (tapX >= h.x && tapX <= h.x + h.w && tapY >= h.y && tapY <= h.y + h.h) {
          SFX.select();
          if (h.action === "continue") { game.lives = 3; startLevel(game.levelNum); }
          else goTitle();
          break;
        }
      }
    }
    if (keys["Enter"] && game.timer > 30) { SFX.select(); game.lives = 3; startLevel(game.levelNum); }
  }
  else if (game.state === "win") {
    if (game.timer % 50 === 0 && game.timer < 400) spawnConfetti(game.camX + VIEW_W/2, 30);
    if (game.timer > 90 && input.anyTap) goTitle();
  }
  else if (game.state === "title") updateTitle();

  input.anyTap = false; input.firePressed = false; tapX = -1;
}

function updateTitle() {
  if (tapX >= 0) {
    for (const c of game.titleCards) {
      if (tapX >= c.sx && tapX <= c.sx + c.sw && tapY >= c.sy && tapY <= c.sy + c.sh) {
        heroKey = c.key; SFX.select();
        startLevel(0);
        return;
      }
    }
  }
  if (keys["Enter"]) { SFX.select(); startLevel(0); }
}

/* ============================== DRAW ============================== */
/* Tiles are pre-rendered once at 3x resolution into offscreen canvases,
   then drawn scaled — detailed texture at zero per-frame cost. */
const SPR = {};
function tileSprite(c) {
  const themeKey = (game.level && game.level.theme) || "";
  const key = c + "|" + themeKey;
  if (SPR[key]) return SPR[key];
  const K = 3, R = 16 * K;
  const s = document.createElement("canvas");
  s.width = c === "T" ? R + 4*K : R; s.height = R;
  const t = s.getContext("2d");
  const lg = (x0,y0,x1,y1,stops) => {
    const gr = t.createLinearGradient(x0,y0,x1,y1);
    for (const [o,col] of stops) gr.addColorStop(o,col);
    return gr;
  };
  const speckle = (n, colors, y0, y1) => {
    for (let i = 0; i < n; i++) {
      t.fillStyle = colors[i % colors.length];
      const sx = Math.random() * R, sy = y0 + Math.random() * (y1 - y0);
      t.beginPath(); t.arc(sx, sy, 1 + Math.random()*1.8, 0, Math.PI*2); t.fill();
    }
  };
  switch (c) {
    case "G": {
      if (themeKey === "beach") {
        t.fillStyle = lg(0,0,0,R,[[0,"#efd7a2"],[1,"#cfae6e"]]); t.fillRect(0,0,R,R);
        speckle(12, ["#dfc18a","#b8945a","#f5e6c0"], 0, R);
        t.fillStyle = "rgba(255,250,225,.55)"; t.fillRect(0,0,R,6);
        break;
      }
      t.fillStyle = lg(0,0,0,R,[[0,"#8a5a32"],[1,"#6b431f"]]); t.fillRect(0,0,R,R);
      speckle(14, ["#7a4b24","#9c6a3c","#5e3a18"], R*0.4, R);
      t.fillStyle = lg(0,0,0,R*0.36,[[0,"#8fd95e"],[1,"#4c9a32"]]); t.fillRect(0,0,R,R*0.34);
      t.fillStyle = "#4c9a32";
      for (let i = 0; i < 8; i++) {
        t.beginPath();
        t.moveTo(i*6, R*0.34); t.lineTo(i*6+3, R*0.34 + 3 + (i%3)*2); t.lineTo(i*6+6, R*0.34);
        t.fill();
      }
      t.strokeStyle = "rgba(255,255,255,.25)"; t.lineWidth = 1.2;
      for (let i = 0; i < 5; i++) {
        t.beginPath(); t.moveTo(4 + i*10, R*0.3); t.lineTo(5.5 + i*10, R*0.08); t.stroke();
      }
      break;
    }
    case "#": {
      if (themeKey === "beach") {
        t.fillStyle = lg(0,0,0,R,[[0,"#d4b276"],[1,"#b08e52"]]); t.fillRect(0,0,R,R);
        speckle(14, ["#c4a266","#9a7a42","#e0c890"], 0, R);
        break;
      }
      t.fillStyle = lg(0,0,0,R,[[0,"#7d4d26"],[1,"#62391a"]]); t.fillRect(0,0,R,R);
      speckle(16, ["#6b431f","#8a5e34","#54320f"], 0, R);
      break;
    }
    case "=": {
      t.fillStyle = "#6e3a17"; t.fillRect(0,0,R,R);   // mortar
      const brick = (bx, by, bw, bh) => {
        t.fillStyle = lg(bx,by,bx,by+bh,[[0,"#cd7d4a"],[1,"#a4562a"]]);
        rrPath(t, bx, by, bw, bh, 2); t.fill();
        t.fillStyle = "rgba(255,255,255,.18)"; t.fillRect(bx+1, by+1, bw-2, 2);
      };
      brick(1, 1, 22, 21); brick(25, 1, 22, 21);
      brick(-11, 25, 22, 21); brick(13, 25, 22, 21); brick(37, 25, 22, 21);
      break;
    }
    case "?": case "M": {
      t.fillStyle = lg(0,0,0,R,[[0,"#f8cf5e"],[0.55,"#eeAB33"],[1,"#c97f1a"]]); t.fillRect(0,0,R,R);
      t.fillStyle = "rgba(255,255,255,.35)"; t.fillRect(2,2,R-4,4);
      t.fillStyle = "rgba(0,0,0,.18)"; t.fillRect(2,R-6,R-4,4);
      t.fillStyle = "#9c6a14";
      for (const [rx,ry] of [[4,4],[R-8,4],[4,R-8],[R-8,R-8]]) { t.beginPath(); t.arc(rx+2,ry+2,2.2,0,Math.PI*2); t.fill(); }
      t.font = "900 26px 'Avenir Next',Arial"; t.textAlign = "center"; t.textBaseline = "middle";
      t.fillStyle = "rgba(0,0,0,.3)"; t.fillText("?", R/2 + 1.5, R/2 + 2.5);
      t.fillStyle = "#fff8e0"; t.fillText("?", R/2, R/2 + 1);
      break;
    }
    case "U": {
      t.fillStyle = lg(0,0,0,R,[[0,"#b07a3a"],[1,"#8a5a24"]]); t.fillRect(0,0,R,R);
      t.fillStyle = "rgba(0,0,0,.2)"; t.fillRect(3,3,R-6,R-6);
      t.fillStyle = lg(0,0,0,R,[[0,"#a9743a"],[1,"#8e5f28"]]); t.fillRect(5,5,R-10,R-10);
      break;
    }
    case "S": {
      t.fillStyle = lg(0,0,0,R,[[0,"#e4e6ef"],[1,"#aaaebe"]]); t.fillRect(0,0,R,R);
      t.fillStyle = "rgba(255,255,255,.55)"; t.fillRect(2,2,R-4,4);
      t.fillStyle = "rgba(40,44,60,.25)"; t.fillRect(2,R-6,R-4,4);
      t.strokeStyle = "rgba(90,95,115,.4)"; t.lineWidth = 1.4;
      t.beginPath(); t.moveTo(R*0.25, R*0.35); t.lineTo(R*0.45, R*0.55); t.lineTo(R*0.38, R*0.75); t.stroke();
      break;
    }
    case "T": {
      const w = R + 4*K;
      t.fillStyle = lg(0,0,0.0001+w,0,[[0,"#15521f"],[0.22,"#67d973"],[0.5,"#2f9e44"],[1,"#123f18"]]);
      rrPath(t, 0, 0, w, R*0.52, 5); t.fill();
      t.fillStyle = lg(0,0,0.0001+w,0,[[0,"#15521f"],[0.25,"#67d973"],[0.5,"#2f9e44"],[1,"#123f18"]]);
      t.fillRect(2*K, R*0.52, R, R*0.48);
      t.fillStyle = "rgba(0,0,0,.25)"; t.fillRect(2*K, R*0.52, R, 3);
      break;
    }
    case "P": {
      t.fillStyle = lg(0,0,R,0,[[0,"#15521f"],[0.25,"#67d973"],[0.5,"#2f9e44"],[1,"#123f18"]]);
      t.fillRect(0,0,R,R);
      break;
    }
  }
  SPR[key] = s;
  return s;
}

function drawTile(c, tx, ty) {
  const x = tx*TILE, y = ty*TILE;
  if (c === "o") {
    const sp = Math.sin(game.timer * 0.12 + tx * 0.9);
    const w = Math.abs(sp) * 4.6 + 1.4;
    const cg = g.createRadialGradient(x+7, y+6.6, 0.5, x+8, y+8, 7);
    cg.addColorStop(0, "#fff3c0"); cg.addColorStop(0.6, "#f6c14f"); cg.addColorStop(1, "#c8861d");
    g.fillStyle = cg;
    g.beginPath(); g.ellipse(x+8, y+8, w, 6, 0, 0, Math.PI*2); g.fill();
    g.strokeStyle = "rgba(140,90,20,.55)"; g.lineWidth = 0.8;
    g.beginPath(); g.ellipse(x+8, y+8, w, 6, 0, 0, Math.PI*2); g.stroke();
    if (w > 3.4) {
      g.strokeStyle = "rgba(150,100,25,.5)";
      g.beginPath(); g.ellipse(x+8, y+8, w*0.55, 3.6, 0, 0, Math.PI*2); g.stroke();
    }
    return;
  }
  const sp = tileSprite(c);
  if (c === "T") g.drawImage(sp, x - 2, y, 20, 16);
  else g.drawImage(sp, x, y, 16, 16);
}

function bgLayer(camX, p, period, fn) {
  const off = -((camX * p) % period);
  for (let i = -1; i < VIEW_W / period + 2; i++) fn(camX + off + i * period);
}

function drawBackgroundUnused(camX) {
  const theme = game.level.theme || "day";
  if (theme === "castle") {
    const cgr = g.createLinearGradient(0, -VIEW_H, 0, LEVEL_H);
    cgr.addColorStop(0, "#140a10"); cgr.addColorStop(1, "#43161c");
    g.fillStyle = cgr;
    g.fillRect(camX - 4, -VIEW_H - 4, VIEW_W + 8, VIEW_H + LEVEL_H + 8);
    return;
  }
  if (theme === "night") {
    const ngr = g.createLinearGradient(0, -VIEW_H, 0, LEVEL_H);
    ngr.addColorStop(0, "#0e1638"); ngr.addColorStop(1, "#33437e");
    g.fillStyle = ngr;
    g.fillRect(camX - 4, -VIEW_H - 4, VIEW_W + 8, VIEW_H + LEVEL_H + 8);
    for (let i = 0; i < 50; i++) {
      const sx = camX + ((i * 89.7) % VIEW_W), sy = (i * 47.3) % 170;
      const tw = Math.sin(game.timer * 0.05 + i) * 0.5 + 0.5;
      g.fillStyle = "rgba(255,255,235," + (0.25 + tw * 0.6) + ")";
      g.fillRect(sx, sy, 1.6, 1.6);
    }
    const mx = camX + VIEW_W * 0.8;
    g.fillStyle = "#f2ecd8";
    g.beginPath(); g.arc(mx, 36, 11, 0, Math.PI*2); g.fill();
    g.fillStyle = "#0e1638";
    g.beginPath(); g.arc(mx + 5, 33, 9, 0, Math.PI*2); g.fill();
    const hx2 = -((camX * 0.4) % 220);
    g.fillStyle = "#1c3a4e";
    for (let i = -1; i < VIEW_W / 220 + 2; i++) {
      const bx = camX + hx2 + i * 220;
      g.beginPath(); g.arc(bx + 60, 208, 44, Math.PI, 0); g.fill();
      g.beginPath(); g.arc(bx + 170, 208, 26, Math.PI, 0); g.fill();
    }
    return;
  }
  // atmospheric sky
  const grad = g.createLinearGradient(0, -VIEW_H, 0, 208);
  grad.addColorStop(0, "#4f8fd4"); grad.addColorStop(0.55, "#8cbce8"); grad.addColorStop(1, "#e4f1f7");
  g.fillStyle = grad;
  g.fillRect(camX - 4, -VIEW_H - 4, VIEW_W + 8, VIEW_H + LEVEL_H + 8);

  // sun with glow (fixed on screen)
  const sx = camX + VIEW_W * 0.8, sy = 28;
  const halo = g.createRadialGradient(sx, sy, 2, sx, sy, 34);
  halo.addColorStop(0, "rgba(255,244,200,.95)"); halo.addColorStop(0.3, "rgba(255,238,170,.45)"); halo.addColorStop(1, "rgba(255,238,170,0)");
  g.fillStyle = halo;
  g.beginPath(); g.arc(sx, sy, 34, 0, Math.PI*2); g.fill();
  g.fillStyle = "#fff6d8";
  g.beginPath(); g.arc(sx, sy, 10, 0, Math.PI*2); g.fill();

  // far mountains (hazy)

function cloud(x, y) {
  g.save();
  g.fillStyle = "rgba(190,205,225,.5)";
  g.beginPath();
  g.arc(x, y + 2.5, 10, 0, Math.PI*2); g.arc(x + 12, y - 2.5, 12, 0, Math.PI*2);
  g.arc(x + 26, y + 2.5, 10, 0, Math.PI*2); g.fill();
  g.fillStyle = "rgba(255,255,255,.95)";
  g.beginPath();
  g.arc(x, y, 10, 0, Math.PI*2); g.arc(x + 12, y - 5, 12, 0, Math.PI*2);
  g.arc(x + 26, y, 10, 0, Math.PI*2); g.fill();

}

  // waving flag

function drawLava(tx0, tx1) {
  const t = game.timer;
  for (let tx = tx0; tx <= tx1; tx++) {
    if (tileAt(tx, 13) !== " " || tileAt(tx, 14) !== " ") continue;
    const x = tx * TILE;
    const fl = Math.sin(t * 0.08 + tx * 1.7) * 2;
    g.fillStyle = "#e84a1a";
    g.fillRect(x, LEVEL_H - 8 + fl * 0.3, TILE, 12);
    g.fillStyle = "#ffb02a";
    g.fillRect(x + 2, LEVEL_H - 9 + fl * 0.5, 4, 3);
    g.fillRect(x + 9, LEVEL_H - 8 - fl * 0.5, 4, 3);
  }
}

function drawCagePug() {
  const p = game.pug, gy = 13 * TILE;
  const hop = p.free ? -Math.abs(Math.sin(p.hopT * 0.15)) * 6 : 0;
  drawPug(g, p.x, gy + hop);
  if (!p.free) {
    g.fillStyle = "#caa23c";
    g.fillRect(p.x - 13, gy - 30, 26, 3);
    g.fillRect(p.x - 13, gy - 2, 26, 2);
    for (let i = 0; i <= 5; i++) g.fillRect(p.x - 13 + i * 4.8, gy - 28, 1.8, 26);
  } else if ((game.timer >> 3) % 2 === 0) {
    g.fillStyle = "#ff5e7e";
    g.font = "bold 9px monospace"; g.textAlign = "center"; g.textBaseline = "alphabetic";
    g.fillText("\u2665", p.x, gy - 24 + Math.sin(game.timer * 0.1) * 2);
  }
}

function drawWorld() {
  const L = game.level, camX = game.camX;
  drawBackground(camX);
  // powerups still rising are drawn first so the block hides them
  for (const p of game.powerups) if (p.rise > 0) drawPowerup(g, p);
  const tx0 = Math.max(0, Math.floor(camX / TILE) - 1);
  const tx1 = Math.min(L.width - 1, Math.ceil((camX + VIEW_W) / TILE) + 1);
  for (let ty = 0; ty < ROWS; ty++)
    for (let tx = tx0; tx <= tx1; tx++) {
      const c = L.grid[ty][tx];
      if (c !== " ") drawTile(c, tx, ty);
    }
  if (L.theme === "castle") drawLava(tx0, tx1);
  if (L.flagX) drawFlag(L.flagX);

  for (const p of game.powerups) if (p.rise <= 0) {
    if (p.type === "mushroom") softShadow(p.x + p.w/2, p.y + p.h, 6);
    drawPowerup(g, p);
  }
  for (const f of game.fireballs) drawFireball(g, f, game.timer);

  for (const e of L.enemies) {
    if (!e.active || e.dead > 25) continue;
    if (e.grounded) softShadow(e.x + e.w/2, e.y + e.h, 6.5);
    drawGrump(g, e.x + e.w/2, e.y + e.h, e.frame, e.dead);
  }

  for (const pg of game.pigeons) drawPigeon(g, pg);

  if (game.pug) drawCagePug();
  if (game.boss && game.boss.y < LEVEL_H + 60) drawBowser(g, game.boss);
  for (const fl of game.bossFlames) drawFlame(g, fl);
  if (game.superFx) drawSuperFx();

  // coin pops
  for (const c of game.pops) {
    const yy = c.y - 8 - c.t * 1.2;
    g.fillStyle = "#f6c14f";
    g.beginPath(); g.ellipse(c.x, yy, 4, 5.5, 0, 0, Math.PI*2); g.fill();
    g.fillStyle = "#fff0c0";
    g.beginPath(); g.ellipse(c.x, yy, 1.6, 3, 0, 0, Math.PI*2); g.fill();
  }
  // particles
  for (const p of game.particles) {
    if (p.t < 0) continue;
    g.fillStyle = p.c;
    if (p.conf) { g.save(); g.translate(p.x, p.y); g.rotate(p.t * 0.1 + p.x); g.fillRect(-2, -1.4, 4, 2.8); g.restore(); }
    else g.fillRect(p.x - 2, p.y - 2, 4, 4);
  }

  // player (flickers while invincible after taking a hit)
  const pal = CHARS[heroKey];
  if (game.state === "dead") {
    g.save();
    g.translate(player.x + player.w/2, player.y + player.h);
    g.scale(1, -1); g.translate(-(player.x + player.w/2), -(player.y + player.h) + player.h + 6);
    drawKid(g, player.x + player.w/2, player.y + player.h, pal, 0, player.facing, true, false, 0);
    g.restore();
  } else {
    const ghost = player.inv > 0 && CHARS[heroKey].kind === "bunny";   // Chun-me turns invisible
    if (ghost || !(player.inv > 0 && (game.timer >> 2) % 2 === 0)) {
      if (player.grounded) softShadow(player.x + player.w/2, player.y + player.h, 7);
      if (ghost) g.globalAlpha = 0.4;
      drawKid(g, player.x + player.w/2, player.y + player.h, pal,
              player.frame, player.facing, !player.grounded, Math.abs(player.vx) > 0.3, player.power);
      g.globalAlpha = 1;
    }
  }
}

function hud() {
  g.save();
  g.setTransform(DPR, 0, 0, DPR, 0, 0);
  const top = Math.max(10, (window.visualViewport ? 0 : 0) + 10);
  g.font = "bold 16px 'Avenir Next',Arial";
  g.textAlign = "left"; g.textBaseline = "top";
  outlineText("♥".repeat(Math.max(0, game.lives)), 14, top, "#ff5e7e");
  outlineText("● " + game.coins, 14, top + 22, "#ffd166");
  if (game.state === "play" || game.state === "clear") {
    const fm = Math.max(0, player.fly / CHARS[heroKey].flyMax);
    g.fillStyle = "rgba(0,0,20,.45)";
    g.fillRect(14, top + 44, 66, 9);
    g.fillStyle = CHARS[heroKey].kind === "cloud" ? "#8fc8ff" : "#ff9ed0";
    g.fillRect(15, top + 45, 64 * fm, 7);
  }
  g.textAlign = "right";
  outlineText(game.level ? game.level.name : "", W - 14, top, "#fff");
  outlineText(String(game.score).padStart(6, "0"), W - 14, top + 22, "#fff");
  g.restore();
}
function outlineText(t, x, y, color) {
  g.lineWidth = 4; g.strokeStyle = "rgba(0,0,0,.45)"; g.lineJoin = "round";
  g.strokeText(t, x, y); g.fillStyle = color; g.fillText(t, x, y);
}

function centerCard(lines) {
  g.save();
  g.setTransform(DPR, 0, 0, DPR, 0, 0);
  g.fillStyle = "rgba(0,0,0,.45)"; g.fillRect(0, 0, W, H);
  g.textAlign = "center"; g.textBaseline = "middle";
  let y = H/2 - (lines.length-1) * 22;
  for (const [txt, size, col] of lines) {
    g.font = "800 " + size + "px 'Avenir Next',Arial";
    outlineText(txt, W/2, y, col);
    y += size + 18;
  }
  g.restore();
}

function drawGameOver() {
  g.save();
  g.setTransform(DPR, 0, 0, DPR, 0, 0);
  g.fillStyle = "rgba(0,0,10,.6)"; g.fillRect(0, 0, W, H);
  g.textAlign = "center"; g.textBaseline = "middle";
  g.font = "900 " + Math.min(W/9, 48) + "px 'Avenir Next',Arial";
  outlineText("GAME OVER", W/2, H*0.3, "#ff5e7e");
  // continue button (same level, fresh lives, score kept)
  const bw = Math.min(W*0.62, 310), bh = 56;
  const bx = W/2 - bw/2, by = H*0.46;
  const pulse = 1 + Math.sin(game.timer * 0.07) * 0.02;
  g.save();
  g.translate(W/2, by + bh/2); g.scale(pulse, pulse); g.translate(-W/2, -(by + bh/2));
  g.fillStyle = "#ffd166"; roundRect(bx, by, bw, bh, 16); g.fill();
  g.lineWidth = 4; g.strokeStyle = "#b8862c"; roundRect(bx, by, bw, bh, 16); g.stroke();
  g.fillStyle = "#5a3c10"; g.font = "900 " + Math.min(bw/11, 23) + "px 'Avenir Next',Arial";
  g.fillText("\u25b6 CONTINUE " + (game.level ? game.level.name : ""), W/2, by + bh/2);
  g.restore();
  // back-to-title link
  const tw = Math.min(W*0.5, 240), th = 40, tx2 = W/2 - tw/2, ty2 = by + bh + 22;
  g.fillStyle = "rgba(255,255,255,.16)"; roundRect(tx2, ty2, tw, th, 12); g.fill();
  g.font = "700 " + Math.min(W/26, 16) + "px 'Avenir Next',Arial";
  outlineText("back to title", W/2, ty2 + th/2, "#fff");
  game.goHits = [
    { x: bx, y: by, w: bw, h: bh, action: "continue" },
    { x: tx2, y: ty2, w: tw, h: th, action: "title" },
  ];
  g.restore();
}

function drawTitle() {
  g.save();
  g.setTransform(DPR, 0, 0, DPR, 0, 0);
  // sky
  const grad = g.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, "#4f8fd4"); grad.addColorStop(0.6, "#8cbce8"); grad.addColorStop(1, "#dcedf6");
  g.fillStyle = grad; g.fillRect(0, 0, W, H);
  // decorative clouds
  g.fillStyle = "rgba(255,255,255,.9)";
  const s = Math.max(1.2, W/420);
  for (let i = 0; i < 4; i++) {
    const bx = ((game.timer * 0.3 + i * (W/3.4)) % (W + 120)) - 60;
    g.save(); g.translate(bx, 50 + i * 36); g.scale(s, s); cloud(0, 0); g.restore();
  }
  // ground strip
  g.fillStyle = "#3fbf52"; g.fillRect(0, H - 46, W, 8);
  g.fillStyle = "#b46a36"; g.fillRect(0, H - 38, W, 38);

  g.textAlign = "center"; g.textBaseline = "middle";
  const big = Math.min(W/9, H*0.105, 52);
  const ty1 = H * 0.10;
  g.font = "900 " + big + "px 'Avenir Next',Arial";
  outlineText("ROSALINA &", W/2, ty1, "#8fc8ff");
  outlineText("COSMO", W/2, ty1 + big + 6, "#ff8ab8");
  g.font = "800 " + Math.min(W/24, 18) + "px 'Avenir Next',Arial";
  outlineText("✨ a game by Jules & Nora ✨", W/2, ty1 + big*1.72 + 12, "#ffe9a8");
  if (H > W * 0.9) {
    g.font = "700 " + Math.min(W/22, 20) + "px 'Avenir Next',Arial";
    outlineText("Pick your hero!", W/2, ty1 + big*2.3 + 26, "#fff");
  }

  // character cards (sized to fit landscape too)
  game.titleCards = [];
  const cw = Math.min(W * 0.36, 170, H * 0.45), ch = Math.min(cw * 1.15, H * 0.5);
  const cy = H * (W > H ? 0.58 : 0.52);
  const keysArr = ["jules", "nora"];
  keysArr.forEach((k, i) => {
    const cxp = W/2 + (i === 0 ? -1 : 1) * (cw/2 + 14);
    const sx = cxp - cw/2, sy = cy - ch/2;
    const bounce = Math.sin(game.timer * 0.08 + i * 2) * 4;
    g.fillStyle = "rgba(255,255,255,.92)";
    roundRect(sx, sy, cw, ch, 16); g.fill();
    g.lineWidth = 4; g.strokeStyle = i === 0 ? "#f59cc4" : "#4fbfa2";
    roundRect(sx, sy, cw, ch, 16); g.stroke();
    // sprite (scaled up)
    g.save();
    g.translate(cxp, sy + ch * 0.62 + bounce);
    const ks = cw / 44;
    g.scale(ks, ks);
    drawKid(g, 0, 0, CHARS[k], Math.floor(game.timer/20) % 2, 1, false, true);
    g.restore();
    let nm = CHARS[k].name, fs = cw/6.2;
    g.font = "900 " + fs + "px 'Avenir Next',Arial";
    while (g.measureText(nm).width > cw - 12 && fs > 7) { fs -= 0.5; g.font = "900 " + fs + "px 'Avenir Next',Arial"; }
    outlineText(nm, cxp, sy + ch - cw/7, i === 0 ? "#e074a8" : "#2f9e7e");
    game.titleCards.push({ key: k, sx, sy, sw: cw, sh: ch });
  });

  g.font = "600 " + Math.min(W/26, 16) + "px 'Avenir Next',Arial";
  outlineText("tap a hero to start", W/2, cy + ch/2 + 34, "#fff");
  g.font = "600 12px 'Avenir Next',Arial";
  outlineText("made with ♥ for Jules & Nora", W/2, H - 16, "#ffe9f0");
  g.restore();
}
function roundRect(x, y, w, h, r) {
  g.beginPath();
  g.moveTo(x+r, y); g.arcTo(x+w, y, x+w, y+h, r); g.arcTo(x+w, y+h, x, y+h, r);
  g.arcTo(x, y+h, x, y, r); g.arcTo(x, y, x+w, y, r); g.closePath();
}

function drawWinScreen() {
  g.save();
  g.setTransform(DPR, 0, 0, DPR, 0, 0);
  const grad = g.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, "#2b3a8f"); grad.addColorStop(1, "#7d6ad9");
  g.fillStyle = grad; g.fillRect(0, 0, W, H);
  // stars
  for (let i = 0; i < 40; i++) {
    const sx = (i * 97.3) % W, sy = (i * 53.7) % (H*0.6);
    const tw = Math.sin(game.timer * 0.07 + i) * 0.5 + 0.5;
    g.fillStyle = "rgba(255,255,240," + (0.3 + tw*0.7) + ")";
    g.fillRect(sx, sy, 2.5, 2.5);
  }
  g.textAlign = "center"; g.textBaseline = "middle";
  g.font = "900 " + Math.min(W/8, 56) + "px 'Avenir Next',Arial";
  outlineText("YOU WIN!", W/2, H*0.22, "#ffd166");
  g.font = "700 " + Math.min(W/20, 22) + "px 'Avenir Next',Arial";
  outlineText("Rosalina & Cosmo saved Peach the pug!", W/2, H*0.32, "#fff");

  // both kids celebrating
  const ks = Math.min(W, H) / 110;
  [["jules", -1], ["nora", 1]].forEach(([k, side]) => {
    g.save();
    const hop = Math.abs(Math.sin(game.timer * 0.1 + (side+1))) * 14;
    g.translate(W/2 + side * Math.min(W*0.16, 90), H*0.62 - hop);
    g.scale(ks, ks);
    drawKid(g, 0, 0, CHARS[k], 0, -side, true, false);
    g.restore();
  });

  // Peach the pug, safe at last
  g.save();
  const pugHop = Math.abs(Math.sin(game.timer * 0.12)) * 10;
  g.translate(W/2, H*0.62 - pugHop);
  g.scale(ks * 0.9, ks * 0.9);
  drawPug(g, 0, 0);
  g.restore();

  g.font = "800 " + Math.min(W/16, 26) + "px 'Avenir Next',Arial";
  outlineText("SCORE " + game.score + "   ●×" + game.coins, W/2, H*0.76, "#fff");
  if (game.timer > 90 && Math.floor(game.timer/30) % 2 === 0) {
    g.font = "700 " + Math.min(W/22, 18) + "px 'Avenir Next',Arial";
    outlineText("tap to play again", W/2, H*0.86, "#aee0ff");
  }
  // confetti in screen space
  g.restore();
}

function draw() {
  g.setTransform(DPR, 0, 0, DPR, 0, 0);
  g.clearRect(0, 0, W, H);

  if (game.state === "title") { drawTitle(); return; }
  if (game.state === "win")   {
    drawWinScreen();
    // overlay confetti (game coords roughly map; redraw in screen space)
    g.setTransform(DPR, 0, 0, DPR, 0, 0);
    for (const p of game.particles) {
      if (p.t < 0 || !p.conf) continue;
      g.fillStyle = p.c;
      g.save();
      g.translate((p.x - game.camX) * SCALE, p.y * (H / LEVEL_H));
      g.rotate(p.t * 0.1 + p.x);
      g.fillRect(-3, -2, 6, 4);
      g.restore();
    }
    return;
  }

  // world transform: in portrait, lift the play area above the touch controls
  const extra = Math.max(0, H / SCALE - LEVEL_H);
  const reserve = Math.min(extra, 130 / SCALE);   // ~130 css px for buttons
  const offY = extra - reserve;
  g.setTransform(DPR * SCALE, 0, 0, DPR * SCALE, -game.camX * DPR * SCALE, offY * DPR * SCALE);
  drawWorld();
  if (reserve > 0) {                              // underground band beneath the level
    const ug = g.createLinearGradient(0, LEVEL_H, 0, LEVEL_H + reserve + 8);
    ug.addColorStop(0, "#4e2c14"); ug.addColorStop(1, "#241204");
    g.fillStyle = ug;
    g.fillRect(game.camX - 4, LEVEL_H, VIEW_W + 8, reserve + 8);
    g.fillStyle = "rgba(0,0,0,.35)";
    g.fillRect(game.camX - 4, LEVEL_H, VIEW_W + 8, 2.5);
  }
  hud();

  if (game.state === "gameover") drawGameOver();
  if (game.state === "clear") centerCard(game.rescued ? [
    ["PEACH IS SAFE! \ud83d\udc36", Math.min(W/10, 40), "#ffd166"],
    ["you rescued the pug princess!", Math.min(W/24, 18), "#fff"],
  ] : [
    ["LEVEL CLEAR!", Math.min(W/10, 44), "#ffd166"],
    [(game.levelNum + 1 < LEVEL_COUNT ? "get ready for " + (game.levelNum+2) + "..." : "one more surprise..."), Math.min(W/24, 18), "#fff"],
  ]);
}

/* ============================== MAIN LOOP ============================== */
let last = performance.now(), acc = 0;
function frame(now) {
  requestAnimationFrame(frame);
  acc += Math.min(now - last, 100); last = now;
  const STEP = 1000 / 60;
  let steps = 0;
  while (acc >= STEP && steps < 5) { update(); acc -= STEP; steps++; }
  if (steps === 5) acc = 0;
  draw();
}
goTitle();
requestAnimationFrame(frame);
window.__g = { game, player, startLevel, update, draw, input, keys };   // debug handle

</script>
