<style>

    width:100%; height:100%; overflow:hidden; background:#5c94fc;

<script>
"use strict";
/* ============================== SETUP ============================== */
const cv = document.getElementById("game");
const g  = cv.getContext("2d");
const TILE = 16, ROWS = 15, LEVEL_H = ROWS * TILE; // 240 game px tall

let W = 0, H = 0, DPR = 1, SCALE = 1, VIEW_W = 0, VIEW_H = 0;
function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 3);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = Math.round(W * DPR); cv.height = Math.round(H * DPR);
  // landscape: fit level height; portrait: fit ~11 tiles across so things stay big
  SCALE = W >= H ? H / LEVEL_H : W / 176;
  VIEW_W = W / SCALE; VIEW_H = H / SCALE;
}
window.addEventListener("resize", resize);
window.addEventListener("orientationchange", () => setTimeout(resize, 200));
resize();

/* ============================== AUDIO ============================== */
let AC = null;
function audio() {
  if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){} }
  if (AC && AC.state === "suspended") AC.resume();
}
function tone(freq, dur, type, vol, slide) {
  if (!AC) return;
  const o = AC.createOscillator(), gn = AC.createGain(), t = AC.currentTime;
  o.type = type || "square"; o.frequency.setValueAtTime(freq, t);
  if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq + slide), t + dur);
  gn.gain.setValueAtTime(vol || .12, t);
  gn.gain.exponentialRampToValueAtTime(.001, t + dur);
  o.connect(gn).connect(AC.destination); o.start(t); o.stop(t + dur + .02);
}
const SFX = {
  jump:  () => tone(300, .22, "square", .10, 380),
  coin:  () => { tone(990, .08, "square", .10); setTimeout(() => tone(1320, .25, "square", .10), 70); },
  stomp: () => tone(220, .14, "square", .14, -140),
  brick: () => tone(140, .16, "sawtooth", .14, -80),
  die:   () => { tone(520, .25, "square", .12, -300); setTimeout(() => tone(260, .4, "square", .12, -180), 200); },
  bump:  () => tone(110, .08, "square", .12),
  select:() => { tone(660, .09, "square", .10); setTimeout(() => tone(880, .14, "square", .10), 80); },
  clear: () => [523,659,784,1047,1319].forEach((f,i) => setTimeout(() => tone(f, .22, "square", .10), i*110)),
  sprout:() => [392,494,587,698].forEach((f,i) => setTimeout(() => tone(f, .09, "square", .09), i*60)),
  grow:  () => [262,330,392,523,659,784].forEach((f,i) => setTimeout(() => tone(f, .08, "square", .10), i*45)),
  shrink:() => [784,523,392,262].forEach((f,i) => setTimeout(() => tone(f, .09, "square", .10), i*70)),
  fire:  () => tone(680, .12, "sawtooth", .08, -420),
  star:  () => { tone(1180, .07, "sine", .09, 300); setTimeout(() => tone(1560, .1, "sine", .07, 200), 50); },
  bolt:  () => { tone(150, .2, "sawtooth", .13, -60); setTimeout(() => tone(90, .3, "sawtooth", .1, -30), 60); },
  coo:   () => { tone(720, .07, "sawtooth", .09, -260); setTimeout(() => tone(560, .12, "sawtooth", .08, -320), 70); },
  superb:() => [392,523,659,784,1047,1319,1568].forEach((f,i) => setTimeout(() => tone(f, .18, "square", .1), i*80),),
  pipe:  () => { tone(520, .14, "square", .12, -260); setTimeout(() => tone(300, .2, "square", .10, -160), 110); },
  boing: () => tone(300, .26, "sine", .14, 520),
  swim:  () => tone(360, .12, "sine", .10, 240),
  yum:   () => [523,659,784].forEach((f,i) => setTimeout(() => tone(f, .12, "triangle", .12), i*70)),

};

/* ============================== INPUT ============================== */
const input = { left:false, right:false, jump:false, jumpPressed:false, firePressed:false, downPressed:false, portalPressed:false, anyTap:false };
const keys = {};
window.addEventListener("keydown", e => {
  if (["ArrowLeft","ArrowRight","ArrowUp","ArrowDown","Space"].includes(e.code)) e.preventDefault();
  audio();
  if (!keys[e.code] && (e.code==="Space"||e.code==="ArrowUp"||e.code==="KeyZ"||e.code==="KeyW")) input.jumpPressed = true;
  if (!keys[e.code] && (e.code==="KeyX"||e.code==="KeyB")) input.firePressed = true;
  if (!keys[e.code] && (e.code==="ArrowDown"||e.code==="KeyS")) input.downPressed = true;
  if (!keys[e.code] && (e.code==="KeyC"||e.code==="KeyQ")) input.portalPressed = true;   // Sparkle's portal
  if (!keys[e.code] && e.code==="KeyP") setPigeonsOff(!game.pigeonsOff);   // P toggles pigeons
  keys[e.code] = true;
  input.anyTap = true;
});
window.addEventListener("keyup", e => { keys[e.code] = false; });

function syncKeys() {
  input.left  = !!(keys["ArrowLeft"] || keys["KeyA"]) || touch.left;
  input.right = !!(keys["ArrowRight"]|| keys["KeyD"]) || touch.right;
  input.jump  = !!(keys["Space"] || keys["ArrowUp"] || keys["KeyZ"] || keys["KeyW"]) || touch.jump;
  input.down  = !!(keys["ArrowDown"] || keys["KeyS"]) || touch.down;
  input.shield = !!(keys["ShiftLeft"] || keys["ShiftRight"] || keys["KeyV"]) || touch.shield;   // Icy's wing shield (hold)
}

const touch = { left:false, right:false, jump:false, down:false, portal:false, shield:false };

// Controls fade to near-invisible a few seconds after first use (still tappable)
let fadeScheduled = false;
function scheduleFade() {
  if (fadeScheduled) return;
  fadeScheduled = true;
  setTimeout(() => allBtns.forEach(b => b.classList.add("faded")), 3000);
}
function unfadeButtons() {
  fadeScheduled = false;
  allBtns.forEach(b => b.classList.remove("faded"));
}

function bindBtn(el, prop, onPress) {
  const set = on => {
    if (on && onPress && !touch[prop]) onPress();
    touch[prop] = on;
    el.classList.toggle("pressed", on);
  };
  el.addEventListener("pointerdown", e => { e.preventDefault(); audio(); scheduleFade(); set(true); }, {passive:false});
  el.addEventListener("pointerup",     () => set(false));
  el.addEventListener("pointercancel", () => set(false));
  el.addEventListener("pointerleave",  () => set(false));
}
bindBtn(btnL, "left"); bindBtn(btnR, "right");
bindBtn(btnJ, "jump", () => { input.jumpPressed = true; });
bindBtn(btnF, "fire", () => { input.firePressed = true; });
bindBtn(btnD, "down", () => { input.downPressed = true; });
bindBtn(btnP, "portal", () => { input.portalPressed = true; });
bindBtn(btnS, "shield");                              // held, not tapped — blocks while pressed
btnX.addEventListener("pointerdown", e => { e.preventDefault(); audio(); btnX.classList.add("pressed");
  if (game.state === "play" && game.inPlayground) exitArea(); }, {passive:false});
btnX.addEventListener("pointerup", () => btnX.classList.remove("pressed"));
btnX.addEventListener("pointercancel", () => btnX.classList.remove("pressed"));

cv.addEventListener("pointerdown", e => {
  e.preventDefault(); audio();
  input.anyTap = true;
  tapX = e.clientX; tapY = e.clientY;
}, {passive:false});
// block 1-finger scroll, but leave 2-finger pinch available so the page can always be un-zoomed
document.addEventListener("touchmove", e => { if (e.touches.length < 2) e.preventDefault(); }, {passive:false});
// iPad Safari ignores user-scalable=no and zooms on double-tap — suppress rapid second taps
let lastTouchEnd = 0;
document.addEventListener("touchend", e => {
  const tnow = Date.now();
  if (tnow - lastTouchEnd < 350) e.preventDefault();
  lastTouchEnd = tnow;
}, {passive:false});
let tapX = -1, tapY = -1;

function showButtons(on) {
  btnL.style.display = btnR.style.display = btnJ.style.display = on ? "block" : "none";
  if (!on) { btnD.style.display = btnX.style.display = btnP.style.display = btnS.style.display = "none";

  refreshFireBtn();
  refreshContextBtns();
}
let fireBtnShown = false;
function refreshFireBtn() {
  const want = game.state === "play" && (!game.inPlayground || game.subArea === "waterpark");  // water gun in the park
  if (want !== fireBtnShown) { fireBtnShown = want; btnF.style.display = want ? "block" : "none"; }
}
let downBtnShown = false, exitBtnShown = false, portalBtnShown = false, shieldBtnShown = false;
function refreshContextBtns() {
  const wantD = game.state === "play" && player.onDownPipe;   // ▼ shows on any pipe that goes deeper
  if (wantD !== downBtnShown) { downBtnShown = wantD; btnD.style.display = wantD ? "block" : "none"; }
  const wantX = game.state === "play" && game.inPlayground;
  if (wantX !== exitBtnShown) { exitBtnShown = wantX; btnX.style.display = wantX ? "block" : "none"; }
  const wantP = game.state === "play" && !game.inPlayground && CHARS[heroKey].look === "unicorn";  // Sparkle's portal
  if (wantP !== portalBtnShown) { portalBtnShown = wantP; btnP.style.display = wantP ? "block" : "none"; }
  const wantS = game.state === "play" && CHARS[heroKey].look === "penguin";                        // Icy's wing shield
  if (wantS !== shieldBtnShown) { shieldBtnShown = wantS; btnS.style.display = wantS ? "block" : "none"; }
}

const firePals = {};
function firePal(key) {
  if (!firePals[key]) {
    const p = CHARS[key];

      shirt:"#fff6f3", shirtDark:p.shirt, cap:"#ff5e5e", capDark:"#d63c3c",

}

/* rounded-rect path helper usable on any 2d context */
function rrPath(ctx, x, y, w, h, r) {
  r = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function drawStarShape(ctx, x, y, ro, ri, rot, fill, stroke) {
  ctx.save(); ctx.translate(x, y); ctx.rotate(rot || 0);
  ctx.beginPath();
  for (let i = 0; i < 10; i++) {
    const r = i % 2 ? ri : ro, a = i * Math.PI / 5 - Math.PI / 2;
    i ? ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r) : ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
  }
  ctx.closePath();
  ctx.fillStyle = fill || "#ffd166"; ctx.fill();
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 0.6; ctx.stroke(); }
  ctx.restore();
}

/* Heroes: Chun-me the wand bunny and Chuckee the storm cloud.
   Feet at (0,0), facing right by default. */
function drawKid(ctx, x, y, pal, frame, facing, airborne, walking, power) {
  ctx.save();
  ctx.translate(x, y);
  if (power > 0) ctx.scale(1.18, 1.32);
  if (facing < 0) ctx.scale(-1, 1);
  if (pal.look === "horse") drawMistyBody(ctx, pal, frame, airborne, walking, power);
  else if (pal.look === "apple") drawAppyBody(ctx, pal, frame, airborne, walking, power);
  else if (pal.look === "penguin") drawIcyBody(ctx, pal, frame, airborne, walking, power);
  else if (pal.look === "dumpling") drawSquishyBody(ctx, pal, frame, airborne, walking, power);
  else if (pal.look === "unicorn") drawSparkleBody(ctx, pal, frame, airborne, walking, power);
  else if (pal.look === "butterfly") drawCutieBody(ctx, pal, frame, airborne, walking, power);
  else if (pal.look === "fox") drawNorthernBody(ctx, pal, frame, airborne, walking, power);
  else if (pal.look === "panda") drawBambooBody(ctx, pal, frame, airborne, walking);
  else if (pal.look === "slime") drawCosmoBody(ctx, pal, frame, airborne, walking);
  else if (pal.look === "princess") drawRosalinaBody(ctx, pal, frame, airborne, walking);
  else if (pal.kind === "cloud") drawChuckeeBody(ctx, pal);
  else drawChunmeBody(ctx, pal, frame, airborne, walking);
  ctx.restore();
}

/* Cosmo the Slime: a cosmic lavender blob with big sparkly eyes, a tiny
   smile, little nub hands, and galaxy speckles. Stretches when jumping. */
function drawCosmoBody(ctx, pal, frame, airborne, walking) {
  const t = game.timer;
  ctx.save();
  if (airborne) ctx.scale(0.9, 1.14);            // jump stretch
  const wob = Math.sin(t * 0.12) * 0.5;
  const sq  = (walking && frame) ? 0.7 : 0;      // little squash on the walk hop

  // blobby body (rounded bottom, tapering rounded top)
  const bg = ctx.createLinearGradient(0, -19, 0, 0);
  bg.addColorStop(0, pal.slimeLt); bg.addColorStop(0.55, pal.slime); bg.addColorStop(1, pal.slimeDark);
  ctx.fillStyle = bg;
  const w = 8 + sq * 0.5, topY = -19 + wob * 0.4 + sq;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo(-w, -0.5, -w - 0.5, -8, -6, -13);
  ctx.bezierCurveTo(-4.5, -16.5, -2.5, topY, 0, topY);
  ctx.bezierCurveTo(2.5, topY, 4.5, -16.5, 6, -13);
  ctx.bezierCurveTo(w + 0.5, -8, w, -0.5, 0, 0);
  ctx.closePath(); ctx.fill();

  // squishy base shadow
  ctx.fillStyle = "rgba(90,60,150,.22)";
  ctx.beginPath(); ctx.ellipse(0, -1.1, 6.4, 1.3, 0, 0, Math.PI*2); ctx.fill();
  // soft top-left highlight
  ctx.fillStyle = "rgba(255,255,255,.32)";
  ctx.beginPath(); ctx.ellipse(-3, -13.5, 2.3, 3.3, -0.5, 0, Math.PI*2); ctx.fill();

  // twinkling galaxy speckles
  ctx.fillStyle = pal.spark;
  for (const s of [[-4.5,-6],[3.6,-4.6],[5,-9],[-2,-3.4],[1.4,-15.4],[-5,-10.6]]) {
    ctx.globalAlpha = 0.45 + 0.45 * Math.abs(Math.sin(t * 0.05 + s[0]));
    ctx.beginPath(); ctx.arc(s[0], s[1], 0.5, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // big sparkly eyes
  for (const ex of [-3, 3]) {
    ctx.fillStyle = pal.slimeEye;
    ctx.beginPath(); ctx.ellipse(ex, -11, 2.5, 3, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,.95)";
    ctx.beginPath(); ctx.arc(ex - 0.8, -12.3, 0.9, 0, Math.PI*2); ctx.fill();   // big catchlight
    ctx.beginPath(); ctx.arc(ex + 0.8, -9.9, 0.42, 0, Math.PI*2); ctx.fill();   // tiny sparkle
  }

  // tiny smile between the eyes
  ctx.strokeStyle = pal.mouth; ctx.lineWidth = 0.8; ctx.lineCap = "round";
  ctx.beginPath(); ctx.arc(0, -9.6, 1.3, 0.15 * Math.PI, 0.85 * Math.PI); ctx.stroke();

  // two little nub hands held together at the front
  const ho = (walking && frame) ? 0.6 : 0;
  ctx.fillStyle = pal.slime;
  ctx.beginPath(); ctx.ellipse(-1.9 - ho, -3.1, 1.6, 1.2, 0.3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(1.9 + ho, -3.1, 1.6, 1.2, -0.3, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = pal.slimeDark; ctx.lineWidth = 0.4;
  ctx.beginPath(); ctx.moveTo(-2.4 - ho, -3.5); ctx.lineTo(-2.4 - ho, -2.7);
                   ctx.moveTo(-1.5 - ho, -3.5); ctx.lineTo(-1.5 - ho, -2.7); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(2.4 + ho, -3.5); ctx.lineTo(2.4 + ho, -2.7);
                   ctx.moveTo(1.5 + ho, -3.5); ctx.lineTo(1.5 + ho, -2.7); ctx.stroke();

  ctx.restore();
}

function drawChunmeBody(ctx, pal, frame, airborne, walking) {
  const t = game.timer;
  // paws
  ctx.fillStyle = pal.body;
  const po = (walking && frame) ? 1.2 : 0;
  ctx.beginPath(); ctx.ellipse(-2.6 - po, -1, 2, 1.3, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(2.2 + po, -1, 2, 1.3, 0, 0, Math.PI*2); ctx.fill();
  // skirt with scalloped hem
  const sk = ctx.createLinearGradient(0, -10, 0, -2);
  sk.addColorStop(0, pal.skirt); sk.addColorStop(1, pal.skirtDark);
  ctx.fillStyle = sk;
  ctx.beginPath();
  ctx.moveTo(-4.8, -9.5);
  ctx.lineTo(4.8, -9.5);
  ctx.lineTo(6.3, -2.8);
  for (const cx of [4.2, 0, -4.2]) ctx.arc(cx, -2.8, 2.1, 0, Math.PI, false);
  ctx.closePath(); ctx.fill();
  // torso
  ctx.fillStyle = pal.body;
  rrPath(ctx, -3.6, -13, 7.2, 4.5, 2); ctx.fill();
  // back arm
  ctx.beginPath(); ctx.ellipse(-4.2, -10.5, 1.7, 1.3, 0.4, 0, Math.PI*2); ctx.fill();
  // golden wand with spinning star tip
  ctx.strokeStyle = "#d9a83c"; ctx.lineWidth = 1.4; ctx.lineCap = "round";
  ctx.beginPath(); ctx.moveTo(3.6, -9.2); ctx.lineTo(8.2, -15.6); ctx.stroke();
  ctx.fillStyle = pal.body;
  ctx.beginPath(); ctx.ellipse(4, -9.6, 1.8, 1.4, 0, 0, Math.PI*2); ctx.fill();
  drawStarShape(ctx, 8.6, -16.4, 2.4, 1.1, t * 0.05, pal.star, "#f08cb8");
  for (let i = 0; i < 2; i++) {
    const a = t * 0.08 + i * 2.6;
    ctx.fillStyle = "rgba(245,140,190," + (0.5 + Math.sin(a) * 0.3).toFixed(2) + ")";
    ctx.beginPath(); ctx.arc(9.5 + Math.cos(a) * 2.5, -15 + Math.sin(a * 1.3) * 3, 0.8, 0, Math.PI*2); ctx.fill();
  }
  // droopy ears with star clips (behind head)
  for (const sgn of [-1, 1]) {
    ctx.save();
    ctx.translate(sgn * 5.6, -18.6);
    ctx.rotate(sgn * (airborne ? 0.45 : 0.3));
    ctx.fillStyle = pal.body;
    ctx.beginPath(); ctx.ellipse(0, 4.6, 2.1, 5.4, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = pal.earIn;
    ctx.beginPath(); ctx.ellipse(0, 5, 1.1, 3.6, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
  // head
  ctx.fillStyle = pal.body;
  ctx.beginPath(); ctx.ellipse(0.4, -16.3, 5.9, 5.4, 0, 0, Math.PI*2); ctx.fill();
  // star clips
  drawStarShape(ctx, -5.4, -19.8, 1.7, 0.8, 0.3, pal.star);
  drawStarShape(ctx, 6, -19.8, 1.7, 0.8, -0.3, pal.star);
  // pink visor
  ctx.fillStyle = pal.visor;
  rrPath(ctx, -5, -19.6, 10.6, 2.6, 1.3); ctx.fill();
  ctx.fillStyle = pal.visorDark;
  ctx.beginPath(); ctx.ellipse(5.8, -18.4, 2.8, 1, -0.12, 0, Math.PI*2); ctx.fill();
  // determined eyes
  for (const e of [[-1.4, 0.18], [3, -0.18]]) {
    ctx.save(); ctx.translate(e[0], -15.6); ctx.rotate(e[1]);
    ctx.fillStyle = "#2a1c12";
    ctx.beginPath(); ctx.ellipse(0, 0, 1.05, 1.5, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,.9)";
    ctx.beginPath(); ctx.arc(-0.25, -0.5, 0.35, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
  ctx.strokeStyle = "#3a2a1e"; ctx.lineWidth = 0.7; ctx.lineCap = "round";
  ctx.beginPath();
  ctx.moveTo(-2.6, -17.4); ctx.lineTo(-0.4, -16.9);
  ctx.moveTo(4.2, -17.4); ctx.lineTo(2, -16.9);
  ctx.stroke();
  // smile + tiny fang
  ctx.strokeStyle = "#b35a4a"; ctx.lineWidth = 0.6;
  ctx.beginPath(); ctx.arc(1, -13.4, 1.1, 0.15 * Math.PI, 0.85 * Math.PI); ctx.stroke();
  ctx.fillStyle = "#fff";
  ctx.beginPath(); ctx.moveTo(1.7, -13.2); ctx.lineTo(2.3, -13.2); ctx.lineTo(2, -12.4); ctx.closePath(); ctx.fill();
}

function drawChuckeeBody(ctx, pal) {
  const t = game.timer;
  ctx.translate(0, Math.sin(t * 0.1) * 0.9 - 0.5);
  const cg = ctx.createLinearGradient(0, -13, 0, -1);
  cg.addColorStop(0, "#ffffff"); cg.addColorStop(1, pal.shade);
  ctx.fillStyle = cg;
  ctx.beginPath(); ctx.ellipse(0, -5.2, 8.6, 4.6, 0, 0, Math.PI*2); ctx.fill();
  for (const b of [[-4.6, -8.6, 3.2], [0.4, -10.2, 3.9], [5.2, -8.4, 3]]) {
    ctx.beginPath(); ctx.arc(b[0], b[1], b[2], 0, Math.PI*2); ctx.fill();
  }
  ctx.fillStyle = "rgba(150,170,205,.3)";
  ctx.beginPath(); ctx.ellipse(0, -2.6, 7.2, 1.6, 0, 0, Math.PI*2); ctx.fill();
  // happy closed eyes + smile
  ctx.strokeStyle = "#5a6a86"; ctx.lineWidth = 0.9; ctx.lineCap = "round";
  ctx.beginPath(); ctx.arc(-2.4, -6.6, 1.3, Math.PI * 1.15, Math.PI * 1.85); ctx.stroke();
  ctx.beginPath(); ctx.arc(2, -6.6, 1.3, Math.PI * 1.15, Math.PI * 1.85); ctx.stroke();
  ctx.beginPath(); ctx.arc(-0.2, -5.4, 1.2, 0.15 * Math.PI, 0.85 * Math.PI); ctx.stroke();
  // rosy cheeks
  ctx.fillStyle = "rgba(245,150,170,.55)";
  ctx.beginPath(); ctx.ellipse(-4.6, -5.4, 1.3, 0.9, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(4.2, -5.4, 1.3, 0.9, 0, 0, Math.PI*2); ctx.fill();
  // pink bolt on top

  ctx.beginPath();
  ctx.moveTo(5.2, -14.6); ctx.lineTo(7.6, -14.6); ctx.lineTo(6.2, -12.2);
  ctx.lineTo(7.8, -12.2); ctx.lineTo(4.8, -8.8); ctx.lineTo(5.8, -11.2);
  ctx.lineTo(4.4, -11.2); ctx.closePath(); ctx.fill();
}

/* Princess Rosalina: flowing aqua gown, platinum hair swept over one eye,
   silver crown with a green star, and a sparkling wand. Front-facing. */
function drawRosalinaBody(ctx, pal, frame, airborne, walking) {
  const t = game.timer;
  const sway = Math.sin(t * 0.08) * 0.6;

  // long hair lock flowing down her left shoulder (viewer's right)
  ctx.fillStyle = pal.hairDk;
  ctx.beginPath();
  ctx.moveTo(3.4, -18.5);
  ctx.bezierCurveTo(8.8, -15.5, 8.2, -7, 5.4 + sway, -3.2);
  ctx.bezierCurveTo(7, -8, 6, -14, 2.6, -16.5);
  ctx.closePath(); ctx.fill();

  // little shoes peeking from the hem
  const po = (walking && frame) ? 1.1 : 0;
  ctx.fillStyle = "#6a4a86";
  ctx.beginPath(); ctx.ellipse(-2.4 - po, -1, 1.7, 1.1, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(2 + po, -1, 1.7, 1.1, 0, 0, Math.PI*2); ctx.fill();

  // flowing gown
  const gg = ctx.createLinearGradient(0, -13, 0, -1);
  gg.addColorStop(0, pal.gown); gg.addColorStop(1, pal.gownDark);
  ctx.fillStyle = gg;
  ctx.beginPath();
  ctx.moveTo(-3.4, -12.5);
  ctx.lineTo(3.4, -12.5);
  ctx.bezierCurveTo(5.5, -8, 7 + sway, -3, 7.6 + sway, -0.6);
  ctx.quadraticCurveTo(0, -2.4, -7.6 + sway, -0.6);
  ctx.bezierCurveTo(-7, -3, -5.5, -8, -3.4, -12.5);
  ctx.closePath(); ctx.fill();
  // soft center panel
  ctx.fillStyle = pal.gownLight; ctx.globalAlpha = 0.5;
  ctx.beginPath();
  ctx.moveTo(-1.7, -12);
  ctx.lineTo(1.7, -12);
  ctx.quadraticCurveTo(2.7, -6, 2.5 + sway*0.6, -1.4);
  ctx.quadraticCurveTo(0, -2.2, -2.5 + sway*0.6, -1.4);
  ctx.quadraticCurveTo(-2.7, -6, -1.7, -12);
  ctx.closePath(); ctx.fill();
  ctx.globalAlpha = 1;

  // bodice + brooch
  ctx.fillStyle = pal.gownDark;
  rrPath(ctx, -3, -14.4, 6, 3.4, 1.4); ctx.fill();
  ctx.fillStyle = pal.gem;
  ctx.beginPath(); ctx.arc(0, -12.6, 1, 0, Math.PI*2); ctx.fill();

  // arms: right hand rests on gown, left raised with the wand
  ctx.strokeStyle = pal.skin; ctx.lineWidth = 1.8; ctx.lineCap = "round";
  ctx.beginPath(); ctx.moveTo(2.8, -13.6); ctx.quadraticCurveTo(4.8, -11, 4.2, -8.4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-2.8, -13.6); ctx.quadraticCurveTo(-5.6, -13, -6.4, -15.4); ctx.stroke();

  // wand with a spinning star + sparkles
  ctx.strokeStyle = "#cfd9e2"; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(-6.4, -15.4); ctx.lineTo(-8.4, -20.4); ctx.stroke();
  drawStarShape(ctx, -8.7, -21, 2.2, 1, t * 0.05, pal.gem, "#3a9fd0");
  for (let i = 0; i < 2; i++) {
    const a = t * 0.09 + i * 2.6;
    ctx.fillStyle = "rgba(150,230,255," + (0.5 + Math.sin(a) * 0.3).toFixed(2) + ")";
    ctx.beginPath(); ctx.arc(-9 + Math.cos(a) * 2.4, -20 + Math.sin(a * 1.3) * 2.6, 0.7, 0, Math.PI*2); ctx.fill();
  }

  // head
  ctx.fillStyle = pal.skin;
  ctx.beginPath(); ctx.ellipse(0, -16.4, 5, 5.2, 0, 0, Math.PI*2); ctx.fill();

  // one visible eye (viewer's left); the other is hidden by the bang
  ctx.save(); ctx.translate(-1.8, -16.4);
  ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.ellipse(0, 0, 1.25, 1.7, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = pal.eye; ctx.beginPath(); ctx.ellipse(0.1, 0.2, 0.85, 1.15, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = "#1a1426"; ctx.beginPath(); ctx.arc(0.1, 0.3, 0.5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = "rgba(255,255,255,.9)"; ctx.beginPath(); ctx.arc(-0.2, -0.2, 0.32, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  // lash + brow
  ctx.strokeStyle = pal.lash; ctx.lineWidth = 0.6;
  ctx.beginPath(); ctx.moveTo(-3.2, -17.5); ctx.quadraticCurveTo(-1.8, -18.3, -0.5, -17.7); ctx.stroke();
  // lips
  ctx.fillStyle = pal.lip;
  ctx.beginPath(); ctx.ellipse(-1, -13.1, 1.1, 0.6, 0, 0, Math.PI*2); ctx.fill();
  // cheek
  ctx.fillStyle = "rgba(245,150,170,.45)";
  ctx.beginPath(); ctx.ellipse(-3.2, -14.5, 1, 0.7, 0, 0, Math.PI*2); ctx.fill();

  // front hair: forehead fringe with a big side-swept bang over her right eye
  const hg = ctx.createLinearGradient(0, -22, 0, -12);
  hg.addColorStop(0, pal.hairLt); hg.addColorStop(1, pal.hair);
  ctx.fillStyle = hg;
  ctx.beginPath();
  ctx.moveTo(-5, -16.8);
  ctx.quadraticCurveTo(-5.8, -21.6, -1, -22.5);
  ctx.quadraticCurveTo(4.3, -22.2, 5.7, -17.4);
  ctx.quadraticCurveTo(5.9, -13.4, 3.3, -12.3);
  ctx.quadraticCurveTo(4.6, -16, 2.1, -17.6);
  ctx.quadraticCurveTo(-0.5, -18.9, -2.4, -17.4);
  ctx.quadraticCurveTo(-3.8, -16.6, -5, -16.8);
  ctx.closePath(); ctx.fill();
  // hair highlight strand
  ctx.strokeStyle = pal.hairLt; ctx.lineWidth = 0.6;
  ctx.beginPath(); ctx.moveTo(-1, -21); ctx.bezierCurveTo(2, -20.4, 3.8, -18, 3.4, -15); ctx.stroke();

  // silver crown with a little green star
  ctx.fillStyle = pal.crown;
  ctx.beginPath();
  ctx.moveTo(-3, -20.8);
  ctx.lineTo(-3.2, -23.2); ctx.lineTo(-1.4, -21.9); ctx.lineTo(0, -23.9); ctx.lineTo(1.4, -21.9);
  ctx.lineTo(3.2, -23.2); ctx.lineTo(3, -20.8);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = pal.crownDk; ctx.lineWidth = 0.4; ctx.stroke();
  drawStarShape(ctx, 0, -23, 1.1, 0.5, 0, pal.pstar, "#5fae3a");
}

function drawPowerup(ctx, p) {
  ctx.save();
  ctx.translate(p.x + p.w/2, p.y + p.h);
  const t = game.timer;
  if (p.type === "mushroom") {               // magic charm: a glowing heart
    const bob = Math.sin(t * 0.1);
    const gl = ctx.createRadialGradient(0, -7 + bob, 1, 0, -7 + bob, 9);
    gl.addColorStop(0, "rgba(255,150,200,.5)"); gl.addColorStop(1, "rgba(255,150,200,0)");
    ctx.fillStyle = gl;
    ctx.beginPath(); ctx.arc(0, -7 + bob, 9, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = "#f0608c";
    ctx.beginPath();
    ctx.moveTo(0, -2.5 + bob);
    ctx.bezierCurveTo(-7, -8 + bob, -3.5, -13.5 + bob, 0, -9.5 + bob);
    ctx.bezierCurveTo(3.5, -13.5 + bob, 7, -8 + bob, 0, -2.5 + bob);
    ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,.55)";
    ctx.beginPath(); ctx.ellipse(-2, -9.5 + bob, 1.4, 1, -0.5, 0, Math.PI*2); ctx.fill();
  } else {                                   // storm gem: triggers the super blast
    const spin = Math.abs(Math.sin(t * 0.08));
    const gl = ctx.createRadialGradient(0, -8, 1, 0, -8, 10);
    gl.addColorStop(0, "rgba(140,230,255,.45)"); gl.addColorStop(1, "rgba(140,230,255,0)");
    ctx.fillStyle = gl;
    ctx.beginPath(); ctx.arc(0, -8, 10, 0, Math.PI*2); ctx.fill();
    const gg = ctx.createLinearGradient(-4, -13, 4, -3);
    gg.addColorStop(0, "#9bf0e0"); gg.addColorStop(0.5, "#5cc8f0"); gg.addColorStop(1, "#9b7af0");
    ctx.fillStyle = gg;
    ctx.beginPath();
    ctx.moveTo(0, -14); ctx.lineTo(4.4 * spin + 1.2, -8); ctx.lineTo(0, -2); ctx.lineTo(-(4.4 * spin + 1.2), -8);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,.6)";
    ctx.beginPath(); ctx.moveTo(0, -13); ctx.lineTo(1.4, -8); ctx.lineTo(0, -3.2); ctx.lineTo(-1, -8); ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}

/* Sparkle the unicorn: white chibi body, rainbow mane & tail, golden spiral
   horn, big sparkly eye. Glows with a rainbow shimmer when powered up.
   Feet at (0,0), facing right. */
/* Misty the golden horse: very pretty — cream mane and tail, long lashes,
   a white star blaze. She turns into a FLYING horse (white wings) when she
   flies, gallops faster than anyone, and glitters when the moon touches her.
   Feet at (0,0), facing right. */
function drawMistyBody(ctx, pal, frame, airborne, walking, power) {
  const t = game.timer;
  const gait = walking ? (frame ? 1.4 : -1.4) : 0;
  const moonlit = game.level && game.level.theme === "moon";
  const sway = Math.sin(t * 0.06);

  // ---- long flowing tail — layered wavy strands ----
  ctx.save(); ctx.translate(-7, -9.5); ctx.rotate(sway * 0.08 - 0.08);
  ctx.lineCap = "round";
  const tailCols = [pal.hManeDk, pal.hMane, "#ffe8b0", pal.hMane, pal.hManeDk];
  for (let i = 0; i < 5; i++) {
    ctx.strokeStyle = tailCols[i]; ctx.lineWidth = 2.1 - i * 0.22;
    const w1 = Math.sin(t * 0.07 + i * 0.8) * 1.4;
    ctx.beginPath(); ctx.moveTo(0.5, -1.5 + i * 0.7);
    ctx.bezierCurveTo(-4.5 - i * 0.5, -1 + i + w1, -6.5 - i * 0.6, 5 + i - w1, -4 - i * 0.7, 10.5 + i * 0.5 + w1);
    ctx.stroke();
  }
  ctx.restore();

  // ---- wings — she becomes a flying horse! (drawn behind her body) ----
  if (player.flying) {
    const flap = Math.sin(t * 0.4);
    for (const near of [false, true]) {
      ctx.save(); ctx.translate(near ? -1 : -3.2, -12.5);
      ctx.rotate((near ? -0.42 : -0.72) - flap * 0.5);
      const wg = ctx.createLinearGradient(0, 0, -17, -8);
      wg.addColorStop(0, near ? "#ffffff" : pal.hWingShade);
      wg.addColorStop(1, near ? pal.hWingShade : "#c8d4e8");
      ctx.fillStyle = wg;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.quadraticCurveTo(-9, -11, -19, -9.5);        // leading edge
      ctx.quadraticCurveTo(-15.5, -6, -16.5, -3);      // four feather scallops
      ctx.quadraticCurveTo(-12.5, -4.2, -13.5, -0.8);
      ctx.quadraticCurveTo(-9.5, -2, -10, 1);
      ctx.quadraticCurveTo(-5, -0.4, 0, 1.8);
      ctx.closePath(); ctx.fill();
      if (near) {
        ctx.strokeStyle = "rgba(212,176,90,.55)"; ctx.lineWidth = 0.7;   // golden feather lines
        ctx.beginPath(); ctx.moveTo(-2, -1.2); ctx.quadraticCurveTo(-9, -6, -16.5, -6.8); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-2.5, 0); ctx.quadraticCurveTo(-8, -2.8, -12.5, -2.4); ctx.stroke();
      }
      ctx.restore();
    }
  }

  // ---- slender legs: far pair shaded, near pair bright, white socks, dark hooves ----
  const legs = [
    { x:-4.2, ph: 1, near:false }, { x: 3.0, ph:-1, near:false },
    { x:-5.4, ph:-1, near:true  }, { x: 4.6, ph: 1, near:true  },
  ];
  for (const L of legs) {
    const lift = walking ? Math.max(0, Math.sin((frame ? 1 : -1) * L.ph) * 1.7) : 0;
    const lx2 = L.x + L.ph * gait * 0.45;
    ctx.strokeStyle = L.near ? pal.hBody : pal.hBodyDk; ctx.lineWidth = 2; ctx.lineCap = "round";
    ctx.beginPath(); ctx.moveTo(L.x, -7.5); ctx.quadraticCurveTo(L.x + L.ph*0.3, -4.5, lx2, -2.2 - lift); ctx.stroke();
    ctx.strokeStyle = L.near ? "#fdf6e3" : "#e0d5b8"; ctx.lineWidth = 2;                 // white sock
    ctx.beginPath(); ctx.moveTo(lx2 - L.ph*0.1, -3.4 - lift); ctx.lineTo(lx2, -2 - lift); ctx.stroke();
    ctx.fillStyle = pal.hHoof;
    ctx.beginPath(); ctx.ellipse(lx2, -1 - lift, 1.4, 1.05, 0, 0, Math.PI*2); ctx.fill();
  }

  // ---- graceful body: slim barrel with a soft shine ----
  const bg = ctx.createLinearGradient(0, -14.5, 0, -5);
  bg.addColorStop(0, pal.hBodyLt); bg.addColorStop(0.5, pal.hBody); bg.addColorStop(1, pal.hBodyDk);
  ctx.fillStyle = bg;
  ctx.beginPath();
  ctx.moveTo(-7.2, -10.6);
  ctx.bezierCurveTo(-8.2, -14.6, -3, -15.4, 0.5, -14.6);   // back line up to the withers
  ctx.bezierCurveTo(3.6, -14, 5.6, -12.4, 5.4, -9.6);      // chest
  ctx.bezierCurveTo(5, -6.2, 1.5, -5.4, -1.5, -5.6);       // belly
  ctx.bezierCurveTo(-5, -5.8, -7.6, -7.4, -7.2, -10.6);    // round rump
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = "rgba(255,255,255,.34)";
  ctx.beginPath(); ctx.ellipse(-2.6, -12.4, 3.4, 1.7, -0.25, 0, Math.PI*2); ctx.fill();  // shine
  ctx.fillStyle = "rgba(255,240,200,.4)";
  ctx.beginPath(); ctx.ellipse(-0.5, -6.6, 3.6, 1.1, 0.08, 0, Math.PI*2); ctx.fill();    // belly glow

  // ---- elegant arched neck ----
  ctx.fillStyle = pal.hBody;
  ctx.beginPath();
  ctx.moveTo(1.6, -13.8);
  ctx.bezierCurveTo(3.2, -16.8, 4.2, -18.6, 4.6, -20.4);   // crest of the neck (arched)
  ctx.lineTo(8.2, -19.2);
  ctx.bezierCurveTo(7.8, -15.4, 6.8, -12.4, 5.2, -9.8);    // throat curve down to chest
  ctx.closePath(); ctx.fill();
  const ng = ctx.createLinearGradient(2, -18, 7, -12);
  ng.addColorStop(0, "rgba(255,224,148,.5)"); ng.addColorStop(1, "rgba(207,154,44,0)");
  ctx.fillStyle = ng;
  ctx.beginPath(); ctx.moveTo(2, -14); ctx.bezierCurveTo(3.6, -17, 4.4, -19, 4.8, -20.2);
  ctx.lineTo(6.4, -19.8); ctx.bezierCurveTo(6, -16, 5.4, -13, 4.6, -10.6); ctx.closePath(); ctx.fill();

  // ---- refined head, held high ----
  ctx.fillStyle = pal.hBody;
  ctx.beginPath(); ctx.ellipse(6.9, -19.9, 3.7, 2.85, -0.18, 0, Math.PI*2); ctx.fill();
  const mg = ctx.createRadialGradient(9.6, -19.4, 0.5, 10, -18.9, 2.6);
  mg.addColorStop(0, "#fff2d8"); mg.addColorStop(1, pal.hMuzzle);
  ctx.fillStyle = mg;
  ctx.beginPath(); ctx.ellipse(10, -18.9, 2.1, 1.7, -0.18, 0, Math.PI*2); ctx.fill();    // soft muzzle
  ctx.fillStyle = "rgba(150,110,60,.55)";
  ctx.beginPath(); ctx.arc(10.8, -18.5, 0.38, 0, Math.PI*2); ctx.fill();                 // nostril
  ctx.strokeStyle = "rgba(150,110,60,.5)"; ctx.lineWidth = 0.5; ctx.lineCap = "round";
  ctx.beginPath(); ctx.arc(10, -17.9, 1, 0.25*Math.PI, 0.7*Math.PI); ctx.stroke();       // sweet smile

  // ---- ears with pink inners ----
  ctx.fillStyle = pal.hBody;
  ctx.beginPath(); ctx.moveTo(3.9,-22.2); ctx.lineTo(4.9,-25.2); ctx.lineTo(6.1,-22.4); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(6.7,-22.3); ctx.lineTo(7.9,-25); ctx.lineTo(8.9,-21.9); ctx.closePath(); ctx.fill();
  ctx.fillStyle = "#f5c4d6";
  ctx.beginPath(); ctx.moveTo(4.4,-22.5); ctx.lineTo(4.95,-24.3); ctx.lineTo(5.6,-22.6); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(7.2,-22.4); ctx.lineTo(7.85,-24.1); ctx.lineTo(8.4,-22.2); ctx.closePath(); ctx.fill();

  // ---- white star blaze ----
  drawStarShape(ctx, 8.2, -21, 1.35, 0.6, 0.25, "#ffffff");

  // ---- big beautiful eye: almond shape, two catchlights, three lashes ----
  ctx.fillStyle = "#fff";
  ctx.beginPath(); ctx.ellipse(6.1, -19.5, 1.75, 1.95, -0.12, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = "#6a4ad0";                                                            // violet iris
  ctx.beginPath(); ctx.ellipse(6.25, -19.3, 1.35, 1.6, -0.12, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = pal.hEye;
  ctx.beginPath(); ctx.ellipse(6.3, -19.2, 0.85, 1.1, -0.12, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = "rgba(255,255,255,.96)";
  ctx.beginPath(); ctx.arc(5.7, -20, 0.55, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(6.8, -18.6, 0.3, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = "#3a2a10"; ctx.lineWidth = 0.6; ctx.lineCap = "round";               // upper lid
  ctx.beginPath(); ctx.arc(6.1, -19.4, 1.8, Math.PI*1.1, Math.PI*1.85); ctx.stroke();
  ctx.lineWidth = 0.5;                                                                   // long lashes
  ctx.beginPath(); ctx.moveTo(4.5,-20.7); ctx.quadraticCurveTo(3.8,-21.2, 3.3,-21.2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(5.1,-21.2); ctx.quadraticCurveTo(4.6,-21.9, 4.1,-22); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(5.9,-21.4); ctx.quadraticCurveTo(5.7,-22.2, 5.3,-22.5); ctx.stroke();
  ctx.fillStyle = pal.hBlush;
  ctx.beginPath(); ctx.ellipse(8.4, -17.5, 1.15, 0.72, -0.15, 0, Math.PI*2); ctx.fill(); // blush

  // ---- long wavy mane flowing down the neck ----
  ctx.lineCap = "round";
  const maneCols = [pal.hManeDk, pal.hMane, "#fffdf5", pal.hMane, "#ffe8b0"];
  for (let i = 0; i < 5; i++) {
    ctx.strokeStyle = maneCols[i]; ctx.lineWidth = 1.9 - i * 0.18;
    const w2 = Math.sin(t * 0.07 + i) * 0.9;
    ctx.beginPath(); ctx.moveTo(4.6 - i * 0.25, -21.6 + i * 0.5);
    ctx.bezierCurveTo(2.2 - i*0.7 + w2, -19 + i*0.6, 0.6 - i*0.8 - w2, -15.5 + i*0.7, 0.4 - i*0.55 + w2, -11.8 + i*0.8);
    ctx.stroke();
  }
  // forelock sweeping over her brow
  ctx.fillStyle = pal.hMane;
  ctx.beginPath(); ctx.moveTo(4.2, -22.6);
  ctx.quadraticCurveTo(6.6, -23.4, 7.6, -21.9);
  ctx.quadraticCurveTo(6, -21.6, 5.2, -20.6);
  ctx.quadraticCurveTo(4.4, -21.4, 4.2, -22.6); ctx.closePath(); ctx.fill();

  // ---- a little pink flower tucked in her mane ----
  ctx.save(); ctx.translate(4.4, -22.9); ctx.rotate(sway * 0.1);
  for (let p = 0; p < 5; p++) { const a = p * Math.PI * 2 / 5;
    ctx.fillStyle = "#ff9ec4";
    ctx.beginPath(); ctx.ellipse(Math.cos(a)*1.15, Math.sin(a)*1.15, 0.95, 0.62, a, 0, Math.PI*2); ctx.fill(); }
  ctx.fillStyle = "#fff3a0"; ctx.beginPath(); ctx.arc(0, 0, 0.62, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // ---- she always carries a hint of sparkle... ----
  const a0 = t * 0.06;
  ctx.globalAlpha = 0.35 + Math.sin(t * 0.12) * 0.2;
  drawStarShape(ctx, -6 + Math.cos(a0) * 2, -16 + Math.sin(a0 * 1.3) * 3, 1, 0.45, a0, "#fff6d8");
  ctx.globalAlpha = 1;

  // ---- ...and when the moon touches her, she GLITTERS ----
  if (moonlit) {
    for (let i = 0; i < 7; i++) {
      const a = t * 0.09 + i * 0.9;
      const gx = Math.cos(a) * (6.5 + (i % 3) * 3.5), gy = -12 + Math.sin(a * 1.3 + i) * 9;
      ctx.globalAlpha = 0.5 + Math.sin(t * 0.15 + i * 2) * 0.4;
      drawStarShape(ctx, gx, gy, 1.1 + (i % 2) * 0.6, 0.5, a, i % 3 === 0 ? "#ffffff" : i % 3 === 1 ? "#cfe6ff" : "#ffe8b0");
    }
    ctx.globalAlpha = 1;
    const sg = ctx.createRadialGradient(0, -12, 2, 0, -12, 16);
    sg.addColorStop(0, "rgba(225,238,255,.20)"); sg.addColorStop(1, "rgba(225,238,255,0)");
    ctx.fillStyle = sg; ctx.beginPath(); ctx.arc(0, -12, 16, 0, Math.PI*2); ctx.fill();
  }
}

/* Appy the apple: a smiley apple that shifts form with her power —
   red normally, GREEN when big, YELLOW with the blue star. Her leaf spins
   like a propeller when she flies, and when big she can split in half onto
   a bad guy. Feet at (0,0), facing right. */
function drawAppyBody(ctx, pal, frame, airborne, walking, power) {
  const t = game.timer;
  const cols = power >= 2 ? pal.apYellow : power >= 1 ? pal.apGreen : pal.apRed;
  const splitting = (player.splitT || 0) > 0;
  const off = splitting ? (player.splitT / 30) * 4.5 : 0;

  // tiny feet
  const po = (walking && frame) ? 1 : 0;
  ctx.fillStyle = pal.apStem;
  ctx.beginPath(); ctx.ellipse(-2.6 - po, -0.8, 1.7, 1.1, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(2.6 + po, -0.8, 1.7, 1.1, 0, 0, Math.PI*2); ctx.fill();

  const paint = () => {                              // the whole apple (drawn once, or twice when split)
    const ag = ctx.createRadialGradient(-2.5, -14, 1.5, 0, -10, 11);
    ag.addColorStop(0, cols[0]); ag.addColorStop(1, cols[1]);
    ctx.fillStyle = ag;
    ctx.beginPath();
    ctx.moveTo(0, -18.6);
    ctx.bezierCurveTo(-8.6, -20.4, -8.4, -2.6, 0, -1.4);   // left lobe
    ctx.bezierCurveTo(8.4, -2.6, 8.6, -20.4, 0, -18.6);    // right lobe
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,.3)";
    ctx.beginPath(); ctx.ellipse(-3, -14.5, 1.9, 3, -0.4, 0, Math.PI*2); ctx.fill();   // shine
    // smiley face (like the drawing)
    ctx.fillStyle = pal.apFace;
    ctx.beginPath(); ctx.arc(-2.3, -11.5, 0.95, 0, Math.PI*2); ctx.arc(2.3, -11.5, 0.95, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,.9)";
    ctx.beginPath(); ctx.arc(-2.6, -11.9, 0.32, 0, Math.PI*2); ctx.arc(2, -11.9, 0.32, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = pal.apFace; ctx.lineWidth = 0.75; ctx.lineCap = "round";
    ctx.beginPath(); ctx.arc(0, -9.6, 1.9, 0.15*Math.PI, 0.85*Math.PI); ctx.stroke();
    ctx.fillStyle = pal.apBlush;
    ctx.beginPath(); ctx.ellipse(-4.3, -9.6, 1.2, 0.8, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(4.3, -9.6, 1.2, 0.8, 0, 0, Math.PI*2); ctx.fill();
  };

  if (splitting) {                                   // pulled apart into two halves
    for (const side of [-1, 1]) {
      ctx.save();
      ctx.translate(side * off, 0); ctx.rotate(side * off * 0.03);
      ctx.beginPath(); ctx.rect(side > 0 ? 0 : -14, -26, 14, 28); ctx.clip();
      paint();
      ctx.fillStyle = "#fdf3dc";                     // flat white inside of the half
      ctx.fillRect(-0.8 + side*0.4, -18, 1.6, 16.5);
      ctx.restore();
    }
  } else paint();

  // stem + leaf (the leaf whirls like a propeller in flight)
  ctx.strokeStyle = pal.apStem; ctx.lineWidth = 1.5; ctx.lineCap = "round";
  ctx.beginPath(); ctx.moveTo(0, -18.4); ctx.quadraticCurveTo(0.6, -20.6, 1.6, -21.8); ctx.stroke();
  if (player.flying && !splitting) {
    ctx.save(); ctx.translate(1, -22.4);
    for (const ph of [0, Math.PI]) {                 // two blurred blades
      const a = t * 0.55 + ph;
      ctx.fillStyle = "rgba(110,210,120,.75)";
      ctx.beginPath(); ctx.ellipse(Math.cos(a)*4.5, Math.sin(a)*1.1, 4.6, 1.5, a * 0.06, 0, Math.PI*2); ctx.fill();
    }
    ctx.fillStyle = pal.apStem; ctx.beginPath(); ctx.arc(0, 0, 1, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  } else {
    ctx.fillStyle = pal.apLeaf;
    ctx.save(); ctx.translate(2.8, -21.6); ctx.rotate(-0.5 + Math.sin(t*0.06)*0.08);
    ctx.beginPath(); ctx.ellipse(2.2, 0, 3.1, 1.4, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = "rgba(50,110,45,.6)"; ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(-0.4, 0); ctx.lineTo(4.8, 0); ctx.stroke();
    ctx.restore();
  }
}

/* Icy the penguin: black & white with a pink bow, orange beak and feet.
   Holding her wing shield turns her blue & white and raises a wing in front.
   Feet at (0,0), facing right. */
function drawIcyBody(ctx, pal, frame, airborne, walking, power) {
  const t = game.timer;
  const sh = !!player.shielding;                     // powers 5+6: blue & white behind the wing
  const dark = sh ? pal.pgBlue : pal.pgDark;
  const darkLt = sh ? pal.pgBlueLt : pal.pgDarkLt;
  const belly = sh ? "#f3faff" : pal.pgBelly;

  // orange feet
  const po = (walking && frame) ? 1.1 : 0;
  ctx.fillStyle = pal.pgFeet;
  ctx.beginPath(); ctx.ellipse(-2.6 - po, -0.8, 2, 1.2, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(2.6 + po, -0.8, 2, 1.2, 0, 0, Math.PI*2); ctx.fill();

  // egg body — dark back/hood
  const bg = ctx.createLinearGradient(0, -20, 0, -1);
  bg.addColorStop(0, darkLt); bg.addColorStop(0.5, dark); bg.addColorStop(1, dark);
  ctx.fillStyle = bg;
  ctx.beginPath();
  ctx.moveTo(-6.4, -2);
  ctx.bezierCurveTo(-7.4, -14, -4.5, -20.5, 0, -20.5);
  ctx.bezierCurveTo(4.5, -20.5, 7.4, -14, 6.4, -2);
  ctx.quadraticCurveTo(0, -0.2, -6.4, -2);
  ctx.closePath(); ctx.fill();

  // flippers (tucked wings) — or one big raised wing when shielding
  if (!sh) {
    const flap = airborne ? Math.sin(t * 0.4) * 0.5 : 0.15;
    for (const sgn of [-1, 1]) {
      ctx.save(); ctx.translate(sgn * 6, -11); ctx.rotate(sgn * (0.35 + flap));
      ctx.fillStyle = dark;
      ctx.beginPath(); ctx.ellipse(0, 2, 1.9, 5, 0, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }

  // white face + belly patch
  ctx.fillStyle = belly;
  ctx.beginPath();
  ctx.moveTo(-4.4, -2.4);
  ctx.bezierCurveTo(-5.4, -12, -3.6, -16.8, 0, -16.8);
  ctx.bezierCurveTo(3.6, -16.8, 5.4, -12, 4.4, -2.4);
  ctx.quadraticCurveTo(0, -1, -4.4, -2.4);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = sh ? "rgba(150,200,240,.35)" : "rgba(180,195,215,.3)";   // soft belly shade
  ctx.beginPath(); ctx.ellipse(0, -3.4, 3.8, 1.6, 0, 0, Math.PI*2); ctx.fill();

  // close-together sparkly eyes (like Nora's drawing) + blush
  for (const ex of [-1.5, 1.5]) {
    ctx.fillStyle = pal.pgEye;
    ctx.beginPath(); ctx.ellipse(ex, -13.6, 1.15, 1.5, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,.95)";
    ctx.beginPath(); ctx.arc(ex - 0.35, -14.2, 0.42, 0, Math.PI*2); ctx.fill();
  }
  ctx.fillStyle = pal.pgBlush;
  ctx.beginPath(); ctx.ellipse(-3.1, -12, 1.1, 0.75, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(3.1, -12, 1.1, 0.75, 0, 0, Math.PI*2); ctx.fill();
  // little orange beak
  ctx.fillStyle = pal.pgBeak;
  ctx.beginPath(); ctx.moveTo(-1.1, -12.5); ctx.lineTo(1.1, -12.5); ctx.lineTo(0, -11.1); ctx.closePath(); ctx.fill();

  // pink bow, up on her head
  ctx.save(); ctx.translate(3.4, -20.6); ctx.rotate(0.15);
  ctx.fillStyle = pal.pgBow;
  ctx.beginPath(); ctx.ellipse(-1.7, 0, 1.6, 1.1, -0.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(1.7, 0, 1.6, 1.1, 0.5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = "#d13c82"; ctx.beginPath(); ctx.arc(0, 0, 0.85, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // the raised wing shield, in front of everything
  if (sh) {
    ctx.save(); ctx.translate(4.2, -9);
    const wgr = ctx.createLinearGradient(-2, -9, 2, 6);
    wgr.addColorStop(0, pal.pgBlueLt); wgr.addColorStop(1, pal.pgBlue);
    ctx.fillStyle = wgr;
    ctx.beginPath(); ctx.ellipse(0, -1, 3.4, 9.4, 0.08, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.ellipse(0, -1, 3.4, 9.4, 0.08, 0, Math.PI*2); ctx.stroke();
    ctx.strokeStyle = "rgba(255,255,255,.7)"; ctx.lineWidth = 0.7;
    ctx.beginPath(); ctx.ellipse(-0.8, -3, 1.2, 4.4, 0.08, Math.PI*0.9, Math.PI*1.7); ctx.stroke();  // shine
    ctx.restore();
    // shimmer sparkles while protected
    for (let i = 0; i < 2; i++) { const a = t*0.14 + i*3;
      ctx.fillStyle = "rgba(200,235,255," + (0.5 + Math.sin(a)*0.3) + ")";
      ctx.beginPath(); ctx.arc(Math.cos(a)*8, -11 + Math.sin(a*1.3)*8, 0.9, 0, Math.PI*2); ctx.fill(); }
  }
}

/* Icy floats on a drifting chunk of ice. */
function drawIceFloeRide(cx, feetY, t, facing) {
  g.save();
  g.translate(cx, feetY + 3.5 + Math.sin(t*0.15)*0.8);
  g.rotate(Math.sin(t*0.1)*0.04);
  g.fillStyle = "rgba(0,0,0,.1)"; g.beginPath(); g.ellipse(0, 3.5, 12, 2, 0, 0, Math.PI*2); g.fill();
  const ig = g.createLinearGradient(0, -3, 0, 4);
  ig.addColorStop(0, "#ffffff"); ig.addColorStop(1, "#a7d2ef");
  g.fillStyle = ig;
  g.beginPath();
  g.moveTo(-11, 0); g.lineTo(-8, -3); g.lineTo(-3, -2.2); g.lineTo(2, -3.4); g.lineTo(8, -2.4);
  g.lineTo(11, 0); g.lineTo(8, 3.4); g.lineTo(-2, 4); g.lineTo(-8, 3);
  g.closePath(); g.fill();
  g.strokeStyle = "rgba(130,180,220,.6)"; g.lineWidth = 0.8;
  g.beginPath(); g.moveTo(-6, -1); g.lineTo(-2, 1.5); g.moveTo(3, -1.5); g.lineTo(5, 1.5); g.stroke();
  for (let i = 0; i < 2; i++) { const a = t*0.1 + i*2.6; g.fillStyle = "rgba(255,255,255,.8)";
    g.beginPath(); g.arc(Math.cos(a)*8, -3 + Math.sin(a)*1.4, 0.7, 0, Math.PI*2); g.fill(); }
  g.restore();
}

/* Squishy the rainbow dumpling: a sparkly rainbow dome in a waffle bowl with a
   big kawaii face. Feet at (0,0), facing right. */
function drawSquishyBody(ctx, pal, frame, airborne, walking, power) {
  const t = game.timer, rc = pal.rainbow;
  const sq = (walking && frame) ? 0.7 : 0;          // little squish-bob

  // tiny feet
  const po = (walking && frame) ? 0.8 : 0;
  ctx.fillStyle = pal.waffleDk;
  ctx.beginPath(); ctx.ellipse(-3 - po, -0.6, 1.8, 1.1, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(3 + po, -0.6, 1.8, 1.1, 0, 0, Math.PI*2); ctx.fill();

  // waffle bowl
  const wg = ctx.createLinearGradient(0, -8, 0, -1);
  wg.addColorStop(0, pal.waffle); wg.addColorStop(1, pal.waffleDk);
  ctx.fillStyle = wg;
  ctx.beginPath(); ctx.moveTo(-7.5, -7); ctx.lineTo(7.5, -7);
  ctx.lineTo(6, -1); ctx.quadraticCurveTo(0, 0.6, -6, -1); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = "rgba(150,100,40,.45)"; ctx.lineWidth = 0.5;
  for (let i = -2; i <= 2; i++) { ctx.beginPath(); ctx.moveTo(i*3, -6.5); ctx.lineTo(i*3-2, -1); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(i*3, -6.5); ctx.lineTo(i*3+2, -1); ctx.stroke(); }
  ctx.fillStyle = pal.waffle; ctx.beginPath(); ctx.ellipse(0, -7, 7.6, 1.7, 0, 0, Math.PI*2); ctx.fill();

  // rainbow dome (clipped rainbow bands)
  ctx.save();
  ctx.beginPath(); ctx.moveTo(-7, -7); ctx.bezierCurveTo(-7.5, -18 - sq, 7.5, -18 - sq, 7, -7); ctx.closePath();
  ctx.clip();
  for (let i = 0; i < rc.length; i++) { ctx.fillStyle = rc[i]; ctx.fillRect(-7 + i*(14/rc.length), -19, 14/rc.length + 0.6, 14); }
  ctx.fillStyle = "rgba(255,255,255,.28)"; ctx.beginPath(); ctx.ellipse(-2.5, -14.5, 3, 4.5, -0.3, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  ctx.strokeStyle = "rgba(255,255,255,.5)"; ctx.lineWidth = 0.6;
  ctx.beginPath(); ctx.moveTo(-7, -7); ctx.bezierCurveTo(-7.5, -18 - sq, 7.5, -18 - sq, 7, -7); ctx.stroke();
  ctx.fillStyle = "#ffe7a0"; ctx.beginPath(); ctx.arc(0, -17 - sq, 1.4, 0, Math.PI*2); ctx.fill();   // top pinch

  // sparkles on the dome
  for (const s of [[-3.5,-13],[3,-15],[4.6,-10.5],[-0.5,-16],[1.6,-11.5]]) {
    ctx.globalAlpha = 0.45 + 0.5*Math.abs(Math.sin(t*0.06 + s[0]));
    drawStarShape(ctx, s[0], s[1] - sq*0.5, 0.95, 0.4, t*0.05, "#ffffff");
  }
  ctx.globalAlpha = 1;

  // kawaii face: big sparkly eyes, blush, open smile
  for (const ex of [-2.7, 2.7]) {
    ctx.fillStyle = pal.dEye;
    ctx.beginPath(); ctx.ellipse(ex, -11.6, 1.9, 2.4, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,.95)";
    ctx.beginPath(); ctx.arc(ex - 0.6, -12.5, 0.7, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(ex + 0.5, -10.9, 0.35, 0, Math.PI*2); ctx.fill();
  }
  ctx.fillStyle = pal.dBlush;
  ctx.beginPath(); ctx.ellipse(-4.8, -10, 1.4, 1, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(4.8, -10, 1.4, 1, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = pal.dMouth;
  ctx.beginPath(); ctx.ellipse(0, -9.4, 1.8, 1.6, 0, 0, Math.PI); ctx.fill();        // open smile
  ctx.fillStyle = "#fff"; ctx.fillRect(-1.5, -9.6, 3, 0.6);                          // teeth
  ctx.fillStyle = "#ff9bb4"; ctx.beginPath(); ctx.ellipse(0, -8.4, 0.9, 0.55, 0, 0, Math.PI*2); ctx.fill();  // tongue

  if (power >= 2) {     // powered sparkle aura
    for (let i = 0; i < 3; i++) { const a = t*0.1 + i*2.1; ctx.fillStyle = rc[(i*2 + (t>>3)) % rc.length];
      ctx.globalAlpha = 0.6 + Math.sin(a)*0.3;
      ctx.beginPath(); ctx.arc(Math.cos(a)*9, -12 + Math.sin(a*1.2)*8, 1, 0, Math.PI*2); ctx.fill(); }
    ctx.globalAlpha = 1;
  }
}

/* Squishy floats on a steamy dim sum bamboo steamer tray. */
function drawDumplingRide(cx, feetY, t, facing) {
  g.save();

  // bamboo basket body + woven slats
  const bg = g.createLinearGradient(0, -2, 0, 4); bg.addColorStop(0, "#e8c483"); bg.addColorStop(1, "#c79a52");
  g.fillStyle = bg; g.beginPath(); g.ellipse(0, 0.8, 11.5, 4, 0, 0, Math.PI*2); g.fill();
  g.strokeStyle = "rgba(140,100,50,.45)"; g.lineWidth = 0.7;
  for (const yy of [-1, 0.6, 2.2, 3.6]) { g.beginPath(); g.moveTo(-11, yy); g.lineTo(11, yy); g.stroke(); }
  for (let i = -3; i <= 3; i++) { g.beginPath(); g.moveTo(i*3.3, -1.2); g.lineTo(i*3.3, 3.6); g.stroke(); }
  // lighter top rim with a shaded inner lip
  g.fillStyle = "#f0d49a"; g.beginPath(); g.ellipse(0, -2.2, 11, 2.5, 0, 0, Math.PI*2); g.fill();
  g.fillStyle = "rgba(120,90,50,.3)"; g.beginPath(); g.ellipse(0, -2, 8.6, 1.6, 0, 0, Math.PI*2); g.fill();
  g.strokeStyle = "#b8915a"; g.lineWidth = 1; g.beginPath(); g.ellipse(0, -2.2, 11, 2.5, 0, 0, Math.PI*2); g.stroke();
  // steam wisps rising
  g.strokeStyle = "rgba(255,255,255,.5)"; g.lineWidth = 1; g.lineCap = "round";
  for (let i = 0; i < 3; i++) { const bx = (i-1)*5, sw = Math.sin(t*0.1 + i*2)*1.6;
    g.beginPath(); g.moveTo(bx, -3); g.quadraticCurveTo(bx + sw, -6, bx - sw, -9.5); g.stroke(); }
  g.restore();
}

function drawSparkleBody(ctx, pal, frame, airborne, walking, power) {
  const t = game.timer, rain = pal.rainbow;
  const glowing = power >= 2 || (player.glow || 0) > 0;

  // flowing rainbow tail (behind)
  ctx.save();
  ctx.translate(-5.4, -3); ctx.rotate(Math.sin(t*0.08)*0.08 - 0.18);
  ctx.lineCap = "round"; ctx.lineWidth = 1.5;
  for (let i = 0; i < rain.length; i++) { ctx.strokeStyle = rain[i];
    ctx.beginPath(); ctx.moveTo(0, -2 + i*0.5);
    ctx.quadraticCurveTo(-4 - i*0.4, -1 + i*0.6, -3 - i*0.5, 5 + i*0.7); ctx.stroke(); }
  ctx.restore();

  // hooves
  const po = (walking && frame) ? 1.1 : 0;
  ctx.fillStyle = pal.uHoof;
  ctx.beginPath(); ctx.ellipse(-2.6 - po, -1, 1.7, 1.4, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(2.6 + po, -1, 1.7, 1.4, 0, 0, Math.PI*2); ctx.fill();

  // plush body
  const bg = ctx.createLinearGradient(0, -12, 0, -1);
  bg.addColorStop(0, pal.uBody); bg.addColorStop(1, pal.uShade);
  ctx.fillStyle = bg;
  ctx.beginPath(); ctx.ellipse(0, -6, 6, 6.4, 0, 0, Math.PI*2); ctx.fill();

  // head
  ctx.fillStyle = pal.uBody;
  ctx.beginPath(); ctx.ellipse(0.4, -15.4, 5.4, 5, 0, 0, Math.PI*2); ctx.fill();
  // ears
  ctx.beginPath(); ctx.moveTo(-3.6,-19.2); ctx.lineTo(-2.2,-21.8); ctx.lineTo(-1,-19.4); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(3.6,-19.2); ctx.lineTo(4.8,-21.4); ctx.lineTo(5.4,-18.8); ctx.closePath(); ctx.fill();

  // golden spiral horn
  ctx.save(); ctx.translate(0.6, -19.8);
  const hg = ctx.createLinearGradient(0,-6,0,0); hg.addColorStop(0,pal.horn); hg.addColorStop(1,pal.hornDk);
  ctx.fillStyle = hg;
  ctx.beginPath(); ctx.moveTo(-1.6, 0.6); ctx.lineTo(0, -6.6); ctx.lineTo(1.6, 0.6); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = "rgba(150,105,15,.7)"; ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.moveTo(-1.2,-0.4); ctx.lineTo(1,-1.7); ctx.moveTo(-0.8,-2.4); ctx.lineTo(0.8,-3.6); ctx.moveTo(-0.4,-4.4); ctx.lineTo(0.5,-5.2); ctx.stroke();
  ctx.restore();

  // rainbow forelock between the ears
  for (let i = 0; i < rain.length; i++) { ctx.fillStyle = rain[i];
    ctx.beginPath(); ctx.ellipse(-2.4 + i*0.8, -18.4 + Math.abs(i-2.5)*0.35, 1.1, 2.2, -0.15, 0, Math.PI*2); ctx.fill(); }
  // rainbow mane down the back
  ctx.save(); ctx.translate(4.7, -17);
  for (let i = 0; i < rain.length; i++) { ctx.fillStyle = rain[i];
    ctx.beginPath(); ctx.ellipse(i*0.3, i*1.4 - 1, 1.7, 1.4, 0.3, 0, Math.PI*2); ctx.fill(); }
  ctx.restore();

  // muzzle + nostril
  ctx.fillStyle = pal.uShade;
  ctx.beginPath(); ctx.ellipse(-2.7, -13.4, 2.2, 1.8, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = "rgba(150,120,160,.5)"; ctx.beginPath(); ctx.arc(-3.5, -13.3, 0.5, 0, Math.PI*2); ctx.fill();

  // blush + big sparkly eye + lashes
  ctx.fillStyle = pal.uBlush; ctx.beginPath(); ctx.ellipse(-0.3, -13.8, 1.3, 0.9, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = pal.uEye;
  ctx.beginPath(); ctx.ellipse(-0.1, -15.5, 1.6, 2, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = "rgba(255,255,255,.95)";
  ctx.beginPath(); ctx.arc(-0.6, -16.2, 0.6, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(0.4, -14.9, 0.34, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = pal.uEye; ctx.lineWidth = 0.5; ctx.lineCap = "round";
  ctx.beginPath(); ctx.moveTo(1.2,-16.3); ctx.lineTo(2.1,-16.8); ctx.moveTo(1.3,-15.5); ctx.lineTo(2.2,-15.6); ctx.stroke();

  // a twinkle off the horn tip
  if ((t>>4)%2===0) drawStarShape(ctx, 0.6, -26.6, 1.2, 0.5, t*0.1, "#fff6c0");
  // glowing power-up — rainbow sparkles orbiting
  if (glowing) {
    for (let i=0;i<3;i++){ const a=t*0.1+i*2.1; ctx.fillStyle = rain[(i*2 + (t>>3)) % rain.length];
      ctx.globalAlpha = 0.6 + Math.sin(a)*0.3;
      ctx.beginPath(); ctx.arc(Math.cos(a)*8.5, -10 + Math.sin(a*1.2)*9, 1, 0, Math.PI*2); ctx.fill(); }
    ctx.globalAlpha = 1;
  }
}

/* A rainbow arc she rides when flying. */
function drawRainbowRide(cx, feetY, t, facing) {
