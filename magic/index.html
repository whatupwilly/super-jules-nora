/* Cutie the butterfly: a smiley red-bodied butterfly with big green/blue
   spotted wings and curly antennae. When powered up she gets a blue star and
   little flowers bloom around her. Feet at (0,0), facing right. */
function drawCutieBody(ctx, pal, frame, airborne, walking, power) {
  const t = game.timer;
  const big = power >= 2;
  // wing flap: fast when airborne, a gentle bob on the ground
  const flap = airborne ? Math.sin(t * 0.45) * 0.42 : Math.sin(t * 0.12) * 0.08 + (walking && frame ? 0.14 : 0);

  // ---- wings (behind the body), mirrored ----
  for (const sgn of [-1, 1]) {
    ctx.save();
    ctx.translate(sgn * 1.6, -10);
    ctx.rotate(sgn * (0.22 + flap));
    const dot = (dx, dy, r) => { ctx.fillStyle = pal.wingSpot; ctx.beginPath(); ctx.arc(sgn*dx, dy, r, 0, Math.PI*2); ctx.fill(); };
    // upper wing
    const ug = ctx.createRadialGradient(sgn*4, -4, 1, sgn*6, -3, 9);
    ug.addColorStop(0, pal.wingGreen); ug.addColorStop(1, pal.wingGreenDk);
    ctx.fillStyle = ug;
    ctx.beginPath(); ctx.ellipse(sgn*5.4, -3.5, 5.6, 6.6, sgn*0.3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = pal.wingBlue;
    ctx.beginPath(); ctx.ellipse(sgn*5.6, -3.5, 3, 4, sgn*0.3, 0, Math.PI*2); ctx.fill();
    dot(5.6, -3.5, 1.2); dot(7.4, -6, 0.8); dot(3.6, -1, 0.8);
    // lower wing
    ctx.fillStyle = pal.wingGreenDk;
    ctx.beginPath(); ctx.ellipse(sgn*4.6, 4.5, 4.2, 4.8, sgn*-0.2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = pal.wingBlue;
    ctx.beginPath(); ctx.ellipse(sgn*4.6, 4.5, 2.2, 2.8, sgn*-0.2, 0, Math.PI*2); ctx.fill();
    dot(4.6, 4.5, 1); dot(5.6, 6.6, 0.7);
    // wing outline shimmer
    ctx.strokeStyle = "rgba(255,255,255,.35)"; ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.ellipse(sgn*5.4, -3.5, 5.6, 6.6, sgn*0.3, 0, Math.PI*2); ctx.stroke();
    ctx.restore();
  }

  // ---- little legs ----
  ctx.strokeStyle = pal.bfBodyDk; ctx.lineWidth = 0.9; ctx.lineCap = "round";
  const po = (walking && frame) ? 0.8 : 0;
  ctx.beginPath(); ctx.moveTo(-1.4, -2); ctx.lineTo(-2.6 - po, 0); ctx.moveTo(1.4, -2); ctx.lineTo(2.6 + po, 0); ctx.stroke();

  // ---- red segmented body ----
  const bg = ctx.createLinearGradient(-3, -14, 3, -2);
  bg.addColorStop(0, pal.bfBody); bg.addColorStop(1, pal.bfBodyDk);
  ctx.fillStyle = bg;
  rrPath(ctx, -2.4, -14.5, 4.8, 13, 2.4); ctx.fill();
  ctx.strokeStyle = "rgba(0,0,0,.18)"; ctx.lineWidth = 0.5;
  for (let sy = -12; sy < -3; sy += 2.4) { ctx.beginPath(); ctx.moveTo(-2.2, sy); ctx.lineTo(2.2, sy); ctx.stroke(); }
  ctx.fillStyle = "rgba(255,255,255,.3)"; ctx.fillRect(-1.6, -13.5, 1, 10);

  // ---- head with a happy smiley face ----
  ctx.fillStyle = pal.bfHead;
  ctx.beginPath(); ctx.arc(0, -17, 4.4, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = pal.bfBlush;
  ctx.beginPath(); ctx.arc(-2.6, -16, 1, 0, Math.PI*2); ctx.arc(2.6, -16, 1, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = pal.bfFace;
  ctx.beginPath(); ctx.arc(-1.5, -17.8, 0.75, 0, Math.PI*2); ctx.arc(1.5, -17.8, 0.75, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = "rgba(255,255,255,.9)";
  ctx.beginPath(); ctx.arc(-1.75, -18.1, 0.28, 0, Math.PI*2); ctx.arc(1.25, -18.1, 0.28, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = pal.bfFace; ctx.lineWidth = 0.7; ctx.lineCap = "round";
  ctx.beginPath(); ctx.arc(0, -16.6, 1.5, 0.15*Math.PI, 0.85*Math.PI); ctx.stroke();

  // ---- antennae with knobs ----
  ctx.strokeStyle = pal.antenna; ctx.lineWidth = 0.8;
  for (const sgn of [-1, 1]) {
    ctx.beginPath(); ctx.moveTo(sgn*1.6, -20.4);
    ctx.quadraticCurveTo(sgn*3.6, -23.5, sgn*2.4 + Math.sin(t*0.1)*0.4, -25.4); ctx.stroke();
    ctx.fillStyle = pal.antTip;
    ctx.beginPath(); ctx.arc(sgn*2.4 + Math.sin(t*0.1)*0.4, -25.6, 1.1, 0, Math.PI*2); ctx.fill();
  }

  // ---- powered up: blue star + blooming flowers ----
  if (big) {
    drawStarShape(ctx, 0, -27.5, 2.4, 1.1, t * 0.05, pal.bfStar, "#2f9ed0");
    for (let i = 0; i < 3; i++) {
      const a = t * 0.09 + i * 2.1, fx = Math.cos(a) * 9, fy = -10 + Math.sin(a * 1.2) * 9;
      ctx.fillStyle = ["#ff8ec4", "#ffd166", "#b88cff"][i];
      for (let p = 0; p < 5; p++) { const pa = p * Math.PI * 2/5;
        ctx.beginPath(); ctx.ellipse(fx + Math.cos(pa)*1.4, fy + Math.sin(pa)*1.4, 0.9, 0.6, pa, 0, Math.PI*2); ctx.fill(); }
      ctx.fillStyle = "#fff6c0"; ctx.beginPath(); ctx.arc(fx, fy, 0.7, 0, Math.PI*2); ctx.fill();
    }
  }
}

/* A flower she rides when flying. */
function drawFlowerRide(cx, feetY, t, facing) {
  g.save();
  g.translate(cx, feetY + 4 + Math.sin(t * 0.15) * 0.8);
  g.fillStyle = "rgba(0,0,0,.1)";
  g.beginPath(); g.ellipse(0, 3, 12, 2.2, 0, 0, Math.PI*2); g.fill();
  g.rotate(Math.sin(t * 0.08) * 0.1);
  // leaves
  g.fillStyle = "#3fa54a";
  g.beginPath(); g.ellipse(-7, 1, 4, 1.8, -0.4, 0, Math.PI*2); g.fill();
  g.beginPath(); g.ellipse(7, 1, 4, 1.8, 0.4, 0, Math.PI*2); g.fill();
  // big flower disc she stands on (petals + center)
  const pet = ["#ff8ec4", "#ffa6d2", "#ff7ab8"];
  for (let i = 0; i < 8; i++) {
    const a = i * Math.PI / 4 + t * 0.02;
    g.fillStyle = pet[i % 3];
    g.beginPath(); g.ellipse(Math.cos(a) * 9, Math.sin(a) * 3.6, 4, 2.2, a, 0, Math.PI*2); g.fill();
  }
  const cg = g.createRadialGradient(0, -1, 0.5, 0, 0, 5);
  cg.addColorStop(0, "#fff3a0"); cg.addColorStop(1, "#f0b53c");
  g.fillStyle = cg; g.beginPath(); g.ellipse(0, 0, 5, 2.6, 0, 0, Math.PI*2); g.fill();
  g.fillStyle = "rgba(180,120,40,.6)";
  for (let i = 0; i < 5; i++) { const a = i * 1.3; g.beginPath(); g.arc(Math.cos(a)*2, Math.sin(a)*1, 0.5, 0, Math.PI*2); g.fill(); }
  g.restore();
}

/* Northern Light the arctic fox: fluffy white fur with cool shadows, big
   sparkly eyes, blush cheeks, tall ears, a huge bushy tail. When powered up
   her fur shimmers aurora colors. Feet at (0,0), facing right. */
function drawNorthernBody(ctx, pal, frame, airborne, walking, power) {
  const t = game.timer;
  // aurora shimmer fur when powered up ("northern light colors with white")
  const aura = power >= 2;
  const furTop = aura ? pal.aur2 : pal.foxFur;
  const furBot = aura ? pal.aur1 : pal.foxShade;
  const r = (rx,ry,rw,rh,c) => { ctx.fillStyle = c; ctx.fillRect(rx,ry,rw,rh); };

  // ---- huge bushy tail sweeping up behind ----
  ctx.save();
  ctx.translate(-5.8, -2.2);
  ctx.rotate(Math.sin(t*0.07)*0.07 - 0.25);
  const tg = ctx.createLinearGradient(0, 2, 0, -12);
  tg.addColorStop(0, aura ? pal.aur3 : pal.foxShade); tg.addColorStop(1, furTop);
  ctx.fillStyle = tg;
  ctx.beginPath();
  ctx.moveTo(0, 1);
  ctx.bezierCurveTo(-6, -2, -6.5, -10, -1.5, -13.5);
  ctx.bezierCurveTo(3, -16, 6, -12, 4.5, -8);
  ctx.bezierCurveTo(3.4, -5, 2, -2, 0, 1);
  ctx.closePath(); ctx.fill();
  // fluffy white tail tip
  ctx.fillStyle = aura ? "#ffffff" : pal.foxFur;
  ctx.beginPath(); ctx.ellipse(1.8, -12.4, 3, 3.4, 0.3, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // ---- legs + paws ----
  const po = (walking && frame) ? 1.2 : 0;
  ctx.fillStyle = furBot;
  ctx.beginPath(); ctx.ellipse(-2.6 - po, -1.2, 2.1, 2.5, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(2.6 + po, -1.2, 2.1, 2.5, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = pal.foxFur;
  ctx.beginPath(); ctx.ellipse(-2.6 - po, -0.5, 2.1, 1.1, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(2.6 + po, -0.5, 2.1, 1.1, 0, 0, Math.PI*2); ctx.fill();

  // ---- fluffy body ----
  const bg = ctx.createLinearGradient(0, -12, 0, -1);
  bg.addColorStop(0, furTop); bg.addColorStop(0.55, pal.foxFur); bg.addColorStop(1, furBot);
  ctx.fillStyle = bg;
  ctx.beginPath(); ctx.ellipse(0, -6, 6.2, 6.6, 0, 0, Math.PI*2); ctx.fill();
  // chest fluff tufts
  ctx.fillStyle = pal.foxFur;
  for (const fx of [-2.4, 0.2, 2.6]) { ctx.beginPath(); ctx.moveTo(fx-1.4,-3.4); ctx.lineTo(fx+1.4,-3.4); ctx.lineTo(fx,-0.6); ctx.closePath(); ctx.fill(); }

  // ---- arms ----
  ctx.fillStyle = furBot;
  if (airborne) {
    ctx.beginPath(); ctx.ellipse(-6, -9, 1.9, 3, 0.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(6, -9, 1.9, 3, -0.5, 0, Math.PI*2); ctx.fill();
  } else {
    ctx.beginPath(); ctx.ellipse(-5.6, -6.4, 1.8, 3, 0.3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(5.6, -6.4, 1.8, 3, -0.3, 0, Math.PI*2); ctx.fill();
  }

  // ---- tall pointy ears (white outer, dark inner), tufted ----
  for (const sgn of [-1, 1]) {
    ctx.save(); ctx.translate(sgn*4.4, -19.4); ctx.rotate(sgn*0.12);
    ctx.fillStyle = furTop;
    ctx.beginPath(); ctx.moveTo(-2.6, 2.2); ctx.lineTo(0.2, -4.4); ctx.lineTo(2.6, 2.2); ctx.closePath(); ctx.fill();
    ctx.fillStyle = pal.foxEarIn;
    ctx.beginPath(); ctx.moveTo(-1.3, 1.4); ctx.lineTo(0.1, -2.6); ctx.lineTo(1.5, 1.4); ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  // ---- head ----
  const hg = ctx.createRadialGradient(-2, -18.5, 1, 0, -16, 8.5);
  hg.addColorStop(0, pal.foxFur); hg.addColorStop(1, furTop);
  ctx.fillStyle = hg;
  ctx.beginPath(); ctx.ellipse(0, -16, 7, 6.3, 0, 0, Math.PI*2); ctx.fill();
  // fluffy cheek ruffs
  ctx.fillStyle = pal.foxFur;
  for (const sgn of [-1, 1]) {
    ctx.save(); ctx.translate(sgn*6, -14.5);
    for (const a of [-0.5, 0, 0.5]) { ctx.beginPath(); ctx.moveTo(0,-1.6); ctx.lineTo(0,1.6); ctx.lineTo(sgn*(2.6+Math.cos(a)), a*2); ctx.closePath(); ctx.fill(); }
    ctx.restore();
  }
  // soft cool shadow under the muzzle
  ctx.fillStyle = pal.foxShade;
  ctx.beginPath(); ctx.ellipse(0, -12.6, 3.4, 2.4, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = pal.foxFur;
  ctx.beginPath(); ctx.ellipse(0, -13.2, 3.3, 2.4, 0, 0, Math.PI*2); ctx.fill();

  // blush cheeks
  ctx.fillStyle = pal.foxBlush;
  ctx.beginPath(); ctx.ellipse(-3.7, -13.4, 1.5, 1, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(3.7, -13.4, 1.5, 1, 0, 0, Math.PI*2); ctx.fill();

  // big sparkly eyes
  for (const ex of [-2.7, 2.7]) {
    ctx.fillStyle = pal.foxEye;
    ctx.beginPath(); ctx.ellipse(ex, -16.2, 2, 2.5, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,.95)";
    ctx.beginPath(); ctx.arc(ex - 0.7, -17.1, 0.85, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(ex + 0.7, -15.3, 0.45, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = "rgba(180,220,255,.6)";
    ctx.beginPath(); ctx.arc(ex + 0.5, -16.6, 0.4, 0, Math.PI*2); ctx.fill();
  }
  // little dark nose + smile
  ctx.fillStyle = pal.foxNose;
  ctx.beginPath(); ctx.ellipse(0, -13.6, 1, 0.8, 0, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = pal.foxNose; ctx.lineWidth = 0.55; ctx.lineCap = "round";
  ctx.beginPath(); ctx.moveTo(0, -12.9); ctx.lineTo(0, -12.3);
  ctx.moveTo(0, -12.3); ctx.quadraticCurveTo(-1.1, -11.9, -1.7, -12.5);
  ctx.moveTo(0, -12.3); ctx.quadraticCurveTo(1.1, -11.9, 1.7, -12.5); ctx.stroke();
  // whiskers
  ctx.strokeStyle = "rgba(180,200,230,.8)"; ctx.lineWidth = 0.4;
  for (const dy of [-0.6, 0.5]) {
    ctx.beginPath(); ctx.moveTo(-2.4, -13 + dy); ctx.lineTo(-7.6, -13.4 + dy*1.8); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(2.4, -13 + dy); ctx.lineTo(7.6, -13.4 + dy*1.8); ctx.stroke();
  }

  // aurora sparkles drifting off her when powered
  if (aura) {
    for (let i = 0; i < 3; i++) {
      const a = t * 0.1 + i * 2.1;
      ctx.fillStyle = [pal.aur1, pal.aur2, pal.aur3][i];
      ctx.globalAlpha = 0.6 + Math.sin(a) * 0.3;
      ctx.beginPath(); ctx.arc(Math.cos(a)*8, -16 + Math.sin(a*1.3)*9, 0.8, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
}

/* A spinning snowflake she rides when flying. */
function drawSnowflakeRide(cx, feetY, t, facing) {
  g.save();
  g.translate(cx, feetY + 4 + Math.sin(t * 0.15) * 0.8);
  g.fillStyle = "rgba(0,0,0,.1)";
  g.beginPath(); g.ellipse(0, 3, 12, 2.2, 0, 0, Math.PI*2); g.fill();
  g.rotate(t * 0.04);
  g.strokeStyle = "#dff0ff"; g.lineWidth = 2.4; g.lineCap = "round";
  g.fillStyle = "rgba(210,238,255,.55)";
  g.beginPath(); g.arc(0, 0, 11, 0, Math.PI*2); g.fill();
  for (let i = 0; i < 6; i++) {
    const a = i * Math.PI / 3;
    const ex = Math.cos(a) * 12, ey = Math.sin(a) * 5;     // squashed for perspective
    g.beginPath(); g.moveTo(0, 0); g.lineTo(ex, ey); g.stroke();
    // little branches
    g.lineWidth = 1.4;
    g.beginPath(); g.moveTo(ex*0.6, ey*0.6); g.lineTo(ex*0.6 + Math.cos(a+0.6)*3, ey*0.6 + Math.sin(a+0.6)*1.4); g.stroke();
    g.beginPath(); g.moveTo(ex*0.6, ey*0.6); g.lineTo(ex*0.6 + Math.cos(a-0.6)*3, ey*0.6 + Math.sin(a-0.6)*1.4); g.stroke();
    g.lineWidth = 2.4;
  }
  g.fillStyle = "#ffffff";
  g.beginPath(); g.arc(0, 0, 2.4, 0, Math.PI*2); g.fill();
  g.restore();
}

/* Bamboo the red panda: rust fur, white face markings, dark legs, fluffy
   ringed tail. Detailed/shaded for a lifelike look. Feet at (0,0), facing right. */
function drawBambooBody(ctx, pal, frame, airborne, walking) {
  const t = game.timer;

  // ---- fluffy ringed tail, sweeping up behind ----
  ctx.save();
  ctx.translate(-5.5, -2.2);
  ctx.rotate(Math.sin(t * 0.08) * 0.06 - 0.15);
  const segs = [[0,0,3.3],[-1.3,-3,3.1],[-1,-6,2.85],[0.6,-8.6,2.55],[2.6,-10.2,2.2]];
  for (let i = segs.length - 1; i >= 0; i--) {
    const s = segs[i];
    ctx.fillStyle = i === segs.length - 1 ? pal.panWhite : (i % 2 ? pal.panStripe : pal.panFur);
    ctx.beginPath(); ctx.arc(s[0], s[1], s[2], 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();

  // ---- legs + paws ----
  const po = (walking && frame) ? 1.2 : 0;
  ctx.fillStyle = pal.panDark;
  ctx.beginPath(); ctx.ellipse(-2.6 - po, -1.3, 2.1, 2.5, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(2.6 + po, -1.3, 2.1, 2.5, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = pal.panDarkLt;
  ctx.beginPath(); ctx.ellipse(-2.6 - po, -0.5, 2.1, 1.1, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(2.6 + po, -0.5, 2.1, 1.1, 0, 0, Math.PI*2); ctx.fill();

  // ---- body: rust shoulders fading to a dark belly ----
  const bg = ctx.createLinearGradient(0, -12, 0, -1);
  bg.addColorStop(0, pal.panFurLt); bg.addColorStop(0.45, pal.panFur); bg.addColorStop(1, pal.panDark);
  ctx.fillStyle = bg;
  ctx.beginPath(); ctx.ellipse(0, -6, 6.1, 6.6, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = pal.panDark;
  ctx.beginPath(); ctx.ellipse(0, -3.2, 4.3, 3.7, 0, 0, Math.PI*2); ctx.fill();

  // ---- arms ----
  ctx.fillStyle = pal.panDark;
  if (airborne) {
    ctx.beginPath(); ctx.ellipse(-6, -9, 1.9, 3, 0.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(6, -9, 1.9, 3, -0.5, 0, Math.PI*2); ctx.fill();
  } else {
    ctx.beginPath(); ctx.ellipse(-5.6, -6.4, 1.8, 3, 0.3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(5.6, -6.4, 1.8, 3, -0.3, 0, Math.PI*2); ctx.fill();
  }

  // ---- ears (behind head): orange with white fluff ----
  for (const sgn of [-1, 1]) {
    ctx.save(); ctx.translate(sgn * 4.9, -19.6);
    ctx.fillStyle = pal.panEar;
    ctx.beginPath(); ctx.ellipse(0, 0, 2.9, 3.3, sgn * 0.2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = pal.panWhite;
    ctx.beginPath(); ctx.ellipse(0, 0.5, 1.5, 2, sgn * 0.2, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // ---- head (rust, radial shaded) ----
  const hg = ctx.createRadialGradient(-2, -18.5, 1, 0, -16, 8.5);
  hg.addColorStop(0, pal.panFurLt); hg.addColorStop(1, pal.panFur);
  ctx.fillStyle = hg;
  ctx.beginPath(); ctx.ellipse(0, -16, 7.1, 6.5, 0, 0, Math.PI*2); ctx.fill();

  // white markings: cheek fluff, muzzle, brow patches
  ctx.fillStyle = pal.panWhite;
  ctx.beginPath(); ctx.ellipse(-5, -13.4, 2.5, 2.7, 0.3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(5, -13.4, 2.5, 2.7, -0.3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(0, -13.4, 3.5, 3, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-2.7, -18, 1.9, 1.5, 0.3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(2.7, -18, 1.9, 1.5, -0.3, 0, Math.PI*2); ctx.fill();

  // reddish tear-stripes from the eyes down the cheeks
  ctx.strokeStyle = pal.panStripe; ctx.lineWidth = 1.3; ctx.lineCap = "round";
  ctx.beginPath(); ctx.moveTo(-2.7, -16.4); ctx.quadraticCurveTo(-3.6, -13.6, -3.1, -11.4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(2.7, -16.4); ctx.quadraticCurveTo(3.6, -13.6, 3.1, -11.4); ctx.stroke();

  // eyes with a catchlight
  for (const ex of [-2.7, 2.7]) {
    ctx.fillStyle = pal.panEye;
    ctx.beginPath(); ctx.arc(ex, -16.4, 1.75, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,.92)";
    ctx.beginPath(); ctx.arc(ex - 0.5, -17, 0.6, 0, Math.PI*2); ctx.fill();
  }
  // nose + mouth
  ctx.fillStyle = pal.panNose;
  ctx.beginPath(); ctx.ellipse(0, -14.2, 1.3, 1, 0, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = pal.panNose; ctx.lineWidth = 0.6; ctx.lineCap = "round";
  ctx.beginPath(); ctx.moveTo(0, -13.2); ctx.lineTo(0, -12.4);
  ctx.moveTo(0, -12.4); ctx.quadraticCurveTo(-1.3, -12, -1.9, -12.7);
  ctx.moveTo(0, -12.4); ctx.quadraticCurveTo(1.3, -12, 1.9, -12.7); ctx.stroke();
  // whiskers
  ctx.strokeStyle = "rgba(255,255,255,.7)"; ctx.lineWidth = 0.4;
  for (const dy of [-0.6, 0.5]) {
    ctx.beginPath(); ctx.moveTo(-2.6, -13 + dy); ctx.lineTo(-7.4, -13.4 + dy * 1.7); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(2.6, -13 + dy); ctx.lineTo(7.4, -13.4 + dy * 1.7); ctx.stroke();
  }
}

/* A flying carpet woven from green bamboo, for when Bamboo takes flight. */
function drawBambooCarpet(cx, feetY, t, facing) {
  g.save();
  g.translate(cx, feetY + 3 + Math.sin(t * 0.15) * 0.7);
  g.rotate(Math.sin(t * 0.12) * 0.04);
  const n = 9, w = 24, gap = w / (n - 1), x0 = -w / 2;
  g.fillStyle = "rgba(0,0,0,.12)";
  g.beginPath(); g.ellipse(0, 5, 13, 2.4, 0, 0, Math.PI*2); g.fill();
  for (let i = 0; i < n; i++) {
    const px = x0 + i * gap, wob = Math.sin(t * 0.18 + i * 0.55) * 0.7;
    const gg = g.createLinearGradient(px - 1.2, 0, px + 1.2, 0);
    gg.addColorStop(0, "#5a9e2e"); gg.addColorStop(0.5, "#8fd24e"); gg.addColorStop(1, "#5a9e2e");
    g.fillStyle = gg;
    rrPath(g, px - 1.2, -2.4 + wob, 2.4, 4.8, 1.1); g.fill();
    g.fillStyle = "rgba(63,115,34,.9)"; g.fillRect(px - 1.2, 0.2 + wob, 2.4, 0.7);
  }
  g.strokeStyle = "#d8b06a"; g.lineWidth = 0.8;
  for (const cy of [-1.8, 1.8]) {
    g.beginPath();
    for (let i = 0; i < n; i++) { const px = x0 + i * gap, wob = Math.sin(t * 0.18 + i * 0.55) * 0.7; i ? g.lineTo(px, cy + wob) : g.moveTo(px, cy + wob); }
    g.stroke();
  }
  g.fillStyle = "#7ec850";
  const fx = facing > 0 ? w / 2 + 1 : -w / 2 - 1, s = facing > 0 ? 1 : -1;
  g.beginPath(); g.ellipse(fx, -2.6, 2.6, 1.1, -0.5 * s, 0, Math.PI*2); g.fill();
  g.beginPath(); g.ellipse(fx + 0.5 * s, 0, 2.6, 1.1, 0.4 * s, 0, Math.PI*2); g.fill();
  g.restore();
}

function drawFireball(ctx, f, t) {
  const cx = f.x + 2.5, cy = f.y + 2.5;
  if (f.kind === "crystal") {                // Misty's moon crystals
    const glow = ctx.createRadialGradient(cx, cy, 0.5, cx, cy, 8);
    glow.addColorStop(0, "rgba(200,230,255,.9)"); glow.addColorStop(1, "rgba(150,200,255,0)");
    ctx.fillStyle = glow; ctx.beginPath(); ctx.arc(cx, cy, 8, 0, Math.PI*2); ctx.fill();
    ctx.save();
    ctx.translate(cx, cy); ctx.rotate(f.t * 0.18 * (Math.sign(f.vx) || 1));
    const cg = ctx.createLinearGradient(-3, -4, 3, 4);
    cg.addColorStop(0, "#eaf6ff"); cg.addColorStop(0.5, "#bfe0ff"); cg.addColorStop(1, "#7fb0e8");
    ctx.fillStyle = cg;
    ctx.beginPath();                                        // faceted moon-crystal shard
    ctx.moveTo(0, -5.2); ctx.lineTo(3, -1.2); ctx.lineTo(1.8, 4.6); ctx.lineTo(-1.8, 4.6); ctx.lineTo(-3, -1.2);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = "rgba(255,255,255,.8)"; ctx.lineWidth = 0.6;
    ctx.beginPath(); ctx.moveTo(0, -5.2); ctx.lineTo(0, 4.6); ctx.moveTo(-3, -1.2); ctx.lineTo(3, -1.2); ctx.stroke();
    // tiny crescent etched inside
    ctx.fillStyle = "rgba(255,255,255,.9)";
    ctx.beginPath(); ctx.arc(-0.4, 0.4, 1.5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = "#a8cef2";
    ctx.beginPath(); ctx.arc(0.3, 0.1, 1.3, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    if ((f.t & 3) === 0) drawStarShape(ctx, cx - f.vx*2, cy - 3 + Math.sin(f.t*0.4)*3, 1.1, 0.5, f.t*0.2, "#eaf6ff");
    return;
  }
  if (f.kind === "apple") {                  // Appy's smiley apples — color matches her form
    const cols = f.form >= 2 ? ["#ffd94d","#e0a820"] : f.form >= 1 ? ["#7ed058","#4a9e30"] : ["#f0564a","#c22c24"];
    ctx.save();
    ctx.translate(cx, cy); ctx.rotate(f.t * 0.22 * (Math.sign(f.vx) || 1));
    const ag = ctx.createRadialGradient(-1, -1.4, 0.5, 0, 0, 4.4);
    ag.addColorStop(0, cols[0]); ag.addColorStop(1, cols[1]);
    ctx.fillStyle = ag;
    ctx.beginPath(); ctx.arc(0, 0.4, 3.6, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = "#8a5a32"; ctx.lineWidth = 0.9; ctx.lineCap = "round";
    ctx.beginPath(); ctx.moveTo(0, -3); ctx.lineTo(0.7, -4.6); ctx.stroke();          // stem
    ctx.fillStyle = "#5cc463";
    ctx.beginPath(); ctx.ellipse(2, -4, 1.7, 0.8, -0.4, 0, Math.PI*2); ctx.fill();    // leaf
    ctx.fillStyle = "#241a12";                                                        // tiny smiley
    ctx.beginPath(); ctx.arc(-1.1, -0.2, 0.45, 0, Math.PI*2); ctx.arc(1.1, -0.2, 0.45, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = "#241a12"; ctx.lineWidth = 0.45;
    ctx.beginPath(); ctx.arc(0, 0.8, 0.95, 0.15*Math.PI, 0.85*Math.PI); ctx.stroke();
    ctx.restore();
    return;
  }
  if (f.kind === "fish") {                   // Icy's thrown fish — wiggles as it flies
    ctx.save();
    ctx.translate(cx, cy);
    if ((Math.sign(f.vx) || 1) < 0) ctx.scale(-1, 1);
    ctx.rotate(Math.sin(f.t * 0.4) * 0.25);
    const fg = ctx.createLinearGradient(0, -3, 0, 3);
    fg.addColorStop(0, "#7fd4f0"); fg.addColorStop(1, "#3f8fc8");
    ctx.fillStyle = fg;
    ctx.beginPath(); ctx.ellipse(0.6, 0, 4, 2.4, 0, 0, Math.PI*2); ctx.fill();   // body
    const flick = Math.sin(f.t * 0.5) * 1.4;
    ctx.beginPath(); ctx.moveTo(-3, 0); ctx.lineTo(-6, -2.4 + flick); ctx.lineTo(-6, 2.4 + flick); ctx.closePath(); ctx.fill();  // tail
    ctx.fillStyle = "#dff3ff";
    ctx.beginPath(); ctx.ellipse(1, 1, 2.6, 1.1, 0, 0, Math.PI*2); ctx.fill();   // belly
    ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(3, -0.7, 1, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = "#16181d"; ctx.beginPath(); ctx.arc(3.3, -0.7, 0.55, 0, Math.PI*2); ctx.fill();  // eye
    ctx.restore();
    // trailing bubbles
    ctx.fillStyle = "rgba(190,230,255,.6)";
    ctx.beginPath(); ctx.arc(cx - f.vx*2, cy - 2 + Math.sin(f.t*0.3)*1.5, 1, 0, Math.PI*2); ctx.fill();
    return;
  }
  if (f.kind === "dumpling") {               // Squishy's thrown mini-dumplings (all sorts of colors)
    const themes = [
      { a:"#ff7a9c", b:"#b58cff" },                       // rainbow
      { a:"#0e1638", b:"#3a4f9e", stars:true },           // space
      { a:"#1f7ad6", b:"#7fe0ff", wave:true },            // ocean
      { a:"#ff8ec4", b:"#ffd23e" },                       // candy
      { a:"#5a2c86", b:"#b58cff", stars:true },           // galaxy
    ];
    const th = themes[(f.dumpTheme || 0) % themes.length];
    const glow = ctx.createRadialGradient(cx, cy, 0.5, cx, cy, 7);
    glow.addColorStop(0, "rgba(255,255,255,.5)"); glow.addColorStop(1, "rgba(255,255,255,0)");
    ctx.fillStyle = glow; ctx.beginPath(); ctx.arc(cx, cy, 7, 0, Math.PI*2); ctx.fill();
    ctx.save(); ctx.translate(cx, cy); ctx.rotate(Math.sin(f.t*0.2)*0.25);
    const dg = ctx.createLinearGradient(-3, -3, 3, 3); dg.addColorStop(0, th.a); dg.addColorStop(1, th.b);
    ctx.fillStyle = dg;
    ctx.beginPath(); ctx.arc(0, 0.4, 3.4, Math.PI, 2*Math.PI); ctx.fill();   // dome
    ctx.fillRect(-3.4, 0.2, 6.8, 1.6);
    ctx.fillStyle = "#d29a52"; ctx.fillRect(-3.4, 1.6, 6.8, 1.4);            // waffle base
    if (th.stars) { ctx.fillStyle = "#fff"; ctx.fillRect(-1.6, -1.4, 0.7, 0.7); ctx.fillRect(1, -0.6, 0.6, 0.6); }
    if (th.wave) { ctx.fillStyle = "rgba(255,255,255,.6)"; ctx.fillRect(-2.4, -1, 2, 0.6); }
    ctx.fillStyle = "rgba(255,255,255,.4)"; ctx.beginPath(); ctx.arc(-1, -1, 0.8, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    return;
  }
  if (f.kind === "sparkle") {                // Sparkle's horn sparkles
    const glow = ctx.createRadialGradient(cx, cy, 0.5, cx, cy, 8);
    glow.addColorStop(0, "rgba(255,240,180,.9)"); glow.addColorStop(1, "rgba(255,210,120,0)");
    ctx.fillStyle = glow; ctx.beginPath(); ctx.arc(cx, cy, 8, 0, Math.PI*2); ctx.fill();
    const cols = ["#fff6c0","#ffd23e","#ff9ed6","#9b6cff"];
    drawStarShape(ctx, cx, cy, 3.6, 1.6, f.t*0.3, "#fff6c0", "#ffcf5a");
    for (let i = 0; i < 3; i++) { const a = f.t*0.25 + i*2.1;
      ctx.fillStyle = cols[(i + (f.t>>2)) % cols.length];
      ctx.beginPath(); ctx.arc(cx + Math.cos(a)*4.2, cy + Math.sin(a)*4.2, 0.9, 0, Math.PI*2); ctx.fill(); }
    return;
  }
  if (f.kind === "rainbow") {                // Cutie's rainbow
    const glow = ctx.createRadialGradient(cx, cy, 0.5, cx, cy, 8);
    glow.addColorStop(0, "rgba(255,255,255,.7)"); glow.addColorStop(1, "rgba(255,255,255,0)");
    ctx.fillStyle = glow; ctx.beginPath(); ctx.arc(cx, cy, 8, 0, Math.PI*2); ctx.fill();
    ctx.save();
    ctx.translate(cx, cy); ctx.rotate(f.t * 0.12 * (Math.sign(f.vx) || 1));
    const bands = ["#ff5e5e", "#ff9f3c", "#ffd84d", "#5ecb6a", "#5aa6f0", "#b07ff0"];
    ctx.lineWidth = 1.1; ctx.lineCap = "round";
    for (let i = 0; i < bands.length; i++) {
      ctx.strokeStyle = bands[i];
      ctx.beginPath(); ctx.arc(0, 1.5, 2 + i * 0.9, Math.PI * 1.05, Math.PI * 1.95); ctx.stroke();
    }
    ctx.fillStyle = "#fff";
    ctx.beginPath(); ctx.arc(-1.4, 2.6, 0.8, 0, Math.PI*2); ctx.arc(1.4, 2.6, 0.8, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    return;
  }
  if (f.kind === "snowflake") {              // Northern Light's snowflake
    const glow = ctx.createRadialGradient(cx, cy, 0.5, cx, cy, 8);
    glow.addColorStop(0, "rgba(220,240,255,.85)"); glow.addColorStop(1, "rgba(180,220,255,0)");
    ctx.fillStyle = glow;
    ctx.beginPath(); ctx.arc(cx, cy, 8, 0, Math.PI*2); ctx.fill();
    ctx.save();
    ctx.translate(cx, cy); ctx.rotate(f.t * 0.22);
    ctx.strokeStyle = "#eaf6ff"; ctx.lineWidth = 1.2; ctx.lineCap = "round";
    for (let i = 0; i < 6; i++) {
      ctx.rotate(Math.PI / 3);
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -4.6); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, -2.8); ctx.lineTo(1.6, -4); ctx.moveTo(0, -2.8); ctx.lineTo(-1.6, -4); ctx.stroke();
    }
    ctx.fillStyle = "#ffffff";
    ctx.beginPath(); ctx.arc(0, 0, 1.5, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    return;
  }
  if (f.kind === "bamboo") {                 // Bamboo's bamboo shoot
    const glow = ctx.createRadialGradient(cx, cy, 0.5, cx, cy, 7);
    glow.addColorStop(0, "rgba(150,230,90,.6)"); glow.addColorStop(1, "rgba(120,200,60,0)");
    ctx.fillStyle = glow;
    ctx.beginPath(); ctx.arc(cx, cy, 7, 0, Math.PI*2); ctx.fill();
    ctx.save();
    ctx.translate(cx, cy); ctx.rotate(f.t * 0.3 * (Math.sign(f.vx) || 1));
    const len = 10, ww = 3.2;
    const gg = ctx.createLinearGradient(0, -ww/2, 0, ww/2);
    gg.addColorStop(0, "#a6e25a"); gg.addColorStop(0.5, "#6fb83a"); gg.addColorStop(1, "#4d8a28");
    ctx.fillStyle = gg;
    rrPath(ctx, -len/2, -ww/2, len, ww, 1.4); ctx.fill();
    ctx.strokeStyle = "#3f7322"; ctx.lineWidth = 0.7;
    ctx.beginPath(); ctx.moveTo(-len/6, -ww/2); ctx.lineTo(-len/6, ww/2);
    ctx.moveTo(len/6, -ww/2); ctx.lineTo(len/6, ww/2); ctx.stroke();
    ctx.fillStyle = "#86cf52";
    ctx.beginPath(); ctx.ellipse(len/2 + 1, -1.4, 2.4, 1, -0.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(len/2 + 0.5, 0.8, 2.2, 0.9, 0.4, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    return;
  }
  if (f.kind === "bolt") {                   // Chuckee's lightning
    const glow = ctx.createRadialGradient(cx, cy, 0.5, cx, cy, 8);
    glow.addColorStop(0, "rgba(255,238,140,.9)"); glow.addColorStop(1, "rgba(255,220,80,0)");
    ctx.fillStyle = glow;
    ctx.beginPath(); ctx.arc(cx, cy, 8, 0, Math.PI*2); ctx.fill();
    ctx.save();
    ctx.translate(cx, cy); ctx.scale(Math.sign(f.vx) || 1, 1);
    ctx.fillStyle = "#ffe066";
    ctx.beginPath();
    ctx.moveTo(-6, -2.6); ctx.lineTo(0.5, -2.6); ctx.lineTo(-1.5, 0); ctx.lineTo(6, 0);
    ctx.lineTo(-1.5, 3.2); ctx.lineTo(0.2, 0.8); ctx.lineTo(-6, 0.8);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  } else if (f.kind === "pinkfire") {        // Chun-me's pink fireball (when charmed)
    const glow = ctx.createRadialGradient(cx, cy, 0.5, cx, cy, 7);
    glow.addColorStop(0, "rgba(255,160,210,.9)"); glow.addColorStop(1, "rgba(255,110,180,0)");
    ctx.fillStyle = glow;
    ctx.beginPath(); ctx.arc(cx, cy, 7, 0, Math.PI*2); ctx.fill();
    const core = ctx.createRadialGradient(cx - 0.8, cy - 0.8, 0.3, cx, cy, 3.6);
    core.addColorStop(0, "#fff"); core.addColorStop(0.5, "#ff9ed0"); core.addColorStop(1, "#e8479c");
    ctx.fillStyle = core;
    ctx.beginPath(); ctx.arc(cx, cy, 3.6, 0, Math.PI*2); ctx.fill();
  } else {                                   // Chun-me's star
    const glow = ctx.createRadialGradient(cx, cy, 0.5, cx, cy, 7);
    glow.addColorStop(0, "rgba(255,220,130,.8)"); glow.addColorStop(1, "rgba(255,180,90,0)");
    ctx.fillStyle = glow;
    ctx.beginPath(); ctx.arc(cx, cy, 7, 0, Math.PI*2); ctx.fill();
    drawStarShape(ctx, cx, cy, 4, 1.8, t * 0.2, "#ffd166", "#f08cb8");
  }
}

function drawGrump(ctx, x, y, frame, squashT) {
  const ice = game.level && (game.level.theme === "snow" || game.level.theme === "icecastle");
  const rbow = game.level && (game.level.theme === "rainbow" || game.level.theme === "rainbowcastle");
  const moon = game.level && game.level.theme === "moon";
  const rc = ["#ff5e6c","#ff9f43","#ffd23e","#5ecb6a","#4aa6f0","#9b6cff"];
  ctx.save(); ctx.translate(x, y);
  if (squashT > 0) {
    ctx.fillStyle = rbow ? "#c79bff" : ice ? "#9fc4e0" : moon ? "#9aa0b8" : "#7c4423";
    rrPath(ctx, -7, -3.5, 14, 3.5, 1.6); ctx.fill();
    ctx.restore(); return;
  }
  const off = frame ? 0.9 : -0.9;
  // feet
  ctx.fillStyle = rbow ? "#8a5fd0" : ice ? "#5a7fa0" : moon ? "#565c72" : "#4f2a14";
  rrPath(ctx, -6.6 + off, -2.5, 5.4, 2.5, 1.2); ctx.fill();
  rrPath(ctx, 1.2 - off, -2.5, 5.4, 2.5, 1.2); ctx.fill();
  // body with radial shading
  if (rbow) {                                  // rainbow-striped body
    ctx.save();
    ctx.beginPath(); ctx.ellipse(0, -7.4, 7, 6, 0, 0, Math.PI*2); ctx.clip();
    for (let i = 0; i < rc.length; i++) { ctx.fillStyle = rc[i]; ctx.fillRect(-7, -13.4 + i*2, 14, 2.1); }
    ctx.fillStyle = "rgba(255,255,255,.25)"; ctx.beginPath(); ctx.ellipse(-2.4, -9.5, 3, 2.4, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    ctx.strokeStyle = "rgba(255,255,255,.5)"; ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.ellipse(0, -7.4, 7, 6, 0, 0, Math.PI*2); ctx.stroke();
  } else {
    const gr = ctx.createRadialGradient(-2, -9.5, 1, 0, -7.2, 9);
    if (ice)       { gr.addColorStop(0, "#eaf6ff"); gr.addColorStop(1, "#8cb6d8"); }
    else if (moon) { gr.addColorStop(0, "#d4d9e8"); gr.addColorStop(1, "#7e849c"); }   // moon-dust grump
    else           { gr.addColorStop(0, "#c1763f"); gr.addColorStop(1, "#7e4017"); }
    ctx.fillStyle = gr;
    ctx.beginPath(); ctx.ellipse(0, -7.4, 7, 6, 0, 0, Math.PI*2); ctx.fill();
  }
  if (ice) {  // frosty sparkles
    ctx.fillStyle = "rgba(255,255,255,.8)";
    ctx.beginPath(); ctx.arc(-3.5, -5, 0.8, 0, Math.PI*2); ctx.arc(3, -10, 0.7, 0, Math.PI*2); ctx.fill();
  }
  // eyes
  for (const s of [-1, 1]) {
    ctx.fillStyle = "#fff";
    ctx.beginPath(); ctx.ellipse(s*2.6, -8.6, 1.7, 2, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = ice ? "#163048" : "#241a12";
    ctx.beginPath(); ctx.arc(s*2.6, -8.1, 0.9, 0, Math.PI*2); ctx.fill();
  }
  // angry brows + frown
  ctx.strokeStyle = rbow ? "#5a2c8a" : ice ? "#2f5274" : "#3c2410"; ctx.lineWidth = 1.1; ctx.lineCap = "round";
  ctx.beginPath();
  ctx.moveTo(-4.4, -11.8); ctx.lineTo(-1.2, -10.6);
  ctx.moveTo(4.4, -11.8); ctx.lineTo(1.2, -10.6);
  ctx.stroke();
  ctx.beginPath(); ctx.arc(0, -3.4, 1.7, 1.15*Math.PI, 1.85*Math.PI); ctx.stroke();
  ctx.restore();
}

/* angry pigeon — flapping, cross-eyed, ready to bonk a flyer */
function drawPigeon(ctx, pg) {
  ctx.save();
  ctx.translate(pg.x + pg.w/2, pg.y + pg.h/2);
  if ((pg.facing || 1) < 0) ctx.scale(-1, 1);
  if (pg.dead > 0) ctx.rotate(Math.min(pg.dead * 0.18, 1.4));   // tumble when shot down
  const flap = Math.sin(pg.flap);
  // tail
  ctx.fillStyle = "#7d8794";
  ctx.beginPath(); ctx.moveTo(-5, 0); ctx.lineTo(-10.5, -2.5); ctx.lineTo(-10.5, 2.5); ctx.closePath(); ctx.fill();
  // far wing (behind body)
  ctx.fillStyle = "#6f7a88";
  ctx.beginPath(); ctx.ellipse(-1, -flap*4 - 1, 6, 3, flap*0.5, 0, Math.PI*2); ctx.fill();
  // body
  const bg = ctx.createRadialGradient(-1, -2, 1, 0, 0, 8);
  bg.addColorStop(0, "#aeb7c2"); bg.addColorStop(1, "#838d9b");
  ctx.fillStyle = bg;
  ctx.beginPath(); ctx.ellipse(0, 0, 6.5, 5, 0, 0, Math.PI*2); ctx.fill();
  // iridescent neck patch
  ctx.fillStyle = "#5fb39a";
  ctx.beginPath(); ctx.ellipse(4, -1.5, 2.2, 2.6, 0, 0, Math.PI*2); ctx.fill();
  // head
  ctx.fillStyle = "#9aa4b1";
  ctx.beginPath(); ctx.arc(6, -3.5, 3.4, 0, Math.PI*2); ctx.fill();
  // beak
  ctx.fillStyle = "#f2a33c";
  ctx.beginPath(); ctx.moveTo(9, -4); ctx.lineTo(13, -3); ctx.lineTo(9, -1.8); ctx.closePath(); ctx.fill();
  // furious eye + angry brow
  ctx.fillStyle = "#fff";
  ctx.beginPath(); ctx.arc(6.6, -4.4, 1.5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = "#1d1f24";
  ctx.beginPath(); ctx.arc(7.1, -4.4, 0.8, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = "#2a2d34"; ctx.lineWidth = 1.1; ctx.lineCap = "round";
  ctx.beginPath(); ctx.moveTo(4.4, -7.2); ctx.lineTo(8.4, -5.6); ctx.stroke();
  // legs
  ctx.strokeStyle = "#e08a2c"; ctx.lineWidth = 0.9;
  ctx.beginPath(); ctx.moveTo(0, 4.5); ctx.lineTo(-0.5, 6.5); ctx.moveTo(2.5, 4.5); ctx.lineTo(2.5, 6.5); ctx.stroke();
  // near wing (in front, flaps the other way)
  ctx.fillStyle = "#9aa4b1";
  ctx.beginPath(); ctx.ellipse(-1, flap*4 + 1, 6.5, 3.2, -flap*0.5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = "#7d8794";
  ctx.beginPath(); ctx.ellipse(-3, flap*4 + 1.5, 3.2, 1.6, -flap*0.5, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}


function drawBowser(ctx, B) {
  const ice = game.level && game.level.theme === "icecastle";
  const rbow = game.level && game.level.theme === "rainbowcastle";
  const rc = ["#ff5e6c","#ff9f43","#ffd23e","#5ecb6a","#4aa6f0","#9b6cff"];
  ctx.save();
  ctx.translate(B.x + B.w/2, B.y + B.h);
  if (B.dead) ctx.scale(1, -1);
  if ((B.facing || -1) < 0) ctx.scale(-1, 1);
  const flash = !B.dead && B.stun > 0 && (B.stun >> 2) % 2 === 0;
  ctx.fillStyle = rbow ? "#b07fe0" : ice ? "#7f9fc0" : "#c9a23c";
  rrPath(ctx, -12, -7, 8, 7, 2.5); ctx.fill();
  rrPath(ctx, 4, -7, 8, 7, 2.5); ctx.fill();
  if (rbow && !flash) {                              // rainbow shell
    ctx.save();
    ctx.beginPath(); ctx.ellipse(-3, -16, 11.5, 10.5, 0, 0, Math.PI*2); ctx.clip();
    for (let i = 0; i < rc.length; i++) { ctx.fillStyle = rc[i]; ctx.fillRect(-15, -26.6 + i*3.6, 24, 3.7); }
    ctx.fillStyle = "rgba(255,255,255,.22)"; ctx.beginPath(); ctx.ellipse(-7, -20, 4, 3.5, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    ctx.strokeStyle = "rgba(255,255,255,.6)"; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.ellipse(-3, -16, 11.5, 10.5, 0, 0, Math.PI*2); ctx.stroke();
  } else {
    const sg = ctx.createRadialGradient(-5, -20, 2, -3, -16, 15);
    sg.addColorStop(0, flash ? "#ffffff" : (ice ? "#dff1ff" : "#6cc873"));
    sg.addColorStop(1, flash ? "#cfeaff" : (ice ? "#6f9ec4" : "#2c7a36"));
    ctx.fillStyle = sg;
    ctx.beginPath(); ctx.ellipse(-3, -16, 11.5, 10.5, 0, 0, Math.PI*2); ctx.fill();
  }
  ctx.fillStyle = "#f3eedd";
  for (const [px, py] of [[-11.5, -24], [-5, -26.5], [1.5, -24]]) {
    ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(px + 2.4, py - 4.5); ctx.lineTo(px + 4.8, py);
    ctx.closePath(); ctx.fill();
  }
  const bg2 = ctx.createLinearGradient(0, -20, 0, -2);
  if (rbow) { bg2.addColorStop(0, "#fff3fb"); bg2.addColorStop(1, "#ffd6f0"); }
  else if (ice) { bg2.addColorStop(0, "#eaf5ff"); bg2.addColorStop(1, "#b4cfe6"); }
  else     { bg2.addColorStop(0, "#f5e2b2"); bg2.addColorStop(1, "#d8b87e"); }
  ctx.fillStyle = bg2;
  ctx.beginPath(); ctx.ellipse(5, -11, 7, 9, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = flash ? "#ffffff" : (rbow ? "#ff9ed6" : ice ? "#c6e2f5" : "#8fce58");
  ctx.beginPath(); ctx.ellipse(9, -26, 7, 6, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = "#e8632c";
  ctx.beginPath(); ctx.ellipse(6, -31.5, 4.5, 2.5, -0.3, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = "#f3eedd";
  ctx.beginPath(); ctx.moveTo(3, -29); ctx.lineTo(2, -34.5); ctx.lineTo(6.5, -31); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(14, -30); ctx.lineTo(16.5, -34.5); ctx.lineTo(17, -29.5); ctx.closePath(); ctx.fill();
  ctx.fillStyle = "#fff";
  ctx.beginPath(); ctx.ellipse(11.5, -27.5, 1.8, 2.1, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = "#c81e1e";
  ctx.beginPath(); ctx.arc(12, -27, 1, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = "#5a2c10"; ctx.lineWidth = 1.1; ctx.lineCap = "round";
  ctx.beginPath(); ctx.moveTo(9, -30.5); ctx.lineTo(13.5, -29.2); ctx.stroke();
  ctx.fillStyle = "#cfe0a8";
  rrPath(ctx, 12, -25, 6.5, 5, 2); ctx.fill();
  ctx.fillStyle = "#fff";
  ctx.fillRect(13.5, -21.5, 4, 1.4);
  ctx.restore();
}

function drawFlame(ctx, fl) {
  const cx = fl.x + fl.w/2, cy = fl.y + fl.h/2;
  const fg2 = ctx.createRadialGradient(cx, cy, 0.5, cx, cy, 9);
  fg2.addColorStop(0, "#fff3c0"); fg2.addColorStop(0.5, "#ffb03c"); fg2.addColorStop(1, "rgba(232,90,32,0)");
  ctx.fillStyle = fg2;
  ctx.beginPath(); ctx.ellipse(cx, cy, 9, 5.5, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = "#ff8a3c";
  ctx.beginPath(); ctx.ellipse(cx, cy, 5, 2.6, 0, 0, Math.PI*2); ctx.fill();
}

function drawPug(ctx, cx, feetY) {
  ctx.save(); ctx.translate(cx, feetY);
  const bg3 = ctx.createLinearGradient(0, -9, 0, 0);
  bg3.addColorStop(0, "#e3c08c"); bg3.addColorStop(1, "#c3a06a");
  ctx.fillStyle = bg3;
  ctx.beginPath(); ctx.ellipse(0, -4.6, 6, 4.4, 0, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = "#c3a06a"; ctx.lineWidth = 1.8; ctx.lineCap = "round";
  ctx.beginPath(); ctx.arc(5.4, -8, 2, 0.4, Math.PI * 1.5); ctx.stroke();
  ctx.fillStyle = "#c3a06a";
  for (const lx of [-4.4, -1.4, 1.6, 4]) ctx.fillRect(lx, -2, 1.8, 2);
  ctx.fillStyle = "#e3c08c";
  ctx.beginPath(); ctx.ellipse(-5.6, -8.4, 4.4, 4.2, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = "#4a3828";
  ctx.beginPath(); ctx.ellipse(-6.4, -6.6, 2.6, 2.1, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = "#241a12";
  ctx.beginPath(); ctx.arc(-7.6, -7, 0.7, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = "#3a2a1c";
  ctx.beginPath(); ctx.ellipse(-8.4, -11.6, 1.6, 2, 0.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-2.6, -11.8, 1.6, 2, -0.4, 0, Math.PI*2); ctx.fill();
  for (const ex of [-7.8, -4.2]) {
    ctx.fillStyle = "#fff";
    ctx.beginPath(); ctx.arc(ex, -9.2, 1.25, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = "#241a12";
    ctx.beginPath(); ctx.arc(ex + 0.2, -9, 0.85, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,.9)";
    ctx.beginPath(); ctx.arc(ex - 0.2, -9.5, 0.3, 0, Math.PI*2); ctx.fill();
  }
  ctx.fillStyle = "#e8748c";
  rrPath(ctx, -7.2, -5.2, 1.8, 2.4, 0.9); ctx.fill();
  ctx.fillStyle = "#ff5e7e";
  ctx.fillRect(-8.8, -5, 6.4, 1.4);
  ctx.restore();
}

function superBlast() {
  const cloudKind = CHARS[heroKey].kind === "cloud";
  game.superFx = { type: cloudKind ? "storm" : "fireworks", t: 0 };
  SFX.superb();
  for (const e of game.level.enemies) {
    if (e.dead || !e.active) continue;
    if (e.x > game.camX - 20 && e.x < game.camX + VIEW_W + 20) {
      e.dead = 1; game.score += 200;
      for (let i = 0; i < 10; i++)
        game.particles.push({ x: e.x + 6, y: e.y + 6,
          vx: Math.cos(i * 0.63) * 2, vy: Math.sin(i * 0.63) * 2 - 1, t: 0,
          c: cloudKind ? "#9bd0ff" : ["#ff7ab8", "#ffd166", "#c89bff"][i % 3] });
    }
  }
  for (const pg of game.pigeons) {            // and scatter the whole flock
    if (pg.dead === 0) { pg.dead = 1; pg.vy = -1.6; game.score += 150; }
  }
}

function drawSuperFx() {
  const fx = game.superFx, camX = game.camX, a = Math.max(0, 1 - fx.t / 110);
  if (fx.type === "storm") {                 // Chuckee's rain storm
    g.fillStyle = "rgba(40,60,110," + (0.25 * a).toFixed(3) + ")";
    g.fillRect(camX - 4, -VIEW_H, VIEW_W + 8, VIEW_H + LEVEL_H + 40);
    g.strokeStyle = "rgba(160,200,255," + (0.7 * a).toFixed(3) + ")";
    g.lineWidth = 1;
    for (let i = 0; i < 50; i++) {
      const rx = camX + ((i * 41.7 + fx.t * 2.5) % VIEW_W);
      const ry = ((i * 53.3 + fx.t * 7) % (LEVEL_H + 40)) - 20;
      g.beginPath(); g.moveTo(rx, ry); g.lineTo(rx - 1.5, ry + 7); g.stroke();
    }
  } else {                                   // Chun-me's pink fireworks
    for (let i = 0; i < 6; i++) {
      const bx = camX + ((i * 67.3) % VIEW_W), by = 36 + ((i * 41.7) % 110);
      const rr = (fx.t * 1.3 + i * 7) % 46;
      g.strokeStyle = "rgba(" + (i % 2 ? "255,140,200," : "255,210,120,") + (Math.max(0, 0.8 - rr / 46) * a).toFixed(3) + ")";
      g.lineWidth = 2;
      g.beginPath(); g.arc(bx, by, rr, 0, Math.PI * 2); g.stroke();
    }
  }
}

/* ============================== LEVELS ============================== */
function makeLevel(num) {
  const widths = [150, 170, 160, 170, 140, 165, 170, 160, 145, 168, 172, 174, 165, 150];
  const Wd = widths[num] || 150;
  const grid = Array.from({length: ROWS}, () => Array(Wd).fill(" "));
  const enemies = [];
  const setT = (x, y, c) => { if (x>=0 && x<Wd && y>=0 && y<ROWS) grid[y][x] = c; };
  const ground = (a, b) => { for (let x=a; x<=b; x++){ setT(x,13,"G"); setT(x,14,"#"); } };
  const brick  = (x, y) => setT(x, y, "=");
  const qb     = (x, y) => setT(x, y, "?");
  const mb     = (x, y) => setT(x, y, "M");   // powerup block (looks like ?)
  const stone  = (x, y) => setT(x, y, "S");
  const coin   = (x, y) => setT(x, y, "o");
  const coins  = (x, y, n) => { for (let i=0;i<n;i++) coin(x+i, y); };
  const pipe   = (x, h) => { for (let yy=13-h; yy<13; yy++){ const c = yy===13-h ? "T":"P"; setT(x,yy,c); setT(x+1,yy,c); } };
  const stair  = (x, h, dir) => { for (let s=0;s<h;s++){ const cx = x + (dir<0 ? -s : s); for (let yy=12; yy>12-(s+1); yy--) stone(cx, yy); } };
  const enemy  = (x, ty = 11) => enemies.push({ x:x*TILE, y:ty*TILE, w:12, h:12, vx:-0.5, vy:0, dead:0, active:false, frame:0 });

  let flagX = null, boss = null, cageX = null;
  if (num === 0) {
    ground(0, 45);
    mb(12,9); brick(13,9); qb(14,9); coins(12,5,3);
    enemy(18);
    pipe(24,2); pipe(32,3);
    enemy(29); enemy(37);
    ground(49, 75);                          // gap 46-48
    brick(54,9); qb(55,9); brick(56,9); mb(57,9); brick(58,9);
    coins(54,5,5);
    enemy(60); enemy(61); enemy(68);
    pipe(70,2);
    ground(80, Wd-1);                        // gap 76-79
    stone(84,9); stone(85,9); stone(86,9); stone(87,9);
    coins(84,6,4);
    enemy(92);
    stair(96, 4, 1);
    stair(103, 4, -1);
    enemy(108); enemy(112);
    coins(114,8,6);
    qb(118,9);

/* Northern Light's snowflakes build little igloo platforms where they land
   (up to 8 — the oldest melts away). */
function buildIgloo(f) {
  const L = game.level;
  const tx = Math.floor((f.x + f.w/2) / TILE);
  let ty = Math.floor((f.y + f.h - 0.01) / TILE);
  if (isSolid(tileAt(tx, ty))) ty -= 1;                 // sit on top of what it hit
  if (tx < 1 || tx >= L.width || ty < 1 || ty >= ROWS) return;
  if (tileAt(tx, ty) !== " ") return;
  L.grid[ty][tx] = "I";
  if (!game.igloos) game.igloos = [];
  game.igloos.push({ tx, ty });
  SFX.star();
  for (let i = 0; i < 5; i++) game.particles.push({ x:(tx+0.5)*TILE+(i-2)*2, y:(ty+0.5)*TILE,
    vx:(i-2)*0.4, vy:-1-Math.random(), t:0, c:"#eaf6ff" });
  if (game.igloos.length > 8) {
    const old = game.igloos.shift();
    if (L.grid[old.ty][old.tx] === "I") L.grid[old.ty][old.tx] = " ";
  }
}

/* Cutie's rainbows bloom little flower platforms where they land (up to 8). */
function buildFlower(f) {
  const L = game.level;
  const tx = Math.floor((f.x + f.w/2) / TILE);
  let ty = Math.floor((f.y + f.h - 0.01) / TILE);
  if (isSolid(tileAt(tx, ty))) ty -= 1;
  if (tx < 1 || tx >= L.width || ty < 1 || ty >= ROWS) return;
  if (tileAt(tx, ty) !== " ") return;
  L.grid[ty][tx] = "F";
  if (!game.flowers) game.flowers = [];
  game.flowers.push({ tx, ty });
  SFX.sprout && SFX.sprout(); if (!SFX.sprout) SFX.star();
  for (let i = 0; i < 6; i++) game.particles.push({ x:(tx+0.5)*TILE+(i-2.5)*2, y:(ty+0.5)*TILE,
    vx:(i-2.5)*0.4, vy:-1-Math.random(), t:0, c:["#ff8ec4","#ffd166","#b88cff"][i%3] });
  if (game.flowers.length > 8) {
    const old = game.flowers.shift();
    if (L.grid[old.ty][old.tx] === "F") L.grid[old.ty][old.tx] = " ";
  }
}

/* ============================== PLAYGROUND ==============================
   A safe, enemy-free hangout reached by going down any pipe. Water slide,
   trampoline, parkour, puppies and an ice-cream stand. Exit anytime. */
function makePlayground() {
  const Wd = 128;
  const grid = Array.from({length: ROWS}, () => Array(Wd).fill(" "));
  const setT = (x,y,c) => { if (x>=0 && x<Wd && y>=0 && y<ROWS) grid[y][x] = c; };
  const ground = (a,b) => { for (let x=a;x<=b;x++){ setT(x,13,"G"); setT(x,14,"#"); } };
  const stone = (x,y) => setT(x,y,"S");
  const brick = (x,y) => setT(x,y,"=");
  const coin  = (x,y) => setT(x,y,"o");
  const coins = (x,y,n) => { for (let i=0;i<n;i++) coin(x+i,y); };
  const pipe  = (x,h) => { for (let yy=13-h; yy<13; yy++){ const c = yy===13-h?"T":"P"; setT(x,yy,c); setT(x+1,yy,c); } };
  const stair = (x,h,dir) => { for (let s=0;s<h;s++){ const cx=x+(dir<0?-s:s); for (let yy=12; yy>12-(s+1); yy--) stone(cx,yy); } };
  ground(0, Wd-1);                                   // continuous floor — no pits

  pipe(6, 2);                                        // the exit pipe, right by spawn

  stair(12, 7, 1);                                   // water slide: stairs up...
  const slide = { x0: 18, x1: 26, topY: 6*TILE, botY: 13*TILE };  // ...then a scripted chute down
  pipe(30, 2);                                       // down here at the slide → the WATER PARK

  setT(34,12,"J"); setT(35,12,"J");                  // gymnastics trampoline
  coins(33,8,4);                                     // floating coins to grab on the bounce
  brick(38,6); brick(39,6); brick(40,6);             // a ledge to flip up onto
  stone(43,9); stone(44,9); stone(45,9);             // balance beam

  const par = [[46,10],[49,8],[52,9],[55,7],[58,9],[61,8],[64,10]];    // parkour hops
  for (const p of par) { stone(p[0],p[1]); stone(p[0]+1,p[1]); coin(p[0], p[1]-2); }

  const puppies = [];
  for (let i=0;i<3;i++) puppies.push({ x:(72+i*4)*TILE, minX:70*TILE, maxX:84*TILE,
                                       vx:(i%2?0.45:-0.45), hopT:i*20 });

  const signs = [
    { x:6.5, text:"EXIT ↑",     color:"#ff5e7e" },
    { x:15,  text:"WATER SLIDE",     color:"#2aa7e0" },
    { x:30.5,text:"WATER PARK ↓",    color:"#1f9ad6" },
    { x:34.5,text:"GYMNASTICS",      color:"#f59a2e" },
    { x:55,  text:"PARKOUR",         color:"#9b6cff" },
    { x:77,  text:"PUPPIES",         color:"#ff6fae" },
    { x:92,  text:"ICE CREAM",       color:"#ff7a7a" },
  ];

  return { grid, width: Wd, enemies: [], flagX: null, name: "PLAYGROUND", boss: null,
           theme: "playground", slide, puppies, iceCreamX: 92*TILE, parkPipeX: 30,
           splash: { x0: 24, x1: 28 }, fence: { x0: 69, x1: 85 }, signs };
}
