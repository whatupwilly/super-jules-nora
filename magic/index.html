  sk.addColorStop(0, "#5a3f8e"); sk.addColorStop(0.45, "#e86a8a"); sk.addColorStop(0.8, "#ffc878"); sk.addColorStop(1, "#ffe8b0");
  g.fillStyle = sk;
  g.fillRect(camX - 4, -VIEW_H - 4, VIEW_W + 8, VIEW_H + LEVEL_H + 8);
  // the big setting sun
  const sx = camX + VIEW_W * 0.55;
  const halo = g.createRadialGradient(sx, 200, 6, sx, 200, 90);
  halo.addColorStop(0, "rgba(255,235,180,.9)"); halo.addColorStop(1, "rgba(255,200,120,0)");
  g.fillStyle = halo; g.beginPath(); g.arc(sx, 200, 90, 0, Math.PI*2); g.fill();
  g.fillStyle = "#fff0c0";
  g.beginPath(); g.arc(sx, 206, 44, Math.PI, 0); g.closePath(); g.fill();
  // birds heading home
  bgLayer(camX, 0.2, 300, bx => {
    g.strokeStyle = "rgba(70,40,80,.75)"; g.lineWidth = 1.2; g.lineCap = "round";
    for (const o of [[40, 60], [70, 48], [100, 68]]) {
      const by = o[1] + Math.sin(game.timer * 0.04 + o[0]) * 3;
      g.beginPath();
      g.moveTo(bx + o[0] - 4, by); g.quadraticCurveTo(bx + o[0], by - 3.4, bx + o[0], by);
      g.quadraticCurveTo(bx + o[0], by - 3.4, bx + o[0] + 4, by);
      g.stroke();
    }
  });
  // dark dusk hills
  bgLayer(camX, 0.32, 300, bx => {
    g.fillStyle = "rgba(58,42,85,.85)";
    g.beginPath(); g.arc(bx + 80, 208, 56, Math.PI, 0); g.closePath(); g.fill();
    g.beginPath(); g.arc(bx + 210, 208, 38, Math.PI, 0); g.closePath(); g.fill();
  });
}

function drawLava(tx0, tx1) {
  const t = game.timer;
  for (let tx = tx0; tx <= tx1; tx++) {
    if (tileAt(tx, 13) !== " " || tileAt(tx, 14) !== " ") continue;
    const x = tx * TILE;
    const fl = Math.sin(t * 0.08 + tx * 1.7) * 2;
    g.fillStyle = "#e84a1a";
    g.fillRect(x, LEVEL_H - 8 + fl * 0.3, TILE, 12);
    g.fillStyle = "#ffb02a";
    g.fillRect(x + 2, LEVEL_H - 9 + fl * 0.5, 4, 3);
    g.fillRect(x + 9, LEVEL_H - 8 - fl * 0.5, 4, 3);
  }
}

function drawCagePug() {
  const p = game.pug, gy = 13 * TILE;
  const hop = p.free ? -Math.abs(Math.sin(p.hopT * 0.15)) * 6 : 0;
  drawPug(g, p.x, gy + hop);
  if (!p.free) {
    g.fillStyle = "#caa23c";
    g.fillRect(p.x - 13, gy - 30, 26, 3);
    g.fillRect(p.x - 13, gy - 2, 26, 2);
    for (let i = 0; i <= 5; i++) g.fillRect(p.x - 13 + i * 4.8, gy - 28, 1.8, 26);
  } else if ((game.timer >> 3) % 2 === 0) {
    g.fillStyle = "#ff5e7e";
    g.font = "bold 9px monospace"; g.textAlign = "center"; g.textBaseline = "alphabetic";
    g.fillText("\u2665", p.x, gy - 24 + Math.sin(game.timer * 0.1) * 2);
  }
}

function drawSign(txTile, text, color) {
  const x = txTile*TILE, y = 13*TILE;
  g.fillStyle = "#9a6a3a"; g.fillRect(x-1, y-26, 2, 14);              // post
  const w = Math.max(text.length*4.6 + 7, 26);
  g.fillStyle = color; roundRect(x - w/2, y-39, w, 15, 4); g.fill();   // board
  g.fillStyle = "rgba(255,255,255,.35)"; roundRect(x - w/2, y-39, w, 4, 4); g.fill();
  g.fillStyle = "#fff"; g.font = "bold 8px 'Avenir Next',Arial";
  g.textAlign = "center"; g.textBaseline = "middle";
  g.fillText(text, x, y-31);
}
function drawIceCreamStand(x, gy) {
  const r = (rx,ry,rw,rh,c) => { g.fillStyle = c; g.fillRect(x+rx, gy+ry, rw, rh); };
  g.fillStyle = "#7a5230"; g.beginPath(); g.arc(x-7,gy-3,2.4,0,Math.PI*2); g.arc(x+7,gy-3,2.4,0,Math.PI*2); g.fill();
  r(-12,-18,24,14,"#fff3f8"); r(-12,-6,24,2,"#d98ab0");              // cart body
  for (let i=0;i<6;i++){ g.fillStyle = i%2?"#ff6b9d":"#ffe0ec"; g.fillRect(x-12+i*4, gy-23, 4, 5); }  // awning
  g.fillStyle = "#7a5230"; g.font = "bold 6px 'Avenir Next',Arial"; g.textAlign="center"; g.textBaseline="middle";
  g.fillText("ICE CREAM", x, gy-11);
  // giant cone on top
  g.fillStyle = "#e8b87a"; g.beginPath(); g.moveTo(x-4,gy-24); g.lineTo(x+4,gy-24); g.lineTo(x,gy-15); g.closePath(); g.fill();
  g.fillStyle = "#ffd1e8"; g.beginPath(); g.arc(x-1.6,gy-27,3.2,0,Math.PI*2); g.fill();
  g.fillStyle = "#bff0d8"; g.beginPath(); g.arc(x+1.8,gy-28,3,0,Math.PI*2); g.fill();
  g.fillStyle = "#fff3a0"; g.beginPath(); g.arc(x,gy-31,2.6,0,Math.PI*2); g.fill();
  g.fillStyle = "#e0466a"; g.beginPath(); g.arc(x,gy-33,1.1,0,Math.PI*2); g.fill();
}
function drawPlayground() {
  const L = game.level, t = game.timer;
  // water slide chute
  const s = L.slide;
  if (s) {
    g.lineCap = "round";
    g.strokeStyle = "#3aa6dc"; g.lineWidth = 15;
    g.beginPath(); g.moveTo(s.x0*TILE, s.topY-3); g.lineTo(s.x1*TILE, s.botY-3); g.stroke();
    g.strokeStyle = "#7fd4ff"; g.lineWidth = 9;
    g.beginPath(); g.moveTo(s.x0*TILE, s.topY-5); g.lineTo(s.x1*TILE, s.botY-5); g.stroke();
    g.strokeStyle = "#d6f3ff"; g.lineWidth = 2.5;
    g.beginPath(); g.moveTo(s.x0*TILE, s.topY-7); g.lineTo(s.x1*TILE, s.botY-7); g.stroke();
  }
  if (L.splash) {
    const px0 = L.splash.x0*TILE, pw = (L.splash.x1-L.splash.x0)*TILE;
    g.fillStyle = "#7fc8ff"; g.fillRect(px0, 12*TILE+5, pw, TILE+3);
    g.fillStyle = "rgba(255,255,255,.65)";
    for (let i=0;i<4;i++){ const wx = px0+6+i*10 + Math.sin(t*0.1+i)*2;
      g.beginPath(); g.arc(wx, 12*TILE+8, 1.6, 0, Math.PI*2); g.fill(); }
  }
  // puppy pen fence
  if (L.fence) {
    g.strokeStyle = "#d2a973"; g.lineWidth = 1.6;
    for (let fx=L.fence.x0; fx<=L.fence.x1; fx+=3){ const x=fx*TILE;
      g.beginPath(); g.moveTo(x, 12.1*TILE); g.lineTo(x, 13*TILE); g.stroke(); }
    g.beginPath(); g.moveTo(L.fence.x0*TILE, 12.35*TILE); g.lineTo(L.fence.x1*TILE, 12.35*TILE); g.stroke();
  }
  for (const pup of L.puppies) {
    const hop = -Math.abs(Math.sin(pup.hopT*0.15))*5;
    drawPug(g, pup.x, 13*TILE + hop);
  }
  drawIceCreamStand(L.iceCreamX, 13*TILE);
  for (const sg of L.signs) drawSign(sg.x, sg.text, sg.color);
}

function drawSlideChute(s, hue) {
  g.lineCap = "round";
  g.strokeStyle = hue[0]; g.lineWidth = 15;
  g.beginPath(); g.moveTo(s.x0*TILE, s.topY-3); g.lineTo(s.x1*TILE, s.botY-3); g.stroke();
  g.strokeStyle = hue[1]; g.lineWidth = 9;
  g.beginPath(); g.moveTo(s.x0*TILE, s.topY-5); g.lineTo(s.x1*TILE, s.botY-5); g.stroke();
  g.strokeStyle = "#d6f3ff"; g.lineWidth = 2.5;
  g.beginPath(); g.moveTo(s.x0*TILE, s.topY-7); g.lineTo(s.x1*TILE, s.botY-7); g.stroke();
}
function drawTree(cx, gy) {
  g.fillStyle = "#9a6a3a"; g.fillRect(cx-2, gy-18, 4, 18);
  for (const [ox,oy,r] of [[-6,-20,9],[6,-20,9],[0,-26,10],[0,-16,9]]) {
    g.fillStyle = "#4fae45"; g.beginPath(); g.arc(cx+ox, gy+oy, r, 0, Math.PI*2); g.fill();
  }
  g.fillStyle = "rgba(255,255,255,.18)"; g.beginPath(); g.arc(cx-3, gy-28, 4, 0, Math.PI*2); g.fill();
}
function drawWaterpark() {
  const L = game.level, t = game.timer;
  // the five slides + their splash pools
  const hues = [["#e06aa8","#ff9ed0"],["#3aa6dc","#7fd4ff"],["#f59a2e","#ffd166"],["#6f55c8","#b39bff"],["#3aa65a","#8fe2a0"]];
  for (let i = 0; i < L.slides.length; i++) {
    if (L.splashes[i]) { const sp = L.splashes[i], px0 = sp.x0*TILE, pw = (sp.x1-sp.x0)*TILE;
      g.fillStyle = "#7fc8ff"; g.fillRect(px0, 12*TILE+5, pw, TILE+3);
      g.fillStyle = "rgba(255,255,255,.6)";
      for (let k=0;k<3;k++){ const wx=px0+5+k*9+Math.sin(t*0.1+k+i)*2; g.beginPath(); g.arc(wx, 12*TILE+8, 1.5, 0, Math.PI*2); g.fill(); } }
    drawSlideChute(L.slides[i], hues[i % hues.length]);
  }
  // park: trees, a swing set, a bench
  for (const tx of L.trees) drawTree(tx*TILE, 13*TILE);
  if (L.swingX != null) { const sx = L.swingX*TILE, top = 13*TILE - 26;
    g.strokeStyle = "#b9772f"; g.lineWidth = 1.6;
    g.beginPath(); g.moveTo(sx-9, 13*TILE); g.lineTo(sx, top); g.lineTo(sx+9, 13*TILE); g.moveTo(sx, top); g.lineTo(sx+18, top); g.lineTo(sx+9, 13*TILE); g.stroke();
    g.strokeStyle = "rgba(80,80,90,.7)"; g.lineWidth = 0.7;
    const sw = Math.sin(t*0.07)*3;
    g.beginPath(); g.moveTo(sx+5, top); g.lineTo(sx+5+sw, 13*TILE-7); g.moveTo(sx+13, top); g.lineTo(sx+13+sw, 13*TILE-7); g.stroke();
    g.fillStyle = "#e0556e"; g.fillRect(sx+4+sw, 13*TILE-8, 10, 2); }
  if (L.benchX != null) { const bx = L.benchX*TILE;
    g.fillStyle = "#caa06a"; g.fillRect(bx-7, 13*TILE-7, 16, 2.5); g.fillRect(bx-7, 13*TILE-12, 16, 2);
    g.fillStyle = "#9a6a3a"; g.fillRect(bx-6, 13*TILE-5, 2, 5); g.fillRect(bx+5, 13*TILE-5, 2, 5); }
  // targets
  for (const tg of L.targets) {
    if (tg.hit > 0) {  // splashed — show a burst, then it respawns
      g.fillStyle = "rgba(127,208,255,.7)";
      for (let k=0;k<5;k++){ const a=k*1.3; g.beginPath(); g.arc(tg.x+Math.cos(a)*tg.r, tg.baseY+Math.sin(a)*tg.r, 1.6, 0, Math.PI*2); g.fill(); }
      continue;
    }
    g.fillStyle = "#9a6a3a"; g.fillRect(tg.x-1, tg.y, 2, 13*TILE - tg.y);   // post
    if (tg.ring) {                                  // bullseye
      g.fillStyle = "#fff"; g.beginPath(); g.arc(tg.x, tg.y, tg.r, 0, Math.PI*2); g.fill();
      g.fillStyle = "#e0466a"; g.beginPath(); g.arc(tg.x, tg.y, tg.r*0.7, 0, Math.PI*2); g.fill();
      g.fillStyle = "#fff"; g.beginPath(); g.arc(tg.x, tg.y, tg.r*0.42, 0, Math.PI*2); g.fill();
      g.fillStyle = "#e0466a"; g.beginPath(); g.arc(tg.x, tg.y, tg.r*0.16, 0, Math.PI*2); g.fill();
    } else {                                        // rubber duck
      g.fillStyle = "#ffd23c"; g.beginPath(); g.ellipse(tg.x, tg.y+1, tg.r, tg.r*0.8, 0, 0, Math.PI*2); g.fill();
      g.beginPath(); g.arc(tg.x - tg.r*0.5, tg.y - tg.r*0.5, tg.r*0.55, 0, Math.PI*2); g.fill();
      g.fillStyle = "#ff8a2c"; g.beginPath(); g.moveTo(tg.x - tg.r*1.1, tg.y - tg.r*0.5); g.lineTo(tg.x - tg.r*0.5, tg.y - tg.r*0.3); g.lineTo(tg.x - tg.r*0.5, tg.y - tg.r*0.7); g.closePath(); g.fill();
      g.fillStyle = "#241a12"; g.beginPath(); g.arc(tg.x - tg.r*0.55, tg.y - tg.r*0.6, 0.9, 0, Math.PI*2); g.fill();
    }
  }
  // water shots (blue droplets)
  for (const ws of game.waterShots) {
    g.fillStyle = "rgba(120,200,255,.55)"; g.beginPath(); g.arc(ws.x-ws.vx, ws.y-ws.vy, 1.6, 0, Math.PI*2); g.fill();
    const wg = g.createRadialGradient(ws.x-0.6, ws.y-0.6, 0.3, ws.x, ws.y, 3.4);
    wg.addColorStop(0,"#dff3ff"); wg.addColorStop(1,"#3f9fe0");
    g.fillStyle = wg; g.beginPath(); g.arc(ws.x, ws.y, 3.2, 0, Math.PI*2); g.fill();
  }
  for (const sg of L.signs) drawSign(sg.x, sg.text, sg.color);
}

function drawWorld() {
  const L = game.level, camX = game.camX;
  drawBackground(camX);
  // powerups still rising are drawn first so the block hides them
  for (const p of game.powerups) if (p.rise > 0) drawPowerup(g, p);
  const tx0 = Math.max(0, Math.floor(camX / TILE) - 1);
  const tx1 = Math.min(L.width - 1, Math.ceil((camX + VIEW_W) / TILE) + 1);
  for (let ty = 0; ty < ROWS; ty++)
    for (let tx = tx0; tx <= tx1; tx++) {
      const c = L.grid[ty][tx];
      if (c !== " ") drawTile(c, tx, ty);
    }
  if (L.theme === "castle") drawLava(tx0, tx1);
  if (L.theme === "icecastle") drawIceWater(tx0, tx1);
  if (L.theme === "rainbowcastle") drawRainbowPit(tx0, tx1);
  if (L.theme === "playground") drawPlayground();
  if (L.theme === "waterpark") drawWaterpark();
  if (L.flagX) drawFlag(L.flagX);

  for (const p of game.powerups) if (p.rise <= 0) {
    if (p.type === "mushroom") softShadow(p.x + p.w/2, p.y + p.h, 6);
    drawPowerup(g, p);
  }
  for (const f of game.fireballs) drawFireball(g, f, game.timer);

  for (const e of L.enemies) {
    if (!e.active || e.dead > 25) continue;
    if (e.grounded) softShadow(e.x + e.w/2, e.y + e.h, 6.5);
    drawGrump(g, e.x + e.w/2, e.y + e.h, e.frame, e.dead);
  }

  for (const pg of game.pigeons) drawPigeon(g, pg);

  if (game.pug) drawCagePug();
  if (game.boss && game.boss.y < LEVEL_H + 60) drawBowser(g, game.boss);
  for (const fl of game.bossFlames) drawFlame(g, fl);
  if (game.superFx) drawSuperFx();

  // coin / heart / ice-cream pops
  for (const c of game.pops) {
    const yy = c.y - 8 - c.t * 1.2;
    if (c.heart) {
      g.fillStyle = "#ff5e7e";
      g.beginPath();
      g.moveTo(c.x, yy+3);
      g.bezierCurveTo(c.x-4, yy-2, c.x-2, yy-5, c.x, yy-2);
      g.bezierCurveTo(c.x+2, yy-5, c.x+4, yy-2, c.x, yy+3);
      g.fill();
    } else if (c.treat) {
      g.fillStyle = "#e8b87a"; g.beginPath();
      g.moveTo(c.x-2.4, yy-1); g.lineTo(c.x+2.4, yy-1); g.lineTo(c.x, yy+4); g.closePath(); g.fill();
      g.fillStyle = "#ffd1e8"; g.beginPath(); g.arc(c.x, yy-3, 2.6, 0, Math.PI*2); g.fill();
      g.fillStyle = "#bff0d8"; g.beginPath(); g.arc(c.x+0.6, yy-4.4, 2, 0, Math.PI*2); g.fill();
    } else {
      g.fillStyle = "#f6c14f";
      g.beginPath(); g.ellipse(c.x, yy, 4, 5.5, 0, 0, Math.PI*2); g.fill();
      g.fillStyle = "#fff0c0";
      g.beginPath(); g.ellipse(c.x, yy, 1.6, 3, 0, 0, Math.PI*2); g.fill();
    }
  }
  // rainbow portal swirls
  if (game.portalFx) for (const pf of game.portalFx) {
    const rc = ["#ff5e6c","#ffd23e","#5ecb6a","#4aa6f0","#9b6cff"];
    g.save(); g.translate(pf.x, pf.y); g.rotate(pf.t * 0.3);
    for (let i = 0; i < rc.length; i++) { g.strokeStyle = rc[i]; g.lineWidth = 2 - i*0.2;
      g.globalAlpha = Math.max(0, 1 - pf.t/26);
      g.beginPath(); g.arc(0, 0, 3 + pf.t*0.7 + i*1.6, 0, Math.PI*1.6); g.stroke(); }
    g.globalAlpha = 1; g.restore();
  }
  // particles
  for (const p of game.particles) {
    if (p.t < 0) continue;
    g.fillStyle = p.c;
    if (p.flower) {                                  // tiny blooming flower (Cutie's trail)
      const s = Math.min(1, p.t / 6) * (1 - p.t / 50);
      g.save(); g.translate(p.x, p.y); g.scale(s, s);
      for (let q = 0; q < 5; q++) { const a = q * Math.PI*2/5 + p.x;
        g.beginPath(); g.ellipse(Math.cos(a)*2, Math.sin(a)*2, 1.4, 0.9, a, 0, Math.PI*2); g.fill(); }
      g.fillStyle = "#fff3a0"; g.beginPath(); g.arc(0, 0, 1, 0, Math.PI*2); g.fill();
      g.restore();
    }
    else if (p.conf) { g.save(); g.translate(p.x, p.y); g.rotate(p.t * 0.1 + p.x); g.fillRect(-2, -1.4, 4, 2.8); g.restore(); }
    else g.fillRect(p.x - 2, p.y - 2, 4, 4);
  }

  // player (flickers while invincible after taking a hit)
  const pal = CHARS[heroKey];
  if (game.state === "dead") {
    g.save();
    g.translate(player.x + player.w/2, player.y + player.h);
    g.scale(1, -1); g.translate(-(player.x + player.w/2), -(player.y + player.h) + player.h + 6);
    drawKid(g, player.x + player.w/2, player.y + player.h, pal, 0, player.facing, true, false, 0);
    g.restore();
  } else {
    const ghost = player.inv > 0 && CHARS[heroKey].kind === "bunny";   // Bamboo turns invisible
    if (ghost || !(player.inv > 0 && (game.timer >> 2) % 2 === 0)) {
      if (player.grounded) softShadow(player.x + player.w/2, player.y + player.h, 7);
      if (ghost) g.globalAlpha = 0.4;
      if (player.flying && CHARS[heroKey].look === "panda")
        drawBambooCarpet(player.x + player.w/2, player.y + player.h, game.timer, player.facing);
      if (player.flying && CHARS[heroKey].look === "fox")
        drawSnowflakeRide(player.x + player.w/2, player.y + player.h, game.timer, player.facing);
      if (player.flying && CHARS[heroKey].look === "butterfly")
        drawFlowerRide(player.x + player.w/2, player.y + player.h, game.timer, player.facing);
      if (player.flying && CHARS[heroKey].look === "unicorn")
        drawRainbowRide(player.x + player.w/2, player.y + player.h, game.timer, player.facing);
      if (player.flying && CHARS[heroKey].look === "dumpling")
        drawDumplingRide(player.x + player.w/2, player.y + player.h, game.timer, player.facing);
      if (player.flying && CHARS[heroKey].look === "penguin")
        drawIceFloeRide(player.x + player.w/2, player.y + player.h, game.timer, player.facing);
      if (player.glow > 0 && CHARS[heroKey].look === "unicorn") {   // indestructible rainbow glow
        const rg = g.createRadialGradient(player.x+player.w/2, player.y+player.h/2, 2, player.x+player.w/2, player.y+player.h/2, 20);
        rg.addColorStop(0, "rgba(255,255,255,.5)"); rg.addColorStop(0.6, "rgba(180,150,255,.35)"); rg.addColorStop(1, "rgba(180,150,255,0)");
        g.fillStyle = rg; g.beginPath(); g.arc(player.x+player.w/2, player.y+player.h/2, 20, 0, Math.PI*2); g.fill();
      }
      if (player.dumpSparkle > 0 && CHARS[heroKey].look === "dumpling") {   // blue-gem sparkle aura
        const cx0 = player.x+player.w/2, cy0 = player.y+player.h/2, rc = CHARS.squishy.rainbow;
        const rg = g.createRadialGradient(cx0, cy0, 2, cx0, cy0, 19);
        rg.addColorStop(0, "rgba(255,255,255,.45)"); rg.addColorStop(1, "rgba(120,200,255,0)");
        g.fillStyle = rg; g.beginPath(); g.arc(cx0, cy0, 19, 0, Math.PI*2); g.fill();
        for (let i = 0; i < 4; i++) { const a = game.timer*0.12 + i*1.6;
          drawStarShape(g, cx0 + Math.cos(a)*12, cy0 + Math.sin(a)*12, 1.3, 0.55, a, rc[(i + (game.timer>>3)) % rc.length]); }
      }
      drawKid(g, player.x + player.w/2, player.y + player.h, pal,
              player.frame, player.facing, !player.grounded, Math.abs(player.vx) > 0.3, player.power);
      g.globalAlpha = 1;
    }
  }

  // "↓ PLAY!" hint when standing on a pipe (out in the world, not playground)
  if (player.onPipe && !game.inPlayground && game.state === "play") {
    const bx = player.x + player.w/2, byy = player.y - 13 + Math.sin(game.timer*0.2)*1.5;
    g.fillStyle = "rgba(0,0,0,.55)"; roundRect(bx-21, byy-9, 42, 13, 6); g.fill();
    g.fillStyle = "#ffe066"; g.font = "bold 8px 'Avenir Next',Arial";
    g.textAlign = "center"; g.textBaseline = "middle";
    g.fillText("↓ PLAY!", bx, byy-2);
  }
}

function hud() {
  g.save();
  g.setTransform(DPR, 0, 0, DPR, 0, 0);
  const top = Math.max(10, (window.visualViewport ? 0 : 0) + 10);
  g.font = "bold 16px 'Avenir Next',Arial";
  g.textAlign = "left"; g.textBaseline = "top";
  outlineText("♥".repeat(Math.max(0, game.lives)), 14, top, "#ff5e7e");
  outlineText("● " + game.coins, 14, top + 22, "#ffd166");
  if (game.state === "play" || game.state === "clear") {
    const fm = Math.max(0, player.fly / CHARS[heroKey].flyMax);
    g.fillStyle = "rgba(0,0,20,.45)";
    g.fillRect(14, top + 44, 66, 9);
    g.fillStyle = CHARS[heroKey].kind === "cloud" ? "#8fc8ff" : "#8fd24e";
    g.fillRect(15, top + 45, 64 * fm, 7);
  }
  g.textAlign = "right";
  outlineText(game.level ? game.level.name : "", W - 14, top, "#fff");
  outlineText(String(game.score).padStart(6, "0"), W - 14, top + 22, "#fff");
  g.restore();
}
function outlineText(t, x, y, color) {
  g.lineWidth = 4; g.strokeStyle = "rgba(0,0,0,.45)"; g.lineJoin = "round";
  g.strokeText(t, x, y); g.fillStyle = color; g.fillText(t, x, y);
}

function centerCard(lines) {
  g.save();
  g.setTransform(DPR, 0, 0, DPR, 0, 0);
  g.fillStyle = "rgba(0,0,0,.45)"; g.fillRect(0, 0, W, H);
  g.textAlign = "center"; g.textBaseline = "middle";
  let y = H/2 - (lines.length-1) * 22;
  for (const [txt, size, col] of lines) {
    g.font = "800 " + size + "px 'Avenir Next',Arial";
    outlineText(txt, W/2, y, col);
    y += size + 18;
  }
  g.restore();
}

function drawGameOver() {
  g.save();
  g.setTransform(DPR, 0, 0, DPR, 0, 0);
  g.fillStyle = "rgba(0,0,10,.6)"; g.fillRect(0, 0, W, H);
  g.textAlign = "center"; g.textBaseline = "middle";
  g.font = "900 " + Math.min(W/9, 48) + "px 'Avenir Next',Arial";
  outlineText("GAME OVER", W/2, H*0.3, "#ff5e7e");
  // continue button (same level, fresh lives, score kept)
  const bw = Math.min(W*0.62, 310), bh = 56;
  const bx = W/2 - bw/2, by = H*0.46;
  const pulse = 1 + Math.sin(game.timer * 0.07) * 0.02;
  g.save();
  g.translate(W/2, by + bh/2); g.scale(pulse, pulse); g.translate(-W/2, -(by + bh/2));
  g.fillStyle = "#ffd166"; roundRect(bx, by, bw, bh, 16); g.fill();
  g.lineWidth = 4; g.strokeStyle = "#b8862c"; roundRect(bx, by, bw, bh, 16); g.stroke();
  g.fillStyle = "#5a3c10"; g.font = "900 " + Math.min(bw/11, 23) + "px 'Avenir Next',Arial";
  g.fillText("\u25b6 CONTINUE " + (game.level ? game.level.name : ""), W/2, by + bh/2);
  g.restore();
  // back-to-title link
  const tw = Math.min(W*0.5, 240), th = 40, tx2 = W/2 - tw/2, ty2 = by + bh + 22;
  g.fillStyle = "rgba(255,255,255,.16)"; roundRect(tx2, ty2, tw, th, 12); g.fill();
  g.font = "700 " + Math.min(W/26, 16) + "px 'Avenir Next',Arial";
  outlineText("back to title", W/2, ty2 + th/2, "#fff");
  game.goHits = [
    { x: bx, y: by, w: bw, h: bh, action: "continue" },
    { x: tx2, y: ty2, w: tw, h: th, action: "title" },
  ];
  g.restore();
}

function drawTitle() {
  g.save();
  g.setTransform(DPR, 0, 0, DPR, 0, 0);
  // sky
  const grad = g.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, "#4f8fd4"); grad.addColorStop(0.6, "#8cbce8"); grad.addColorStop(1, "#dcedf6");
  g.fillStyle = grad; g.fillRect(0, 0, W, H);
  // decorative clouds
  g.fillStyle = "rgba(255,255,255,.9)";
  const s = Math.max(1.2, W/420);
  for (let i = 0; i < 4; i++) {
    const bx = ((game.timer * 0.3 + i * (W/3.4)) % (W + 120)) - 60;
    g.save(); g.translate(bx, 50 + i * 36); g.scale(s, s); cloud(0, 0); g.restore();
  }
  // ground strip
  g.fillStyle = "#3fbf52"; g.fillRect(0, H - 46, W, 8);
  g.fillStyle = "#b46a36"; g.fillRect(0, H - 38, W, 38);

  g.textAlign = "center"; g.textBaseline = "middle";
  const big = Math.min(W/9, H*0.105, 52);
  const ty1 = H * 0.10;
  g.font = "900 " + big + "px 'Avenir Next',Arial";
  outlineText("MAGIC", W/2, ty1, "#8fc8ff");
  outlineText("HEROES", W/2, ty1 + big + 6, "#ff8ab8");
  g.font = "800 " + Math.min(W/24, 18) + "px 'Avenir Next',Arial";
  outlineText("✨ a game by Jules & Nora ✨", W/2, ty1 + big*1.72 + 12, "#ffe9a8");
  if (H > W * 0.9) {
    g.font = "700 " + Math.min(W/22, 20) + "px 'Avenir Next',Arial";
    outlineText("Pick your hero!", W/2, ty1 + big*2.3 + 26, "#fff");
  }

  // character cards — sized & wrapped to fit however many heroes there are
  game.titleCards = [];
  const keysArr = ["jules", "northern", "cutie", "nora", "sparkle", "squishy", "icy", "appy", "misty"];
  const n = keysArr.length;
  const perRow = n <= 4 ? n : Math.ceil(n / 2);     // 5+ heroes → wrap to two rows
  const rows = Math.ceil(n / perRow), rowGap = 10;
  const gap = Math.min(10, W * 0.016);
  const cw = Math.min((W * 0.96 - (perRow-1)*gap) / perRow, 132, H * 0.32);
  const ch = Math.min(cw * 1.18, H * (rows > 1 ? 0.255 : 0.46));
  // top of the card block — clamped so cards + toggle + level picker + footer all fit
  const thT = Math.min(W/10, 40), chipHT = Math.max(17, Math.min(W/17, 24));
  const stackH = rows*ch + (rows-1)*rowGap + 30 + thT + 12 + 14 + chipHT + 34;
  const cy0 = Math.min(H * (W > H ? 0.50 : 0.46), H - stackH);
  const edge = ["#f59cc4", "#7fb6ff", "#b07fe0", "#4fbfa2", "#ffce3a", "#ff8ab0", "#5ec2e0", "#f0564a", "#e8b64a"];
  const nameCol = ["#e074a8", "#3f7fd0", "#8a5fd0", "#2f9e7e", "#d39a1e", "#e0608c", "#2f8fb0", "#c8362c", "#b8862c"];
  keysArr.forEach((k, i) => {
    const row = Math.floor(i / perRow);
    const inRow = (row === rows-1) ? (n - perRow*(rows-1)) : perRow;
    const idxInRow = i - row*perRow;
    const rowW = inRow*cw + (inRow-1)*gap, startX = W/2 - rowW/2;
    const sx = startX + idxInRow*(cw + gap), sy = cy0 + row*(ch + rowGap), cxp = sx + cw/2;
    const bounce = Math.sin(game.timer * 0.08 + i * 2) * 4;
    g.fillStyle = "rgba(255,255,255,.92)";
    roundRect(sx, sy, cw, ch, 14); g.fill();
    g.lineWidth = 4; g.strokeStyle = edge[i % edge.length];
    roundRect(sx, sy, cw, ch, 14); g.stroke();
    g.save();
    g.translate(cxp, sy + ch * 0.6 + bounce);
    const ks = cw / 48;
    g.scale(ks, ks);
    drawKid(g, 0, 0, CHARS[k], Math.floor(game.timer/20) % 2, 1, false, true);
    g.restore();
    let nm = CHARS[k].name, fs = cw/6.4;
    g.font = "900 " + fs + "px 'Avenir Next',Arial";
    while (g.measureText(nm).width > cw - 16 && fs > 7) { fs -= 0.5; g.font = "900 " + fs + "px 'Avenir Next',Arial"; }
    // readable name plate: solid colored pill + white text (high contrast for long names)
    const ntw = g.measureText(nm).width, pillH = fs + 7, pillW = Math.min(cw - 3, ntw + 14), py = sy + ch - cw/8.5;
    g.fillStyle = nameCol[i % nameCol.length];
    roundRect(cxp - pillW/2, py - pillH/2, pillW, pillH, pillH/2); g.fill();
    g.textAlign = "center"; g.textBaseline = "middle";
    g.lineWidth = 3; g.lineJoin = "round"; g.strokeStyle = "rgba(0,0,0,.28)"; g.strokeText(nm, cxp, py);
    g.fillStyle = "#fff"; g.fillText(nm, cxp, py);
    game.titleCards.push({ key: k, sx, sy, sw: cw, sh: ch });
  });
  const cardsBottom = cy0 + rows*ch + (rows-1)*rowGap;

  g.font = "600 " + Math.min(W/26, 16) + "px 'Avenir Next',Arial";
  outlineText("tap a hero to start", W/2, cardsBottom + 20, "#fff");

  // pigeons on/off toggle (kid-friendly — tap to flip; remembered next time)
  const off = game.pigeonsOff;
  const tw = Math.min(W * 0.62, 280), th = Math.min(W/10, 40), tx = W/2 - tw/2, tyT = cardsBottom + 30;
  g.fillStyle = off ? "rgba(120,170,90,.85)" : "rgba(120,140,170,.55)";
  roundRect(tx, tyT, tw, th, th/2); g.fill();
  g.lineWidth = 3; g.strokeStyle = off ? "#bff0a0" : "rgba(255,255,255,.6)";
  roundRect(tx, tyT, tw, th, th/2); g.stroke();
  // knob
  const knobR = Math.max(2, th/2 - 5), knobX = off ? tx + tw - th/2 : tx + th/2;
  g.fillStyle = "#fff"; g.beginPath(); g.arc(knobX, tyT + th/2, knobR, 0, Math.PI*2); g.fill();
  g.font = "800 " + Math.min(W/30, 15) + "px 'Avenir Next',Arial";
  outlineText("🕊️ Pigeons: " + (off ? "OFF" : "ON"), W/2, tyT + th/2, off ? "#eaffe0" : "#fff");
  game.pigeonToggleRect = { x: tx, y: tyT, w: tw, h: th };

  // level picker — tap a chip to choose where to start
  game.levelBtnRects = [];
  const lvName = n => n < 5 ? "1-" + (n+1) : n < 9 ? "2-" + (n-4) : "3-" + (n-8);
  const worldCol = n => n < 5 ? "#3fae52" : n < 9 ? "#3f8fd0" : "#9b6cff";
  const chipGap = 3, chipW = Math.min((W * 0.96 - (LEVEL_COUNT-1)*chipGap) / LEVEL_COUNT, 42);
  const chipH = Math.max(17, Math.min(W/17, 24));
  const rowW = LEVEL_COUNT * chipW + (LEVEL_COUNT-1) * chipGap;
  const cx0 = W/2 - rowW/2, cyL = tyT + th + 12;
  g.font = "700 " + Math.min(W/34, 12) + "px 'Avenir Next',Arial";
  outlineText("start at level:", W/2, cyL - 3, "#fff");
  for (let n = 0; n < LEVEL_COUNT; n++) {
    const bx = cx0 + n * (chipW + chipGap), by = cyL + 6;
    const sel = n === (game.levelSelect || 0);
    g.fillStyle = sel ? worldCol(n) : "rgba(255,255,255,.28)";
    roundRect(bx, by, chipW, chipH, 6); g.fill();
    g.lineWidth = sel ? 2.5 : 1.2;
    g.strokeStyle = sel ? "#fff" : "rgba(255,255,255,.5)";
    roundRect(bx, by, chipW, chipH, 6); g.stroke();
    g.font = (sel ? "900 " : "700 ") + Math.max(7, Math.min(chipW/3.1, 11)) + "px 'Avenir Next',Arial";
    g.textAlign = "center"; g.textBaseline = "middle";
    if (sel) { g.lineWidth = 3; g.lineJoin = "round"; g.strokeStyle = "rgba(0,0,0,.3)"; g.strokeText(lvName(n), bx + chipW/2, by + chipH/2 + 0.5); }
    g.fillStyle = sel ? "#fff" : "rgba(255,255,255,.95)";
    g.fillText(lvName(n), bx + chipW/2, by + chipH/2 + 0.5);
    game.levelBtnRects.push({ n, x: bx, y: by, w: chipW, h: chipH });
  }

  g.font = "600 12px 'Avenir Next',Arial";
  outlineText("made with ♥ for Jules & Nora", W/2, H - 16, "#ffe9f0");
  g.restore();
}
function roundRect(x, y, w, h, r) {
  g.beginPath();
  g.moveTo(x+r, y); g.arcTo(x+w, y, x+w, y+h, r); g.arcTo(x+w, y+h, x, y+h, r);
  g.arcTo(x, y+h, x, y, r); g.arcTo(x, y, x+w, y, r); g.closePath();
}

function drawWinScreen() {
  g.save();
  g.setTransform(DPR, 0, 0, DPR, 0, 0);
  const grad = g.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, "#2b3a8f"); grad.addColorStop(1, "#7d6ad9");
  g.fillStyle = grad; g.fillRect(0, 0, W, H);
  // stars
  for (let i = 0; i < 40; i++) {
    const sx = (i * 97.3) % W, sy = (i * 53.7) % (H*0.6);
    const tw = Math.sin(game.timer * 0.07 + i) * 0.5 + 0.5;
    g.fillStyle = "rgba(255,255,240," + (0.3 + tw*0.7) + ")";
    g.fillRect(sx, sy, 2.5, 2.5);
  }
  g.textAlign = "center"; g.textBaseline = "middle";
  g.font = "900 " + Math.min(W/8, 56) + "px 'Avenir Next',Arial";
  outlineText("YOU WIN!", W/2, H*0.22, "#ffd166");
  g.font = "700 " + Math.min(W/20, 22) + "px 'Avenir Next',Arial";
  outlineText("The heroes saved Peach the pug!", W/2, H*0.32, "#fff");

  // all the heroes celebrating
  const ks = Math.min(W, H) / 140;
  [["jules", -4], ["northern", -3], ["cutie", -2], ["squishy", -1], ["misty", 0], ["appy", 1], ["icy", 2], ["sparkle", 3], ["nora", 4]].forEach(([k, side]) => {
    g.save();
    const hop = Math.abs(Math.sin(game.timer * 0.1 + (side+2))) * 14;
    g.translate(W/2 + side * Math.min(W*0.078, 42), H*0.62 - hop);
    g.scale(ks, ks);
    drawKid(g, 0, 0, CHARS[k], 0, side < 0 ? 1 : -1, true, false);
    g.restore();
  });

  // Peach the pug, safe at last
  g.save();
  const pugHop = Math.abs(Math.sin(game.timer * 0.12)) * 10;
  g.translate(W/2, H*0.62 - pugHop);
  g.scale(ks * 0.9, ks * 0.9);
  drawPug(g, 0, 0);
  g.restore();

  g.font = "800 " + Math.min(W/16, 26) + "px 'Avenir Next',Arial";
  outlineText("SCORE " + game.score + "   ●×" + game.coins, W/2, H*0.76, "#fff");
  if (game.timer > 90 && Math.floor(game.timer/30) % 2 === 0) {
    g.font = "700 " + Math.min(W/22, 18) + "px 'Avenir Next',Arial";
    outlineText("tap to play again", W/2, H*0.86, "#aee0ff");
  }
  // confetti in screen space
  g.restore();
}

function draw() {
  g.setTransform(DPR, 0, 0, DPR, 0, 0);
  g.clearRect(0, 0, W, H);

  if (game.state === "title") { drawTitle(); return; }
  if (game.state === "win")   {
    drawWinScreen();
    // overlay confetti (game coords roughly map; redraw in screen space)
    g.setTransform(DPR, 0, 0, DPR, 0, 0);
    for (const p of game.particles) {
      if (p.t < 0 || !p.conf) continue;
      g.fillStyle = p.c;
      g.save();
      g.translate((p.x - game.camX) * SCALE, p.y * (H / LEVEL_H));
      g.rotate(p.t * 0.1 + p.x);
      g.fillRect(-3, -2, 6, 4);
      g.restore();
    }
    return;
  }

  // world transform: in portrait, lift the play area above the touch controls
  const extra = Math.max(0, H / SCALE - LEVEL_H);
  const reserve = Math.min(extra, 130 / SCALE);   // ~130 css px for buttons
  const offY = extra - reserve;
  g.setTransform(DPR * SCALE, 0, 0, DPR * SCALE, -game.camX * DPR * SCALE, offY * DPR * SCALE);
  drawWorld();
  if (reserve > 0) {                              // underground band beneath the level
    const ug = g.createLinearGradient(0, LEVEL_H, 0, LEVEL_H + reserve + 8);
    ug.addColorStop(0, "#4e2c14"); ug.addColorStop(1, "#241204");
    g.fillStyle = ug;
    g.fillRect(game.camX - 4, LEVEL_H, VIEW_W + 8, reserve + 8);
    g.fillStyle = "rgba(0,0,0,.35)";
    g.fillRect(game.camX - 4, LEVEL_H, VIEW_W + 8, 2.5);
  }
  hud();

  if (game.state === "gameover") drawGameOver();
  if (game.state === "clear") centerCard(game.rescued ? (game.levelNum + 1 < LEVEL_COUNT ? [
    ["PEACH IS SAFE! \ud83d\udc36", Math.min(W/10, 40), "#ffd166"],
    [game.levelNum === 4 ? "...but a blizzard sweeps her away!" : "...but Bowser grabs her again!", Math.min(W/24, 18), "#fff"],
    [game.levelNum === 4 ? "on to the snow world! \u2744\ufe0f" : "on to the rainbow world! \ud83c\udf08", Math.min(W/24, 18), "#bfe6ff"],
  ] : [
    ["PEACH IS SAFE! \ud83d\udc36", Math.min(W/10, 40), "#ffd166"],
    ["you rescued the pug princess!", Math.min(W/24, 18), "#fff"],
  ]) : [
    ["LEVEL CLEAR!", Math.min(W/10, 44), "#ffd166"],
    [(game.levelNum + 1 < LEVEL_COUNT ? "get ready for " + (game.levelNum+1 < 5 ? "1-"+(game.levelNum+2) : game.levelNum+1 < 9 ? "2-"+(game.levelNum-3) : "3-"+(game.levelNum-7)) + "..." : "one more surprise..."), Math.min(W/24, 18), "#fff"],
  ]);
}

/* ============================== MAIN LOOP ============================== */
let last = performance.now(), acc = 0;
function frame(now) {
  requestAnimationFrame(frame);
  acc += Math.min(now - last, 100); last = now;
  const STEP = 1000 / 60;
  let steps = 0;
  while (acc >= STEP && steps < 5) { update(); acc -= STEP; steps++; }
  if (steps === 5) acc = 0;
  draw();
}
goTitle();
requestAnimationFrame(frame);
window.__g = { game, player, startLevel, update, draw, input, keys };   // debug handle

</script>
</body>
