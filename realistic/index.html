<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>Super Young Sisters: Lifelike</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  #game, .btn, #verlink, #verlink a { touch-action:none; }
  html, body {
    width:100%; height:100%; overflow:hidden; background:#5c94fc;
    touch-action:none; -webkit-user-select:none; user-select:none;
    -webkit-touch-callout:none; -webkit-tap-highlight-color:transparent;
    font-family:"Avenir Next","Helvetica Neue",Arial,sans-serif;
    position:fixed;
  }
  #game { display:block; width:100%; height:100%; }
  #verlink {
    position:fixed; right:14px; top:max(14px, env(safe-area-inset-top)); z-index:20; display:none;
  }
  #verlink a {
    color:#fff; font-weight:700; font-size:14px; text-decoration:none;
    background:rgba(0,0,0,.32); padding:7px 14px; border-radius:16px; margin-left:8px;
  }
  .btn {
    position:fixed; bottom:max(18px, env(safe-area-inset-bottom));
    width:72px; height:72px; border-radius:50%;
    background:rgba(255,255,255,.22); border:3px solid rgba(255,255,255,.55);
    color:#fff; font-size:30px; font-weight:800; text-align:center; line-height:66px;
    z-index:10; display:none; backdrop-filter:blur(2px);
  }
  .btn.pressed { background:rgba(255,255,255,.55); }
  .btn { transition: opacity .6s; }
  .btn.faded { opacity:.14; }
  .btn.faded.pressed { opacity:.5; }
  #btnL { left:max(16px, env(safe-area-inset-left)); }
  #btnR { left:calc(max(16px, env(safe-area-inset-left)) + 90px); }
  #btnJ { right:max(16px, env(safe-area-inset-right)); width:88px; height:88px; line-height:80px; font-size:22px; }
  #btnF { right:calc(max(16px, env(safe-area-inset-right)) + 106px); bottom:calc(max(18px, env(safe-area-inset-bottom)) + 8px); font-size:16px; background:rgba(255,120,80,.3); border-color:rgba(255,180,120,.65); }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div class="btn" id="btnL">&#9664;</div>
<div class="btn" id="btnR">&#9654;</div>
<div class="btn" id="btnJ">JUMP</div>
<div class="btn" id="btnF">FIRE</div>
<div id="verlink"><a href="../">🕹 Classic</a><a href="../hd/">✨ HD</a><a href="../fortnite/">⚡ Battle</a><a href="../bubble/">🫧 Bubble</a></div>
<script>
"use strict";
/* ============================== SETUP ============================== */
const cv = document.getElementById("game");
const g  = cv.getContext("2d");
const TILE = 16, ROWS = 15, LEVEL_H = ROWS * TILE; // 240 game px tall

let W = 0, H = 0, DPR = 1, SCALE = 1, VIEW_W = 0, VIEW_H = 0;
function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 3);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = Math.round(W * DPR); cv.height = Math.round(H * DPR);
  // landscape: fit level height; portrait: fit ~11 tiles across so things stay big
  SCALE = W >= H ? H / LEVEL_H : W / 176;
  VIEW_W = W / SCALE; VIEW_H = H / SCALE;
}
window.addEventListener("resize", resize);
window.addEventListener("orientationchange", () => setTimeout(resize, 200));
resize();

/* ============================== ASSETS (CC0 photo textures, Poly Haven) ============================== */
const ASSETS = { ready: false };
{
  const names = ["grass", "soil", "brick", "rock", "wood", "sky"];
  let left = names.length;
  for (const n of names) {
    const im = new Image();
    im.onload = im.onerror = () => { if (--left === 0) ASSETS.ready = true; };
    im.src = "assets/" + n + ".jpg";
    ASSETS[n] = im;
  }
}
function texOK(im) { return im && im.naturalWidth > 0; }

/* ============================== AUDIO ============================== */
let AC = null;
function audio() {
  if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){} }
  if (AC && AC.state === "suspended") AC.resume();
}
function tone(freq, dur, type, vol, slide) {
  if (!AC) return;
  const o = AC.createOscillator(), gn = AC.createGain(), t = AC.currentTime;
  o.type = type || "square"; o.frequency.setValueAtTime(freq, t);
  if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq + slide), t + dur);
  gn.gain.setValueAtTime(vol || .12, t);
  gn.gain.exponentialRampToValueAtTime(.001, t + dur);
  o.connect(gn).connect(AC.destination); o.start(t); o.stop(t + dur + .02);
}
const SFX = {
  jump:  () => tone(300, .22, "square", .10, 380),
  coin:  () => { tone(990, .08, "square", .10); setTimeout(() => tone(1320, .25, "square", .10), 70); },
  stomp: () => tone(220, .14, "square", .14, -140),
  brick: () => tone(140, .16, "sawtooth", .14, -80),
  die:   () => { tone(520, .25, "square", .12, -300); setTimeout(() => tone(260, .4, "square", .12, -180), 200); },
  bump:  () => tone(110, .08, "square", .12),
  select:() => { tone(660, .09, "square", .10); setTimeout(() => tone(880, .14, "square", .10), 80); },
  clear: () => [523,659,784,1047,1319].forEach((f,i) => setTimeout(() => tone(f, .22, "square", .10), i*110)),
  sprout:() => [392,494,587,698].forEach((f,i) => setTimeout(() => tone(f, .09, "square", .09), i*60)),
  grow:  () => [262,330,392,523,659,784].forEach((f,i) => setTimeout(() => tone(f, .08, "square", .10), i*45)),
  shrink:() => [784,523,392,262].forEach((f,i) => setTimeout(() => tone(f, .09, "square", .10), i*70)),
  fire:  () => tone(680, .12, "sawtooth", .08, -420),
};

/* ============================== INPUT ============================== */
const input = { left:false, right:false, jump:false, jumpPressed:false, firePressed:false, anyTap:false };
const keys = {};
window.addEventListener("keydown", e => {
  if (["ArrowLeft","ArrowRight","ArrowUp","Space"].includes(e.code)) e.preventDefault();
  audio();
  if (!keys[e.code] && (e.code==="Space"||e.code==="ArrowUp"||e.code==="KeyZ"||e.code==="KeyW")) input.jumpPressed = true;
  if (!keys[e.code] && (e.code==="KeyX"||e.code==="KeyB")) input.firePressed = true;
  keys[e.code] = true;
  input.anyTap = true;
});
window.addEventListener("keyup", e => { keys[e.code] = false; });

function syncKeys() {
  input.left  = !!(keys["ArrowLeft"] || keys["KeyA"]) || touch.left;
  input.right = !!(keys["ArrowRight"]|| keys["KeyD"]) || touch.right;
  input.jump  = !!(keys["Space"] || keys["ArrowUp"] || keys["KeyZ"] || keys["KeyW"]) || touch.jump;
}

const touch = { left:false, right:false, jump:false };
const btnL = document.getElementById("btnL"),
      btnR = document.getElementById("btnR"),
      btnJ = document.getElementById("btnJ"),
      btnF = document.getElementById("btnF");
const allBtns = [btnL, btnR, btnJ, btnF];

// Controls fade to near-invisible a few seconds after first use (still tappable)
let fadeScheduled = false;
function scheduleFade() {
  if (fadeScheduled) return;
  fadeScheduled = true;
  setTimeout(() => allBtns.forEach(b => b.classList.add("faded")), 3000);
}
function unfadeButtons() {
  fadeScheduled = false;
  allBtns.forEach(b => b.classList.remove("faded"));
}

function bindBtn(el, prop, onPress) {
  const set = on => {
    if (on && onPress && !touch[prop]) onPress();
    touch[prop] = on;
    el.classList.toggle("pressed", on);
  };
  el.addEventListener("pointerdown", e => { e.preventDefault(); audio(); scheduleFade(); set(true); }, {passive:false});
  el.addEventListener("pointerup",     () => set(false));
  el.addEventListener("pointercancel", () => set(false));
  el.addEventListener("pointerleave",  () => set(false));
}
bindBtn(btnL, "left"); bindBtn(btnR, "right");
bindBtn(btnJ, "jump", () => { input.jumpPressed = true; });
bindBtn(btnF, "fire", () => { input.firePressed = true; });

cv.addEventListener("pointerdown", e => {
  e.preventDefault(); audio();
  input.anyTap = true;
  tapX = e.clientX; tapY = e.clientY;
}, {passive:false});
// block 1-finger scroll, but leave 2-finger pinch available so the page can always be un-zoomed
document.addEventListener("touchmove", e => { if (e.touches.length < 2) e.preventDefault(); }, {passive:false});
// iPad Safari ignores user-scalable=no and zooms on double-tap — suppress rapid second taps
let lastTouchEnd = 0;
document.addEventListener("touchend", e => {
  const tnow = Date.now();
  if (tnow - lastTouchEnd < 350) e.preventDefault();
  lastTouchEnd = tnow;
}, {passive:false});
let tapX = -1, tapY = -1;

function showButtons(on) {
  btnL.style.display = btnR.style.display = btnJ.style.display = on ? "block" : "none";
  refreshFireBtn();
}
let fireBtnShown = false;
function refreshFireBtn() {
  const want = game.state === "play" && player.power === 2;
  if (want !== fireBtnShown) { fireBtnShown = want; btnF.style.display = want ? "block" : "none"; }
}

/* ============================== CHARACTERS ============================== */
const CHARS = {
  jules: {
    name: "JULES",
    cap:"#f3d27a", capDark:"#d9b452", hair:"#3a2a1e", skin:"#f3c89f",
    shirt:"#f59cc4", shirtDark:"#e074a8", legs:"#33408c", legsLow:"#33408c",
    shoe:"#aacdec", sock:null,
  },
  nora: {
    name: "NORA",
    cap:"#1e6b4d", capDark:"#124a34", hair:"#2e2118", skin:"#f0c49a",
    shirt:"#7fdcc4", shirtDark:"#4fbfa2", legs:"#7fdcc4", legsLow:"#f0c49a",
    shoe:"#e9b7cd", sock:"#f5f1ea",
  }
};
let heroKey = "jules";

const firePals = {};
function firePal(key) {
  if (!firePals[key]) {
    const p = CHARS[key];
    firePals[key] = Object.assign({}, p, {
      shirt:"#fff6f3", shirtDark:p.shirt, cap:"#ff5e5e", capDark:"#d63c3c",
    });
  }
  return firePals[key];
}

/* rounded-rect path helper usable on any 2d context */
function rrPath(ctx, x, y, w, h, r) {
  r = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

/* one two-segment limb (thigh+shin or upper+forearm); angles measured from
   straight-down, positive = forward. Returns the end-point. */
function limb(ctx, x0, y0, a1, l1, a2, l2, w, c1, c2) {
  const kx = x0 + Math.sin(a1) * l1, ky = y0 + Math.cos(a1) * l1;
  const fx = kx + Math.sin(a2) * l2, fy = ky + Math.cos(a2) * l2;
  ctx.lineCap = "round";
  ctx.strokeStyle = c1; ctx.lineWidth = w;
  ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(kx, ky); ctx.stroke();
  ctx.strokeStyle = c2; ctx.lineWidth = w * 0.85;
  ctx.beginPath(); ctx.moveTo(kx, ky); ctx.lineTo(fx, fy); ctx.stroke();
  return [fx, fy];
}

/* Draw a kid with realistic proportions (~6 heads tall) and articulated
   limbs. `phase` is a continuous walk-cycle angle, not a 2-state frame.
   Feet at (0,0), facing right by default. */
function drawKid(ctx, x, y, pal, phase, facing, airborne, walking, power) {
  ctx.save();
  ctx.translate(x, y);
  if (power > 0) ctx.scale(1.18, 1.32);
  if (facing < 0) ctx.scale(-1, 1);
  ctx.rotate(airborne ? 0.1 : walking ? 0.07 : 0);          // forward lean

  const HIP = -9.8, SHO = -16.4;
  const bounce = walking && !airborne ? -Math.abs(Math.sin(phase)) * 0.7 : 0;
  ctx.translate(0, bounce);
  const darker = c => c;                                     // limb segments share color

  // gait angles
  let lA1, lA2, rA1, rA2, armA;
  if (airborne) {
    lA1 = 0.65; lA2 = lA1 - 1.5;                             // front leg tucked
    rA1 = -0.55; rA2 = rA1 - 0.35;                           // back leg trailing
    armA = -0.9;                                             // arms swung back/up
  } else if (walking) {
    const s = Math.sin(phase);
    lA1 = s * 0.62;  lA2 = lA1 - Math.max(0, -Math.cos(phase)) * 1.1;
    rA1 = -s * 0.62; rA2 = rA1 - Math.max(0,  Math.cos(phase)) * 1.1;
    armA = -s * 0.5;
  } else {
    lA1 = 0.06; lA2 = 0.02; rA1 = -0.06; rA2 = -0.1; armA = 0.05;
  }
  const thigh = 5.2, shin = 4.8, upper = 3.6, fore = 3.2;

  const shoe = (fx, fy) => {
    ctx.fillStyle = pal.shoe;
    ctx.beginPath(); ctx.ellipse(fx + 0.7, fy - 0.3, 2, 1.15, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,.25)";
    ctx.beginPath(); ctx.ellipse(fx + 0.7, fy - 0.7, 1.5, 0.45, 0, 0, Math.PI*2); ctx.fill();
  };
  const sockOrSkin = pal.sock ? pal.sock : pal.legsLow;

  // back arm, then back leg (drawn behind torso)
  limb(ctx, -1.2, SHO, -armA, upper, -armA - 0.45, fore, 1.7, pal.shirtDark, pal.skin);
  let f = limb(ctx, -0.6, HIP, rA1, thigh, rA2, shin, 2.3, pal.legs, sockOrSkin);
  shoe(f[0], f[1]);

  // torso (shirt) with shading
  const sh = ctx.createLinearGradient(0, SHO - 1, 0, HIP + 1.5);
  sh.addColorStop(0, pal.shirt); sh.addColorStop(1, pal.shirtDark);
  ctx.fillStyle = sh;
  ctx.beginPath();
  ctx.moveTo(-3.4, SHO - 0.6);
  ctx.quadraticCurveTo(0, SHO - 1.6, 3.4, SHO - 0.6);
  ctx.lineTo(3.1, HIP + 1.4); ctx.quadraticCurveTo(0, HIP + 2.2, -3.1, HIP + 1.4);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = "rgba(255,255,255,.13)";
  ctx.beginPath(); ctx.ellipse(-1, SHO + 1.6, 2, 1.1, 0.4, 0, Math.PI*2); ctx.fill();

  // front leg + front arm
  f = limb(ctx, 0.6, HIP, lA1, thigh, lA2, shin, 2.3, pal.legs, sockOrSkin);
  shoe(f[0], f[1]);
  limb(ctx, 1.2, SHO, armA, upper, armA + 0.4, fore, 1.7, pal.shirt, pal.skin);

  // neck + head
  ctx.strokeStyle = pal.skin; ctx.lineWidth = 1.4;
  ctx.beginPath(); ctx.moveTo(0, SHO); ctx.lineTo(0.3, SHO - 1.6); ctx.stroke();
  const hx = 0.5, hy = -20.2;
  // back hair (bob falling to the jaw)
  ctx.fillStyle = pal.hair;
  ctx.beginPath();
  ctx.ellipse(hx - 0.6, hy + 0.4, 3.3, 3.3, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(hx - 3.6, hy - 0.5); ctx.quadraticCurveTo(hx - 4, hy + 4.4, hx - 2.2, hy + 4.6);
  ctx.lineTo(hx - 1, hy + 2); ctx.closePath(); ctx.fill();
  // face
  ctx.fillStyle = pal.skin;
  ctx.beginPath(); ctx.ellipse(hx + 0.6, hy + 0.4, 2.75, 2.9, 0, 0, Math.PI*2); ctx.fill();
  // face shading (light from upper-left)
  ctx.fillStyle = "rgba(120,70,40,.14)";
  ctx.beginPath(); ctx.ellipse(hx + 1.4, hy + 1.5, 1.8, 1.6, 0.3, 0, Math.PI*2); ctx.fill();
  // front hair wisp
  ctx.fillStyle = pal.hair;
  ctx.beginPath();
  ctx.moveTo(hx + 2.9, hy - 1.2); ctx.quadraticCurveTo(hx + 3.4, hy + 1, hx + 3, hy + 2.4);
  ctx.quadraticCurveTo(hx + 3.8, hy + 0.4, hx + 3.3, hy - 1.6); ctx.closePath(); ctx.fill();
  // cap
  const capG = ctx.createLinearGradient(0, hy - 3.4, 0, hy - 0.6);
  capG.addColorStop(0, pal.cap); capG.addColorStop(1, pal.capDark);
  ctx.fillStyle = capG;
  ctx.beginPath(); ctx.arc(hx, hy - 0.8, 3.1, Math.PI, 0); ctx.closePath(); ctx.fill();
  ctx.fillStyle = pal.capDark;
  ctx.beginPath(); ctx.ellipse(hx + 3.2, hy - 0.9, 1.9, 0.55, -0.1, 0, Math.PI*2); ctx.fill();
  // eye + brow (profile-ish 3/4 view)
  ctx.fillStyle = "#241a12";
  ctx.beginPath(); ctx.ellipse(hx + 1.7, hy + 0.1, 0.42, 0.55, 0, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = "rgba(40,25,12,.6)"; ctx.lineWidth = 0.35;
  ctx.beginPath(); ctx.moveTo(hx + 1.1, hy - 0.9); ctx.lineTo(hx + 2.3, hy - 1); ctx.stroke();
  // mouth
  ctx.strokeStyle = "rgba(150,70,55,.8)"; ctx.lineWidth = 0.4;
  ctx.beginPath(); ctx.moveTo(hx + 2, hy + 1.6); ctx.lineTo(hx + 2.8, hy + 1.5); ctx.stroke();
  ctx.restore();
}

function drawPowerup(ctx, p) {
  ctx.save();
  ctx.translate(p.x + p.w/2, p.y + p.h);
  if (p.type === "mushroom") {
    // stout stalk with shading
    const stg = ctx.createLinearGradient(-4, 0, 4, 0);
    stg.addColorStop(0, "#e8d8b8"); stg.addColorStop(0.5, "#f2e6cc"); stg.addColorStop(1, "#b89e74");
    ctx.fillStyle = stg;
    rrPath(ctx, -4, -7, 8, 7, 2.6); ctx.fill();
    // porcini cap with radial shading
    const cg = ctx.createRadialGradient(-2.5, -12.5, 1, 0, -10, 9);
    cg.addColorStop(0, "#c79a64"); cg.addColorStop(0.6, "#8a5e32"); cg.addColorStop(1, "#5a3a1c");
    ctx.fillStyle = cg;
    ctx.beginPath(); ctx.ellipse(0, -9.4, 7.2, 4.6, 0, Math.PI, 0); ctx.closePath(); ctx.fill();
    rrPath(ctx, -7.2, -10, 14.4, 2.2, 1.1); ctx.fill();
    // gills shadow under the cap + sun glint on top
    ctx.fillStyle = "rgba(40,24,10,.45)";
    rrPath(ctx, -6.4, -8.6, 12.8, 1.2, 0.6); ctx.fill();
    ctx.fillStyle = "rgba(255,240,200,.4)";
    ctx.beginPath(); ctx.ellipse(-2.6, -12.2, 2.6, 1.1, 0.3, 0, Math.PI*2); ctx.fill();
  } else {                                           // fire flower
    ctx.strokeStyle = "#3fae4e"; ctx.lineWidth = 1.8; ctx.lineCap = "round";
    ctx.beginPath(); ctx.moveTo(0, -1); ctx.quadraticCurveTo(0.8, -4, 0, -7); ctx.stroke();
    ctx.fillStyle = "#3fae4e";
    ctx.beginPath(); ctx.ellipse(-3, -3.4, 2.6, 1.2, -0.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(3, -2.6, 2.6, 1.2, 0.5, 0, Math.PI*2); ctx.fill();
    // petals
    for (let i = 0; i < 8; i++) {
      const a = i * Math.PI / 4;
      ctx.fillStyle = i % 2 ? "#ff8a3c" : "#e8453c";
      ctx.beginPath();
      ctx.ellipse(Math.cos(a)*3.6, -10.5 + Math.sin(a)*3.6, 2.5, 1.6, a, 0, Math.PI*2);
      ctx.fill();
    }
    const fg = ctx.createRadialGradient(-0.6, -11, 0.4, 0, -10.5, 3);
    fg.addColorStop(0, "#fff0b8"); fg.addColorStop(1, "#f5b93c");
    ctx.fillStyle = fg;
    ctx.beginPath(); ctx.arc(0, -10.5, 2.6, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function drawFireball(ctx, f, t) {
  const cx = f.x + 2, cy = f.y + 2;
  const glow = ctx.createRadialGradient(cx, cy, 0.5, cx, cy, 6);
  glow.addColorStop(0, "rgba(255,200,80,.9)"); glow.addColorStop(1, "rgba(255,120,40,0)");
  ctx.fillStyle = glow;
  ctx.beginPath(); ctx.arc(cx, cy, 6, 0, Math.PI*2); ctx.fill();
  const core = ctx.createRadialGradient(cx - 0.8, cy - 0.8, 0.3, cx, cy, 3.2);
  core.addColorStop(0, "#fff3c0"); core.addColorStop(0.55, "#ffb03c"); core.addColorStop(1, "#e85a20");
  ctx.fillStyle = core;
  ctx.beginPath(); ctx.arc(cx, cy, 3.2, 0, Math.PI*2); ctx.fill();
}

function drawGrump(ctx, x, y, frame, squashT, dir) {
  ctx.save(); ctx.translate(x, y);
  if (squashT > 0) {
    ctx.fillStyle = "#4a3322";
    rrPath(ctx, -7.5, -3, 15, 3, 1.5); ctx.fill();
    ctx.restore(); return;
  }
  if ((dir || -1) > 0) ctx.scale(-1, 1);      // face direction of travel (default art faces left)
  const step = frame ? 0.9 : -0.9;
  // legs (stubby, alternating)
  ctx.strokeStyle = "#3c2a1a"; ctx.lineWidth = 1.6; ctx.lineCap = "round";
  ctx.beginPath();
  ctx.moveTo(-4 + step, -4); ctx.lineTo(-4 - step * 0.6, -0.4);
  ctx.moveTo(3.4 - step, -4); ctx.lineTo(3.4 + step * 0.6, -0.4);
  ctx.stroke();
  // body: bristly boar with fur shading
  const gr = ctx.createLinearGradient(0, -11.5, 0, -2);
  gr.addColorStop(0, "#6e553c"); gr.addColorStop(0.55, "#54402c"); gr.addColorStop(1, "#3a2c1e");
  ctx.fillStyle = gr;
  ctx.beginPath(); ctx.ellipse(0.6, -6.6, 6.6, 4.6, 0, 0, Math.PI*2); ctx.fill();
  // bristle ridge
  ctx.strokeStyle = "rgba(30,22,14,.8)"; ctx.lineWidth = 0.8;
  for (let i = -4; i <= 3; i += 1.6) {
    ctx.beginPath(); ctx.moveTo(i, -10.6); ctx.lineTo(i + 0.8, -11.9); ctx.stroke();
  }
  // snout head
  ctx.fillStyle = "#54402c";
  ctx.beginPath(); ctx.ellipse(-6, -6, 3.4, 3, 0.25, 0, Math.PI*2); ctx.fill();

  const enemies = [];
  const setT = (x, y, c) => { if (x>=0 && x<Wd && y>=0 && y<ROWS) grid[y][x] = c; };
  const ground = (a, b) => { for (let x=a; x<=b; x++){ setT(x,13,"G"); setT(x,14,"#"); } };
  const brick  = (x, y) => setT(x, y, "=");
  const qb     = (x, y) => setT(x, y, "?");
  const mb     = (x, y) => setT(x, y, "M");   // powerup block (looks like ?)
  const stone  = (x, y) => setT(x, y, "S");
  const coin   = (x, y) => setT(x, y, "o");
  const coins  = (x, y, n) => { for (let i=0;i<n;i++) coin(x+i, y); };
  const pipe   = (x, h) => { for (let yy=13-h; yy<13; yy++){ const c = yy===13-h ? "T":"P"; setT(x,yy,c); setT(x+1,yy,c); } };
  const stair  = (x, h, dir) => { for (let s=0;s<h;s++){ const cx = x + (dir<0 ? -s : s); for (let yy=12; yy>12-(s+1); yy--) stone(cx, yy); } };
  const enemy  = (x, ty = 11) => enemies.push({ x:x*TILE, y:ty*TILE, w:12, h:12, vx:-0.5, vy:0, dead:0, active:false, frame:0 });

/* ============================== PHYSICS ============================== */
const SOLID = "#G=?MUSPT";
function tileAt(tx, ty) {
  const L = game.level;
  if (tx < 0 || tx >= L.width) return "#";
  if (ty < 0) return " ";
  if (ty >= ROWS) return " ";
  return L.grid[ty][tx];
}
function isSolid(c) { return SOLID.includes(c); }

function moveEntity(e, onBumpHead) {
  // horizontal
  e.x += e.vx;
  let x0 = Math.floor(e.x / TILE), x1 = Math.floor((e.x + e.w - 0.01) / TILE);
  let y0 = Math.floor(e.y / TILE), y1 = Math.floor((e.y + e.h - 0.01) / TILE);
  if (e.vx > 0) {
    for (let ty = y0; ty <= y1; ty++) if (isSolid(tileAt(x1, ty))) { e.x = x1*TILE - e.w - 0.01; e.hitWall = true; break; }
  } else if (e.vx < 0) {
    for (let ty = y0; ty <= y1; ty++) if (isSolid(tileAt(x0, ty))) { e.x = (x0+1)*TILE + 0.01; e.hitWall = true; break; }
  }
  // vertical
  e.y += e.vy;
  x0 = Math.floor(e.x / TILE); x1 = Math.floor((e.x + e.w - 0.01) / TILE);
  y0 = Math.floor(e.y / TILE); y1 = Math.floor((e.y + e.h - 0.01) / TILE);
  e.grounded = false;
  if (e.vy > 0) {
    for (let tx = x0; tx <= x1; tx++) if (isSolid(tileAt(tx, y1))) {
      e.y = y1*TILE - e.h; e.vy = 0; e.grounded = true; break;
    }
  } else if (e.vy < 0) {
    let bumped = null, bestDist = 1e9;
    for (let tx = x0; tx <= x1; tx++) if (isSolid(tileAt(tx, y0))) {
      e.y = (y0+1)*TILE + 0.01; e.vy = 0;
      const cx = e.x + e.w/2, d = Math.abs((tx+0.5)*TILE - cx);
      if (d < bestDist) { bestDist = d; bumped = tx; }
    }
    if (bumped !== null && onBumpHead) onBumpHead(bumped, y0);
  }
}

function bumpBlock(tx, ty) {
  const c = tileAt(tx, ty), L = game.level;
  if (c === "?") {
    L.grid[ty][tx] = "U";
    game.coins++; game.score += 100; SFX.coin();
    game.pops.push({ x:(tx+0.5)*TILE, y:ty*TILE, t:0 });
  } else if (c === "M") {
    L.grid[ty][tx] = "U";
    game.score += 100; SFX.sprout();
    // mushroom when small, fire flower when already big (like SMB)
    game.powerups.push({ x:tx*TILE + 2, y:ty*TILE + 2, w:12, h:12,
      vx:0.7, vy:0, type: player.power === 0 ? "mushroom" : "flower", rise:28 });
  } else if (c === "=") {
    if (player.power > 0) {                  // only big kids break bricks
      L.grid[ty][tx] = " ";
      game.score += 50; SFX.brick();
      for (let i = 0; i < 6; i++)
        game.particles.push({ x:(tx+0.5)*TILE, y:(ty+0.5)*TILE,
          vx:(i%2?1:-1)*(0.6+i*0.25), vy:-2.2-(i%3)*0.7, t:0, c:"#b46a36" });
    } else SFX.bump();
  } else if (isSolid(c)) {
    SFX.bump();
  }
}

function applyDamage() {
  if (player.inv > 0) return;
  if (player.power > 0) {
    player.power--;
    if (player.power === 0) { player.y += 8; player.h = 16; }
    player.inv = 120; SFX.shrink();
  } else {
    killPlayer();
  }
}

function bossHit() {
  const B = game.boss;
  B.hp--; B.stun = 50; SFX.stomp();
  game.score += 500;
  if (B.hp <= 0) { B.dead = true; B.deadT = 0; B.vy = -4.5; game.score += 5000; SFX.clear(); }
}

function collectCoins() {
  const x0 = Math.floor(player.x / TILE), x1 = Math.floor((player.x + player.w) / TILE);
  const y0 = Math.floor(player.y / TILE), y1 = Math.floor((player.y + player.h) / TILE);
  for (let ty = y0; ty <= y1; ty++) for (let tx = x0; tx <= x1; tx++) {
    if (tileAt(tx, ty) === "o") {
      game.level.grid[ty][tx] = " ";
      game.coins++; game.score += 100; SFX.coin();
      game.pops.push({ x:(tx+0.5)*TILE, y:ty*TILE, t:0 });
    }
  }
}

/* ============================== UPDATE ============================== */
/* Super Mario Bros movement constants (px/frame @ 60fps, 16px tiles) */
const WALK_MAX = 1.5625, RUN_MAX = 2.5625;
const ACC_WALK = 0.0374, ACC_RUN = 0.0556, DEC_REL = 0.0508, DEC_SKID = 0.1016;
const MAX_FALL = 4.0;
/* SMB jump: initial velocity + gravity depend on takeoff speed */
function jumpTier(speed) {
  const s = Math.abs(speed);
  if (s < 1.0)    return { v:-4.0, hold:0.125,   fall:0.4375  };
  if (s < 2.3125) return { v:-4.0, hold:0.1172,  fall:0.40625 };
  return            { v:-5.0, hold:0.15625, fall:0.5625  };
}

function setPower(n) {
  if (n > 0 && player.h === 16) { player.y -= 8.01; player.h = 24; }
  if (n === 0 && player.h === 24) { player.y += 8; player.h = 16; }
  player.power = n;
}

function updatePlay() {
  syncKeys();
  if (player.inv > 0) player.inv--;

  // --- horizontal: walk/auto-run with SMB accel, release decel and skid ---
  const dir = (input.right ? 1 : 0) - (input.left ? 1 : 0);
  if (dir !== 0) {
    if (dir === player.runDir) player.runCharge++;
    else { player.runCharge = 0; player.runDir = dir; }
  } else player.runCharge = 0;
  const running = player.runCharge > 30;            // hold a direction ~0.5s to run
  const maxV = running ? RUN_MAX : WALK_MAX;

  if (dir !== 0) {
    player.facing = dir;
    if (player.vx * dir < 0) {
      player.vx += dir * (player.grounded ? DEC_SKID : ACC_RUN);   // skid turn
    } else if (Math.abs(player.vx) < maxV) {
      player.vx += dir * (running ? ACC_RUN : ACC_WALK);
      if (Math.abs(player.vx) > maxV) player.vx = dir * maxV;
    } else if (player.grounded && Math.abs(player.vx) > maxV) {
      player.vx -= Math.sign(player.vx) * DEC_REL;                 // ease back to walk speed
    }
  } else if (player.grounded && player.vx !== 0) {
    const s = Math.sign(player.vx);
    player.vx -= s * DEC_REL;
    if (player.vx * s < 0) player.vx = 0;
  }

  // --- jump (buffer + coyote for kid-friendliness) ---
  if (input.jumpPressed) { player.jumpBuf = 7; input.jumpPressed = false; }
  if (player.grounded) { player.coyote = 5; player.jg = jumpTier(player.vx); }
  if (player.jumpBuf > 0 && player.coyote > 0) {
    const t = jumpTier(player.vx);
    player.vy = t.v; player.jg = t;
    player.coyote = 0; player.jumpBuf = 0; SFX.jump();
  }
  if (player.jumpBuf > 0) player.jumpBuf--;
  if (player.coyote > 0) player.coyote--;

  // --- gravity: light while rising & holding jump, heavy otherwise (SMB) ---
  player.vy += (player.vy < 0 && input.jump) ? player.jg.hold : player.jg.fall;
  player.vy = Math.min(player.vy, MAX_FALL);

  player.hitWall = false;
  moveEntity(player, bumpBlock);
  collectCoins();

  // --- fireballs ---
  if (input.firePressed) {
    input.firePressed = false;
    if (player.power === 2 && game.fireballs.length < 2) {
      game.fireballs.push({ x: player.x + (player.facing > 0 ? player.w : -5),
        y: player.y + player.h * 0.35, w:4, h:4, vx: 3 * player.facing, vy: 1 });
      SFX.fire();
    }
  }
  for (const f of game.fireballs) {
    f.vy = Math.min(f.vy + 0.3, 5);
    f.hitWall = false;
    moveEntity(f);
    if (f.grounded) f.vy = -2.6;
    if (f.hitWall || f.x < game.camX - 24 || f.x > game.camX + VIEW_W + 24 || f.y > LEVEL_H + 24) f.gone = true;
  }
  game.fireballs = game.fireballs.filter(f => !f.gone);

  // --- powerups (mushrooms walk, flowers sit) ---
  for (const p of game.powerups) {
    if (p.rise > 0) { p.rise--; p.y -= 0.5; }
    else if (p.type === "mushroom") {
      p.vy = Math.min(p.vy + 0.4375, MAX_FALL);
      p.hitWall = false;
      moveEntity(p);
      if (p.hitWall) p.vx = -p.vx;
      if (p.y > LEVEL_H + 40) p.gone = true;
    }
    if (p.rise < 20 &&
        player.x < p.x + p.w && player.x + player.w > p.x &&
        player.y < p.y + p.h && player.y + player.h > p.y) {
      p.gone = true; game.score += 1000; SFX.grow();
      setPower(p.type === "flower" ? Math.min(2, player.power + 1) : Math.max(1, player.power));
      game.pops.push({ x: p.x + p.w/2, y: p.y, t: 0 });
    }
  }
  game.powerups = game.powerups.filter(p => !p.gone);
  refreshFireBtn();

  // animation: continuous gait phase scaled by speed
  if (Math.abs(player.vx) > 0.1 && player.grounded) player.phase += Math.abs(player.vx) * 0.32;

  // fell in a pit
  if (player.y > LEVEL_H + 40) { killPlayer(); return; }

  // enemies
  const L = game.level;
  for (const e of L.enemies) {
    if (!e.active) {
      if (e.x < game.camX + VIEW_W + 24) e.active = true;
      else continue;
    }
    if (e.dead > 0) { e.dead++; continue; }
    e.vy = Math.min(e.vy + 0.4375, MAX_FALL);
    e.hitWall = false;
    moveEntity(e);
    if (e.hitWall) e.vx = -e.vx;
    e.frame = (Math.floor(game.timer / 14)) % 2;
    if (e.y > LEVEL_H + 60) { e.dead = 999; continue; }

    // fireball hits
    for (const f of game.fireballs) {
      if (!f.gone && f.x < e.x + e.w && f.x + f.w > e.x &&
          f.y < e.y + e.h && f.y + f.h > e.y) {
        e.dead = 1; f.gone = true; game.score += 200; SFX.stomp();
      }
    }
    if (e.dead > 0) continue;

    // player collision
    if (player.x < e.x + e.w && player.x + player.w > e.x &&
        player.y < e.y + e.h && player.y + player.h > e.y) {
      const feet = player.y + player.h;
      if (player.vy > 0.4 && feet - e.y < 9) {
        e.dead = 1; game.score += 200; SFX.stomp();
        const t = jumpTier(player.vx);
        player.vy = t.v; player.jg = t;     // SMB-style bounce; hold jump to ride it higher
      } else {
        applyDamage();
        if (game.state !== "play") return;
      }
    }
  }
  L.enemies = L.enemies.filter(e => e.dead < 26 || !e.active);

  // --- the castle boss ---
  const B = game.boss;
  if (B && !B.dead) {
    if (!B.active && B.x < game.camX + VIEW_W + 60) B.active = true;
    if (B.active) {
      if (B.stun > 0) B.stun--;
      B.facing = player.x + player.w/2 < B.x + B.w/2 ? -1 : 1;
      B.x += B.vx;
      if (B.x < B.baseX - 30 || B.x > B.baseX + 30) B.vx = -B.vx;
      B.vy = Math.min(B.vy + 0.3, 5);
      B.y += B.vy;
      const floorY = 13*TILE - B.h;
      if (B.y >= floorY) { B.y = floorY; B.vy = 0; }
      if (--B.hopT <= 0) { B.hopT = 130 + (game.timer % 70); B.vy = -3.4; }
      if (--B.fireT <= 0) {
        B.fireT = 150;
        game.bossFlames.push({ x: B.x + (B.facing > 0 ? B.w + 2 : -14), y: B.y + 7,
                               w: 12, h: 6, vx: 1.5 * B.facing });
        SFX.brick();
      }
      for (const f of game.fireballs) {
        if (!f.gone && B.stun === 0 && f.x < B.x + B.w && f.x + f.w > B.x &&
            f.y < B.y + B.h && f.y + f.h > B.y) { f.gone = true; bossHit(); }
      }
      if (player.x < B.x + B.w && player.x + player.w > B.x &&
          player.y < B.y + B.h && player.y + player.h > B.y) {
        const feet = player.y + player.h;
        if (player.vy > 0.4 && feet - B.y < 14) {
          const t = jumpTier(player.vx);
          player.vy = t.v; player.jg = t;       // bounce off his head
          if (B.stun === 0) bossHit();
        } else if (B.stun < 30) {
          applyDamage();
          if (game.state !== "play") return;
        }
      }
    }
  } else if (B && B.dead && B.y < LEVEL_H + 80) {
    B.deadT++; B.vy = Math.min(B.vy + 0.25, 6); B.y += B.vy;
  }
  for (const fl of game.bossFlames) {
    fl.x += fl.vx;
    if (fl.x < game.camX - 30 || fl.x > game.camX + VIEW_W + 30) fl.gone = true;
    else if (player.inv === 0 &&
        player.x < fl.x + fl.w && player.x + player.w > fl.x &&
        player.y < fl.y + fl.h && player.y + player.h > fl.y) {
      fl.gone = true;
      applyDamage();
      if (game.state !== "play") return;
    }
  }
  game.bossFlames = game.bossFlames.filter(fl => !fl.gone);

  // --- Peach the pug, waiting in her cage ---
  if (game.pug) {
    if (!game.pug.free && game.boss.dead && game.boss.deadT > 40) { game.pug.free = true; SFX.sprout(); }
    if (game.pug.free) {
      game.pug.hopT++;
      if (Math.abs(player.x + player.w/2 - game.pug.x) < 14 && player.y + player.h > 11*TILE) {
        game.state = "clear"; game.timer = 0; game.rescued = true; game.score += 5000;
        SFX.clear(); spawnConfetti(game.pug.x, 100); showButtons(false);
      }
    }
  }

  // flag
  if (L.flagX && player.x + player.w/2 >= L.flagX * TILE) {
    game.state = "clear"; game.timer = 0; game.score += 1000; SFX.clear();
    spawnConfetti(L.flagX * TILE, 80);
    showButtons(false);
  }

  // camera
  const target = player.x + player.w/2 - VIEW_W * 0.42;
  game.camX += (target - game.camX) * 0.12;
  game.camX = Math.max(0, Math.min(game.camX, L.width * TILE - VIEW_W));
}

function killPlayer() {
  game.state = "dead"; game.timer = 0;
  player.vy = -6.5; player.power = 0; SFX.die();
  showButtons(false);
}

function spawnConfetti(x, n) {
  const colors = ["#ff5e7e","#ffd166","#6ee7b7","#7fb5ff","#c89bff"];
  for (let i = 0; i < n; i++)
    game.particles.push({ x: x + (Math.random()*60-30), y: Math.random()*120,
      vx: Math.random()*2-1, vy: Math.random()*-1.5-0.5, t: -Math.random()*30,
      c: colors[i % colors.length], conf: true });
}

function update() {
  game.timer++;

  // particles
  for (const p of game.particles) {
    if (p.t < 0) { p.t++; continue; }
    p.x += p.vx; p.y += p.vy;
    p.vy += p.conf ? 0.05 : 0.3;
    if (p.conf) p.vx *= 0.99;
    p.t++;
  }
  game.particles = game.particles.filter(p => p.t < (p.conf ? 220 : 60) && p.y < LEVEL_H + 80);
  for (const c of game.pops) c.t++;
  game.pops = game.pops.filter(c => c.t < 28);

  if (game.state === "play") updatePlay();
  else if (game.state === "dead") {
    player.vy += 0.35; player.y += player.vy;
    if (game.timer > 110) {
      game.lives--;
      if (game.lives <= 0) { game.state = "gameover"; game.timer = 0; }
      else startLevel(game.levelNum);
    }
  }
  else if (game.state === "clear") {
    // hero strolls right past the flag
    player.vx = 1.2; player.vy = Math.min(player.vy + 0.46, 7);
    moveEntity(player);
    player.phase += 0.38;
    if (game.timer > 170) {
      if (game.levelNum + 1 < LEVEL_COUNT) startLevel(game.levelNum + 1);
      else { game.state = "win"; game.timer = 0; spawnConfetti(game.camX + VIEW_W/2, 120); }
    }
  }
  else if (game.state === "gameover") {
    if (game.timer > 30 && tapX >= 0 && game.goHits) {
      for (const h of game.goHits) {
        if (tapX >= h.x && tapX <= h.x + h.w && tapY >= h.y && tapY <= h.y + h.h) {
          SFX.select();
          if (h.action === "continue") { game.lives = 3; startLevel(game.levelNum); }
          else goTitle();
          break;
        }
      }
    }
    if (keys["Enter"] && game.timer > 30) { SFX.select(); game.lives = 3; startLevel(game.levelNum); }
  }
  else if (game.state === "win") {
    if (game.timer % 50 === 0 && game.timer < 400) spawnConfetti(game.camX + VIEW_W/2, 30);
    if (game.timer > 90 && input.anyTap) goTitle();
  }
  else if (game.state === "title") updateTitle();

  input.anyTap = false; input.firePressed = false; tapX = -1;
}

function updateTitle() {
  if (tapX >= 0) {
    for (const c of game.titleCards) {
      if (tapX >= c.sx && tapX <= c.sx + c.sw && tapY >= c.sy && tapY <= c.sy + c.sh) {
        heroKey = c.key; SFX.select();
        startLevel(0);
        return;
      }
    }
  }
  if (keys["Enter"]) { SFX.select(); startLevel(0); }
}

/* ============================== DRAW ============================== */
/* Tiles are pre-rendered once at 3x resolution into offscreen canvases,
   then drawn scaled — detailed texture at zero per-frame cost. */
const SPR = {};
function tileSprite(c) {
  if (SPR[c]) return SPR[c];
  const K = 3, R = 16 * K;
  const s = document.createElement("canvas");
  s.width = c === "T" ? R + 4*K : R; s.height = R;
  const t = s.getContext("2d");
  const lg = (x0,y0,x1,y1,stops) => {
    const gr = t.createLinearGradient(x0,y0,x1,y1);
    for (const [o,col] of stops) gr.addColorStop(o,col);
    return gr;
  };
  // crop a region of a photo texture onto the sprite (cover-fit)
  const photo = (im, cx, cy, crop, dx, dy, dw, dh) => {
    if (!texOK(im)) return false;
    t.drawImage(im, cx, cy, crop, crop, dx, dy, dw, dh);
    return true;
  };
  const bevel = (a) => {   // baked directional light: top-left lit, bottom-right shaded
    t.fillStyle = "rgba(255,250,235," + a + ")";
    t.fillRect(0, 0, R, 3); t.fillRect(0, 0, 3, R);
    t.fillStyle = "rgba(15,10,25," + (a + 0.08) + ")";
    t.fillRect(0, R - 4, R, 4); t.fillRect(R - 4, 0, 4, R);
  };
  switch (c) {
    case "G": {
      photo(ASSETS.soil, 30, 30, 200, 0, 0, R, R) || (t.fillStyle = "#6b431f", t.fillRect(0,0,R,R));
      // grass turf on top with a ragged sod line
      t.save();
      t.beginPath(); t.moveTo(0, 0); t.lineTo(R, 0); t.lineTo(R, 14);
      for (let i = 8; i >= 0; i--) t.lineTo(i * 6, 14 + ((i * 7) % 3) * 2.4);
      t.closePath(); t.clip();
      photo(ASSETS.grass, 60, 60, 150, 0, -4, R, 26) || (t.fillStyle = "#4c9a32", t.fillRect(0,0,R,18));
      t.restore();
      // sunlight on the turf, occlusion under the sod line
      t.fillStyle = "rgba(255,240,190,.28)"; t.fillRect(0, 0, R, 5);
      t.fillStyle = "rgba(20,12,4,.3)"; t.fillRect(0, 16, R, 5);
      break;
    }
    case "#": {
      photo(ASSETS.soil, 130, 130, 220, 0, 0, R, R) || (t.fillStyle = "#62391a", t.fillRect(0,0,R,R));
      t.fillStyle = "rgba(58,30,8,.5)"; t.fillRect(0, 0, R, R);   // deeper earth, warm and dark
      break;
    }
    case "=": {
      photo(ASSETS.brick, 40, 60, 150, 0, 0, R, R) || (t.fillStyle = "#a4562a", t.fillRect(0,0,R,R));
      bevel(0.16);
      break;
    }
    case "?": case "M": {                       // banded wooden crate
      photo(ASSETS.wood, 30, 30, 200, 0, 0, R, R) || (t.fillStyle = "#9a6a38", t.fillRect(0,0,R,R));
      // frame planks
      t.fillStyle = "rgba(60,38,16,.55)";
      t.fillRect(0, 0, R, 5); t.fillRect(0, R-5, R, 5); t.fillRect(0, 0, 5, R); t.fillRect(R-5, 0, 5, R);
      // iron corner brackets
      t.fillStyle = "#3c3f46";
      for (const [bx,by] of [[0,0],[R-9,0],[0,R-9],[R-9,R-9]]) t.fillRect(bx, by, 9, 9);
      t.fillStyle = "rgba(255,255,255,.18)";
      for (const [bx,by] of [[0,0],[R-9,0],[0,R-9],[R-9,R-9]]) t.fillRect(bx, by, 9, 2);
      // branded "?"
      t.font = "900 24px 'Avenir Next',Arial"; t.textAlign = "center"; t.textBaseline = "middle";
      t.fillStyle = "rgba(255,235,180,.85)"; t.fillText("?", R/2, R/2 + 1);
      t.fillStyle = "rgba(30,15,5,.35)"; t.fillText("?", R/2 + 1, R/2 + 2);
      bevel(0.14);
      break;
    }
    case "U": {                                 // opened crate
      photo(ASSETS.wood, 130, 130, 200, 0, 0, R, R) || (t.fillStyle = "#7a5226", t.fillRect(0,0,R,R));
      t.fillStyle = "rgba(15,8,2,.5)"; t.fillRect(0, 0, R, R);
      t.fillStyle = "rgba(0,0,0,.55)"; t.fillRect(8, 8, R-16, R-16);
      break;
    }
    case "S": {
      photo(ASSETS.rock, 50, 50, 180, 0, 0, R, R) || (t.fillStyle = "#aaaebe", t.fillRect(0,0,R,R));
      bevel(0.18);
      break;
    }
    case "T": {                                 // mossy stone pillar cap
      const w = R + 4*K;
      if (texOK(ASSETS.rock)) t.drawImage(ASSETS.rock, 20, 20, 220, 110, 0, 0, w, R);
      else { t.fillStyle = "#6b7790"; t.fillRect(0,0,w,R); }
      // cylindrical shading
      t.fillStyle = lg(0,0,0.0001+w,0,[[0,"rgba(10,8,20,.5)"],[0.3,"rgba(255,250,230,.22)"],[0.55,"rgba(0,0,0,0)"],[1,"rgba(10,8,20,.55)"]]);
      t.fillRect(0,0,w,R);
      // moss turf on the cap
      t.save();
      t.beginPath(); t.rect(0, 0, w, 10); t.clip();
      photo(ASSETS.grass, 100, 100, 160, 0, -3, w, 16);
      t.restore();
      t.fillStyle = "rgba(20,12,4,.4)"; t.fillRect(0, 10, w, 3);
      break;
    }
    case "P": {                                 // stone pillar shaft
      if (texOK(ASSETS.rock)) t.drawImage(ASSETS.rock, 60, 90, 150, 150, -2, 0, R + 4, R);
      else { t.fillStyle = "#6b7790"; t.fillRect(0,0,R,R); }
      t.fillStyle = lg(0,0,R,0,[[0,"rgba(10,8,20,.5)"],[0.3,"rgba(255,250,230,.2)"],[0.55,"rgba(0,0,0,0)"],[1,"rgba(10,8,20,.55)"]]);
      t.fillRect(0,0,R,R);
      break;
    }
  }
  SPR[c] = s;
  return s;
}

function drawTile(c, tx, ty) {
  const x = tx*TILE, y = ty*TILE;
  if (c === "o") {
    const sp = Math.sin(game.timer * 0.12 + tx * 0.9);
    const w = Math.abs(sp) * 4.6 + 1.4;
    const cg = g.createRadialGradient(x+7, y+6.6, 0.5, x+8, y+8, 7);
    cg.addColorStop(0, "#fff3c0"); cg.addColorStop(0.6, "#f6c14f"); cg.addColorStop(1, "#c8861d");
    g.fillStyle = cg;
    g.beginPath(); g.ellipse(x+8, y+8, w, 6, 0, 0, Math.PI*2); g.fill();
    g.strokeStyle = "rgba(140,90,20,.55)"; g.lineWidth = 0.8;
    g.beginPath(); g.ellipse(x+8, y+8, w, 6, 0, 0, Math.PI*2); g.stroke();
    if (w > 3.4) {
      g.strokeStyle = "rgba(150,100,25,.5)";
      g.beginPath(); g.ellipse(x+8, y+8, w*0.55, 3.6, 0, 0, Math.PI*2); g.stroke();
    }
    return;
  }
  const sp = tileSprite(c);
  if (c === "T") g.drawImage(sp, x - 2, y, 20, 16);
  else g.drawImage(sp, x, y, 16, 16);
}

function bgLayer(camX, p, period, fn) {
  const off = -((camX * p) % period);
  for (let i = -1; i < VIEW_W / period + 2; i++) fn(camX + off + i * period);
}

function drawBackground(camX) {
  const theme = game.level.theme || "day";
  if (theme === "castle") {
    const cgr = g.createLinearGradient(0, -VIEW_H, 0, LEVEL_H);
    cgr.addColorStop(0, "#140a10"); cgr.addColorStop(1, "#43161c");
    g.fillStyle = cgr;
    g.fillRect(camX - 4, -VIEW_H - 4, VIEW_W + 8, VIEW_H + LEVEL_H + 8);
    return;
  }
  if (theme === "night") {
    const ngr = g.createLinearGradient(0, -VIEW_H, 0, LEVEL_H);
    ngr.addColorStop(0, "#0e1638"); ngr.addColorStop(1, "#33437e");
    g.fillStyle = ngr;
    g.fillRect(camX - 4, -VIEW_H - 4, VIEW_W + 8, VIEW_H + LEVEL_H + 8);
    for (let i = 0; i < 50; i++) {
      const sx = camX + ((i * 89.7) % VIEW_W), sy = (i * 47.3) % 170;
      const tw = Math.sin(game.timer * 0.05 + i) * 0.5 + 0.5;
      g.fillStyle = "rgba(255,255,235," + (0.25 + tw * 0.6) + ")";
      g.fillRect(sx, sy, 1.6, 1.6);
    }
    const mx = camX + VIEW_W * 0.8;
    g.fillStyle = "#f2ecd8";
    g.beginPath(); g.arc(mx, 36, 11, 0, Math.PI*2); g.fill();
    g.fillStyle = "#0e1638";
    g.beginPath(); g.arc(mx + 5, 33, 9, 0, Math.PI*2); g.fill();
    const hx2 = -((camX * 0.4) % 220);
    g.fillStyle = "#1c3a4e";
    for (let i = -1; i < VIEW_W / 220 + 2; i++) {
      const bx = camX + hx2 + i * 220;
      g.beginPath(); g.arc(bx + 60, 208, 44, Math.PI, 0); g.fill();
      g.beginPath(); g.arc(bx + 170, 208, 26, Math.PI, 0); g.fill();
    }
    return;
  }
  // real photographed sky (equirect strip), slow parallax, tiled horizontally
  const sk = ASSETS.sky;
  if (texOK(sk)) {
    const dh = 400, dw = dh * (sk.width / sk.height);   // horizon sits at dh/2
    const dy = 196 - dh / 2;
    g.fillStyle = "#39536e";                            // matches sky-top for the strip above
    g.fillRect(camX - 4, -VIEW_H - 4, VIEW_W + 8, VIEW_H + dy + 8);
    const off = -((camX * 0.06) % dw);
    for (let i = -1; i < VIEW_W / dw + 2; i++)
      g.drawImage(sk, camX + off + i * dw, dy, dw, dh);
    // blend seam between fill and photo
    const seam = g.createLinearGradient(0, dy, 0, dy + 50);
    seam.addColorStop(0, "#39536e"); seam.addColorStop(1, "rgba(57,83,110,0)");
    g.fillStyle = seam; g.fillRect(camX - 4, dy, VIEW_W + 8, 50);
  } else {
    const grad = g.createLinearGradient(0, -VIEW_H, 0, 208);
    grad.addColorStop(0, "#4f7faa"); grad.addColorStop(1, "#dce8ee");
    g.fillStyle = grad;
    g.fillRect(camX - 4, -VIEW_H - 4, VIEW_W + 8, VIEW_H + LEVEL_H + 8);
  }

  // distant ridges in atmospheric haze
  bgLayer(camX, 0.1, 380, bx => {
    g.fillStyle = "rgba(116,138,158,.5)";
    g.beginPath(); g.moveTo(bx, 208);
    g.quadraticCurveTo(bx + 85, 96, bx + 170, 208); g.closePath(); g.fill();
    g.beginPath(); g.moveTo(bx + 130, 208);
    g.quadraticCurveTo(bx + 240, 122, bx + 380, 208); g.closePath(); g.fill();
  });
  bgLayer(camX, 0.18, 300, bx => {
    g.fillStyle = "rgba(86,108,116,.55)";
    g.beginPath(); g.moveTo(bx, 208);
    g.quadraticCurveTo(bx + 95, 132, bx + 200, 208); g.closePath(); g.fill();
  });

  // forest tree line
  bgLayer(camX, 0.34, 240, bx => {
    g.fillStyle = "rgba(44,72,48,.85)";
    for (let i = 0; i < 12; i++) {
      const tx2 = bx + i * 20 + ((i * 13) % 7), th = 26 + ((i * 11) % 17);
      g.beginPath();
      g.moveTo(tx2, 208); g.lineTo(tx2 + 9, 208 - th); g.lineTo(tx2 + 18, 208);
      g.closePath(); g.fill();
    }
  });
  // nearer, darker trees
  bgLayer(camX, 0.5, 260, bx => {
    g.fillStyle = "rgba(28,50,34,.9)";
    for (let i = 0; i < 7; i++) {
      const tx2 = bx + i * 36 + ((i * 17) % 11), th = 38 + ((i * 23) % 22);
      g.beginPath();
      g.moveTo(tx2, 208); g.lineTo(tx2 + 12, 208 - th); g.lineTo(tx2 + 24, 208);
      g.closePath(); g.fill();
    }
  });
  // ground fog hugging the treeline
  const fog = g.createLinearGradient(0, 170, 0, 208);
  fog.addColorStop(0, "rgba(214,226,230,0)"); fog.addColorStop(1, "rgba(214,226,230,.4)");
  g.fillStyle = fog;
  g.fillRect(camX - 4, 170, VIEW_W + 8, 38);
}

/* post pass: golden-hour grade, sun bloom, dust motes, vignette */
function lightingPass(camX) {
  const sunX = camX + VIEW_W * 0.74, sunY = 26;
  g.save();
  g.globalCompositeOperation = "multiply";
  const warm = g.createLinearGradient(0, -40, 0, LEVEL_H);
  warm.addColorStop(0, "#ffeedd"); warm.addColorStop(1, "#d8cfd2");
  g.fillStyle = warm;
  g.fillRect(camX - 4, -VIEW_H, VIEW_W + 8, VIEW_H + LEVEL_H + 60);
  g.globalCompositeOperation = "screen";
  const bloom = g.createRadialGradient(sunX, sunY, 4, sunX, sunY, VIEW_W * 0.7);
  bloom.addColorStop(0, "rgba(255,214,150,.55)"); bloom.addColorStop(0.25, "rgba(255,190,120,.18)"); bloom.addColorStop(1, "rgba(255,190,120,0)");
  g.fillStyle = bloom;
  g.fillRect(camX - 4, -VIEW_H, VIEW_W + 8, VIEW_H + LEVEL_H + 60);
  // light shafts
  g.fillStyle = "rgba(255,225,170,.06)";
  for (let i = 0; i < 3; i++) {
    const a = 0.55 + i * 0.16 + Math.sin(game.timer * 0.004 + i) * 0.03;
    g.beginPath();
    g.moveTo(sunX, sunY);
    g.lineTo(sunX - Math.cos(a) * 600 - 26, sunY + Math.sin(a) * 600);
    g.lineTo(sunX - Math.cos(a) * 600 + 26, sunY + Math.sin(a) * 600);
    g.closePath(); g.fill();
  }
  g.globalCompositeOperation = "source-over";
  // drifting dust motes
  for (let i = 0; i < 26; i++) {
    const mx = camX + (((i * 73.7) + game.timer * (0.08 + (i % 5) * 0.05)) % VIEW_W);
    const my = 30 + ((i * 41.3 + Math.sin(game.timer * 0.01 + i) * 14) % 170);
    g.fillStyle = "rgba(255,240,210," + (0.1 + (i % 4) * 0.05) + ")";
    g.fillRect(mx, my, 1.1, 1.1);
  }
  // vignette
  const cx = camX + VIEW_W / 2;
  const vg = g.createRadialGradient(cx, 110, VIEW_W * 0.3, cx, 110, VIEW_W * 0.85);
  vg.addColorStop(0, "rgba(10,8,16,0)"); vg.addColorStop(1, "rgba(10,8,16,.28)");
  g.fillStyle = vg;
  g.fillRect(camX - 4, -VIEW_H, VIEW_W + 8, VIEW_H + LEVEL_H + 60);
  g.restore();
}

function drawFlag(fx) {
  const x = fx * TILE + 8, top = 2*TILE;
  // pole with metallic gradient
  const pg = g.createLinearGradient(x-1.5, 0, x+2.5, 0);
  pg.addColorStop(0, "#9aa4ae"); pg.addColorStop(0.4, "#eef3f7"); pg.addColorStop(1, "#7c868f");
  g.fillStyle = pg; g.fillRect(x-1.5, top, 4, 11*TILE);
  const bg2 = g.createRadialGradient(x-0.5, top-1.5, 0.5, x+0.5, top, 4.5);
  bg2.addColorStop(0, "#fffbe8"); bg2.addColorStop(1, "#c9a83c");
  g.fillStyle = bg2; g.beginPath(); g.arc(x+0.5, top, 4.2, 0, Math.PI*2); g.fill();
  // waving flag
  const wave = Math.sin(game.timer * 0.08) * 2.5;
  const fg = g.createLinearGradient(x, 0, x+27, 0);
  fg.addColorStop(0, "#ff7d96"); fg.addColorStop(1, "#e83c60");
  g.fillStyle = fg;
  g.beginPath();
  g.moveTo(x+2.5, top+4);
  g.quadraticCurveTo(x+15, top+6 + wave*0.6, x+27+wave, top+11);
  g.quadraticCurveTo(x+15, top+16 - wave*0.6, x+2.5, top+18);
  g.closePath(); g.fill();
  g.fillStyle = "#fff";
  g.font = "bold 8px monospace"; g.textAlign = "left"; g.textBaseline = "alphabetic";
  g.fillText("♥", x+7, top+14);
}

function softShadow(cx, feetY, w) {
  g.fillStyle = "rgba(30,40,20,.18)";
  g.beginPath(); g.ellipse(cx, feetY + 0.8, w, 1.7, 0, 0, Math.PI*2); g.fill();
}

function drawLava(tx0, tx1) {
  const t = game.timer;
  for (let tx = tx0; tx <= tx1; tx++) {
    if (tileAt(tx, 13) !== " " || tileAt(tx, 14) !== " ") continue;
    const x = tx * TILE;
    const fl = Math.sin(t * 0.08 + tx * 1.7) * 2;
    g.fillStyle = "#e84a1a";
    g.fillRect(x, LEVEL_H - 8 + fl * 0.3, TILE, 12);
    g.fillStyle = "#ffb02a";
    g.fillRect(x + 2, LEVEL_H - 9 + fl * 0.5, 4, 3);
    g.fillRect(x + 9, LEVEL_H - 8 - fl * 0.5, 4, 3);
  }
}

function drawCagePug() {
  const p = game.pug, gy = 13 * TILE;
  const hop = p.free ? -Math.abs(Math.sin(p.hopT * 0.15)) * 6 : 0;
  drawPug(g, p.x, gy + hop);
  if (!p.free) {
    g.fillStyle = "#caa23c";
    g.fillRect(p.x - 13, gy - 30, 26, 3);
    g.fillRect(p.x - 13, gy - 2, 26, 2);
    for (let i = 0; i <= 5; i++) g.fillRect(p.x - 13 + i * 4.8, gy - 28, 1.8, 26);
  } else if ((game.timer >> 3) % 2 === 0) {
    g.fillStyle = "#ff5e7e";
    g.font = "bold 9px monospace"; g.textAlign = "center"; g.textBaseline = "alphabetic";
    g.fillText("\u2665", p.x, gy - 24 + Math.sin(game.timer * 0.1) * 2);
  }
}

function drawWorld() {
  const L = game.level, camX = game.camX;
  drawBackground(camX);
  // powerups still rising are drawn first so the block hides them
  for (const p of game.powerups) if (p.rise > 0) drawPowerup(g, p);
  const tx0 = Math.max(0, Math.floor(camX / TILE) - 1);
  const tx1 = Math.min(L.width - 1, Math.ceil((camX + VIEW_W) / TILE) + 1);
  for (let ty = 0; ty < ROWS; ty++)
    for (let tx = tx0; tx <= tx1; tx++) {
      const c = L.grid[ty][tx];
      if (c !== " ") drawTile(c, tx, ty);
    }
  if (L.theme === "castle") drawLava(tx0, tx1);
  if (L.flagX) drawFlag(L.flagX);

  for (const p of game.powerups) if (p.rise <= 0) {
    if (p.type === "mushroom") softShadow(p.x + p.w/2, p.y + p.h, 6);
    drawPowerup(g, p);
  }
  for (const f of game.fireballs) drawFireball(g, f, game.timer);

  for (const e of L.enemies) {
    if (!e.active || e.dead > 25) continue;
    if (e.grounded) softShadow(e.x + e.w/2, e.y + e.h, 6.5);
    drawGrump(g, e.x + e.w/2, e.y + e.h, e.frame, e.dead, Math.sign(e.vx) || -1);
  }

  if (game.pug) drawCagePug();
  if (game.boss && game.boss.y < LEVEL_H + 60) drawBowser(g, game.boss);
  for (const fl of game.bossFlames) drawFlame(g, fl);

  // coin pops
  for (const c of game.pops) {
    const yy = c.y - 8 - c.t * 1.2;
    g.fillStyle = "#f6c14f";
    g.beginPath(); g.ellipse(c.x, yy, 4, 5.5, 0, 0, Math.PI*2); g.fill();
    g.fillStyle = "#fff0c0";
    g.beginPath(); g.ellipse(c.x, yy, 1.6, 3, 0, 0, Math.PI*2); g.fill();
  }
  // particles
  for (const p of game.particles) {
    if (p.t < 0) continue;
    g.fillStyle = p.c;
    if (p.conf) { g.save(); g.translate(p.x, p.y); g.rotate(p.t * 0.1 + p.x); g.fillRect(-2, -1.4, 4, 2.8); g.restore(); }
    else g.fillRect(p.x - 2, p.y - 2, 4, 4);
  }

  // player (flickers while invincible after taking a hit)
  const pal = player.power === 2 ? firePal(heroKey) : CHARS[heroKey];
  if (game.state === "dead") {
    g.save();
    g.translate(player.x + player.w/2, player.y + player.h);
    g.scale(1, -1); g.translate(-(player.x + player.w/2), -(player.y + player.h) + player.h + 6);
    drawKid(g, player.x + player.w/2, player.y + player.h, pal, 0, player.facing, true, false, 0);
    g.restore();
  } else if (!(player.inv > 0 && (game.timer >> 2) % 2 === 0)) {
    if (player.grounded) softShadow(player.x + player.w/2, player.y + player.h, 7);
    drawKid(g, player.x + player.w/2, player.y + player.h, pal,
            player.phase, player.facing, !player.grounded, Math.abs(player.vx) > 0.3, player.power);
  }

  if ((game.level.theme || "day") === "day") lightingPass(camX);
}

function hud() {
  g.save();
  g.setTransform(DPR, 0, 0, DPR, 0, 0);
  const top = Math.max(10, (window.visualViewport ? 0 : 0) + 10);
  g.font = "bold 16px 'Avenir Next',Arial";
  g.textAlign = "left"; g.textBaseline = "top";
  outlineText("♥".repeat(Math.max(0, game.lives)), 14, top, "#ff5e7e");
  outlineText("● " + game.coins, 14, top + 22, "#ffd166");
  g.textAlign = "right";
  outlineText(game.level ? game.level.name : "", W - 14, top, "#fff");
  outlineText(String(game.score).padStart(6, "0"), W - 14, top + 22, "#fff");
  g.restore();
}
function outlineText(t, x, y, color) {
  g.lineWidth = 4; g.strokeStyle = "rgba(0,0,0,.45)"; g.lineJoin = "round";
  g.strokeText(t, x, y); g.fillStyle = color; g.fillText(t, x, y);
}

function centerCard(lines) {
  g.save();
  g.setTransform(DPR, 0, 0, DPR, 0, 0);
  g.fillStyle = "rgba(0,0,0,.45)"; g.fillRect(0, 0, W, H);
  g.textAlign = "center"; g.textBaseline = "middle";
  let y = H/2 - (lines.length-1) * 22;
  for (const [txt, size, col] of lines) {
    g.font = "800 " + size + "px 'Avenir Next',Arial";
    outlineText(txt, W/2, y, col);
    y += size + 18;
  }
  g.restore();
}

function drawGameOver() {
  g.save();
  g.setTransform(DPR, 0, 0, DPR, 0, 0);
  g.fillStyle = "rgba(0,0,10,.6)"; g.fillRect(0, 0, W, H);
  g.textAlign = "center"; g.textBaseline = "middle";
  g.font = "900 " + Math.min(W/9, 48) + "px 'Avenir Next',Arial";
  outlineText("GAME OVER", W/2, H*0.3, "#ff5e7e");
  // continue button (same level, fresh lives, score kept)
  const bw = Math.min(W*0.62, 310), bh = 56;
  const bx = W/2 - bw/2, by = H*0.46;
  const pulse = 1 + Math.sin(game.timer * 0.07) * 0.02;
  g.save();
  g.translate(W/2, by + bh/2); g.scale(pulse, pulse); g.translate(-W/2, -(by + bh/2));
  g.fillStyle = "#ffd166"; roundRect(bx, by, bw, bh, 16); g.fill();
  g.lineWidth = 4; g.strokeStyle = "#b8862c"; roundRect(bx, by, bw, bh, 16); g.stroke();
  g.fillStyle = "#5a3c10"; g.font = "900 " + Math.min(bw/11, 23) + "px 'Avenir Next',Arial";
  g.fillText("\u25b6 CONTINUE " + (game.level ? game.level.name : ""), W/2, by + bh/2);
  g.restore();
  // back-to-title link
  const tw = Math.min(W*0.5, 240), th = 40, tx2 = W/2 - tw/2, ty2 = by + bh + 22;
  g.fillStyle = "rgba(255,255,255,.16)"; roundRect(tx2, ty2, tw, th, 12); g.fill();
  g.font = "700 " + Math.min(W/26, 16) + "px 'Avenir Next',Arial";
  outlineText("back to title", W/2, ty2 + th/2, "#fff");
  game.goHits = [
    { x: bx, y: by, w: bw, h: bh, action: "continue" },
    { x: tx2, y: ty2, w: tw, h: th, action: "title" },
  ];
  g.restore();
}

function drawTitle() {
  g.save();
  g.setTransform(DPR, 0, 0, DPR, 0, 0);
  // real sky photo, slowly drifting
  if (texOK(ASSETS.sky)) {
    const sk = ASSETS.sky;
    const dh = Math.max(H * 0.85, 300), dw = dh * (sk.width / sk.height);
    const off = -((game.timer * 0.15) % dw);
    g.fillStyle = "#39536e"; g.fillRect(0, 0, W, H);
    for (let i = -1; i < W / dw + 2; i++) g.drawImage(sk, off + i * dw, H * 0.62 - dh / 2, dw, dh);
    const tg = g.createLinearGradient(0, 0, 0, H * 0.45);
    tg.addColorStop(0, "#39536e"); tg.addColorStop(1, "rgba(57,83,110,0)");
    g.fillStyle = tg; g.fillRect(0, 0, W, H * 0.45);
  } else {
    g.fillStyle = "#4f7faa"; g.fillRect(0, 0, W, H);
  }
  // photographed ground strip
  if (texOK(ASSETS.soil)) {
    g.drawImage(ASSETS.soil, 0, 60, 256, 60, 0, H - 40, W, 40);
    g.drawImage(ASSETS.grass, 0, 80, 256, 26, 0, H - 50, W, 12);
    g.fillStyle = "rgba(20,12,4,.35)"; g.fillRect(0, H - 39, W, 4);
  } else {
    g.fillStyle = "#5e4a30"; g.fillRect(0, H - 40, W, 40);
  }
  g.fillStyle = "rgba(10,8,16,.22)"; g.fillRect(0, 0, W, H);   // cinematic grade

  g.textAlign = "center"; g.textBaseline = "middle";
  const big = Math.min(W/9, H*0.105, 52);
  const ty1 = H * 0.10;
  g.font = "900 " + big + "px 'Avenir Next',Arial";
  outlineText("SUPER", W/2, ty1, "#ffd166");
  outlineText("YOUNG SISTERS", W/2, ty1 + big + 6, "#ff5e7e");
  g.font = "800 " + Math.min(W/24, 18) + "px 'Avenir Next',Arial";
  outlineText("🌿 LIFELIKE EDITION 🌿", W/2, ty1 + big*1.72 + 12, "#cfe8c0");
  if (H > W * 0.9) {
    g.font = "700 " + Math.min(W/22, 20) + "px 'Avenir Next',Arial";
    outlineText("Pick your hero!", W/2, ty1 + big*2.3 + 26, "#fff");
  }

  // character cards (sized to fit landscape too)
  game.titleCards = [];
  const cw = Math.min(W * 0.36, 170, H * 0.45), ch = Math.min(cw * 1.15, H * 0.5);
  const cy = H * (W > H ? 0.58 : 0.52);
  const keysArr = ["jules", "nora"];
  keysArr.forEach((k, i) => {
    const cxp = W/2 + (i === 0 ? -1 : 1) * (cw/2 + 14);
    const sx = cxp - cw/2, sy = cy - ch/2;
    const bounce = Math.sin(game.timer * 0.08 + i * 2) * 4;
    g.fillStyle = "rgba(255,255,255,.92)";
    roundRect(sx, sy, cw, ch, 16); g.fill();
    g.lineWidth = 4; g.strokeStyle = i === 0 ? "#f59cc4" : "#4fbfa2";
    roundRect(sx, sy, cw, ch, 16); g.stroke();
    // sprite (scaled up)
    g.save();
    g.translate(cxp, sy + ch * 0.62 + bounce);
    const ks = cw / 44;
    g.scale(ks, ks);
    drawKid(g, 0, 0, CHARS[k], game.timer * 0.12, 1, false, true);
    g.restore();
    g.font = "900 " + cw/6.2 + "px 'Avenir Next',Arial";
    outlineText(CHARS[k].name, cxp, sy + ch - cw/7, i === 0 ? "#e074a8" : "#2f9e7e");
    game.titleCards.push({ key: k, sx, sy, sw: cw, sh: ch });
  });

  g.font = "600 " + Math.min(W/26, 16) + "px 'Avenir Next',Arial";
  outlineText("tap a hero to start", W/2, cy + ch/2 + 34, "#fff");
  g.font = "600 12px 'Avenir Next',Arial";
  outlineText("made with ♥ for Jules & Nora", W/2, H - 16, "#ffe9f0");
  g.restore();
}
function roundRect(x, y, w, h, r) {
  g.beginPath();
  g.moveTo(x+r, y); g.arcTo(x+w, y, x+w, y+h, r); g.arcTo(x+w, y+h, x, y+h, r);
  g.arcTo(x, y+h, x, y, r); g.arcTo(x, y, x+w, y, r); g.closePath();
}

function drawWinScreen() {
  g.save();
  g.setTransform(DPR, 0, 0, DPR, 0, 0);
  const grad = g.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, "#2b3a8f"); grad.addColorStop(1, "#7d6ad9");
  g.fillStyle = grad; g.fillRect(0, 0, W, H);
  // stars
  for (let i = 0; i < 40; i++) {
    const sx = (i * 97.3) % W, sy = (i * 53.7) % (H*0.6);
    const tw = Math.sin(game.timer * 0.07 + i) * 0.5 + 0.5;
    g.fillStyle = "rgba(255,255,240," + (0.3 + tw*0.7) + ")";
    g.fillRect(sx, sy, 2.5, 2.5);
  }
  g.textAlign = "center"; g.textBaseline = "middle";
  g.font = "900 " + Math.min(W/8, 56) + "px 'Avenir Next',Arial";
  outlineText("YOU WIN!", W/2, H*0.22, "#ffd166");
  g.font = "700 " + Math.min(W/20, 22) + "px 'Avenir Next',Arial";
  outlineText("Jules & Nora save the day!", W/2, H*0.32, "#fff");

  // both kids celebrating
  const ks = Math.min(W, H) / 110;
  [["jules", -1], ["nora", 1]].forEach(([k, side]) => {
    g.save();
    const hop = Math.abs(Math.sin(game.timer * 0.1 + (side+1))) * 14;
    g.translate(W/2 + side * Math.min(W*0.16, 90), H*0.62 - hop);
    g.scale(ks, ks);
    drawKid(g, 0, 0, CHARS[k], 0, -side, true, false);
    g.restore();
  });

  // Peach the pug, safe at last
  g.save();
  const pugHop = Math.abs(Math.sin(game.timer * 0.12)) * 10;
  g.translate(W/2, H*0.62 - pugHop);
  g.scale(ks * 0.9, ks * 0.9);
  drawPug(g, 0, 0);
  g.restore();

  g.font = "800 " + Math.min(W/16, 26) + "px 'Avenir Next',Arial";
  outlineText("SCORE " + game.score + "   ●×" + game.coins, W/2, H*0.76, "#fff");
  if (game.timer > 90 && Math.floor(game.timer/30) % 2 === 0) {
    g.font = "700 " + Math.min(W/22, 18) + "px 'Avenir Next',Arial";
    outlineText("tap to play again", W/2, H*0.86, "#aee0ff");
  }
  // confetti in screen space
  g.restore();
}

function draw() {
  g.setTransform(DPR, 0, 0, DPR, 0, 0);
  g.clearRect(0, 0, W, H);

  if (!ASSETS.ready) {
    g.fillStyle = "#15131f"; g.fillRect(0, 0, W, H);
    g.fillStyle = "#cfc8e8"; g.font = "700 18px 'Avenir Next',Arial";
    g.textAlign = "center"; g.textBaseline = "middle";
    g.fillText("loading the real world" + ".".repeat(1 + (Math.floor(game.timer / 20) % 3)), W/2, H/2);
    return;
  }

  if (game.state === "title") { drawTitle(); return; }
  if (game.state === "win")   {
    drawWinScreen();
    // overlay confetti (game coords roughly map; redraw in screen space)
    g.setTransform(DPR, 0, 0, DPR, 0, 0);
    for (const p of game.particles) {
      if (p.t < 0 || !p.conf) continue;
      g.fillStyle = p.c;
      g.save();
      g.translate((p.x - game.camX) * SCALE, p.y * (H / LEVEL_H));
      g.rotate(p.t * 0.1 + p.x);
      g.fillRect(-3, -2, 6, 4);
      g.restore();
    }
    return;
  }

  // world transform: in portrait, lift the play area above the touch controls
  const extra = Math.max(0, H / SCALE - LEVEL_H);
  const reserve = Math.min(extra, 130 / SCALE);   // ~130 css px for buttons
  const offY = extra - reserve;
  g.setTransform(DPR * SCALE, 0, 0, DPR * SCALE, -game.camX * DPR * SCALE, offY * DPR * SCALE);
  drawWorld();
  if (reserve > 0) {                              // underground band beneath the level
    const ug = g.createLinearGradient(0, LEVEL_H, 0, LEVEL_H + reserve + 8);
    ug.addColorStop(0, "#4e2c14"); ug.addColorStop(1, "#241204");
    g.fillStyle = ug;
    g.fillRect(game.camX - 4, LEVEL_H, VIEW_W + 8, reserve + 8);
    g.fillStyle = "rgba(0,0,0,.35)";
    g.fillRect(game.camX - 4, LEVEL_H, VIEW_W + 8, 2.5);
  }
  hud();

  if (game.state === "gameover") drawGameOver();
  if (game.state === "clear") centerCard(game.rescued ? [
    ["PEACH IS SAFE! \ud83d\udc36", Math.min(W/10, 40), "#ffd166"],
    ["you rescued the pug princess!", Math.min(W/24, 18), "#fff"],
  ] : [
    ["LEVEL CLEAR!", Math.min(W/10, 44), "#ffd166"],
    [(game.levelNum + 1 < LEVEL_COUNT ? "get ready for " + (game.levelNum+2) + "..." : "one more surprise..."), Math.min(W/24, 18), "#fff"],
  ]);
}

/* ============================== MAIN LOOP ============================== */
let last = performance.now(), acc = 0;
function frame(now) {
  requestAnimationFrame(frame);
  acc += Math.min(now - last, 100); last = now;
  const STEP = 1000 / 60;
  let steps = 0;
  while (acc >= STEP && steps < 5) { update(); acc -= STEP; steps++; }
  if (steps === 5) acc = 0;
  draw();
}
goTitle();
requestAnimationFrame(frame);
window.__g = { game, player, startLevel, update, draw, input, keys };   // debug handle

</script>
